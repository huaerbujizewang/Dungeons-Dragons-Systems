<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硬核科技树</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #101318;
            --panel: #171c24;
            --panel-soft: #202734;
            --line: #3d4a5c;
            --line-bright: #77b7ff;
            --text: #e8edf5;
            --muted: #8d98aa;
            --paper: #d4c39d;
            --paper-dark: #2a241c;
            --blue: #58a6ff;
            --green: #55d17d;
            --gold: #d9a441;
            --red: #df6a6a;
            --violet: #aa8bff;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
                radial-gradient(circle at top left, rgba(88,166,255,0.16), transparent 34rem),
                var(--bg);
            background-size: 28px 28px, 28px 28px, auto, auto;
            color: var(--text);
            font-family: Consolas, "PingFang SC", "Microsoft YaHei", monospace;
        }

        button, input, select, textarea { font-family: inherit; }
        button { cursor: pointer; }

        .app {
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .topbar {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(119,183,255,0.35);
            background: rgba(16,19,24,0.94);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .brand h1 {
            margin: 0;
            color: var(--blue);
            font-size: 1.25rem;
            letter-spacing: 0;
        }

        .brand .sub {
            color: var(--muted);
            font-size: 0.78rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .top-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

        .btn {
            border: 1px solid rgba(119,183,255,0.55);
            background: rgba(88,166,255,0.08);
            color: var(--text);
            border-radius: 4px;
            padding: 8px 10px;
            font-size: 0.85rem;
        }

        .btn:hover { background: rgba(88,166,255,0.18); border-color: var(--blue); }
        .btn.danger { border-color: rgba(223,106,106,0.7); color: #ffd4d4; background: rgba(223,106,106,0.08); }
        .btn.good { border-color: rgba(85,209,125,0.7); color: #d8ffe1; background: rgba(85,209,125,0.08); }
        .btn.gold { border-color: rgba(217,164,65,0.75); color: #ffe7b4; background: rgba(217,164,65,0.08); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .layout {
            min-height: 0;
            display: grid;
            grid-template-columns: 250px minmax(0, 1fr) 340px;
        }

        .layout.no-admin {
            grid-template-columns: 250px minmax(0, 1fr);
        }

        .sidebar, .control-panel {
            min-height: 0;
            overflow-y: auto;
            background: rgba(18,22,29,0.9);
            border-right: 1px solid rgba(119,183,255,0.18);
            padding: 12px;
        }

        .control-panel {
            border-right: none;
            border-left: 1px solid rgba(119,183,255,0.18);
        }

        .panel-title {
            color: #dcecff;
            font-weight: bold;
            font-size: 0.86rem;
            margin: 4px 0 10px;
        }

        .category-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 9px 10px;
            margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.09);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            text-align: left;
            border-radius: 4px;
        }

        .category-btn.active {
            border-color: rgba(88,166,255,0.85);
            background: rgba(88,166,255,0.15);
            box-shadow: inset 3px 0 0 var(--blue);
        }

        .era-tabs {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
            margin-bottom: 12px;
        }

        .era-btn {
            min-height: 48px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.035);
            color: var(--text);
            border-radius: 4px;
            padding: 7px 8px;
            text-align: left;
        }

        .era-btn strong {
            display: block;
            font-size: 0.82rem;
            margin-bottom: 3px;
        }

        .era-btn span {
            display: block;
            color: var(--muted);
            font-size: 0.68rem;
            line-height: 1.25;
        }

        .era-btn.active {
            border-color: rgba(88,166,255,0.85);
            background: rgba(88,166,255,0.15);
            box-shadow: inset 0 -2px 0 var(--blue);
        }

        .era-btn.empty {
            opacity: 0.68;
        }

        .category-count {
            color: var(--muted);
            font-size: 0.75rem;
        }

        .main {
            min-width: 0;
            min-height: 0;
            display: grid;
            grid-template-rows: auto 1fr;
            overflow: hidden;
        }

        .category-header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(23,28,36,0.78);
        }

        .category-header h2 {
            margin: 0 0 6px;
            font-size: 1.2rem;
            color: #f1f6ff;
        }

        .legend {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 0.78rem;
        }

        .era-line {
            color: #aab7c8;
            font-size: 0.78rem;
            margin-bottom: 7px;
        }

        .legend span {
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            padding: 3px 8px;
            background: rgba(0,0,0,0.15);
        }

        .slot-strip {
            padding: 0 0 14px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: transparent;
            margin-bottom: 12px;
        }

        .slot-card {
            border: 1px solid rgba(119,183,255,0.22);
            background: rgba(255,255,255,0.035);
            border-radius: 4px;
            padding: 9px;
            min-height: 86px;
        }

        .slot-card.busy { border-color: rgba(217,164,65,0.6); box-shadow: inset 0 0 0 1px rgba(217,164,65,0.12); }
        .slot-name { display:flex; justify-content:space-between; gap:8px; font-weight:bold; color:#f1f6ff; font-size:0.86rem; }
        .slot-cats { color: var(--muted); font-size:0.72rem; margin-top:4px; line-height:1.4; }
        .slot-work { margin-top:8px; font-size:0.78rem; color:#c8d8ea; }
        .slot-progress {
            height: 8px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(0,0,0,0.28);
            border-radius: 999px;
            overflow: hidden;
        }
        .slot-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(88,166,255,0.9), rgba(85,209,125,0.9));
            box-shadow: 0 0 10px rgba(88,166,255,0.35);
        }
        .slot-progress-text {
            margin-top: 5px;
            color: #aab7c8;
            font-size: 0.7rem;
        }
        .slot-actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
        .slot-actions .btn { padding:5px 7px; font-size:0.72rem; }

        .tree-scroll {
            position: relative;
            min-height: 0;
            overflow: auto;
            padding: 22px;
        }

        .tree-board {
            position: relative;
            min-width: max-content;
            min-height: 640px;
            padding: 12px 18px 28px;
        }

        #link-layer {
            position: absolute;
            left: 0;
            top: 0;
            pointer-events: none;
            overflow: visible;
            z-index: 0;
        }

        .tech-columns {
            position: relative;
            z-index: 1;
            display: grid;
            gap: 36px;
            align-items: start;
        }

        .depth-col {
            width: 230px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .depth-label {
            color: var(--muted);
            border-bottom: 1px dashed rgba(255,255,255,0.15);
            padding-bottom: 6px;
            font-size: 0.78rem;
        }

        .tech-node {
            position: relative;
            min-height: 118px;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(19,24,32,0.94);
            box-shadow: 0 10px 24px rgba(0,0,0,0.24);
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .tech-node.available {
            border-color: rgba(88,166,255,0.8);
            box-shadow: 0 0 0 1px rgba(88,166,255,0.14), 0 12px 24px rgba(0,0,0,0.28);
        }

        .tech-node.available:hover { transform: translateY(-2px); background: rgba(25,36,51,0.97); }
        .tech-node.researching {
            border-color: rgba(217,164,65,0.9);
            background: linear-gradient(135deg, rgba(217,164,65,0.13), rgba(19,24,32,0.96));
            box-shadow: 0 0 0 1px rgba(217,164,65,0.18), inset 0 0 24px rgba(217,164,65,0.08);
        }
        .tech-node.researched {
            border-color: rgba(85,209,125,0.85);
            background: linear-gradient(135deg, rgba(85,209,125,0.12), rgba(19,24,32,0.95));
        }
        .tech-node.locked {
            opacity: 0.54;
            border-style: dashed;
            background: rgba(15,18,24,0.86);
            filter: grayscale(0.35);
        }

        .tech-name { font-weight: bold; color: #f5f8ff; margin-bottom: 6px; line-height: 1.3; }
        .tech-meta { display:flex; gap:6px; flex-wrap:wrap; color: var(--muted); font-size:0.72rem; margin-bottom:8px; }
        .tech-chip { border:1px solid rgba(255,255,255,0.12); border-radius:999px; padding:2px 7px; background:rgba(0,0,0,0.16); }
        .tech-state { font-size:0.75rem; color:#dcecff; margin-bottom:8px; }
        .tech-prereq { color: var(--muted); font-size:0.72rem; line-height:1.45; }
        .prereq-row {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 5px;
            align-items: start;
        }
        .prereq-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .prereq-link {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(0,0,0,0.18);
            color: #dcecff;
            border-radius: 4px;
            padding: 3px 5px;
            font-size: 0.7rem;
            line-height: 1.2;
            cursor: pointer;
            text-align: left;
        }
        .prereq-link span {
            display: block;
            color: #8fa0b6;
            font-size: 0.62rem;
            margin-top: 1px;
        }
        .prereq-link.researched {
            border-color: rgba(85,209,125,0.55);
            color: #d8ffe1;
        }
        .prereq-link.missing {
            border-color: rgba(217,164,65,0.65);
            color: #ffd89c;
        }
        .node-action { margin-top:10px; width:100%; padding:7px 8px; font-size:0.78rem; }

        .tech-node.dm-click-unlock {
            cursor: crosshair;
            box-shadow: 0 0 0 1px rgba(217,164,65,0.2), 0 12px 24px rgba(0,0,0,0.28);
        }

        .focus-pulse {
            animation: focusPulse 1.2s ease-out 2;
        }

        @keyframes focusPulse {
            0% { box-shadow: 0 0 0 0 rgba(119,183,255,0.8), 0 12px 24px rgba(0,0,0,0.28); }
            100% { box-shadow: 0 0 0 14px rgba(119,183,255,0), 0 12px 24px rgba(0,0,0,0.28); }
        }

        .empty-era {
            color: var(--muted);
            border: 1px dashed rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.025);
            border-radius: 4px;
            padding: 14px;
            font-size: 0.82rem;
            line-height: 1.5;
        }

        .link-path {
            fill: none;
            stroke: rgba(141,152,170,0.45);
            stroke-width: 2;
            stroke-dasharray: 7 6;
        }

        .link-path.active {
            stroke: rgba(119,183,255,0.9);
            stroke-dasharray: none;
            filter: drop-shadow(0 0 4px rgba(119,183,255,0.45));
        }

        .control-section {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.03);
        }

        .control-section h3 {
            margin: 0 0 10px;
            font-size: 0.95rem;
            color: #f2f7ff;
        }

        .form-row { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
        .form-row label { color: var(--muted); font-size:0.76rem; }
        input[type="text"], input[type="number"], select {
            width: 100%;
            color: var(--text);
            background: rgba(0,0,0,0.24);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 4px;
            padding: 8px;
        }

        .check-grid {
            display:grid;
            grid-template-columns: 1fr;
            gap: 5px;
            max-height: 220px;
            overflow:auto;
            padding-right: 4px;
        }

        .check-row {
            display:flex;
            align-items:center;
            gap:7px;
            color:#c9d4e4;
            font-size:0.78rem;
        }

        .warning {
            color: #ffd89c;
            border: 1px solid rgba(217,164,65,0.38);
            background: rgba(217,164,65,0.09);
            padding: 8px;
            border-radius: 4px;
            font-size: 0.78rem;
            line-height: 1.45;
            margin-bottom: 10px;
            display:none;
        }

        .hidden { display:none !important; }

        @media (max-width: 1100px) {
            .layout { grid-template-columns: 220px minmax(0,1fr); }
            .control-panel { grid-column: 1 / -1; max-height: 360px; border-left:none; border-top:1px solid rgba(119,183,255,0.18); }
        }

        @media (max-width: 760px) {
            .app { height:auto; min-height:100vh; }
            .layout { grid-template-columns: 1fr; }
            .sidebar, .control-panel { max-height:none; border-right:none; border-bottom:1px solid rgba(119,183,255,0.18); }
            .main { min-height: 760px; }
            .topbar { align-items:flex-start; flex-direction:column; }
            .tree-scroll { padding: 12px; }
        }
    </style>
</head>
<body>
<div class="app">
    <header class="topbar">
        <div class="brand">
            <h1>硬核策略科技树 · 蓝图终端</h1>
            <div class="sub" id="state-line">正在连接科研档案...</div>
        </div>
        <div class="top-actions">
            <button class="btn" onclick="window.location.href='index.html'">返回终端</button>
            <button class="btn" onclick="saveState()">保存状态</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="panel-title">科研槽位</div>
            <section id="slot-strip" class="slot-strip"></section>
            <div class="panel-title">科技领域</div>
            <div id="era-tabs" class="era-tabs"></div>
            <div id="category-menu"></div>
        </aside>

        <main class="main">
            <section class="category-header">
                <h2 id="category-title">科技树</h2>
                <div class="era-line" id="era-line">时代 / 页面</div>
                <div class="legend">
                    <span>暗色虚线：Locked</span>
                    <span>蓝框：Available</span>
                    <span>金框：Researching</span>
                    <span>绿框：Researched</span>
                </div>
            </section>

            <section class="tree-scroll" id="tree-scroll">
                <div class="tree-board" id="tree-board">
                    <svg id="link-layer"></svg>
                    <div id="tech-columns" class="tech-columns"></div>
                </div>
            </section>
        </main>

        <aside class="control-panel hidden" id="dm-panel">
            <div class="panel-title">DM 控制面板</div>
            <div class="slot-cats" id="dm-role-line" style="margin-bottom:10px;">正在验证权限...</div>
            <div class="warning" id="storage-warning"></div>

            <div class="control-section">
                <h3>DM 快捷操作</h3>
                <button class="btn" id="dm-click-unlock-btn" style="width:100%;" onclick="toggleDmClickUnlockMode()">点击解锁模式：关闭</button>
                <div class="slot-cats" id="dm-click-unlock-line" style="margin-top:8px;">开启后，点击科技节点即可为当前玩家解锁或取消解锁。</div>
            </div>

            <div class="control-section">
                <h3>玩家科技档案</h3>
                <div class="form-row">
                    <label>当前操作玩家</label>
                    <select id="dm-player-select" onchange="switchResearchTarget(this.value)"></select>
                </div>
                <div class="slot-cats" id="target-player-line">未选择玩家</div>
            </div>

            <div class="control-section">
                <h3>科研槽管理</h3>
                <div class="form-row">
                    <label>槽位名称</label>
                    <input type="text" id="new-slot-name" placeholder="例如：炼金专修槽">
                </div>
                <label class="check-row"><input type="checkbox" id="new-slot-all" onchange="toggleAllCategoryChecks()">允许全部领域（ALL）</label>
                <div class="form-row" style="margin-top:8px;">
                    <label>允许领域</label>
                    <div id="slot-category-checks" class="check-grid"></div>
                </div>
                <button class="btn good" style="width:100%;" onclick="addSlot()">新增槽位</button>
            </div>

            <div class="control-section">
                <h3>槽位列表</h3>
                <div id="slot-admin-list"></div>
            </div>

            <div class="control-section">
                <h3>科技强制控制</h3>
                <div class="form-row">
                    <label>科技节点</label>
                    <select id="force-tech-select"></select>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn good" style="flex:1;" onclick="forceUnlockSelected()">强制解锁</button>
                    <button class="btn danger" style="flex:1;" onclick="forceUnresearchSelected()">强制取消</button>
                </div>
                <div class="form-row" style="margin-top:12px;">
                    <label>层级快捷解锁</label>
                    <select id="force-depth-select"></select>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn good" style="flex:1;" onclick="forceUnlockDepthExact()">解锁该层级</button>
                    <button class="btn gold" style="flex:1;" onclick="forceUnlockThroughDepth()">推进到层级 X</button>
                </div>
            </div>
        </aside>
    </div>
</div>

function escapeHTML(value) {
    return String(value ?? '').replace(/[&<>'"]/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[ch]));
}

function getEraByPage(page) {
    return ERA_DEFS.find(era => era.start !== null && page >= era.start && page <= era.end) || ERA_DEFS[0];
}

function buildTechData() {
    techNodes = [];
    techById = new Map();
    idByName = new Map();
    categoryMeta = new Map();
    let seq = 1;
    categories.forEach((category, index) => {
        const page = index + 1;
        const era = getEraByPage(page);
        categoryMeta.set(category, { page, era: era.id, eraName: era.name });
        RAW_TECH[category].forEach(([name, prereqNames, days]) => {
            const id = `tech_${String(seq++).padStart(3, '0')}`;
            idByName.set(name, id);
            techNodes.push({ id, name, category, prereqNames, prerequisites: [], base_days: days, depth: 0, page, era: era.id });
        });
    });

    techNodes.forEach(node => {
        node.prerequisites = node.prereqNames.map(name => idByName.get(name)).filter(Boolean);
        node.missingPrerequisites = node.prereqNames.filter(name => !idByName.has(name));
        techById.set(node.id, node);
    });

    const memo = new Map();
    const visiting = new Set();
    const calcDepth = (node) => {
        if (memo.has(node.id)) return memo.get(node.id);
        if (visiting.has(node.id)) return 0;
        visiting.add(node.id);
        const depth = node.prerequisites.length
            ? Math.max(...node.prerequisites.map(id => calcDepth(techById.get(id)))) + 1
            : 0;
        visiting.delete(node.id);
        memo.set(node.id, depth);
        return depth;
    };
    techNodes.forEach(node => node.depth = calcDepth(node));
}

function defaultSlots() {
    return [
        { id: 'slot_1', name: '通用槽', allowed_categories: ['ALL'], current_research: null },
        createResearchSlot('slot_2', '军工专修槽', ['武器与防具', '攻城、火器与爆破'], idByName.get('链甲') || null)
    ];
}

function createResearchSlot(id, name, allowedCategories, techId = null) {
    const tech = techId ? techById.get(techId) : null;
    return {
        id,
        name,
        allowed_categories: allowedCategories,
        current_research: tech ? tech.id : null,
        progress_days: 0,
        research_total_days: tech ? tech.base_days : null,
        research_started_at: tech ? new Date().toISOString() : null,
        research_name: tech ? tech.name : null,
        speed_multiplier: 1,
        boost_label: null
    };
}

function clearSlotResearch(slot) {
    slot.current_research = null;
    slot.progress_days = 0;
    slot.research_total_days = null;
    slot.research_started_at = null;
    slot.research_name = null;
}

function setSlotResearch(slot, tech) {
    slot.current_research = tech.id;
    slot.progress_days = 0;
    slot.research_total_days = tech.base_days;
    slot.research_started_at = new Date().toISOString();
    slot.research_name = tech.name;
}

function researchedSet() {
    return new Set(appState.researched_ids || []);
}

function isSlotAllowed(slot, category) {
    return (slot.allowed_categories || []).includes('ALL') || (slot.allowed_categories || []).includes(category);
}

function isResearching(id) {
    return (appState.slots || []).some(slot => slot.current_research === id);
}

function prereqsMet(node, set = researchedSet()) {
    return node.missingPrerequisites.length === 0 && node.prerequisites.every(id => set.has(id));
}

function getTechState(node) {
    const set = researchedSet();
    if (set.has(node.id)) return 'Researched';
    if (isResearching(node.id)) return 'Researching';
    if (prereqsMet(node, set)) return 'Available';
    return 'Locked';
}

    buildTechData();

    renderCategoryMenu();

    targetUid = isAdmin ? (requestedUid || currentUserId) : currentUserId;

        if (requestedUid && requestedUid !== currentUserId) {

        }
    }

    window.addEventListener('resize', drawLinks);
    document.getElementById('tree-scroll').addEventListener('scroll', drawLinks);
}

async function loadState() {
    const localKey = `tech_tree_state_${targetUid}`;
    const warning = document.getElementById('storage-warning');
    if (warning) {
        warning.style.display = 'none';
        warning.innerText = '';
    }
    try {
        const { data, error } = await supabaseClient
            .from('tech_tree_state')
            .select('researched_ids, slots')
            .eq('user_id', targetUid)
            .maybeSingle();
        if (error) throw error;
        appState = data || { researched_ids: [], slots: defaultSlots() };
        if (!appState.slots || appState.slots.length === 0) appState.slots = defaultSlots();
        const shouldSaveMetadata = hasSlotMissingProgressMetadata();
        normalizeState();
        persistenceMode = 'supabase';
        setStateLine('Supabase 档案已连接');
        if (shouldSaveMetadata) await saveState();
    } catch (e) {
        persistenceMode = 'local';
        const cached = localStorage.getItem(localKey);
        appState = cached ? JSON.parse(cached) : { researched_ids: [], slots: defaultSlots() };
        const shouldSaveMetadata = hasSlotMissingProgressMetadata();
        normalizeState();
        showWarning(`科技树状态表未就绪，当前使用本机缓存。请执行 tech_tree_state.sql。错误：${e.message || e}`);
        setStateLine('本机缓存模式');
        if (shouldSaveMetadata) await saveState();
    }
}

function hasSlotMissingProgressMetadata() {
    return (appState.slots || []).some(slot =>
        slot.current_research && (slot.progress_days === undefined || !slot.research_total_days)
    );
}

async function saveState() {
    normalizeState();
    const payload = {
        user_id: targetUid,
        researched_ids: appState.researched_ids || [],
        slots: appState.slots || [],
        updated_at: new Date().toISOString()
    };

    if (persistenceMode === 'local') {
        localStorage.setItem(`tech_tree_state_${targetUid}`, JSON.stringify(payload));
        setStateLine('已保存到本机缓存');
        return;
    }

    const { error } = await supabaseClient.from('tech_tree_state').upsert(payload, { onConflict: 'user_id' });
    if (error) {
        persistenceMode = 'local';
        localStorage.setItem(`tech_tree_state_${targetUid}`, JSON.stringify(payload));
        showWarning(`保存到 Supabase 失败，已回退本机缓存。请确认 tech_tree_state.sql 已执行。错误：${error.message}`);
    } else {
        setStateLine(`已保存 · ${new Date().toLocaleTimeString('zh-CN', { hour12:false })}`);
    }
}

function setStateLine(text) {
    const label = targetLabel || targetUid || '未选择玩家';
    document.getElementById('state-line').innerText = `${label} · ${text} · 已解锁 ${appState.researched_ids?.length || 0}/${techNodes.length}`;
    const targetLine = document.getElementById('target-player-line');
    if (targetLine) targetLine.innerText = `当前档案：${label}`;
}

function showWarning(text) {
    const box = document.getElementById('storage-warning');
    box.style.display = 'block';
    box.innerText = text;
}

async function loadPlayerOptions() {
    const select = document.getElementById('dm-player-select');
    if (!select) return;

    try {
        const { data, error } = await supabaseClient
            .from('profiles')
            .select('id, email')
            .order('email', { ascending: true });
        if (error) throw error;

        const rows = data && data.length
            ? data
            : [{ id: currentUserId, email: '当前账号' }];
        if (!rows.some(row => row.id === targetUid)) {
            rows.unshift({ id: targetUid, email: targetUid });
        }

        select.innerHTML = rows.map(row => {
            const selected = row.id === targetUid ? 'selected' : '';
            return `<option value="${escapeHTML(row.id)}" ${selected}>${escapeHTML(row.email || row.id)}</option>`;
        }).join('');

        const active = rows.find(row => row.id === targetUid);
        targetLabel = active?.email || targetUid;
    } catch (e) {
        select.innerHTML = `<option value="${escapeHTML(targetUid)}">${escapeHTML(targetUid)}</option>`;
        showWarning(`玩家列表读取失败，但仍可操作当前 URL 指定档案。错误：${e.message || e}`);
    }
}

function renderSlots() {
    const strip = document.getElementById('slot-strip');
    strip.innerHTML = (appState.slots || []).map(slot => {

        const cats = (slot.allowed_categories || []).includes('ALL') ? 'ALL / 全领域' : slot.allowed_categories.join('、');
        const done = tech ? Math.min(Number(slot.progress_days) || 0, Number(slot.research_total_days) || tech.base_days) : 0;
        const total = tech ? (Number(slot.research_total_days) || tech.base_days) : 0;
        const pct = total ? Math.min(100, Math.round((done / total) * 100)) : 0;
        const multiplier = Math.max(0, Number(slot.speed_multiplier) || 1);
        const boostText = multiplier !== 1 ? ` · 加速 ${Math.round(multiplier * 100)}%` : '';
        const work = tech

               <div class="slot-progress" title="${done}/${total} 天">

               <div class="slot-actions">
                   <button class="btn good" onclick="completeResearch('${slot.id}')">完成研究</button>
                   <button class="btn danger" onclick="cancelSlotResearch('${slot.id}')">撤销挂载</button>
               </div>`
            : '<div class="slot-work" style="color:#7f8da0;">空闲，可接入匹配领域科技。</div>';
        return `<div class="slot-card ${tech ? 'busy' : ''}">
            <div class="slot-name"><span>${escapeHTML(slot.name)}</span><span>${tech ? '●' : '○'}</span></div>

function renderTechTree() {
    const era = ERA_DEFS.find(item => item.id === selectedEra);
    if (!selectedCategory) {
        document.getElementById('category-title').innerText = `${era?.name || '科技树'} / 暂无科技`;
        document.getElementById('era-line').innerText = '该时代尚未录入科技节点';
        document.getElementById('link-layer').innerHTML = '';
        const columns = document.getElementById('tech-columns');
        columns.style.gridTemplateColumns = 'minmax(280px, 520px)';
        columns.innerHTML = `<div class="empty-era">未来时代已经预留入口；等你给出节点后，可以直接加入 RAW_TECH 并分配页码。</div>`;
        return;
    }

    document.getElementById('category-title').innerText = `${CATEGORY_ICONS[selectedCategory] || '◇'} ${selectedCategory}`;
    const meta = categoryMeta.get(selectedCategory);
    document.getElementById('era-line').innerText = `${meta?.eraName || era?.name || '时代'} · 第 ${meta?.page || '-'} 页 · 点击前置标识可跳转`;
    const nodes = techNodes.filter(t => t.category === selectedCategory);
    const depths = Array.from(new Set(nodes.map(n => n.depth))).sort((a, b) => a - b);
    const columns = document.getElementById('tech-columns');
    columns.style.gridTemplateColumns = `repeat(${depths.length || 1}, 230px)`;

    let html = '';
    for (const depth of depths) {
        const inDepth = nodes.filter(n => n.depth === depth);
        html += `<div class="depth-col"><div class="depth-label">Depth ${depth}</div>${inDepth.map(renderNode).join('')}</div>`;
    }
    columns.innerHTML = html;
    requestAnimationFrame(drawLinks);
}

function renderNode(node) {
    const state = getTechState(node);
    const prereqText = node.prereqNames.length
        ? node.prereqNames.map(name => renderPrereqBadge(name)).join('')
        : '<span>无</span>';
    const missingText = node.missingPrerequisites.length
        ? `<div class="tech-prereq" style="color:#ffd89c;">缺失前置定义：${escapeHTML(node.missingPrerequisites.join('、'))}</div>`
        : '';
    const action = state === 'Available'
        ? `<button class="btn node-action" onclick="event.stopPropagation(); startResearch('${node.id}')">挂载研发</button>`
        : state === 'Locked'
            ? `<button class="btn node-action" disabled>前置未满足</button>`
            : state === 'Researching'
                ? `<button class="btn gold node-action" disabled>槽位研发中</button>`
                : `<button class="btn good node-action" disabled>已解锁</button>`;
    const clickUnlockClass = dmClickUnlockMode && ['dm', 'root'].includes(currentUserRole) ? ' dm-click-unlock' : '';

    return `<article class="tech-node ${state.toLowerCase()}${clickUnlockClass}" id="node-${node.id}" data-tech-id="${node.id}" onclick="handleTechNodeClick(event, '${node.id}')">
        <div class="tech-name">${escapeHTML(node.name)}</div>
        <div class="tech-meta">
            <span class="tech-chip">${node.base_days} 天</span>
            <span class="tech-chip">${escapeHTML(node.category)}</span>
        </div>
        <div class="tech-state">${stateLabels[state]}</div>
        <div class="tech-prereq prereq-row"><span>前置：</span><div class="prereq-list">${prereqText}</div></div>
        ${missingText}
        ${action}
    </article>`;
}

function renderPrereqBadge(name) {
    const id = idByName.get(name);
    if (!id) return `<span class="prereq-link missing">${escapeHTML(name)}<span>缺失定义</span></span>`;
    const node = techById.get(id);
    const meta = categoryMeta.get(node.category);
    const state = getTechState(node).toLowerCase();
    const title = `${node.category} · 第 ${meta?.page || '-'} 页 · Depth ${node.depth}`;
    return `<button type="button" class="prereq-link ${state}" title="${escapeHTML(title)}" onclick="jumpToPrerequisite(event, '${id}')">
        ${escapeHTML(name)}<span>${escapeHTML(meta?.eraName || '')} / ${escapeHTML(node.category)} / P${meta?.page || '-'}</span>
    </button>`;
}

function drawLinks() {
    const board = document.getElementById('tree-board');
    const svg = document.getElementById('link-layer');
    if (!selectedCategory) {
        svg.innerHTML = '';
        return;
    }
    const nodes = techNodes.filter(t => t.category === selectedCategory);
    const visibleIds = new Set(nodes.map(n => n.id));
    svg.setAttribute('width', board.scrollWidth);
    svg.setAttribute('height', board.scrollHeight);
    svg.style.width = `${board.scrollWidth}px`;
    svg.style.height = `${board.scrollHeight}px`;
    svg.innerHTML = '';

    const set = researchedSet();
    nodes.forEach(node => {
        node.prerequisites.forEach(preId => {
            if (!visibleIds.has(preId)) return;
            const from = document.getElementById(`node-${preId}`);
            const to = document.getElementById(`node-${node.id}`);
            if (!from || !to) return;
            const x1 = from.offsetLeft + from.offsetWidth;
            const y1 = from.offsetTop + from.offsetHeight / 2;
            const x2 = to.offsetLeft;
            const y2 = to.offsetTop + to.offsetHeight / 2;
            const mid = x1 + Math.max(44, (x2 - x1) / 2);
            const active = set.has(preId) && getTechState(node) !== 'Locked';
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`);
            path.setAttribute('class', `link-path ${active ? 'active' : ''}`);
            svg.appendChild(path);
        });
    });
}

function jumpToPrerequisite(event, techId) {
    event.stopPropagation();
    const node = techById.get(techId);
    if (!node) return;
    selectedCategory = node.category;
    selectedEra = categoryMeta.get(node.category)?.era || selectedEra;
    renderAll();
    requestAnimationFrame(() => {
        const el = document.getElementById(`node-${techId}`);
        if (!el) return;
        el.scrollIntoView({ block: 'center', inline: 'center', behavior: 'smooth' });
        el.classList.add('focus-pulse');
        window.setTimeout(() => el.classList.remove('focus-pulse'), 2400);
    });
}

async function handleTechNodeClick(event, techId) {
    if (!dmClickUnlockMode || !['dm', 'root'].includes(currentUserRole)) return;
    if (event.target.closest('.prereq-link') || event.target.closest('.node-action')) return;
    await forceToggleTechId(techId);
}

    dmClickUnlockMode = !dmClickUnlockMode;

    renderTechTree();

function renderDmClickUnlockMode() {

    const line = document.getElementById('dm-click-unlock-line');
    if (!btn || !line) return;
    btn.textContent = dmClickUnlockMode ? '点击解锁模式：开启' : '点击解锁模式：关闭';
    btn.classList.toggle('gold', dmClickUnlockMode);

        : '开启后，点击科技节点即可为当前玩家解锁或取消解锁。';

async function forceUnlockTechId(id) {
    if (!['dm', 'root'].includes(currentUserRole)) return false;
    if (!id || !techById.has(id)) return false;
    if (!appState.researched_ids.includes(id)) appState.researched_ids.push(id);
    appState.slots.forEach(slot => {
        if (slot.current_research === id) clearSlotResearch(slot);
    });
    await saveState();
    renderAll();
    return true;
}

async function forceToggleTechId(id) {
    if (researchedSet().has(id)) return forceCancelTechId(id, false);
    return forceUnlockTechId(id);
}

async function forceCancelTechId(id, askConfirm = true) {
    if (!['dm', 'root'].includes(currentUserRole)) return false;
    if (!id || !techById.has(id)) return false;
    const node = techById.get(id);
    if (askConfirm && !confirm(`确定取消「${node?.name || id}」的解锁？只会取消该科技本身，不会牵连后续科技。`)) return false;
    const set = researchedSet();
    set.delete(id);
    appState.researched_ids = techNodes.filter(node => set.has(node.id)).map(node => node.id);
    appState.slots.forEach(slot => {
        if (slot.current_research === id) clearSlotResearch(slot);
    });
    await saveState();
    renderAll();
    return true;
}

async function startResearch(techId) {
    const node = techById.get(techId);
    if (!node || getTechState(node) !== 'Available') return;
    const slot = (appState.slots || []).find(s => !s.current_research && isSlotAllowed(s, node.category));
    if (!slot) {
        alert('无对应领域的可用科研槽');
        return;
    }
    setSlotResearch(slot, node);
    await saveState();
    renderAll();
}

async function completeResearch(slotId) {
    const slot = appState.slots.find(s => s.id === slotId);
    if (!slot?.current_research) return;
    const techId = slot.current_research;
    if (!appState.researched_ids.includes(techId)) appState.researched_ids.push(techId);
    clearSlotResearch(slot);
    await saveState();
    renderAll();
}

async function cancelSlotResearch(slotId) {
    const slot = appState.slots.find(s => s.id === slotId);
    if (!slot?.current_research) return;
    if (!confirm('确定撤销该槽位当前研发？')) return;
    clearSlotResearch(slot);
    await saveState();
    renderAll();
}

async function addSlot() {

function renderSlotAdminList() {

async function assignTechToSlot(slotId) {
    if (!['dm', 'root'].includes(currentUserRole)) return alert('仅 DM 可操作');
    const slot = appState.slots.find(s => s.id === slotId);
    const select = document.getElementById(`slot-force-${slotId}`);
    if (!slot || !select?.value) return;
    const tech = techById.get(select.value);
    if (!tech) return alert('科技不存在');
    if (!isSlotAllowed(slot, tech.category)) return alert('该槽位不允许此科技领域');
    appState.slots.forEach(s => {
        if (s.current_research === tech.id) clearSlotResearch(s);
    });
    setSlotResearch(slot, tech);
    await saveState();
    renderAll();
}

async function clearAdminSlot(slotId) {
    if (!['dm', 'root'].includes(currentUserRole)) return alert('仅 DM 可操作');
    const slot = appState.slots.find(s => s.id === slotId);
    if (!slot) return;
    clearSlotResearch(slot);
    await saveState();
    renderAll();
}

async function setSlotProgress(slotId) {
    if (!['dm', 'root'].includes(currentUserRole)) return alert('仅 DM 可操作');
    const slot = appState.slots.find(s => s.id === slotId);
    const tech = slot?.current_research ? techById.get(slot.current_research) : null;
    if (!slot || !tech) return alert('该槽位当前没有研发项目');
    const input = document.getElementById(`slot-progress-${slotId}`);
    const total = Number(slot.research_total_days) || tech.base_days;
    const value = Math.max(0, Number(input?.value) || 0);
    if (value >= total) {
        if (!appState.researched_ids.includes(tech.id)) appState.researched_ids.push(tech.id);
        clearSlotResearch(slot);
    } else {
        slot.progress_days = value;
        slot.research_total_days = total;
        slot.research_name = tech.name;
    }
    await saveState();
    renderAll();
}

async function setSlotBoost(slotId) {
    if (!['dm', 'root'].includes(currentUserRole)) return alert('仅 DM 可操作');
    const slot = appState.slots.find(s => s.id === slotId);
    if (!slot) return;
    const input = document.getElementById(`slot-boost-${slotId}`);
    const percent = Math.max(0, Number(input?.value) || 100);
    slot.speed_multiplier = percent / 100;
    slot.boost_label = percent === 100 ? null : `${percent}% 加速卡`;
    await saveState();
    renderAll();
}

async function clearSlotBoost(slotId) {
    if (!['dm', 'root'].includes(currentUserRole)) return alert('仅 DM 可操作');
    const slot = appState.slots.find(s => s.id === slotId);
    if (!slot) return;
    slot.speed_multiplier = 1;
    slot.boost_label = null;
    await saveState();
    renderAll();
}

async function deleteSlot(slotId) {
    if (!['dm', 'root'].includes(currentUserRole)) return alert('仅 DM 可操作');
    const slot = appState.slots.find(s => s.id === slotId);
    if (!slot) return;
    if (!confirm(`确定删除槽位「${slot.name}」？当前研发也会被撤销。`)) return;
    appState.slots = appState.slots.filter(s => s.id !== slotId);

async function forceUnlockDepthExact() {

}

async function forceUnlockThroughDepth() {
    await forceUnlockByDepth(true);
}

async function forceUnlockByDepth(throughDepth) {
    if (!['dm', 'root'].includes(currentUserRole)) return alert('仅 DM 可操作');
    const depth = Number(document.getElementById('force-depth-select').value);
    if (!Number.isInteger(depth) || depth < 0) return;

    const affected = techNodes.filter(node => throughDepth ? node.depth <= depth : node.depth === depth);
    const set = researchedSet();
    const newlyUnlocked = affected.filter(node => !set.has(node.id));
    const actionLabel = throughDepth ? `推进到 Depth ${depth}` : `解锁 Depth ${depth}`;
    if (!affected.length) return alert('该层级没有科技节点');
    if (!newlyUnlocked.length) return alert('所选范围内的科技已经全部解锁');
    if (!confirm(`确定为「${targetLabel || targetUid}」${actionLabel}？将强制解锁 ${newlyUnlocked.length} 个科技。`)) return;

    newlyUnlocked.forEach(node => set.add(node.id));
    appState.researched_ids = techNodes.filter(node => set.has(node.id)).map(node => node.id);

    const affectedIds = new Set(newlyUnlocked.map(node => node.id));
    appState.slots.forEach(slot => {
        if (affectedIds.has(slot.current_research)) clearSlotResearch(slot);
    });

    await saveState();
    renderAll();
}

async function forceUnresearchSelected() {
    if (!['dm', 'root'].includes(currentUserRole)) return alert('仅 DM 可操作');
    const id = document.getElementById('force-tech-select').value;
    if (!id) return;
    await forceCancelTechId(id, true);
}

function normalizeState() {
    appState.researched_ids = Array.from(new Set((appState.researched_ids || []).filter(id => techById.has(id))));
    appState.slots = (appState.slots || []).map(slot => {
        const current = techById.has(slot.current_research) ? slot.current_research : null;
        const tech = current ? techById.get(current) : null;
        const progress = Math.max(0, Number(slot.progress_days) || 0);
        const total = tech ? (Number(slot.research_total_days) || tech.base_days) : null;
        return {
            id: slot.id || `slot_${Date.now()}_${Math.random().toString(16).slice(2)}`,
            name: slot.name || '未命名科研槽',
            allowed_categories: slot.allowed_categories?.length ? slot.allowed_categories : ['ALL'],
            current_research: current,
            progress_days: tech ? Math.min(progress, total) : 0,
            research_total_days: tech ? total : null,
            research_started_at: tech ? (slot.research_started_at || new Date().toISOString()) : null,
            research_name: tech ? (slot.research_name || tech.name) : null,
            speed_multiplier: Math.max(0, Number(slot.speed_multiplier) || 1),
            boost_label: slot.boost_label || null
        };
    });
}

window.onload = init;
</script>
</body>
</html>
