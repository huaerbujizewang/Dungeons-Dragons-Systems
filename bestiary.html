<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>怪物图鉴</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- 核心复用样式 --- */
        :root { --border: #e0e0e0; --bg: #f8f9fa; --active: #333; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #fff; color: #333; margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        /* 导航与Tab */
        .nav { display: flex; gap: 15px; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 30px; align-items: center; }
        .tab-btn { padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 1em; color: #7f8c8d; border-radius: 4px; font-weight: 500; transition: 0.2s; }
        .tab-btn.active { background: #333; color: #fff; }
        .tab-btn:hover:not(.active) { color: #333; background: #f0f0f0; }

        /* 网格与卡片 */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 15px; position: relative; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); text-align: center; }
        .card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.08); border-color: #bbb; transform: translateY(-2px); }
        
        /* 图鉴特有样式 */
        .threat-header { color: #c0392b; border-bottom: 2px solid #e74c3c; margin: 30px 0 15px 0; padding-bottom: 5px; font-size: 1.2em; font-weight: bold; font-variant: small-caps; display: flex; align-items: center; gap: 8px; }
        .enemy-status-tag { font-size: 0.75em; display: inline-block; padding: 2px 10px; border-radius: 12px; background: #c0392b; color: white; font-weight: bold; margin-bottom: 8px; }
        
        /* 边框颜色 (复用星级颜色，但用于威胁等级) */
        .rarity-border-6 { border-top: 5px solid #e74c3c; border-image: linear-gradient(to right, #f1c40f, #e74c3c, #f1c40f) 1; box-shadow: 0 -2px 10px rgba(231, 76, 60, 0.2); }
        .rarity-border-5 { border-top: 5px solid #f1c40f; }
        .rarity-border-4 { border-top: 5px solid #9b59b6; }

        /* --- 弹窗与档案样式 (完全复用) --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        #dossier-modal .modal-box { width: 900px; max-width: 95%; height: 600px; background: #1a1a1a; color: #ecf0f1; padding: 0; overflow: hidden; display: flex; border: 1px solid #444; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .dossier-left { width: 350px; position: relative; background: #111; overflow: hidden; flex-shrink: 0; border-right: 1px solid #333; }
        .dossier-stand-img { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to bottom, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%); transition: transform 0.3s; opacity: 0; }
        .dossier-stand-img.loaded { opacity: 1; }
        .dossier-stand-img:hover { transform: scale(1.02); }
        .dossier-bg-blur { position: absolute; top:0; left:0; width:100%; height:100%; background-size: cover; background-position: center; filter: blur(20px) brightness(0.4); z-index: 0; }
        .dossier-watermark { position: absolute; bottom: -20px; left: -20px; font-size: 6em; font-weight: 900; color: rgba(255,255,255,0.03); z-index: 1; pointer-events: none; white-space: nowrap; font-family: Impact, sans-serif; }
        .dossier-right { flex: 1; display: flex; flex-direction: column; background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjMWExYTFhIi8+CjxwYXRoIGQ9Ik0wIDBoNHYxSDB6IiBmaWxsPSIjMjIyIi8+Cjwvc3ZnPg=='); }
        .dossier-header { padding: 20px 30px; border-bottom: 2px solid #e74c3c; background: linear-gradient(to right, rgba(231, 76, 60, 0.1), transparent); display: flex; justify-content: space-between; align-items: flex-end; }
        .dossier-name { font-size: 2.5em; font-weight: 900; line-height: 1; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .dossier-meta { color: #e74c3c; font-weight: bold; font-size: 0.9em; background: #000; padding: 2px 8px; display: inline-block; transform: skewX(-15deg); margin-top: 5px; }
        .dossier-meta span { display: block; transform: skewX(15deg); }
        .dossier-tabs { display: flex; background: #000; padding-left: 20px; border-bottom: 1px solid #333; }
        .dossier-tab-btn { padding: 12px 25px; background: transparent; color: #666; border: none; cursor: pointer; font-weight: bold; font-size: 0.9em; transition: 0.2s; border-bottom: 3px solid transparent; }
        .dossier-tab-btn:hover { color: #fff; background: #222; }
        .dossier-tab-btn.active { color: #e74c3c; border-bottom-color: #e74c3c; background: #1a1a1a; }
        .dossier-content { flex: 1; overflow-y: auto; padding: 25px 30px; position: relative; }
        .dossier-pane { display: none; animation: fadeIn 0.3s; }
        .dossier-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 档案内部细节 */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .info-item { border-bottom: 1px solid #333; padding-bottom: 5px; }
        .info-label { font-size: 0.8em; color: #7f8c8d; display: block; margin-bottom: 2px; }
        .info-val { font-size: 1.1em; color: #fff; font-weight: 500; }
        .tag-box { display: inline-block; background: #333; color: #ccc; font-size: 0.75em; padding: 2px 6px; border-radius: 2px; margin-right: 5px; }

        .combat-top-bar { display: flex; gap: 15px; margin-bottom: 25px; }
        .combat-stat-box { flex: 1; background: #222; border-left: 4px solid #555; padding: 8px 12px; display: flex; flex-direction: column; justify-content: space-between; min-height: 80px; }
        .combat-stat-box.hp { border-color: #e74c3c; background: linear-gradient(to bottom, #2c2c2c, #222); }
        .combat-stat-box.ac { border-color: #3498db; background: linear-gradient(to bottom, #2c2c2c, #222); }
        .stat-label-top { font-size: 0.7em; color: #aaa; text-transform: uppercase; align-self: flex-start; }
        .stat-val-top { font-size: 2.2em; font-weight: 900; color: #fff; font-family: 'Arial Black', sans-serif; line-height: 1.1; margin-top: 2px; }
        .stat-note-top { font-size: 0.75em; color: #666; align-self: flex-end; font-family: 'Consolas', monospace; text-align: right; }
        
        .ability-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 25px; }
        .ability-box { background: #2c3e50; color: #fff; text-align: center; padding: 8px 0; border-radius: 2px; }
        .ability-title { font-size: 0.7em; color: #95a5a6; display: block; margin-bottom: 2px; }
        .ability-score { font-size: 0.9em; color: #bdc3c7; }
        .ability-mod { font-size: 1.4em; font-weight: bold; color: #fff; display: block; margin-top: -2px; }

        .props-list { font-size: 0.9em; color: #ccc; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; }
        .props-row { margin-bottom: 5px; display: flex; }
        .props-key { color: #f39c12; width: 60px; flex-shrink: 0; font-weight: bold; }
        .props-val { color: #ecf0f1; }

        .combat-section-title { font-size: 0.85em; font-weight: bold; color: #7f8c8d; margin: 20px 0 8px 0; padding-left: 10px; border-left: 4px solid #555; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; background: linear-gradient(to right, rgba(255,255,255,0.05), transparent); }
        .combat-section-title.action { border-left-color: #e74c3c; color: #e74c3c; }
        .combat-section-title.bonus { border-left-color: #e67e22; color: #e67e22; }
        .combat-section-title.reaction { border-left-color: #9b59b6; color: #9b59b6; }
        .combat-section-title.legendary { border-left-color: #f1c40f; color: #f1c40f; }

        .trait-card { margin-bottom: 12px; background: #252525; padding: 10px 15px; border-left: 3px solid #666; }
        .trait-card.action { border-left-color: #e74c3c; }
        .trait-card.bonus { border-left-color: #e67e22; }
        .trait-card.reaction { border-left-color: #9b59b6; }
        .trait-card.legendary { border-left-color: #f1c40f; }
        .trait-title { font-weight: bold; color: #fff; margin-bottom: 4px; font-size: 1.05em; }
        .trait-desc { font-size: 0.9em; color: #aaa; line-height: 1.6; }
        .trait-desc b { color: #ddd; }

        .spell-group { margin-bottom: 10px; font-size: 0.9em; }
        .spell-level { color: #3498db; font-weight: bold; display: inline-block; width: 120px; }
        .spell-items { color: #ccc; }

        .resume-text { font-family: 'Courier New', Courier, monospace; line-height: 1.8; color: #ccc; font-size: 0.95em; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav" style="justify-content: space-between;">
        <div style="font-size: 1.5em; font-weight: bold; color: #c0392b;">🧌 怪物与威胁档案</div>
        <button onclick="window.location.href='index.html'" style="padding: 8px 16px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">🔙 返回终端</button>
    </div>

    <div id="faction-tabs" class="nav" style="border-bottom: none; gap: 10px;">
        </div>

    <div id="enemies-container">
        </div>
</div>

<div id="dossier-modal" class="modal">
    <div class="modal-box">
        <div class="dossier-left">
            <div id="dossier-bg-blur" class="dossier-bg-blur"></div>
            <img id="dossier-stand-img" src="" class="dossier-stand-img">
            <div id="dossier-watermark" class="dossier-watermark">DANGER</div>
        </div>

        <div class="dossier-right">
            <div class="dossier-header">
                <div>
                    <div id="dossier-name" class="dossier-name">NAME</div>
                    <div class="dossier-meta"><span id="dossier-meta">TYPE</span></div>
                </div>
                <div id="dossier-stars" style="color:#e74c3c; font-size:1.2em; letter-spacing:2px;">⚠️⚠️⚠️</div>
            </div>

            <div class="dossier-tabs">
                <button class="dossier-tab-btn active" onclick="switchDossierTab('basic')">基础档案</button>
                <button class="dossier-tab-btn" onclick="switchDossierTab('combat')">战斗属性</button>
                <button class="dossier-tab-btn" onclick="switchDossierTab('resume')">侦查情报</button>
                <button class="dossier-tab-btn" onclick="closeModal('dossier-modal')" style="margin-left:auto; color:#666;">✕ 关闭</button>
            </div>

            <div class="dossier-content">
                <div id="dossier-pane-basic" class="dossier-pane active">
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">【目标名称】</span>
                            <span id="info-name" class="info-val">--</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">【生物分类】</span>
                            <span id="info-race" class="info-val">--</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">【阵营/势力】</span>
                            <span id="info-origin" class="info-val">--</span>
                        </div>
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <span class="info-label">【威胁标签】</span>
                            <div id="info-tags" style="margin-top:5px;"></div>
                        </div>
                    </div>
                </div>

                <div id="dossier-pane-combat" class="dossier-pane">
                    <div class="combat-top-bar">
                        <div class="combat-stat-box hp">
                            <span class="stat-label-top">HP / 生命值</span>
                            <div id="combat-hp" class="stat-val-top">0</div>
                            <div id="combat-hp-note" class="stat-note-top"></div>
                        </div>
                        <div class="combat-stat-box ac">
                            <span class="stat-label-top">AC / 护甲</span>
                            <div id="combat-ac" class="stat-val-top">10</div>
                            <div id="combat-ac-note" class="stat-note-top"></div>
                        </div>
                        <div class="combat-stat-box spd" style="border-color:#2ecc71; background: linear-gradient(to bottom, #2c2c2c, #222);">
                            <span class="stat-label-top">SPD / 速度</span>
                            <div id="combat-speed" class="stat-val-top">30尺</div>
                            <div id="combat-speed-note" class="stat-note-top"></div>
                        </div>
                    </div>

                    <div id="combat-stats-grid" class="ability-grid"></div>
                    <div id="combat-props" class="props-list"></div>
                    <div id="combat-abilities-list"></div>
                </div>

                <div id="dossier-pane-resume" class="dossier-pane">
                    <div id="resume-content" class="resume-text"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 1. Supabase 初始化 ---
    const SUPABASE_URL = 'https://vbzfpgucpciqgaakqndz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTc2MzMsImV4cCI6MjA4MzE3MzYzM30.fBVDirEJ52bvrYJZ5DNv7fVDLNgCwITKwdKqT6YJDYw'; // 使用你 index.html 中的 Key
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentUserEmail = null;
    let allEnemies = [];
    let currentFaction = '全部';

    const threatWeights = { '首领': 3, '精英': 2, '杂兵': 1 };

    // --- 2. 页面加载与鉴权 ---
    async function initBestiary() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
            alert('未检测到终端权限，请先登录');
            window.location.href = 'index.html';
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        
        let targetEmail = session.user.email; 
        
        if (uid && uid !== 'undefined' && uid !== 'null') {
            const { data: profile } = await supabaseClient.from('profiles').select('email').eq('id', uid).single();
            if (profile) targetEmail = profile.email;
        }

        try {
            const { data, error } = await supabaseClient.from('bestiary').select('*');
            if (error) throw error;
            
            allEnemies = data.filter(enemy => 
                (enemy.visible_to || []).includes('all') || 
                (enemy.visible_to || []).includes(targetEmail)
            );

            renderTabs();
            renderEnemies();
        } catch (e) {
            console.error("图鉴加载失败", e);
            document.getElementById('enemies-container').innerHTML = '<div style="color:red; padding: 20px;">读取敌人数据失败，请检查网络或控制台报错。</div>';
        }
    }

    // --- 3. 渲染分类 Tabs ---
    function renderTabs() {
        const factions = ['全部', ...new Set(allEnemies.map(e => e.faction))];
        const tabContainer = document.getElementById('faction-tabs');
        
        tabContainer.innerHTML = factions.map(f => `
            <button class="tab-btn ${f === currentFaction ? 'active' : ''}" 
                    onclick="switchFaction('${f}')">${f}</button>
        `).join('');
    }

    function switchFaction(faction) {
        currentFaction = faction;
        renderTabs();
        renderEnemies();
    }

    // --- 4. 渲染怪物网格卡片 ---
    function renderEnemies() {
        const container = document.getElementById('enemies-container');
        
        let filtered = allEnemies;
        if (currentFaction !== '全部') {
            filtered = allEnemies.filter(e => e.faction === currentFaction);
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div style="color:#999; padding:20px; text-align:center;">该分类下暂无已记录的档案。</div>';
            return;
        }

        // 按威胁等级分组
        const grouped = { '首领': [], '精英': [], '杂兵': [] };
        filtered.forEach(e => {
            const level = e.threat_level || '杂兵';
            if (!grouped[level]) grouped[level] = [];
            grouped[level].push(e);
        });

        let html = '';
        ['首领', '精英', '杂兵'].forEach(level => {
            if (grouped[level].length > 0) {
                const icon = level === '首领' ? '☠️' : (level === '精英' ? '⚔️' : '🛡️');
                html += `<div class="threat-header">${icon} 威胁等级：${level}</div>`;
                html += `<div class="shop-grid">`;
                
                grouped[level].forEach(e => {
                    const rarityBorder = level === '首领' ? 'rarity-border-6' : (level === '精英' ? 'rarity-border-5' : 'rarity-border-4');
                    html += `
                        <div class="card emp-card-content ${rarityBorder}">
                            <img src="${e.avatar_url || 'https://via.placeholder.com/70'}" 
                                 style="width:70px; height:70px; border-radius:50%; object-fit:cover; margin-bottom:10px; border:1px solid #eee;">
                            <div style="font-weight:bold; font-size:1.1em;">${e.name}</div>
                            <div style="font-size:0.8em; color:#666; margin:4px 0;">${e.faction}</div>
                            <div class="enemy-status-tag">${e.status || '敌对实体'}</div>
                            <div style="margin-top:10px;">
                                <button onclick="openEnemyDossier('${e.id}')" style="font-size:0.85em; padding:6px 15px; border:1px solid #c0392b; background:#fffcf0; color:#c0392b; border-radius:4px; cursor:pointer; font-weight:bold; transition: 0.2s;" onmouseover="this.style.background='#c0392b'; this.style.color='#fff';" onmouseout="this.style.background='#fffcf0'; this.style.color='#c0392b';">
                                    📜 查阅档案
                                </button>
                            </div>
                        </div>`;
                });
                html += `</div>`;
            }
        });

        container.innerHTML = html;
    }

    // --- 5. 档案弹窗逻辑 ---
    function openEnemyDossier(enemyId) {
        const enemy = allEnemies.find(e => e.id == enemyId);
        if (!enemy || !enemy.stat_block) return alert('档案数据损坏或未录入详细数据');

        const modal = document.getElementById('dossier-modal');
        resetDossierUI(); 
        
        modal.style.display = 'flex';
        switchDossierTab('basic');
        
        const data = enemy.stat_block;
        const basic = data.basic_info || {};

        // 头部与立绘
        const imgEl = document.getElementById('dossier-stand-img');
        imgEl.src = enemy.stand_url || enemy.avatar_url || 'https://via.placeholder.com/300x500';
        imgEl.onload = () => imgEl.classList.add('loaded');
        if (imgEl.complete) imgEl.classList.add('loaded');

        document.getElementById('dossier-bg-blur').style.backgroundImage = `url('${enemy.avatar_url || imgEl.src}')`;
        document.getElementById('dossier-name').innerText = enemy.name;
        document.getElementById('dossier-meta').innerText = data.meta || '未知实体';
        document.getElementById('dossier-stars').innerText = '⚠️'.repeat(threatWeights[enemy.threat_level] || 1);

        // Tab 1: 基础档案
        document.getElementById('info-name').innerText = enemy.name;
        document.getElementById('info-race').innerText = data.meta || '--';
        document.getElementById('info-origin').innerText = enemy.faction || '未知';
        document.getElementById('info-tags').innerHTML = `<span class="tag-box" style="background:#c0392b;">${enemy.threat_level}</span>`;
        if (basic.tags) {
            basic.tags.forEach(tag => {
                document.getElementById('info-tags').innerHTML += `<span class="tag-box">${tag}</span>`;
            });
        }

        // Tab 2: 战斗属性
        renderCombatTab(data);

        // Tab 3: 情报
        document.getElementById('resume-content').innerText = data.resume || "【系统提示】\n未检索到该实体的详细侦查情报。";
    }

    function resetDossierUI() {
        document.getElementById('dossier-stand-img').src = ''; 
        document.getElementById('dossier-stand-img').classList.remove('loaded');
        document.getElementById('dossier-bg-blur').style.backgroundImage = 'none';
        
        ['combat-hp', 'combat-ac', 'combat-speed'].forEach(id => document.getElementById(id).innerText = '--');
        ['combat-hp-note', 'combat-ac-note', 'combat-speed-note'].forEach(id => document.getElementById(id).innerText = '');
        document.getElementById('combat-stats-grid').innerHTML = '';
        document.getElementById('combat-props').innerHTML = '';
        document.getElementById('combat-abilities-list').innerHTML = '';
    }

    function renderCombatTab(data) {
        // HP / AC / Speed
        const parseVal = (str) => {
            if(!str) return { val: '--', note: '' };
            const match = str.match(/^([^\uff08(]+)(?:[\uff08(](.*)[\uff09)])?$/);
            return match ? { val: match[1].trim(), note: match[2] || '' } : { val: str, note: '' };
        };

        const hpData = parseVal(data.hp);
        document.getElementById('combat-hp').innerText = hpData.val;
        document.getElementById('combat-hp-note').innerText = hpData.note;

        const acData = parseVal(data.ac);
        document.getElementById('combat-ac').innerText = acData.val;
        document.getElementById('combat-ac-note').innerText = acData.note;

        const speedRaw = data.speed || '--';
        const splitRegex = /[,，]/;
        if (splitRegex.test(speedRaw)) {
            const parts = speedRaw.split(splitRegex);
            document.getElementById('combat-speed').innerText = parts[0].trim();
            document.getElementById('combat-speed-note').innerText = parts.slice(1).join(', ').trim();
        } else {
            document.getElementById('combat-speed').innerText = speedRaw;
        }

        // 六维
        const statKeys = ['str', 'dex', 'con', 'int', 'wis', 'cha'];
        const grid = document.getElementById('combat-stats-grid');
        if (data.stats) {
            statKeys.forEach(k => {
                const s = data.stats[k] || { score: 10, mod: '+0' };
                grid.innerHTML += `
                    <div class="ability-box">
                        <span class="ability-title">${k.toUpperCase()}</span>
                        <span class="ability-mod">${s.mod}</span>
                        <span class="ability-score">${s.score}</span>
                    </div>`;
            });
        }

        // Props (豁免/技能/感官)
        const propsDiv = document.getElementById('combat-props');
        if (data.props) {
            data.props.forEach(p => {
                propsDiv.innerHTML += `
                    <div class="props-row">
                        <div class="props-key">${p.label}</div>
                        <div class="props-val">${p.value}</div>
                    </div>`;
            });
        }

        // 能力/动作
        const listDiv = document.getElementById('combat-abilities-list');
        const renderSection = (title, list, typeClass) => {
            if (!list || list.length === 0) return;
            listDiv.innerHTML += `<div class="combat-section-title ${typeClass}">${title}</div>`;
            list.forEach(item => {
                let desc = (item.desc || '').replace(/\n/g, '<br>').replace(/^([^。]+。)/gm, '<b>$1</b>');
                listDiv.innerHTML += `
                    <div class="trait-card ${typeClass}">
                        <div class="trait-title">${item.name}</div>
                        <div class="trait-desc">${desc}</div>
                    </div>`;
            });
        };

        renderSection('特性 / TRAITS', data.traits, '');
        renderSection('动作 / ACTIONS', data.actions, 'action');       
        renderSection('附赠 / BONUS', data.bonus_actions, 'bonus');   
        renderSection('反应 / REACTIONS', data.reactions, 'reaction'); 
        renderSection('传奇 / LEGENDARY', data.legendary_actions, 'legendary'); 

        // 施法
        if (data.spells && data.spells.list && data.spells.list.length > 0) {
            listDiv.innerHTML += `<div class="combat-section-title" style="border-left-color:#3498db; color:#3498db;">施法 / SPELLS</div>`;
            let spellHtml = `<div class="trait-card" style="border-left-color:#3498db;">
                <div class="trait-desc" style="margin-bottom:10px; font-style:italic; color:#aaa;">${data.spells.header || ''}</div>`;
            data.spells.list.forEach(s => {
                spellHtml += `
                    <div class="spell-group">
                        <span class="spell-level">${s.level}</span>
                        <span class="spell-items">${s.spells}</span>
                    </div>`;
            });
            spellHtml += '</div>';
            listDiv.innerHTML += spellHtml;
        }
    }

    function switchDossierTab(tabName) {
        document.querySelectorAll('.dossier-tab-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('onclick').includes(tabName)) btn.classList.add('active');
        });
        document.querySelectorAll('.dossier-pane').forEach(pane => pane.classList.remove('active'));
        document.getElementById(`dossier-pane-${tabName}`).classList.add('active');
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // 启动
    window.onload = initBestiary;
</script>
</body>
</html>
