        .vote-stats { font-size: 0.85em; color: #555; display: flex; align-items: center; gap: 15px; background: #f4f1ea; padding: 5px 15px; border-radius: 20px;}
        .vote-count.approve { color: #27ae60; font-weight: bold; }

        .btn-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end;}
        button { cursor: pointer; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; transition: 0.2s; }

        .decision-time { font-size: 0.8em; color: #999; margin-top: 5px; text-align: right; }

        .btn-cancel { background: #95a5a6; color: white; }

        .round-tag { font-size: 0.8em; background: #34495e; color: white; padding: 2px 6px; border-radius: 4px; margin-left: 10px; vertical-align: middle;}
    </style>
</head>

// ==========================================
// V2 新版结算引擎 (严格区分单选3票与多选相对多数)
// ==========================================
async function calculateWinnerAndSettleV2(proposal, roundVotes, isExpired = false) {
    const isChoice = proposal.proposal_type === 'choice';
    const voteCounts = {};
    const totalVotesInRound = roundVotes.length;

    // 初始化计分
    if (isChoice) {
        (proposal.options || []).forEach(opt => voteCounts[opt.id] = 0);
    } else {
        voteCounts['approve'] = 0; voteCounts['reject'] = 0;
    }

    roundVotes.forEach(v => {
        if (voteCounts[v.vote_type] !== undefined) voteCounts[v.vote_type]++;
    });

    const sortedVotes = Object.entries(voteCounts).sort((a, b) => b[1] - a[1]);
    const maxVotes = sortedVotes[0][1];
    const winners = sortedVotes.filter(s => s[1] === maxVotes);

    let finalDecision = null;
    let finalReason = '';
    let finalCost = 0;
    const timePrefix = isExpired ? `⏳ 议案已逾期。` : '✅ 全员投票完毕。';

    if (maxVotes === 0) {
        finalDecision = 'rejected';
        finalReason = `${timePrefix}无人投票，议案自动废弃。`;
    } 
    else if (!isChoice) {
        // === 是非题：严格要求 3 票多数决 ===
        if (voteCounts['approve'] >= 3) {
            finalDecision = 'approved';
            finalCost = proposal.cost || 0;
            finalReason = `${timePrefix}赞成票达到3票，法案正式通过。`;
        } else if (voteCounts['reject'] >= 3) {
            finalDecision = 'rejected';
            finalReason = `${timePrefix}反对票达到3票，法案被正式否决。`;
        } else if (totalVotesInRound >= totalVotersCount || isExpired) {
            // 投满了或过期了，但没人达到3票 (例如 2:2且1弃权，或 2:1过期)
            finalDecision = 'rejected';
            finalReason = `${timePrefix}未能达成3票绝对多数共识，议案作废。`;
        }
    } 
    else {
        // === 选择题：相对多数决 (最高票唯一即胜出) ===
        if (winners.length === 1) {
            const winOpt = proposal.options.find(o => o.id === winners[0][0]);
            finalDecision = 'approved';
            finalCost = winOpt.cost || 0;
            finalReason = `${timePrefix}方案【${winOpt.text}】以相对多数 (${maxVotes}票) 胜出。`;
        } else if (totalVotesInRound >= totalVotersCount || isExpired) {
            // 平票且投满或过期 -> 剔除末位，开启下一轮决胜
            const nextOptions = proposal.options.filter(o => winners.map(w => w[0]).includes(o.id));
            await supabaseClient.from('city_proposals_v2').update({
                current_round: proposal.current_round + 1,
                options: nextOptions,
                status: 'pending',
                created_at: new Date().toISOString(), // 重置倒计时
                decision_reason: (proposal.decision_reason || '') + `\n🔄 第${proposal.current_round}轮决胜：${winners.length}项方案平票(${maxVotes}票)，开启新一轮。`
            }).eq('id', proposal.id);
            return;
        }
    }

    // 最终扣款与归档
    if (finalDecision) {
        if (finalDecision === 'approved' && finalCost !== 0) {
            const { data: currentProf } = await supabaseClient.from('profiles').select('gold_gp').eq('id', userProfile.id).single();
            if (finalCost > 0 && currentProf.gold_gp < finalCost) {
                finalDecision = 'rejected';
                finalReason = `${finalReason}\n⚠️ 但由于国库资金不足以支付 ${finalCost} GP，被财务官强制驳回！`;
            } else {
                const newGold = currentProf.gold_gp - finalCost;
                await supabaseClient.from('profiles').update({ gold_gp: newGold }).eq('id', userProfile.id);
            }
        }
        await supabaseClient.from('city_proposals_v2').update({
            status: finalDecision, decision_reason: finalReason, decided_at: new Date().toISOString()
        }).eq('id', proposal.id);
    }
}

// ==========================================
// V1 旧版数据逾期结算保留 (独立逻辑)
// ==========================================
async function autoSettleExpiredProposalV1(proposal, allVotes) {
    const propVotes = allVotes.filter(v => v.proposal_id === proposal.id);
    const approves = propVotes.filter(v => v.vote_type === 'approve').length;
    const rejects = propVotes.filter(v => v.vote_type === 'reject').length;

    let finalDecision = (approves > rejects) ? 'approved' : 'rejected';
    let finalReason = `⏳ 议案已逾期 (5天)。最终票数 ${approves}赞成 : ${rejects}反对，法案${finalDecision === 'approved' ? '通过' : '被否决'}。`;

    if (approves === rejects) {
        finalDecision = 'rejected';
        finalReason = `⏳ 议案已逾期 (5天)。最终票数战平，法案自动打回。`;
    }

    if (finalDecision === 'approved' && proposal.cost !== 0) {
        const { data: currentProf } = await supabaseClient.from('profiles').select('gold_gp').eq('id', userProfile.id).single();
        if (proposal.cost > 0 && currentProf.gold_gp < proposal.cost) {
            finalDecision = 'rejected';
            finalReason += `\n⚠️ 国库资金不足，强制驳回。`;
        } else {
            const newGold = currentProf.gold_gp - proposal.cost;
            await supabaseClient.from('profiles').update({ gold_gp: newGold }).eq('id', userProfile.id);
        }
    }
    await supabaseClient.from('city_proposals').update({
        status: finalDecision, decision_reason: finalReason, decided_at: new Date().toISOString()
    }).eq('id', proposal.id);
}

// ==========================================
// 双轨混合并行，实时显示预算
// ==========================================
async function loadProposals(userId) {
    document.getElementById('loading').style.display = 'block';

    // 1. 并行拉取两套系统的议案和选票
    let [v1PropsRes, v2PropsRes, v1VotesRes, v2VotesRes] = await Promise.all([
        supabaseClient.from('city_proposals').select('*').eq('user_id', userId),
        supabaseClient.from('city_proposals_v2').select('*').eq('user_id', userId),
        supabaseClient.from('proposal_votes').select('*'),
        supabaseClient.from('proposal_votes_v2').select('*')
    ]);

    let listV1 = v1PropsRes.data || [];
    let listV2 = v2PropsRes.data || [];
    const votesV1 = v1VotesRes.data || [];
    const votesV2 = v2VotesRes.data || [];
    const nowMs = new Date().getTime();
    let hasJustSettled = false;

    // 2. 独立处理 V2 逾期逻辑 (多轮决胜)
    for (let prop of listV2) {
        if (prop.status === 'pending' && (nowMs - new Date(prop.created_at).getTime() > EXPIRE_MS)) {
            const roundVotes = votesV2.filter(v => v.proposal_id === prop.id && v.round_num === prop.current_round);
            await calculateWinnerAndSettleV2(prop, roundVotes, true);
            hasJustSettled = true;
        }
    }

    // 3. 独立处理 V1 逾期逻辑 (是非题)
    for (let prop of listV1) {
        if (prop.status === 'pending' && (nowMs - new Date(prop.created_at).getTime() > EXPIRE_MS)) {
            const currentV1Votes = votesV1.filter(v => v.proposal_id === prop.id);
            await autoSettleExpiredProposalV1(prop, currentV1Votes);
            hasJustSettled = true;
        }
    }

    if (hasJustSettled) {
        location.reload(); // 发生结算则刷新
        return;
    }

    // 4. 数据标准化与统一排序 (不再区分新旧版本)
    const normalizedV1 = listV1.map(p => ({ ...p, _isChoice: false, _votesData: votesV1 }));
    const normalizedV2 = listV2.map(p => ({ ...p, _isChoice: true, _votesData: votesV2 }));
    
    // 按照发布时间 created_at 混合排序（最新发布的排最上面）
    const combinedList = [...normalizedV1, ...normalizedV2].sort((a, b) => 
        new Date(b.created_at).getTime() - new Date(a.created_at).getTime()
    );

    document.getElementById('loading').style.display = 'none';
    const pendingBox = document.getElementById('pending-list');
    const historyBox = document.getElementById('history-list');
    pendingBox.innerHTML = ''; historyBox.innerHTML = '';

    // 5. 内部辅助函数：生成单条议案卡片的 HTML
    function createCardHTML(item) {
        const isV2 = item._isChoice;
        const allVotesData = item._votesData;
        const avatarUrl = employeeMap[item.proposer_name] || 'https://via.placeholder.com/70';
        
        let myVote = null, currentRoundVotes = [];
        // 区分获取选票逻辑
        if (isV2) {
            currentRoundVotes = allVotesData.filter(v => v.proposal_id === item.id && v.round_num === item.current_round);
            myVote = currentRoundVotes.find(v => v.voter_name === currentVoter.name);
        } else {
            currentRoundVotes = allVotesData.filter(v => v.proposal_id === item.id);
            myVote = currentRoundVotes.find(v => v.voter_name === currentVoter.name);
        }

        // 拼接批注记录 (包含轮次 R1/R2)
        let notesHtml = '';
        const propAllVotes = allVotesData.filter(v => v.proposal_id === item.id);
        if (propAllVotes.length > 0) {
            notesHtml = `<div style="margin-top: 15px; font-size: 0.9em; background: #fdfbf7; padding: 10px; border: 1px dashed #dcd6cc; border-radius: 4px;">
                <div style="font-weight: bold; margin-bottom: 5px; color: #7f8c8d;">📜 议员批注记录：</div>
                ${propAllVotes.map(v => {
                    let voteText = v.vote_type === 'approve' ? '赞成' : (v.vote_type === 'reject' ? '反对' : v.vote_type);
                    if (isV2 && item.options) {
                        const matchedOpt = item.options.find(o => o.id === v.vote_type);
                        if(matchedOpt) voteText = matchedOpt.text;
                    }
                    const roundTag = isV2 ? `<span style="color:#aaa; font-size:0.8em;">[R${v.round_num}]</span> ` : '';
                    return `<div style="margin-bottom: 4px;">${roundTag}<b>${v.voter_name}</b> 选择 <b>[${escapeHTML(voteText)}]</b>: <span style="color:#555;">${escapeHTML(v.vote_reason || '无')}</span></div>`;
                }).join('')}
            </div>`;
        }

        let actionButtons = '', voteStatsHtml = '', costHtml = '';
        const titleExtra = (isV2 && item.current_round > 1) ? `<span class="round-tag">第 ${item.current_round} 轮决胜</span>` : '';

        // 渲染核心：区分 [多选题] 与 [是非题]
        if (isV2 && item.proposal_type === 'choice') {
            // --- 多选题逻辑 ---
            costHtml = `<div class="cost-tag" style="color: #8e44ad;">⚖️ 独立预算方案</div>`;
            (item.options || []).forEach(opt => {
                const count = currentRoundVotes.filter(v => v.vote_type === opt.id).length;
                const optCost = opt.cost || 0;
                const costStr = optCost > 0 ? `-${optCost.toLocaleString()}` : (optCost < 0 ? `+${Math.abs(optCost).toLocaleString()}` : '0');
                // 统计行：显示每项票数及开销
                voteStatsHtml += `<span style="color:#2980b9; font-weight:bold;">${escapeHTML(opt.text)}: ${count}票 <small style="color:#7f8c8d;">[${costStr} GP]</small></span> | `;
            });

            if (myVote) {
                const selectedOpt = item.options.find(o => o.id === myVote.vote_type);
                actionButtons = `<button class="btn-voted">本轮已投: ${escapeHTML(selectedOpt ? selectedOpt.text : '已投')}</button>`;
            } else {
                (item.options || []).forEach(opt => {
                        actionButtons += `<button class="btn-choice" style="margin-bottom:5px;" onclick="castVoteV2(${item.id}, '${opt.id}', '${escapeHTML(opt.text)}')">
                            🗳️ ${escapeHTML(opt.text)}
                        </button>`;
                    });
            }
        } else {
            // --- 是非题逻辑 (无论是 V1 还是 V2 的是非题) ---
            let costVal = item.cost || 0;
            if (costVal > 0) costHtml = `<div class="cost-tag" style="color: #c0392b;">💰 -${costVal.toLocaleString()}</div>`;
            else if (costVal < 0) costHtml = `<div class="cost-tag" style="color: #27ae60;">💰 +${Math.abs(costVal).toLocaleString()}</div>`;
            else costHtml = `<div class="cost-tag" style="color: #f39c12;">✨ 0 预算</div>`;

            const approves = currentRoundVotes.filter(v => v.vote_type === 'approve').length;
            const rejects = currentRoundVotes.filter(v => v.vote_type === 'reject').length;
            voteStatsHtml = `<span class="vote-count approve">${approves} 赞成</span> | <span class="vote-count reject">${rejects} 反对</span>`;

            if (myVote) {
                actionButtons = `<button class="btn-voted">本轮已投: ${myVote.vote_type === 'approve' ? '✅' : '❌'}</button>`;
            } else {
                const voteFunc = isV2 ? 'castVoteV2' : 'castVoteV1'; // 根据存储表决定投票目标
                actionButtons = `
                    <button class="btn-approve" onclick="${voteFunc}(${item.id}, 'approve')">✅ 赞成</button>
                    <button class="btn-reject" onclick="${voteFunc}(${item.id}, 'reject')">❌ 反对</button>
                `;
            }
        }

        // 返回完整的卡片 HTML
        if (item.status === 'pending') {
            const expireDateStr = new Date(new Date(item.created_at).getTime() + EXPIRE_MS).toLocaleString();
            let roundNote = item.decision_reason ? `<div class="decision-note">${escapeHTML(item.decision_reason)}</div>` : '';
            return `<div class="proposal-card">
                <div class="avatar-box"><img src="${avatarUrl}" class="avatar"><div class="proposer-name">${item.proposer_name}</div></div>
                <div class="content-box">
                    <div>
                        <div class="prop-title">${escapeHTML(item.title)} ${titleExtra}</div>
                        <div class="prop-desc">${escapeHTML(item.description)}</div>
                        ${roundNote}${notesHtml}
                    </div>
                    <div class="action-bar">
                        ${costHtml}
                        <div class="btn-group">
                            <div class="vote-stats">
                                ${voteStatsHtml}
                                <div style="font-size: 0.8em; color: #e67e22; margin-top: 4px;">⏳ 截止: ${expireDateStr}</div>
                            </div>
                            ${actionButtons}
                        </div>
                    </div>
                </div>
            </div>`;
        } else {
            const statusTag = item.status === 'approved' ? `<span class="status-badge status-approved">已批准</span>` : `<span class="status-badge status-rejected">已否决</span>`;
            return `<div class="proposal-card history-card ${item.status}">
                <div class="avatar-box"><img src="${avatarUrl}" class="avatar" style="filter:grayscale(80%)"></div>
                <div class="content-box">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="prop-title">${escapeHTML(item.title)} ${titleExtra}</div>
                        ${statusTag}
                    </div>
                    <div class="prop-desc" style="color:#888;">${escapeHTML(item.description)}</div>
                    ${notesHtml}
                    <div class="decision-note">📝 判定：<br>${escapeHTML(item.decision_reason)}</div>
                    <div class="decision-time">归档时间: ${item.decided_at ? new Date(item.decided_at).toLocaleString() : ''}</div>
                </div>
            </div>`;
        }
    }

    // 6. 遍历组合后的列表，将生成的 HTML 插入页面
    combinedList.forEach(item => {
        const cardHTML = createCardHTML(item);
        if (item.status === 'pending') pendingBox.innerHTML += cardHTML;
        else historyBox.innerHTML += cardHTML;
    });

    document.getElementById('pending-section').style.display = pendingBox.innerHTML ? 'block' : 'none';
    document.getElementById('history-section').style.display = historyBox.innerHTML ? 'block' : 'none';
    if (!pendingBox.innerHTML && !historyBox.innerHTML) document.getElementById('loading').innerText = "暂无任何议案。";
}


// ==========================================
// 是非题 专用投票函数
// ==========================================
async function castVoteV1(proposalId, voteType) {
    const defaultReason = voteType === 'approve' ? '同意执行。' : '暂缓议案。';
    const reason = await new Promise((resolve) => {
        const modal = document.getElementById('vote-modal');
        // ❌ 修改了弹窗标题，去掉了“针对旧档”字样
        document.getElementById('vote-modal-title').innerText = `您决定投票给 [${voteType === 'approve'?'赞成':'反对'}]。\n请输入您的决策理由/批注:`;
        const textarea = document.getElementById('vote-modal-text');
        textarea.value = defaultReason;
        modal.style.display = 'flex'; textarea.focus();
        document.getElementById('vote-btn-confirm').onclick = () => { modal.style.display = 'none'; resolve(textarea.value); };
        document.getElementById('vote-btn-cancel').onclick = () => { modal.style.display = 'none'; resolve(null); };
    });

    if (reason === null) return;
    
    // 提交选票
    await supabaseClient.from('proposal_votes').insert({
        proposal_id: proposalId, 
        voter_name: currentVoter.name, 
        vote_type: voteType, 
        vote_reason: reason || '无意见'
    });
    
    // 检查是非题是否投满，投满则立刻触发结算
    const { data: latestV1Votes } = await supabaseClient.from('proposal_votes').select('*').eq('proposal_id', proposalId);
    if (latestV1Votes.length >= totalVotersCount) {
        const { data: propV1 } = await supabaseClient.from('city_proposals').select('*').eq('id', proposalId).single();
        if (propV1) {
            await autoSettleExpiredProposalV1(propV1, latestV1Votes); 
        }
    }

    loadProposals(userProfile.id);
}

    async function castVoteV2(proposalId, voteType, choiceText = null) {
        // 获取该议案当前状态和轮次
        const { data: prop } = await supabaseClient.from('city_proposals_v2').select('*').eq('id', proposalId).single();
        if (!prop || prop.status !== 'pending') return alert("该议案状态已变更！");

        const actionName = choiceText || (voteType === 'approve' ? '赞成' : '反对');
        const defaultReason = choiceText ? `我支持方案：${choiceText}。` : (voteType === 'approve' ? '同意执行。' : '暂缓议案。');
        
        // 唤起自定义弹窗
        const reason = await new Promise((resolve) => {
            const modal = document.getElementById('vote-modal');
            document.getElementById('vote-modal-title').innerText = `您决定投票给 [${actionName}]。\n请输入您的决策理由/批注:`;
            const textarea = document.getElementById('vote-modal-text');
            textarea.value = defaultReason;
            modal.style.display = 'flex';
            textarea.focus();

            document.getElementById('vote-btn-confirm').onclick = () => { modal.style.display = 'none'; resolve(textarea.value); };
            document.getElementById('vote-btn-cancel').onclick = () => { modal.style.display = 'none'; resolve(null); };
        });

        if (reason === null) return; 
        const userVoteReason = reason.trim() === '' ? '未发表意见' : reason;

        // 写入新表，务必带上当前轮次
        const { error: insertErr } = await supabaseClient.from('proposal_votes_v2').insert({
            proposal_id: proposalId,
            voter_name: currentVoter.name,
            vote_type: voteType,
            vote_reason: userVoteReason,
            round_num: prop.current_round
        });
        
        if (insertErr) return alert('投票失败！');

        // 拉取当前轮次的所有票
        const { data: latestRoundVotes } = await supabaseClient.from('proposal_votes_v2')
            .select('*').eq('proposal_id', proposalId).eq('round_num', prop.current_round);
        
        // 如果全员投完，触发结算逻辑
        if (latestRoundVotes.length >= totalVotersCount) {
            await calculateWinnerAndSettleV2(prop, latestRoundVotes, false); 
        }

        loadProposals(userProfile.id);
    }

    function setupRealtime(targetId) {
    supabaseClient.channel('city_realtime_all')
        // 监听 V2
        .on('postgres_changes', { event: '*', schema: 'public', table: 'city_proposals_v2' }, () => {
            if(currentVoter) loadProposals(targetId); refreshGoldDisplay(targetId);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'proposal_votes_v2' }, () => {
            if(currentVoter) loadProposals(targetId);
        })
        // 监听 V1 (新增)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'city_proposals' }, () => {
            if(currentVoter) loadProposals(targetId); refreshGoldDisplay(targetId);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'proposal_votes' }, () => {
            if(currentVoter) loadProposals(targetId);
        })
        .subscribe();
}

    async function refreshGoldDisplay(userId) {
        const { data: prof } = await supabaseClient.from('profiles').select('gold_gp').eq('id', userId).single();
        if (prof) {
            document.getElementById('current-gold').innerText = prof.gold_gp.toLocaleString();
            userProfile.gold_gp = prof.gold_gp;
        }
    }

    init();
</script>
