<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>政务厅 - 艾尔莫瑞尔</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #f4f1ea; --card-bg: #fff; --text: #2c3e50; --border: #dcd6cc; }
        body { font-family: "PingFang SC", "Microsoft YaHei", serif; background-color: var(--bg-color); color: var(--text); margin: 0; padding: 40px; }
        
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #8e44ad; padding-bottom: 15px; margin-bottom: 30px; }
        .back-btn { padding: 8px 15px; border: 1px solid #333; text-decoration: none; color: #333; border-radius: 4px; font-size: 0.9em; transition: 0.2s; }
        .back-btn:hover { background: #333; color: #fff; }

        .section-title { font-weight: bold; margin: 30px 0 15px; color: #555; border-left: 4px solid #8e44ad; padding-left: 10px; }
        
        /* 登录界面的头像墙 */
        #login-section { text-align: center; margin-top: 50px; }
        .login-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .login-card { cursor: pointer; background: var(--card-bg); border: 2px solid transparent; border-radius: 10px; padding: 15px; width: 100px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .login-card:hover { border-color: #8e44ad; transform: translateY(-5px); }
        .login-card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        .login-card .name { margin-top: 10px; font-weight: bold; font-size: 0.9em; }
        .dm-tag { font-size: 0.7em; color: #c0392b; border: 1px solid #c0392b; border-radius: 3px; padding: 1px 4px; margin-top: 5px; display: inline-block; }

        /* 提案卡片 */
        .proposal-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; display: flex; gap: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        
        .avatar-box { flex-shrink: 0; text-align: center; width: 80px; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; margin-bottom: 5px; }
        .proposer-name { font-size: 0.85em; font-weight: bold; color: #666; }

        .content-box { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .prop-title { font-size: 1.2em; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        .prop-desc { font-size: 0.95em; color: #555; line-height: 1.6; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 4px; border-left: 3px solid #ddd; white-space: pre-wrap; word-wrap: break-word; }

        .vote-reason-text { white-space: pre-wrap; word-wrap: break-word; color:#555; display: inline-block; vertical-align: top; width: calc(100% - 80px); }
        .decision-note { white-space: pre-wrap; margin-top: 10px; padding: 10px; background: #fffbe6; border: 1px solid #f1c40f; border-radius: 4px; font-size: 0.9em; color: #7f6000; }
        
        .action-bar { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed #eee; padding-top: 15px; }
        .cost-tag { font-family: monospace; font-weight: bold; font-size: 1.1em; }
        
        /* 投票进度条 */
        .vote-stats { font-size: 0.85em; color: #555; display: flex; align-items: center; gap: 15px; background: #f4f1ea; padding: 5px 15px; border-radius: 20px;}
        .vote-count.approve { color: #27ae60; font-weight: bold; }
        .vote-count.reject { color: #c0392b; font-weight: bold; }
        
        .btn-group { display: flex; gap: 10px; align-items: center; }
        button { cursor: pointer; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-approve { background: #27ae60; color: white; }
        .btn-reject { background: #c0392b; color: white; }
        .btn-voted { background: #bdc3c7; color: #fff; cursor: not-allowed; }
        
        .history-card { opacity: 0.8; background: #fcfcfc; border-left: 4px solid transparent; }
        .history-card.approved { border-left-color: #27ae60; }
        .history-card.rejected { border-left-color: #c0392b; }
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .status-approved { background: #d5f5e3; color: #27ae60; }
        .status-rejected { background: #fadbd8; color: #c0392b; }
        
        .decision-note { margin-top: 10px; padding: 10px; background: #fffbe6; border: 1px solid #f1c40f; border-radius: 4px; font-size: 0.9em; color: #7f6000; }
        .decision-time { font-size: 0.8em; color: #999; margin-top: 5px; text-align: right; }

        /* 自定义弹窗样式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-box {
            background: #fff; padding: 20px; border-radius: 8px; width: 90%; max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 15px;
        }
        .modal-title { font-weight: bold; color: #2c3e50; white-space: pre-wrap; line-height: 1.5; }
        .modal-box textarea {
            width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 4px;
            font-family: inherit; font-size: 0.95em; resize: vertical; box-sizing: border-box;
        }
        .modal-box textarea:focus { outline: none; border-color: #8e44ad; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .btn-cancel { background: #95a5a6; color: white; }
        .btn-submit { background: #2980b9; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0;">💼 领地政务厅</h1>
        <div id="user-status" style="display:none; font-weight: bold; color: #2980b9;">
            当前登录: <span id="current-voter-name"></span>
            <a href="#" onclick="location.reload()" style="margin-left:10px; font-size:0.8em; color:#7f8c8d;">[登出]</a>
        </div>
        <a href="index.html" class="back-btn">⬅ 返回主控台</a>
    </div>

    <div id="login-section">
        <h2>请验证您的城主身份</h2>
        <p style="color: #777;">选择您的角色进入议事厅</p>
        <div class="login-grid" id="login-grid">
            </div>
    </div>

    <div id="main-section" style="display:none;">
        <div style="text-align: right; margin-bottom: 20px; font-weight: bold; color: #d35400;">
            当前国库: <span id="current-gold">...</span> GP
        </div>

        <div id="loading" style="text-align:center; color:#999;">正在同步议会卷宗...</div>

        <div id="pending-section" style="display:none;">
            <div class="section-title">🔴 待审议案 (需要 <span id="majority-req"></span> 票多数决)</div>
            <div id="pending-list"></div>
        </div>

        <div id="history-section" style="display:none;">
            <div class="section-title">🗄️ 历史决策档案</div>
            <div id="history-list"></div>
        </div>
    </div>
</div>

<div id="vote-modal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <div id="vote-modal-title" class="modal-title"></div>
        <textarea id="vote-modal-text" placeholder="在此输入您的详细批注..."></textarea>
        <div class="modal-actions">
            <button class="btn-cancel" id="vote-btn-cancel">取消</button>
            <button class="btn-submit" id="vote-btn-confirm">确认提交</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://vbzfpgucpciqgaakqndz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTc2MzMsImV4cCI6MjA4MzE3MzYzM30.fBVDirEJ52bvrYJZ5DNv7fVDLNgCwITKwdKqT6YJDYw';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let userProfile = null;
    let employeeMap = {}; 
    let voterEmployees = []; 
    let totalVotersCount = 0;
    let currentVoter = null; 

    // 表决限期（天数）
    const EXPIRE_DAYS = 5;
    const EXPIRE_MS = EXPIRE_DAYS * 24 * 60 * 60 * 1000;

    const authorizedVoters = [
        '伊凡·乾', '凋命', '伯勒斯', '薇艾拉', '格拉西斯'
    ];

    function escapeHTML(str) {
        if (!str) return '';
        return str.replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
                }[tag] || tag)
        );
    }

    async function init() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { alert('请先登录主账号'); window.location.href = 'index.html'; return; }

        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('uid') || user.id;

        const { data: prof } = await supabaseClient.from('profiles').select('*').eq('id', targetId).single();
        if (prof) {
            userProfile = prof;
            document.getElementById('current-gold').innerText = prof.gold_gp.toLocaleString();
        }

        const { data: emps } = await supabaseClient.from('employees').select('name, avatar_url').eq('user_id', targetId);
        
        if (emps) { 
            voterEmployees = emps.filter(emp => authorizedVoters.includes(emp.name));
            totalVotersCount = voterEmployees.length;
            const majorityCount = Math.floor(totalVotersCount / 2) + 1;
            document.getElementById('majority-req').innerText = majorityCount;

            emps.forEach(e => employeeMap[e.name] = e.avatar_url); 
            renderLoginScreen(targetId);
        }

        setupRealtime(targetId);
    }

    function renderLoginScreen(targetId) {
        const grid = document.getElementById('login-grid');
        grid.innerHTML = '';
        voterEmployees.forEach(emp => {
            grid.innerHTML += `
                <div class="login-card" onclick="selectVoter('${emp.name}', '${targetId}')">
                    <img src="${emp.avatar_url || 'https://via.placeholder.com/80'}">
                    <div class="name">${emp.name}</div>
                </div>
            `;
        });
    }

    function selectVoter(name, targetId) {
        currentVoter = { name: name };
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('main-section').style.display = 'block';
        document.getElementById('user-status').style.display = 'block';
        document.getElementById('current-voter-name').innerText = name;
        
        loadProposals(targetId);
    }

    // 处理逾期议案的自动结算逻辑
    async function autoSettleExpiredProposal(proposal, allVotes) {
        const propVotes = allVotes.filter(v => v.proposal_id === proposal.id);
        const approves = propVotes.filter(v => v.vote_type === 'approve').length;
        const rejects = propVotes.filter(v => v.vote_type === 'reject').length;

        let finalDecision = null;
        let finalReason = '';

        // 按当前票型结算 (0:0 也会被判为废案打回)
        if (approves > rejects) {
            finalDecision = 'approved';
            finalReason = `⏳ 议案已逾期 (${EXPIRE_DAYS}天)。最终票数 ${approves}赞成 : ${rejects}反对，法案自动通过并执行。`;
        } else if (rejects > approves) {
            finalDecision = 'rejected';
            finalReason = `⏳ 议案已逾期 (${EXPIRE_DAYS}天)。最终票数 ${approves}赞成 : ${rejects}反对，法案被自动否决。`;
        } else {
            finalDecision = 'rejected';
            finalReason = `⏳ 议案已逾期 (${EXPIRE_DAYS}天)。最终票数战平 (${approves} : ${rejects})，法案自动打回重批。`;
        }

        if (finalDecision === 'approved' && proposal.cost !== 0) {
            const { data: currentProf } = await supabaseClient.from('profiles').select('gold_gp').eq('id', userProfile.id).single();
            
            if (proposal.cost > 0 && currentProf.gold_gp < proposal.cost) {
                finalDecision = 'rejected';
                finalReason = `⏳ 议案逾期且已获多数赞成，但【国库资金不足】，被财务官强制驳回。`;
            } else {
                const newGold = currentProf.gold_gp - proposal.cost;
                await supabaseClient.from('profiles').update({ gold_gp: newGold }).eq('id', userProfile.id);
                userProfile.gold_gp = newGold; // 同步本地金币
            }
        }

        await supabaseClient.from('city_proposals').update({
            status: finalDecision,
            decision_reason: finalReason,
            decided_at: new Date().toISOString()
        }).eq('id', proposal.id);
    }

    async function loadProposals(userId) {
        document.getElementById('loading').style.display = 'block';

        let [propsRes, votesRes] = await Promise.all([
            supabaseClient.from('city_proposals').select('*').eq('user_id', userId).order('created_at', { ascending: false }),
            supabaseClient.from('proposal_votes').select('*') 
        ]);

        let list = propsRes.data || [];
        const allVotes = votesRes.data || [];
        const nowMs = new Date().getTime();
        let hasJustSettled = false;

        // 检查所有 Pending 议案，把超时的强行结案
        for (let i = 0; i < list.length; i++) {
            if (list[i].status === 'pending') {
                const createdAtMs = new Date(list[i].created_at).getTime();
                if (nowMs - createdAtMs > EXPIRE_MS) {
                    await autoSettleExpiredProposal(list[i], allVotes);
                    hasJustSettled = true;
                }
            }
        }

        // 如果刚才发生过系统自动结算，立刻重新拉取最新数据，防止玩家看到过期状态
        if (hasJustSettled) {
            const refreshedProps = await supabaseClient.from('city_proposals').select('*').eq('user_id', userId).order('created_at', { ascending: false });
            list = refreshedProps.data || [];
        }

        document.getElementById('loading').style.display = 'none';
        const pendingBox = document.getElementById('pending-list');
        const historyBox = document.getElementById('history-list');
        pendingBox.innerHTML = ''; historyBox.innerHTML = '';

        let hasPending = false, hasHistory = false;

        list.forEach(item => {
            const avatarUrl = employeeMap[item.proposer_name] || 'https://via.placeholder.com/70';
            const propVotes = allVotes.filter(v => v.proposal_id === item.id);
            const approves = propVotes.filter(v => v.vote_type === 'approve').length;
            const rejects = propVotes.filter(v => v.vote_type === 'reject').length;
            
            let costHtml = '';
            if (item.cost > 0) costHtml = `<div class="cost-tag" style="color: #c0392b;">💰 -${item.cost.toLocaleString()}</div>`;
            else if (item.cost < 0) costHtml = `<div class="cost-tag" style="color: #27ae60;">💰 +${Math.abs(item.cost).toLocaleString()}</div>`;
            else costHtml = `<div class="cost-tag" style="color: #f39c12;">✨ 0 预算</div>`;

            let notesHtml = '';
            if (propVotes.length > 0) {
                notesHtml = `
                <div style="margin-top: 15px; font-size: 0.9em; background: #fdfbf7; padding: 10px; border: 1px dashed #dcd6cc; border-radius: 4px;">
                    <div style="font-weight: bold; margin-bottom: 5px; color: #7f8c8d;">📜 议员批注记录：</div>
                    ${propVotes.map(v => `
                        <div style="margin-bottom: 4px;">
                            <b>${v.voter_name}</b> 
                            <span style="color:${v.vote_type === 'approve' ? '#27ae60' : '#c0392b'}">[${v.vote_type === 'approve' ? '赞成' : '反对'}]</span>: 
                            <span style="color:#555;">${escapeHTML(v.vote_reason || '无')}</span>
                        </div>
                    `).join('')}
                </div>`;
            }

            if (item.status === 'pending') {
                hasPending = true;
                const myVote = propVotes.find(v => v.voter_name === currentVoter.name);

                let actionButtons = '';
                if (myVote) {
                    const myChoice = myVote.vote_type === 'approve' ? '✅ 赞成' : '❌ 反对';
                    actionButtons = `<button class="btn-voted">您已投: ${myChoice}</button>`;
                } else {
                    actionButtons = `
                        <button class="btn-approve" onclick="castVote(${item.id}, 'approve', ${item.cost})">✅ 赞成</button>
                        <button class="btn-reject" onclick="castVote(${item.id}, 'reject', ${item.cost})">❌ 反对</button>
                    `;
                }

                // 计算并显示死线
                const expireDateStr = new Date(new Date(item.created_at).getTime() + EXPIRE_MS).toLocaleString();

                pendingBox.innerHTML += `
                    <div class="proposal-card">
                        <div class="avatar-box">
                            <img src="${avatarUrl}" class="avatar">
                            <div class="proposer-name">${item.proposer_name}</div>
                        </div>
                        <div class="content-box">
                            <div>
                                <div class="prop-title">${escapeHTML(item.title)}</div>
                                <div class="prop-desc">${escapeHTML(item.description)}</div>
                                ${notesHtml}
                            </div>
                            <div class="action-bar" style="margin-top:15px;">
                                ${costHtml}
                                <div class="btn-group">
                                    <div class="vote-stats">
                                        <span class="vote-count approve">${approves} 赞成</span> | 
                                        <span class="vote-count reject">${rejects} 反对</span>
                                        <div style="font-size: 0.8em; color: #e67e22; margin-top: 4px;">⏳ 截止: ${expireDateStr}</div>
                                    </div>
                                    ${actionButtons}
                                </div>
                            </div>
                        </div>
                    </div>`;
            } else {
                hasHistory = true;
                const isApproved = item.status === 'approved';
                const statusTag = isApproved 
                    ? `<span class="status-badge status-approved">已批准</span>`
                    : `<span class="status-badge status-rejected">${item.decision_reason.includes('平票') || item.decision_reason.includes('战平') ? '平票打回' : '已否决'}</span>`;
                
                const dateStr = item.decided_at ? new Date(item.decided_at).toLocaleString() : '';
                historyBox.innerHTML += `
                    <div class="proposal-card history-card ${item.status}">
                        <div class="avatar-box">
                            <img src="${avatarUrl}" class="avatar" style="filter:grayscale(80%)">
                        </div>
                        <div class="content-box">
                            <div style="display:flex; justify-content:space-between;">
                                <div class="prop-title">${escapeHTML(item.title)}</div>
                                ${statusTag}
                            </div>
                            <div class="prop-desc" style="color:#888;">${escapeHTML(item.description)}</div>
                            ${notesHtml}
                            <div class="decision-note" style="margin-top:10px;">📝 系统最终判定：${item.decision_reason}</div>
                            <div class="decision-time">归档时间: ${dateStr}</div>
                        </div>
                    </div>`;
            }
        });

        document.getElementById('pending-section').style.display = hasPending ? 'block' : 'none';
        document.getElementById('history-section').style.display = hasHistory ? 'block' : 'none';
        if (!hasPending && !hasHistory) document.getElementById('loading').innerText = "暂无任何议案。";
    }

    async function castVote(proposalId, voteType, cost) {
        const actionName = voteType === 'approve' ? '赞成' : '反对';
        const defaultReason = voteType === 'approve' ? '同意执行。' : '暂缓议案。';
        
        // 唤起自定义弹窗并等待玩家操作
const reason = await new Promise((resolve) => {
    const modal = document.getElementById('vote-modal');
    document.getElementById('vote-modal-title').innerText = `您决定 [${actionName}] 该提案。\n请输入您的决策理由/批注:`;
    const textarea = document.getElementById('vote-modal-text');
    textarea.value = defaultReason;
    
    modal.style.display = 'flex';
    textarea.focus();

    document.getElementById('vote-btn-confirm').onclick = () => {
        modal.style.display = 'none';
        resolve(textarea.value);
    };
    document.getElementById('vote-btn-cancel').onclick = () => {
        modal.style.display = 'none';
        resolve(null);
    };
});

if (reason === null) return; // 玩家点击了取消
const userVoteReason = reason.trim() === '' ? '未发表意见' : reason;

        const { error: insertErr } = await supabaseClient.from('proposal_votes').insert({
            proposal_id: proposalId,
            voter_name: currentVoter.name,
            vote_type: voteType,
            vote_reason: userVoteReason // 【修改这里】：对应改成 userVoteReason
        });
        
        if (insertErr) return alert('投票失败！可能您已经投过票，或者网络出现了波动。');

        const { data: latestVotes } = await supabaseClient.from('proposal_votes').select('*').eq('proposal_id', proposalId);
        const approves = latestVotes.filter(v => v.vote_type === 'approve').length;
        const rejects = latestVotes.filter(v => v.vote_type === 'reject').length;
        
        const totalVotesCast = approves + rejects;
        let finalDecision = null;
        let finalReason = '';

        // 判定条件：已投票人数 === 拥有投票权的总人数
        if (totalVotesCast === totalVotersCount) {
            if (approves > rejects) {
                finalDecision = 'approved';
                finalReason = `全员投票完毕 (${approves}赞成 : ${rejects}反对)：法案正式通过并执行。`;
            } else if (rejects > approves) {
                finalDecision = 'rejected';
                finalReason = `全员投票完毕 (${approves}赞成 : ${rejects}反对)：法案被正式否决。`;
            } else {
                finalDecision = 'rejected'; 
                finalReason = `全员投票完毕，票数战平 (${approves} : ${rejects})：法案被打回重批。`;
            }
        }

        if (finalDecision) {
            if (finalDecision === 'approved' && cost !== 0) {
                const { data: currentProf } = await supabaseClient.from('profiles').select('gold_gp').eq('id', userProfile.id).single();
                
                if (cost > 0 && currentProf.gold_gp < cost) {
                    alert('⚠️ 警告：议案虽已获多数赞成，但国库资金不足以支付！议案已被财务官强制驳回。');
                    finalDecision = 'rejected';
                    finalReason = `全员投票通过，但国库资金不足，法案被财务官强制驳回。`;
                } else {
                    const newGold = currentProf.gold_gp - cost;
                    await supabaseClient.from('profiles').update({ gold_gp: newGold }).eq('id', userProfile.id);
                }
            }

            await supabaseClient.from('city_proposals').update({
                status: finalDecision,
                decision_reason: finalReason,
                decided_at: new Date().toISOString()
            }).eq('id', proposalId);
        }

        loadProposals(userProfile.id);
    }

    function setupRealtime(targetId) {
        supabaseClient.channel('city_realtime')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'city_proposals' }, () => {
                if(currentVoter) loadProposals(targetId); refreshGoldDisplay(targetId);
            })
            .on('postgres_changes', { event: '*', schema: 'public', table: 'proposal_votes' }, () => {
                if(currentVoter) loadProposals(targetId);
            })
            .subscribe();
    }

    async function refreshGoldDisplay(userId) {
        const { data: prof } = await supabaseClient.from('profiles').select('gold_gp').eq('id', userId).single();
        if (prof) {
            document.getElementById('current-gold').innerText = prof.gold_gp.toLocaleString();
            userProfile.gold_gp = prof.gold_gp;
        }
    }

    init();
</script>
</body>
</html>
