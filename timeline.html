<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>费伦编年史 - 记忆回廊</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- 全局锁定，打造全屏沉浸感 --- */
        body { 
            font-family: 'Noto Serif SC', "PingFang SC", serif; 
            background: #050505; 
            color: #ecf0f1; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; /* 彻底禁止浏览器的默认滚动 */
            width: 100vw;
            height: 100vh;
        }

        /* --- 导航栏 --- */
        .back-nav { 
            position: fixed; top: 0; left: 0; width: 100%; 
            padding: 20px 30px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100; pointer-events: none; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }

        /* --- 核心容器：水平滑动轨道 --- */
        .timeline-viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            cursor: grab;
            padding: 0 10vw; /* 左右留白，防止第一张和最后一张贴边 */
        }
        .timeline-viewport:active { cursor: grabbing; }
        /* 隐藏滚动条 */
        .timeline-viewport::-webkit-scrollbar { display: none; }

        .timeline-track {
            display: flex;
            gap: 60px; /* 卡片间距 */
            height: 70%;
            align-items: center;
        }

        /* --- 电影感卡片设计 --- */
        .timeline-item {
            flex-shrink: 0;
            width: 450px; /* 默认宽度 */
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .cinematic-card {
            width: 100%;
            height: 100%;
            background: #111;
            overflow: hidden;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .cinematic-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.3) brightness(0.8);
            transition: 0.8s;
        }

        .cinematic-card:hover .cinematic-img {
            filter: grayscale(0) brightness(1.1);
            transform: scale(1.05);
        }

        /* --- 日期遮罩层 --- */
        .cinematic-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .card-date {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            color: #d4af37; /* 黄金色 */
        }

        /* --- 状态消息 --- */
        #status-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #666;
            letter-spacing: 4px;
        }

        /* --- 剧场预览 (Lightbox) --- */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.4s;
        }

        #lightbox-img {
            max-width: 90%;
            max-height: 85%;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        #lightbox-caption {
            position: absolute;
            bottom: 30px;
            color: #d4af37;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>

    <nav class="back-nav">
        <a href="index.html" class="back-btn">← 离开回廊</a>
        <div style="color:rgba(255,255,255,0.3); font-size: 0.8rem; letter-spacing: 5px;">CHRONICLE OF FAERÛN</div>
    </nav>

    <div id="status-msg">正在回溯位面记忆...</div>

    <div class="timeline-viewport" id="viewport">
        <div class="timeline-track" id="timeline-track" style="display:none;">
            </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Full View">
        <div id="lightbox-caption"></div>
    </div>

    <script>
        // --- 基础配置 ---
        const SUPABASE_URL = 'https://vbzfpgucpciqgaakqndz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTc2MzMsImV4cCI6MjA4MzE3MzYzM30.fBVDirEJ52bvrYJZ5DNv7fVDLNgCwITKwdKqT6YJDYw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const JSON_URL = 'https://raw.githubusercontent.com/huaerbujizewang/Dungeons-Dragons-Systems/refs/heads/main/timeline.json';

        // --- 拖拽逻辑变量 ---
        let isDragging = false;
        let startX;
        let scrollLeft;
        const viewport = document.getElementById('viewport');

        // --- 鉴权与数据加载 ---
        async function init() {
            try {
                // 1. 获取当前登录用户
                const { data: { user } } = await supabaseClient.auth.getUser();
                
                if (!user) {
                    alert('检测到位面波动（未登录），请先进行身份验证');
                    window.location.href = 'index.html';
                    return;
                }

                // 2. 加载数据并根据邮箱过滤
                loadTimelineData(user.email);

            } catch (error) {
                console.error(error);
                document.getElementById('status-msg').innerText = "身份校验失败。";
            }
        }

        async function loadTimelineData(userEmail) {
            const track = document.getElementById('timeline-track');
            const statusMsg = document.getElementById('status-msg');

            try {
                // 带上时间戳防止 GitHub 缓存
                const response = await fetch(`${JSON_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("无法读取档案馆数据");
                const allData = await response.json();

                // 3. 核心判定逻辑：过滤出允许该邮箱查看的内容
                const filteredData = allData.filter(ev => {
                    // 如果没设白名单，则所有人（已登录）可见
                    if (!ev.allowed_emails || ev.allowed_emails.length === 0) {
                        return true;
                    }
                    // 检查当前用户是否在白名单内
                    return ev.allowed_emails.includes(userEmail);
                });

                if (!filteredData || filteredData.length === 0) {
                    statusMsg.innerText = "你的权限不足以窥探这些记忆。";
                    return;
                }

                statusMsg.style.display = 'none';
                track.style.display = 'flex';
                renderTimeline(filteredData);
                initDragScroll(); // 渲染后开启拖拽

            } catch (error) {
                console.error(error);
                statusMsg.innerText = "时空链接中断：" + error.message;
            }
        }

        function renderTimeline(data) {
            const track = document.getElementById('timeline-track');
            track.innerHTML = ''; 

            data.forEach(ev => {
                const html = `
                    <div class="timeline-item">
                        <div class="cinematic-card" onclick="openLightbox('${ev.image}', '${ev.date}')">
                            <img src="${ev.image}" class="cinematic-img" loading="lazy" alt="Memory" draggable="false">
                            <div class="cinematic-overlay">
                                <div class="card-date">${ev.date || ''}</div>
                            </div>
                        </div>
                    </div>
                `;
                track.innerHTML += html;
            });
        }

        // --- 水平拖拽滚动 ---
        function initDragScroll() {
            viewport.addEventListener('mousedown', (e) => {
                isDragging = true;
                viewport.classList.add('active');
                startX = e.pageX - viewport.offsetLeft;
                scrollLeft = viewport.scrollLeft;
            });
            viewport.addEventListener('mouseleave', () => { isDragging = false; });
            viewport.addEventListener('mouseup', () => { 
                setTimeout(() => isDragging = false, 50); // 延迟重置防止立即触发点击
            });
            viewport.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const x = e.pageX - viewport.offsetLeft;
                const walk = (x - startX) * 2; // 滚动速度倍率
                viewport.scrollLeft = scrollLeft - walk;
            });

            // 滚轮支持
            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                viewport.scrollLeft += e.deltaY;
            });
        }

        // --- 剧场预览模式 ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');

        function openLightbox(imgSrc, date) {
            if (isDragging) return; // 拖拽时不触发预览
            
            lightboxImg.src = imgSrc;
            lightboxCaption.innerText = date; 
            lightbox.style.display = 'flex';
            setTimeout(() => { lightbox.style.opacity = '1'; }, 10);
        }

        function closeLightbox() {
            lightbox.style.opacity = '0';
            setTimeout(() => { 
                lightbox.style.display = 'none'; 
                lightboxImg.src = ''; 
            }, 400);
        }

        init();
    </script>
</body>
</html>
