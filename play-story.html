<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剧情播放中...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --text: #f8fafc;
            --panel: rgba(12, 18, 28, 0.78);
            --panel-strong: rgba(12, 18, 28, 0.92);
            --line: rgba(255, 255, 255, 0.18);
            --accent: #f4c95d;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #05070a;
            color: var(--text);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            user-select: none;
        }

        #stage {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: #05070a;
            isolation: isolate;
        }

        #background-layer,
        #cg-layer,
        #tone-layer,
        #weather-layer,
        #flash-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        #background-layer {
            z-index: 1;
            background-size: cover;
            background-position: center;
            transform: scale(1.01);
            transition: opacity 0.5s ease, filter 0.5s ease, transform 0.8s ease;
        }

        #background-layer.zoom-in { transform: scale(1.08); }
        #background-layer.blur { filter: blur(4px) brightness(0.8); }

        #cg-layer {
            z-index: 12;
            display: none;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: rgba(0, 0, 0, 0.82);
        }

        #tone-layer {
            z-index: 5;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.68), rgba(0, 0, 0, 0.05) 52%, rgba(0, 0, 0, 0.24));
        }

        #character-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        .character {
            position: absolute;
            bottom: 0;
            max-width: min(34vw, 460px);
            max-height: 86vh;
            object-fit: contain;
            filter: drop-shadow(0 24px 34px rgba(0, 0, 0, 0.55));
            transform-origin: bottom center;
            transition: opacity 0.28s ease, transform 0.32s ease, filter 0.25s ease;
        }

        .character.left { left: 4%; transform: translateX(0) scale(1); }
        .character.center { left: 50%; transform: translateX(-50%) scale(1.03); }
        .character.right { right: 4%; transform: translateX(0) scale(1); }
        .character.dim { filter: brightness(0.55) saturate(0.9) drop-shadow(0 24px 34px rgba(0, 0, 0, 0.55)); }
        .character.enter-left { animation: enterLeft 0.32s ease both; }
        .character.enter-right { animation: enterRight 0.32s ease both; }
        .character.enter-pop { animation: enterPop 0.26s ease both; }
        .character.exit { opacity: 0; transform: translateY(18px) scale(0.98); }
        .character.shake { animation: spriteShake 0.36s ease; }

        #avatar-container {
            position: absolute;
            left: max(24px, calc(50% - 520px));
            bottom: 48px;
            z-index: 34;
            width: 128px;
            height: 128px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(0);
            transition: opacity 0.22s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #avatar-container.visible { opacity: 1; }
        #avatar-container.bump { transform: translateY(-6px); }
        #avatar-container.shake { animation: spriteShake 0.36s ease; }

        #main-avatar {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(255, 255, 255, 0.92);
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.48);
        }

        #dialogue-box {
            position: absolute;
            left: 50%;
            bottom: 32px;
            z-index: 30;
            width: min(92vw, 1040px);
            min-height: 142px;
            transform: translateX(-50%);
            padding: 28px 32px 24px 172px;
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(18, 25, 38, 0.88), var(--panel));
            backdrop-filter: blur(10px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
            cursor: pointer;
        }

        #dialogue-box.hidden { display: none; }
        #dialogue-box.no-avatar { padding-left: 32px; }
        #dialogue-box.shake { animation: dialogueShake 0.3s ease; }

        #speaker-name {
            position: absolute;
            top: -18px;
            left: 172px;
            min-width: 116px;
            padding: 7px 18px;
            border: 1px solid rgba(244, 201, 93, 0.42);
            background: var(--panel-strong);
            color: var(--accent);
            font-weight: 700;
            text-align: center;
            letter-spacing: 0;
        }

        #dialogue-box.no-avatar #speaker-name { left: 28px; }

        #text-content {
            min-height: 64px;
            line-height: 1.75;
            font-size: 20px;
            overflow-wrap: anywhere;
        }

        #text-content strong { color: #ffe08a; }

        #choices {
            display: none;
            margin-top: 18px;
            gap: 10px;
            flex-direction: column;
        }

        .choice-btn {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            font: inherit;
            text-align: left;
            cursor: pointer;
            transition: background 0.16s ease, border-color 0.16s ease;
        }

        .choice-btn:hover {
            background: rgba(244, 201, 93, 0.18);
            border-color: rgba(244, 201, 93, 0.52);
        }

        .controls {
            position: absolute;
            top: 18px;
            right: 18px;
            z-index: 60;
            display: flex;
            gap: 8px;
        }

        .btn {
            min-width: 42px;
            height: 36px;
            padding: 0 12px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(0, 0, 0, 0.42);
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .btn:hover, .btn.active { background: rgba(244, 201, 93, 0.22); border-color: rgba(244, 201, 93, 0.48); }

        #history-panel {
            position: absolute;
            top: 64px;
            right: 18px;
            z-index: 70;
            display: none;
            width: min(420px, calc(100vw - 36px));
            max-height: 58vh;
            overflow: auto;
            padding: 14px;
            border: 1px solid var(--line);
            background: var(--panel-strong);
        }

        .history-item { padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .history-speaker { color: var(--accent); font-weight: 700; margin-bottom: 4px; }

        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            background: #05070a;
            color: white;
            transition: opacity 0.45s ease;
        }

        #flash-layer { z-index: 80; opacity: 0; }
        #flash-layer.white { background: #fff; animation: flash 0.42s ease; }
        #flash-layer.red { background: rgba(239, 68, 68, 0.85); animation: flash 0.42s ease; }
        #flash-layer.black { background: #000; animation: flash 0.55s ease; }

        #weather-layer { z-index: 18; opacity: 0; transition: opacity 0.35s ease; }
        #weather-layer.rain {
            opacity: 1;
            background-image: repeating-linear-gradient(105deg, rgba(180, 220, 255, 0.0) 0 16px, rgba(180, 220, 255, 0.32) 17px 18px);
            animation: weatherMove 0.45s linear infinite;
        }
        #weather-layer.snow {
            opacity: 1;
            background-image: radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 2px);
            background-size: 28px 28px;
            animation: snowMove 4s linear infinite;
        }

        .screen-shake { animation: screenShake 0.38s ease; }

        @keyframes enterLeft {
            from { opacity: 0; transform: translateX(-36px) scale(0.98); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes enterRight {
            from { opacity: 0; transform: translateX(36px) scale(0.98); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes enterPop {
            from { opacity: 0; transform: translateY(18px) scale(0.94); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes spriteShake {
            0%, 100% { translate: 0 0; }
            20% { translate: -10px 0; }
            40% { translate: 9px 0; }
            60% { translate: -6px 0; }
            80% { translate: 4px 0; }
        }
        @keyframes dialogueShake {
            0%, 100% { translate: 0 0; }
            25% { translate: 6px 0; }
            50% { translate: -6px 0; }
            75% { translate: 3px 0; }
        }
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-8px, 5px); }
            40% { transform: translate(7px, -4px); }
            60% { transform: translate(-5px, -5px); }
            80% { transform: translate(4px, 4px); }
        }
        @keyframes flash {
            0% { opacity: 0; }
            22% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes weatherMove {
            from { background-position: 0 0; }
            to { background-position: -44px 72px; }
        }
        @keyframes snowMove {
            from { background-position: 0 0; }
            to { background-position: 18px 84px; }
        }

        @media (max-width: 720px) {
            .character { max-width: 56vw; max-height: 72vh; }
            .character.left { left: -10%; }
            .character.right { right: -10%; }
            #avatar-container { left: 20px; bottom: 38px; width: 88px; height: 88px; }
            #dialogue-box { bottom: 18px; width: calc(100vw - 24px); min-height: 156px; padding: 26px 18px 18px 118px; }
            #dialogue-box.no-avatar { padding-left: 18px; }
            #speaker-name { left: 118px; }
            #dialogue-box.no-avatar #speaker-name { left: 18px; }
            #text-content { font-size: 17px; }
            .controls { top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
<div id="loading-screen">
    <div>正在读取剧情...</div>
    <div id="preload-status" style="font-size: 13px; color: #94a3b8;">0%</div>
</div>

<div id="stage">
    <div id="background-layer"></div>
    <div id="cg-layer"></div>
    <div id="tone-layer"></div>
    <div id="weather-layer"></div>
    <div id="character-layer"></div>
    <div id="flash-layer"></div>
    <div id="avatar-container">
        <img id="main-avatar" alt="">
    </div>

    <div class="controls" onclick="event.stopPropagation()">
        <button class="btn" id="auto-btn" title="自动播放" onclick="toggleAuto()">自动</button>
        <button class="btn" title="文本回看" onclick="toggleHistory()">回看</button>
        <button class="btn" title="退出回想" onclick="location.href='lore.html'">退出</button>
    </div>

    <div id="history-panel"></div>

    <div id="dialogue-box" class="no-avatar" onclick="handleTap()">
        <div id="speaker-name">...</div>
        <div id="text-content"></div>
        <div id="choices"></div>
    </div>
</div>

<audio id="bgm-player" loop></audio>
<audio id="se-player"></audio>
<audio id="voice-player"></audio>

<script>
    const SUPABASE_URL = 'https://vbzfpgucpciqgaakqndz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTc2MzMsImV4cCI6MjA4MzE3MzYzM30.fBVDirEJ52bvrYJZ5DNv7fVDLNgCwITKwdKqT6YJDYw';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentStory = null;
    let scriptLines = [];
    let currentLine = 0;
    let isTyping = false;
    let typingJob = null;
    let activeChoice = false;
    let autoMode = false;
    let defaultSpeed = 28;
    let labelMap = new Map();
    let historyItems = [];
    const characterNodes = new Map();

    const els = {
        stage: document.getElementById('stage'),
        bg: document.getElementById('background-layer'),
        cg: document.getElementById('cg-layer'),
        weather: document.getElementById('weather-layer'),
        flash: document.getElementById('flash-layer'),
        characters: document.getElementById('character-layer'),
        avatarContainer: document.getElementById('avatar-container'),
        avatar: document.getElementById('main-avatar'),
        dialogue: document.getElementById('dialogue-box'),
        speaker: document.getElementById('speaker-name'),
        text: document.getElementById('text-content'),
        choices: document.getElementById('choices'),
        history: document.getElementById('history-panel'),
        loading: document.getElementById('loading-screen'),
        preload: document.getElementById('preload-status'),
        autoBtn: document.getElementById('auto-btn'),
        bgm: document.getElementById('bgm-player'),
        se: document.getElementById('se-player'),
        voice: document.getElementById('voice-player')
    };

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const storyId = params.get('id');
        const localDev = params.get('dev') === '1' && (location.protocol === 'file:' || ['localhost', '127.0.0.1'].includes(location.hostname));

        if (!storyId) {
            location.href = 'lore.html';
            return;
        }

        if (!localDev) {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                alert('请先登录。');
                location.href = 'index.html';
                return;
            }
        }

        try {
            currentStory = await loadStoryContent(storyId);
            scriptLines = normalizeScript(currentStory);
            labelMap = buildLabelMap(scriptLines);
            defaultSpeed = Number(currentStory.typeSpeed || currentStory.speed || defaultSpeed);
            await preloadAssets();
            hideLoading();
            if (currentStory.bg) await setBackground(currentStory.bg, { duration: 0 });
            if (currentStory.bgm) playAudio('bgm', currentStory.bgm, { volume: currentStory.bgmVolume });
            renderNext();
        } catch (error) {
            els.preload.innerText = error.message || '剧情读取失败';
            console.error(error);
        }
    }

    async function loadStoryContent(storyId) {
        const jsonUrl = `stories/content/${storyId}.json?v=${Date.now()}`;
        try {
            const response = await fetch(jsonUrl, { cache: 'no-store' });
            if (response.ok) return await response.json();
        } catch (_) {
            // file:// or older deployments can fall through to the legacy JS loader.
        }

        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = `stories/content/${storyId}.js?v=${Date.now()}`;
            script.onload = () => {
                if (typeof storyContent !== 'undefined') resolve(storyContent);
                else if (window.storyContent) resolve(window.storyContent);
                else reject(new Error('故事文件没有声明 storyContent。'));
            };
            script.onerror = () => reject(new Error('无法加载故事内容。'));
            document.body.appendChild(script);
        });
    }

    function normalizeScript(story) {
        return Array.isArray(story.script) ? story.script : (story.lines || []);
    }

    function buildLabelMap(lines) {
        const map = new Map();
        lines.forEach((line, index) => {
            if (line && line.type === 'label' && line.name) map.set(line.name, index);
        });
        return map;
    }

    async function preloadAssets() {
        const srcs = new Set();
        const add = value => {
            const src = resolveAsset(value);
            if (src && /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(src.split('?')[0])) srcs.add(src);
        };

        add(currentStory.bg);
        walkObject(currentStory.assets, add);
        Object.values(currentStory.characters || {}).forEach(character => walkObject(character.sprites, add));
        scriptLines.forEach(line => {
            add(line.bg);
            add(line.src);
            add(line.cg);
            add(line.image);
        });

        const assets = [...srcs];
        if (!assets.length) {
            els.preload.innerText = '100%';
            return;
        }

        let loaded = 0;
        await Promise.all(assets.map(src => new Promise(resolve => {
            const img = new Image();
            img.onload = img.onerror = () => {
                loaded++;
                els.preload.innerText = `${Math.round(loaded / assets.length * 100)}%`;
                resolve();
            };
            img.src = src;
        })));
    }

    function walkObject(value, visitor) {
        if (!value) return;
        if (typeof value === 'string') {
            visitor(value);
            return;
        }
        if (Array.isArray(value)) {
            value.forEach(item => walkObject(item, visitor));
            return;
        }
        if (typeof value === 'object') Object.values(value).forEach(item => walkObject(item, visitor));
    }

    function hideLoading() {
        els.loading.style.opacity = '0';
        setTimeout(() => { els.loading.style.display = 'none'; }, 460);
    }

    async function renderNext() {
        if (activeChoice || isTyping) return;

        if (currentLine >= scriptLines.length) {
            showEnding();
            return;
        }

        const line = scriptLines[currentLine++];
        const type = normalizeType(line);

        if (type === 'say') {
            await renderSay(line);
            return;
        }

        await runCommand(type, line);
        if (!activeChoice) renderNext();
    }

    function normalizeType(line) {
        if (!line || typeof line !== 'object') return 'wait';
        if (!line.type) return 'say';
        return line.type;
    }

    async function runCommand(type, line) {
        switch (type) {
            case 'bg':
            case 'scene':
                await setBackground(line.src || line.bg || line.name, line);
                break;
            case 'show':
                showCharacter(line);
                break;
            case 'hide':
                hideCharacter(line.character || line.id || line.name, line);
                break;
            case 'hideAll':
                hideAllCharacters();
                break;
            case 'effect':
                await runEffect(line.name || line.effect, line);
                break;
            case 'flash':
                await runEffect(line.color || 'white', line);
                break;
            case 'wait':
                await sleep(Number(line.duration || line.ms || 600));
                break;
            case 'audio':
            case 'bgm':
            case 'se':
            case 'voice':
                playAudio(type === 'audio' ? line.channel : type, line.src || line.name, line);
                break;
            case 'stopAudio':
                stopAudio(line.channel || 'bgm');
                break;
            case 'cg':
                setCG(line.src || line.cg || line.name, line);
                break;
            case 'overlay':
                setOverlay(line.name || line.weather || line.effect);
                break;
            case 'textbox':
                els.dialogue.classList.toggle('hidden', line.visible === false || line.show === false);
                break;
            case 'jump':
                jumpTo(line.target || line.label || line.name);
                break;
            case 'label':
                break;
            case 'choice':
                showChoices(line);
                break;
            default:
                if (line.text || line.speaker) await renderSay(line);
                break;
        }
    }

    async function renderSay(line) {
        const speaker = line.speaker || line.name || '';
        const text = line.text || '';

        els.dialogue.classList.remove('hidden');
        els.choices.style.display = 'none';
        els.choices.innerHTML = '';
        els.speaker.innerText = speaker || '旁白';

        if (line.voice) playAudio('voice', line.voice, line);
        if (line.effect) runEffect(line.effect, line);

        if (speaker === '旁白' || line.narration) {
            hideAvatar();
            dimCharacters(null);
        } else {
            const characterId = line.character || line.id || speaker;
            if (line.emotion || line.src) showCharacter({ ...line, character: characterId, position: line.position || 'left', enter: line.enter || 'pop' });
            dimCharacters(characterId);
        }

        historyItems.push({ speaker: speaker || '旁白', text });
        renderHistory();
        await startTypewriter(text, line);
    }

    function showCharacter(line) {
        if (!usesSpriteDisplay(line)) {
            showAvatar(line);
            return;
        }

        showSpriteCharacter(line);
    }

    function usesSpriteDisplay(line) {
        const display = line.display || line.mode || line.view || currentStory.characterDisplay || currentStory.defaultDisplay;
        return display === 'sprite' || display === 'stand' || display === '立绘';
    }

    function showAvatar(line) {
        const id = line.character || line.id || line.name || line.speaker || 'main';
        const src = resolveCharacterSprite(id, line);
        if (!src) return;

        if (els.avatar.src !== new URL(src, document.baseURI).href) {
            els.avatar.src = src;
            els.avatar.alt = id;
            els.avatarContainer.dataset.character = id;
            els.avatarContainer.classList.add('bump');
            setTimeout(() => els.avatarContainer.classList.remove('bump'), 220);
        }

        els.avatarContainer.classList.add('visible');
        els.dialogue.classList.remove('no-avatar');
    }

    function hideAvatar() {
        els.avatarContainer.classList.remove('visible', 'bump', 'shake');
        delete els.avatarContainer.dataset.character;
        els.dialogue.classList.add('no-avatar');
    }

    function showSpriteCharacter(line) {
        hideAvatar();

        const id = line.character || line.id || line.name || line.speaker || 'main';
        const src = resolveCharacterSprite(id, line);
        if (!src) return;

        let img = characterNodes.get(id);
        const position = line.position || 'left';
        if (!img) {
            img = document.createElement('img');
            img.dataset.character = id;
            img.className = `character ${position}`;
            els.characters.appendChild(img);
            characterNodes.set(id, img);
        }

        img.src = src;
        img.alt = id;
        img.className = `character ${position}`;
        if (line.enter === 'left') img.classList.add('enter-left');
        else if (line.enter === 'right') img.classList.add('enter-right');
        else if (line.enter !== 'none') img.classList.add('enter-pop');

        setTimeout(() => img.classList.remove('enter-left', 'enter-right', 'enter-pop'), 360);
    }

    function hideCharacter(id, line = {}) {
        if (!id) return;
        if (els.avatarContainer.dataset.character === id) hideAvatar();

        const img = characterNodes.get(id);
        if (!img) return;
        img.classList.add('exit');
        setTimeout(() => {
            img.remove();
            characterNodes.delete(id);
        }, Number(line.duration || 300));
    }

    function hideAllCharacters() {
        hideAvatar();
        [...characterNodes.keys()].forEach(id => hideCharacter(id));
    }

    function dimCharacters(activeId) {
        characterNodes.forEach((node, id) => {
            node.classList.toggle('dim', !!activeId && id !== activeId);
        });
    }

    function resolveCharacterSprite(id, line) {
        if (line.src) return resolveAsset(line.src);
        const character = currentStory.characters && currentStory.characters[id];
        if (character && character.sprites) {
            const sprite = character.sprites[line.emotion || 'default'] || character.sprites.default || character.sprites.normal;
            if (sprite) return resolveAsset(sprite);
        }
        return resolveAsset(line.emotion || id);
    }

    function resolveAsset(key) {
        if (!key) return '';
        if (/^(https?:|data:|\.{0,2}\/|素材\/|stories\/)/.test(key)) return key;
        const assets = currentStory && currentStory.assets ? currentStory.assets : {};
        return assets[key] || key;
    }

    async function setBackground(value, line = {}) {
        const src = resolveAsset(value);
        if (!src) return;
        const duration = Number(line.duration ?? 500);
        els.bg.style.transitionDuration = `${duration}ms`;
        if (duration > 0 && line.effect !== 'instant') {
            els.bg.style.opacity = '0';
            await sleep(Math.min(duration, 420));
        }
        els.bg.style.backgroundImage = `url("${src}")`;
        els.bg.classList.toggle('zoom-in', line.zoom === true || line.effect === 'zoom');
        els.bg.classList.toggle('blur', line.blur === true);
        els.bg.style.opacity = '1';
        if (duration > 0) await sleep(duration);
    }

    function setCG(value, line = {}) {
        if (line.visible === false || line.show === false || line.hide) {
            els.cg.style.display = 'none';
            els.cg.style.backgroundImage = '';
            return;
        }
        const src = resolveAsset(value);
        if (!src) return;
        els.cg.style.display = 'block';
        els.cg.style.backgroundImage = `url("${src}")`;
    }

    function setOverlay(name) {
        els.weather.className = '';
        if (name && name !== 'none' && name !== 'clear') els.weather.classList.add(name);
    }

    async function runEffect(name, line = {}) {
        const effect = String(name || '').toLowerCase();
        const duration = Number(line.duration || 420);

        if (['shake', 'screen-shake', 'screen'].includes(effect)) {
            els.stage.classList.add('screen-shake');
            await sleep(duration);
            els.stage.classList.remove('screen-shake');
            return;
        }

        if (['dialogue-shake', 'box-shake'].includes(effect)) {
            els.dialogue.classList.add('shake');
            await sleep(duration);
            els.dialogue.classList.remove('shake');
            return;
        }

        if (['sprite-shake', 'character-shake'].includes(effect)) {
            const id = line.character || line.id || line.speaker;
            const node = id ? characterNodes.get(id) : null;
            if (node) {
                node.classList.add('shake');
                await sleep(duration);
                node.classList.remove('shake');
            } else if (!id || els.avatarContainer.dataset.character === id) {
                els.avatarContainer.classList.add('shake');
                await sleep(duration);
                els.avatarContainer.classList.remove('shake');
            }
            return;
        }

        const color = effect.includes('red') ? 'red' : effect.includes('black') ? 'black' : 'white';
        els.flash.className = color;
        await sleep(duration);
        els.flash.className = '';
    }

    function playAudio(channel, value, line = {}) {
        const src = resolveAsset(value);
        const player = channel === 'se' ? els.se : channel === 'voice' ? els.voice : els.bgm;
        if (!player || !src) return;
        player.volume = Number(line.volume ?? currentStory.volume ?? 0.75);
        if (channel === 'bgm') player.loop = line.loop !== false;
        if (player.src !== new URL(src, document.baseURI).href) player.src = src;
        player.currentTime = 0;
        player.play().catch(() => {
            console.info('浏览器需要用户交互后才能播放音频。');
        });
    }

    function stopAudio(channel) {
        const player = channel === 'se' ? els.se : channel === 'voice' ? els.voice : els.bgm;
        if (!player) return;
        player.pause();
        player.currentTime = 0;
    }

    async function startTypewriter(text, line = {}) {
        const parsed = parseInlineText(String(text));
        const speed = Number(line.speed || defaultSpeed);
        const job = { cancelled: false, fullHTML: parsed.fullHTML };
        typingJob = job;
        isTyping = true;
        els.text.innerHTML = '';

        let html = '';
        let delay = speed;
        for (const token of parsed.tokens) {
            if (job.cancelled) break;
            if (token.type === 'wait') {
                await sleep(token.ms);
                continue;
            }
            if (token.type === 'speed') {
                delay = token.ms;
                continue;
            }
            html += token.html;
            els.text.innerHTML = html;
            await sleep(delay);
        }

        finishTyping();
    }

    function finishTyping() {
        if (typingJob) {
            typingJob.cancelled = true;
            els.text.innerHTML = typingJob.fullHTML;
        }
        isTyping = false;
        typingJob = null;
        if (autoMode && !activeChoice) setTimeout(renderNext, Number(currentStory.autoDelay || 900));
    }

    function parseInlineText(text) {
        const tokens = [];
        const stack = [];
        let i = 0;

        while (i < text.length) {
            if (text[i] === '[') {
                const end = text.indexOf(']', i);
                if (end !== -1) {
                    const tag = text.slice(i + 1, end);
                    if (/^wait=\d+$/i.test(tag)) {
                        tokens.push({ type: 'wait', ms: Number(tag.split('=')[1]) });
                        i = end + 1;
                        continue;
                    }
                    if (/^speed=(\d+|normal)$/i.test(tag)) {
                        const value = tag.split('=')[1];
                        tokens.push({ type: 'speed', ms: value === 'normal' ? defaultSpeed : Number(value) });
                        i = end + 1;
                        continue;
                    }
                    if (/^color=/i.test(tag)) {
                        stack.push({ tag: 'span', style: `color:${escapeAttribute(tag.slice(6))}` });
                        i = end + 1;
                        continue;
                    }
                    if (tag === '/color') {
                        popTag(stack, 'span');
                        i = end + 1;
                        continue;
                    }
                    if (tag === 'b') {
                        stack.push({ tag: 'strong' });
                        i = end + 1;
                        continue;
                    }
                    if (tag === '/b') {
                        popTag(stack, 'strong');
                        i = end + 1;
                        continue;
                    }
                }
            }

            const char = text[i];
            const safe = escapeHTML(char);
            const open = stack.map(item => item.style ? `<${item.tag} style="${item.style}">` : `<${item.tag}>`).join('');
            const close = stack.slice().reverse().map(item => `</${item.tag}>`).join('');
            tokens.push({ type: 'char', html: open + safe + close });
            i++;
        }

        return {
            tokens,
            fullHTML: tokens.filter(token => token.type === 'char').map(token => token.html).join('')
        };
    }

    function popTag(stack, tag) {
        const index = stack.map(item => item.tag).lastIndexOf(tag);
        if (index !== -1) stack.splice(index, 1);
    }

    function showChoices(line) {
        const options = line.options || line.choices || [];
        if (!options.length) return;

        activeChoice = true;
        els.dialogue.classList.remove('hidden');
        els.speaker.innerText = line.speaker || '选择';
        els.text.innerHTML = escapeHTML(line.text || '');
        els.choices.style.display = 'flex';
        els.choices.innerHTML = options.map((option, index) => {
            const label = escapeHTML(option.text || option.label || `选项 ${index + 1}`);
            return `<button class="choice-btn" data-choice-index="${index}">${label}</button>`;
        }).join('');

        els.choices.querySelectorAll('.choice-btn').forEach(button => {
            button.addEventListener('click', event => {
                event.stopPropagation();
                const choice = options[Number(button.dataset.choiceIndex)];
                activeChoice = false;
                els.choices.style.display = 'none';
                els.choices.innerHTML = '';
                if (choice.effect) runEffect(choice.effect, choice);
                if (choice.jump || choice.target || choice.label) jumpTo(choice.jump || choice.target || choice.label);
                renderNext();
            });
        });
    }

    function jumpTo(label) {
        if (!labelMap.has(label)) return;
        currentLine = labelMap.get(label) + 1;
    }

    function handleTap() {
        if (activeChoice) return;
        if (isTyping) {
            finishTyping();
            return;
        }
        renderNext();
    }

    function toggleAuto() {
        autoMode = !autoMode;
        els.autoBtn.classList.toggle('active', autoMode);
        if (autoMode && !isTyping && !activeChoice) renderNext();
    }

    function toggleHistory() {
        els.history.style.display = els.history.style.display === 'block' ? 'none' : 'block';
    }

    function renderHistory() {
        els.history.innerHTML = historyItems.slice(-30).map(item => `
            <div class="history-item">
                <div class="history-speaker">${escapeHTML(item.speaker)}</div>
                <div>${escapeHTML(item.text)}</div>
            </div>
        `).join('');
    }

    function showEnding() {
        els.speaker.innerText = '系统';
        els.text.innerText = '（故事结束）';
        els.choices.style.display = 'flex';
        els.choices.innerHTML = `
            <button class="choice-btn" onclick="location.reload(); event.stopPropagation();">重读一遍</button>
            <button class="choice-btn" onclick="location.href='lore.html'; event.stopPropagation();">返回列表</button>
        `;
        activeChoice = true;
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, Math.max(0, ms)));
    }

    function escapeHTML(value) {
        return String(value).replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    function escapeAttribute(value) {
        return String(value).replace(/["'<>]/g, '');
    }

    init();
</script>
</body>
</html>
