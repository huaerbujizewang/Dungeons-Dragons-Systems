<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法术图鉴 - 自设法术档案</title>
    <style>
        :root {
            --ink: #2c2418;
            --muted: #7a6a56;
            --paper: #fffaf0;
            --line: #d8c7aa;
            --accent: #6d3f8d;
            --accent-soft: #f3edf8;
        }

        body {
            margin: 0;
            padding: 32px;
            font-family: "PingFang SC", "Microsoft YaHei", serif;
            color: var(--ink);
            background: #f4f1ea;
        }

        .container { max-width: 1180px; margin: 0 auto; }
        .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; border-bottom: 2px solid var(--ink); padding-bottom: 16px; margin-bottom: 24px; }
        .back-btn { padding: 8px 15px; border: 1px solid var(--ink); text-decoration: none; color: var(--ink); border-radius: 4px; background: rgba(255,255,255,0.45); }
        .back-btn:hover { background: var(--ink); color: white; }
        h1 { margin: 0; font-size: 2em; letter-spacing: 2px; }

        .controls {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) 150px 160px;
            gap: 10px;
            background: rgba(255,255,255,0.55);
            border: 1px solid var(--line);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 22px;
        }

        .controls input, .controls select {
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 4px;
            background: white;
            color: var(--ink);
            font: inherit;
        }

        .layout { display: block; }

        .level-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            background: rgba(255,255,255,0.6);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 18px;
        }

        .level-btn {
            text-align: center;
            padding: 9px 10px;
            border: none;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            color: var(--muted);
            font-weight: bold;
            white-space: nowrap;
        }

        .level-btn.active, .level-btn:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .spell-list { display: flex; flex-direction: column; gap: 10px; }

        .spell-card {
            background: var(--paper);
            border: 1px solid var(--line);
            border-left: 5px solid var(--accent);
            border-radius: 8px;
            padding: 12px 14px;
            box-shadow: 0 5px 16px rgba(44, 36, 24, 0.06);
            display: grid;
            grid-template-columns: 230px 300px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
        }

        .spell-name { font-size: 1.28em; font-weight: 900; margin-bottom: 4px; color: var(--ink); line-height: 1.2; }
        .spell-title-row { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
        .source-tag { display: inline-flex; align-items: center; border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; background: rgba(255,255,255,0.68); color: var(--muted); font-size: 0.72em; font-weight: bold; line-height: 1.4; white-space: nowrap; }
        .spell-meta { color: var(--accent); font-style: italic; font-weight: bold; margin-bottom: 0; }
        .stat-row { display: grid; grid-template-columns: 72px minmax(0, 1fr); gap: 8px; padding: 3px 0; border-bottom: 1px solid rgba(216,199,170,0.7); font-size: 0.86em; }
        .stat-key { color: var(--muted); font-weight: bold; }
        .spell-body { line-height: 1.55; font-size: 0.93em; }
        .spell-body p { margin: 0 0 7px; }
        .effect-list { display: grid; grid-template-columns: repeat(2, minmax(240px, 1fr)); gap: 7px 12px; margin-top: 8px; }
        .effect { padding: 6px 8px 6px 10px; border-left: 3px solid var(--line); background: rgba(109, 63, 141, 0.045); border-radius: 0 4px 4px 0; }
        .effect-title { font-weight: bold; color: var(--accent); }
        .empty { color: var(--muted); text-align: center; padding: 40px; border: 1px dashed var(--line); border-radius: 8px; background: rgba(255,255,255,0.45); }

        @media (max-width: 960px) {
            body { padding: 18px; }
            .topbar { flex-direction: column; align-items: flex-start; }
            .controls { grid-template-columns: 1fr; }
            .spell-card { grid-template-columns: 1fr; }
            .effect-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h1>✦ 法术图鉴</h1>
                <div style="color:var(--muted); margin-top:6px;">法术档案 / 1环至12环</div>
            </div>
            <a href="index.html" class="back-btn">⬅ 返回主界面</a>
        </div>

        <div class="controls">
            <input id="spell-search" type="text" placeholder="搜索法术名称、学派或正文..." oninput="renderSpells()">
            <select id="school-filter" onchange="renderSpells()">
                <option value="">全部学派</option>
            </select>
            <select id="sort-filter" onchange="renderSpells()">
                <option value="level-asc">环位升序</option>
                <option value="level-desc">环位降序</option>
                <option value="name">名称排序</option>
            </select>
        </div>

        <div class="layout">
            <aside class="level-list" id="level-list"></aside>
            <main class="spell-list" id="spell-grid">
                <div class="empty">正在读取法术档案...</div>
            </main>
        </div>
    </div>

    <script>
        let SPELLS = [];
        let currentLevel = '';

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>'"]/g, ch => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[ch]));
        }

        function levelLabel(level) {
            return Number(level) === 0 ? '戏法' : `${level}环`;
        }

        async function init() {
            try {
                const response = await fetch('spells.json?v=' + Date.now());
                if (!response.ok) throw new Error('法术数据读取失败');
                SPELLS = await response.json();
                renderLevelButtons();
                renderSchoolOptions();
                renderSpells();
            } catch (error) {
                document.getElementById('spell-grid').innerHTML = `<div class="empty">${escapeHTML(error.message)}</div>`;
            }
        }

        function renderLevelButtons() {
            const list = document.getElementById('level-list');
            const buttons = [{ value: '', label: '全部环位' }];
            for (let i = 1; i <= 12; i++) buttons.push({ value: String(i), label: `${i}环法术` });

            list.innerHTML = buttons.map(btn => `
                <button class="level-btn ${currentLevel === btn.value ? 'active' : ''}" onclick="setLevelFilter('${btn.value}')">
                    ${btn.label}
                </button>
            `).join('');
        }

        function setLevelFilter(level) {
            currentLevel = level;
            renderLevelButtons();
            renderSpells();
        }

        function renderSchoolOptions() {
            const select = document.getElementById('school-filter');
            const schools = [...new Set(SPELLS.map(spell => spell.school).filter(Boolean))].sort();
            select.innerHTML = '<option value="">全部学派</option>' + schools.map(school => `<option value="${escapeHTML(school)}">${escapeHTML(school)}</option>`).join('');
        }

        function spellClassText(spell) {
            return (spell.classes || []).join('、');
        }

        function spellSearchText(spell) {
            return [
                spell.name,
                spell.source,
                spell.school,
                spellClassText(spell),
                spell.casting_time,
                spell.range,
                spell.components,
                spell.duration,
                ...(spell.description || []),
                ...(spell.effects || []).flatMap(effect => [effect.title, effect.text])
            ].join(' ').toLowerCase();
        }

        function renderSpells() {
            const grid = document.getElementById('spell-grid');
            const query = document.getElementById('spell-search').value.trim().toLowerCase();
            const school = document.getElementById('school-filter').value;
            const sortMode = document.getElementById('sort-filter').value;

            let visible = SPELLS.filter(spell => {
                if (currentLevel && String(spell.level) !== currentLevel) return false;
                if (school && spell.school !== school) return false;
                if (query && !spellSearchText(spell).includes(query)) return false;
                return true;
            });

            visible = visible.sort((a, b) => {
                if (sortMode === 'level-desc') return Number(b.level) - Number(a.level) || a.name.localeCompare(b.name, 'zh-Hans-CN');
                if (sortMode === 'name') return a.name.localeCompare(b.name, 'zh-Hans-CN');
                return Number(a.level) - Number(b.level) || a.name.localeCompare(b.name, 'zh-Hans-CN');
            });

            if (visible.length === 0) {
                grid.innerHTML = '<div class="empty">没有匹配的法术。</div>';
                return;
            }

            grid.innerHTML = visible.map(renderSpellCard).join('');
        }

        function renderSpellCard(spell) {
            const description = (spell.description || []).map(text => `<p>${escapeHTML(text)}</p>`).join('');
            const sourceTag = spell.source ? `<span class="source-tag">${escapeHTML(spell.source)}</span>` : '';
            const effects = (spell.effects || []).length
                ? `<div class="effect-list">${(spell.effects || []).map(effect => `
                    <div class="effect"><span class="effect-title">${escapeHTML(effect.title)}：</span>${escapeHTML(effect.text)}</div>
                `).join('')}</div>`
                : '';

            return `
                <article class="spell-card">
                    <section>
                        <div class="spell-title-row">
                            <div class="spell-name">${escapeHTML(spell.name)}</div>
                            ${sourceTag}
                        </div>
                        <div class="spell-meta">${levelLabel(spell.level)} ${escapeHTML(spell.school)}${spell.classes?.length ? `（${escapeHTML(spellClassText(spell))}）` : ''}</div>
                    </section>
                    <section>
                        <div class="stat-row"><div class="stat-key">施法时间</div><div>${escapeHTML(spell.casting_time)}</div></div>
                        <div class="stat-row"><div class="stat-key">施法距离</div><div>${escapeHTML(spell.range)}</div></div>
                        <div class="stat-row"><div class="stat-key">法术成分</div><div>${escapeHTML(spell.components)}</div></div>
                        <div class="stat-row"><div class="stat-key">持续时间</div><div>${escapeHTML(spell.duration)}</div></div>
                    </section>
                    <div class="spell-body">${description}${effects}</div>
                </article>
            `;
        }

        init();
    </script>
</body>
</html>
