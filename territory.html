<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>领地行政终端</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-color: #f4f1ea; 
            --panel-bg: #ffffff;
            --text-main: #2c3e50;
            --accent-gold: #c5a059; 
            --accent-blue: #34495e;
            --border-color: #dcd6cc;
            --danger-color: #c0392b;
            --success-color: #27ae60;
            --state-color: #8e44ad;
            --trade-color: #2980b9; 
        }

        body { font-family: "PingFang SC", "Microsoft YaHei", serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        .layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
        
        /* 内容区 */
        .main-content { padding: 40px; overflow-y: auto; display: flex; flex-direction: column; }
        .city-header { border-bottom: 2px solid var(--accent-gold); padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: end; }
        .city-name { font-size: 2.5em; font-weight: bold; letter-spacing: 2px; color: var(--text-main); }
        .city-info { font-size: 0.9em; color: #666; font-family: sans-serif; }

        /* 概览 */
        #overview-panel { display: block; animation: fadeIn 0.5s; }
        .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--panel-bg); padding: 20px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--accent-blue); text-align: center; }
        .kpi-value { font-size: 2em; font-weight: bold; margin: 10px 0; }
        .kpi-label { color: #7f8c8d; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-sub { font-size: 0.8em; font-weight: bold; }

        /* 图表区域 */
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .charts-row.full { grid-template-columns: 1fr; }
        .chart-box { background: var(--panel-bg); padding: 20px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; }
        .chart-title { text-align: center; font-weight: bold; margin-bottom: 15px; color: var(--accent-blue); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .canvas-container { position: relative; height: 300px; width: 100%; }

        /* 数据表格样式 */
        .data-section { background: var(--panel-bg); padding: 25px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid var(--border-color); }
        .section-header { font-size: 1.2em; font-weight: bold; color: var(--accent-blue); border-left: 5px solid var(--accent-gold); padding-left: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .finance-table, .staff-table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
        .finance-table th, .staff-table th { text-align: left; padding: 12px; background: #f8f9fa; border-bottom: 2px solid #eee; color: #666; }
        .finance-table td, .staff-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .finance-table tr:last-child td { border-bottom: none; }
        
        .amount-col { text-align: right; font-family: monospace; font-weight: bold; }
        .income-text { color: var(--success-color); }
        .expense-text { color: var(--danger-color); }
        .total-row { background: #fdfdfd; font-weight: bold; border-top: 2px solid #ddd; }
        
        .tag-box { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; background: #eee; color: #555; }
        .tag-tax { background: #e3f2fd; color: #1976d2; } 
        .tag-state { background: #f3e5f5; color: #8e44ad; } 
        .tag-trade { background: #eafaf1; color: #27ae60; } 
        .tag-cost { background: #fdeaea; color: #c0392b; } 
        .tag-special { background: #fff8e1; color: #f39c12; } 

        /* 详情 */
        #detail-panel { display: none; animation: fadeIn 0.3s; height: 100%; }
        .suzerain-container { background: var(--panel-bg); border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.1); height: 100%; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; }
        .suz-header { background: var(--accent-blue); color: #fff; padding: 15px; text-align: center; font-size: 1.2em; letter-spacing: 2px; font-weight: bold; border-bottom: 4px solid var(--accent-gold); }
        .suz-list { flex: 1; overflow-y: auto; padding: 20px; background: #fff; }
        .suz-item { padding: 15px; border: 1px solid #eee; margin-bottom: 10px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .suz-item:hover { background: #f9f9f9; border-left-color: #ddd; }
        .suz-item.active { background: #f0f4f8; border-left-color: var(--accent-gold); border-color: var(--accent-gold); }
        .suz-item-title { font-weight: bold; font-size: 1.1em; }
        .suz-desc-box { background: var(--accent-blue); color: #fff; padding: 25px; min-height: 140px; font-size: 0.95em; line-height: 1.6; border-top: 4px solid var(--accent-gold); box-shadow: inset 0 5px 15px rgba(0,0,0,0.2); }

        /* 侧边栏及折叠菜单 */
        .sidebar { background: #fff; border-left: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; box-shadow: -5px 0 20px rgba(0,0,0,0.02); z-index: 10; }
        
        /* 区域切换器样式 */
        .location-selector { padding: 20px 15px 10px 15px; border-bottom: 2px solid var(--accent-gold); background: #fdfcf9; }
        #location-select { width: 100%; padding: 10px; font-weight: bold; background: var(--text-main); color: #fff; border: 1px solid var(--accent-gold); border-radius: 4px; font-size: 1.05em; cursor: pointer; outline: none; }
        #location-select:focus { box-shadow: 0 0 10px rgba(197, 160, 89, 0.5); }

        .menu-btn { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border: none; background: #fdfdfd; color: #666; cursor: pointer; transition: 0.2s; border-radius: 6px; font-size: 0.95em; text-align: left; font-family: inherit; width: 100%; box-sizing: border-box; margin: 0 10px; width: calc(100% - 20px); }
        .menu-btn:hover { background: #f4f1ea; color: #333; }
        .menu-btn.active { background: var(--accent-blue); color: #fff; box-shadow: 0 4px 8px rgba(52, 73, 94, 0.2); }
        
        .menu-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { width: 24px; text-align: center; }
        .chevron { transition: transform 0.3s ease; font-size: 0.8em; }
        .chevron.open { transform: rotate(180deg); }
        
        #sub-menus { display: flex; flex-direction: column; gap: 4px; padding-left: 20px; overflow: hidden; transition: max-height 0.3s ease-in-out; max-height: 500px; margin-right: 10px; }
        .sub-btn { background: transparent; padding: 10px 15px; font-size: 0.9em; justify-content: flex-start; margin:0; width: 100%; }
        .sub-btn.active { font-weight: bold; background: #f4f1ea; color: var(--accent-blue); box-shadow: none; border-left: 3px solid var(--accent-gold); }

        .back-link { margin-top: auto; text-align: center; color: #999; text-decoration: none; font-size: 0.8em; padding: 15px; }
        .back-link:hover { color: #333; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="layout">
    <div class="main-content">
        <div class="city-header">
            <div class="city-name" id="header-city-name">-- <span style="font-size:0.5em; font-weight:normal; color:#666;">--</span></div>
            <div class="city-info" id="date-display">--</div>
        </div>

        <div id="overview-panel">
            <div class="kpi-row">
                <div class="kpi-card">
                    <div class="kpi-label">管辖人口</div>
                    <div class="kpi-value" id="kpi-pop">--</div>
                    <div style="font-size:0.8em; color:green;" id="kpi-pop-trend">▲ 稳定</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">月度净收入</div>
                    <div class="kpi-value" id="kpi-income">Calculating...</div>
                    <div class="kpi-sub" id="kpi-income-sub">...</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">治安指数</div>
                    <div class="kpi-value" id="kpi-order-status" style="color:green;">--</div>
                    <div style="font-size:0.8em; color:#666;" id="kpi-order-desc">--</div>
                </div>
            </div>

            <div class="charts-row" id="demographic-charts-row">
                <div class="chart-box">
                    <div class="chart-title">种族构成 (Demographics)</div>
                    <div class="canvas-container"><canvas id="raceChart"></canvas></div>
                </div>
                <div class="chart-box">
                    <div class="chart-title">宗教信仰 (Religion)</div>
                    <div class="canvas-container"><canvas id="faithChart"></canvas></div>
                </div>
            </div>

            <div class="charts-row">
                <div class="chart-box">
                    <div class="chart-title">收入构成 (Income)</div>
                    <div class="canvas-container"><canvas id="incomePieChart"></canvas></div>
                </div>
                <div class="chart-box">
                    <div class="chart-title">支出构成 (Expense)</div>
                    <div class="canvas-container"><canvas id="expensePieChart"></canvas></div>
                </div>
            </div>
            
            <div class="charts-row full">
                <div class="chart-box">
                    <div class="chart-title">盈亏趋势 (Trends)</div>
                    <div class="canvas-container"><canvas id="trendLineChart"></canvas></div>
                </div>
            </div>

            <div id="tables-container">
                <div class="data-section">
                    <div class="section-header">
                        <span>📜 财政收支详单</span>
                        <span style="font-size:0.8em; color:#666; font-weight:normal;">单位: 金币 (GP)</span>
                    </div>
                    <table class="finance-table">
                        <thead>
                            <tr><th>项目</th><th>说明</th><th class="amount-col">金额</th></tr>
                        </thead>
                        <tbody id="finance-table-body"></tbody>
                    </table>
                </div>

                <div class="data-section">
                    <div class="section-header"><span>💰 税收明细 (Tax)</span></div>
                    <table class="finance-table">
                        <thead><tr><th>税种</th><th>征收标准/来源</th><th class="amount-col">征收总额</th></tr></thead>
                        <tbody id="tax-table-body"></tbody>
                    </table>
                </div>

                <div class="data-section">
                    <div class="section-header"><span>👥 城市职员编制</span></div>
                    <table class="staff-table">
                        <thead><tr><th>职能</th><th>人数</th><th>月薪标准</th><th class="amount-col">月度总支出</th></tr></thead>
                        <tbody id="staff-table-body"></tbody>
                    </table>
                </div>

                <div class="data-section">
                    <div class="section-header"><span>⚖️ 贸易与产业收支</span></div>
                    <table class="finance-table">
                        <thead><tr><th>项目名称</th><th>类型</th><th>详情</th><th class="amount-col">月度额度</th></tr></thead>
                        <tbody id="trade-table-body"></tbody>
                    </table>
                </div>

                <div class="data-section">
                    <div class="section-header"><span>🏗️ 城市基础设施维护</span></div>
                    <table class="finance-table">
                        <thead><tr><th>设施名称</th><th>数量</th><th>单项维护费</th><th class="amount-col">月度总支出</th></tr></thead>
                        <tbody id="building-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="detail-panel">
            <div class="suzerain-container">
                <div class="suz-header" id="suz-title">...</div>
                <div class="suz-list" id="suz-list"></div>
                <div class="suz-desc-box" id="suz-desc">请从上方选择一项条目以查看详细报告。</div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="location-selector">
            <select id="location-select" onchange="changeLocation()">
                <option value="overview">🌍 领地大盘总览</option>
                <option value="almorel" selected>🏰 艾尔莫瑞尔</option>
                <option value="dragon_mine">⛰️ 巨龙之心矿区</option>
                <option value="herakmar">🛡️ 赫拉克玛尔城</option>
                <option value="khilku">🌊 希尔库港</option>
            </select>
        </div>

        <button id="overview-btn" class="menu-btn active" onclick="toggleOverview(true)" style="margin-top: 10px;">
            <div class="menu-left"><span class="menu-icon">📊</span> 宏观概览</div>
            <span class="chevron open" id="overview-chevron">▼</span>
        </button>
        
        <div style="height:1px; background:#eee; margin:5px 10px;"></div>
        
        <div id="sub-menus"></div>

        <a href="index.html" class="back-link">⬅ 返回主控台</a>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://vbzfpgucpciqgaakqndz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTc2MzMsImV4cCI6MjA4MzE3MzYzM30.fBVDirEJ52bvrYJZ5DNv7fVDLNgCwITKwdKqT6YJDYw';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let globalUserId = null;
    let currentLocation = 'almorel';
    let territoryData = null;
    let chartInstances = {};

    // 核心初始化：加载 JSON
    async function init() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { alert('请先登录'); window.location.href = 'index.html'; return; }
        const urlParams = new URLSearchParams(window.location.search);
        globalUserId = urlParams.get('uid') || user.id;

        try {
            const res = await fetch('territory_data.json');
            if(!res.ok) throw new Error("JSON file not found");
            territoryData = await res.json();
            console.log("Territory Data Loaded Successfully");
        } catch (e) {
            console.error("Critical: Failed to load territory_data.json. Page will be empty.");
            return;
        }

        await changeLocation(); 
    }

    // 切换地域逻辑
    async function changeLocation() {
        currentLocation = document.getElementById('location-select').value;
        const locInfo = territoryData[currentLocation];
        if (!locInfo) return;
        
        // 1. 更新 UI 标题
        document.getElementById('header-city-name').innerHTML = `${locInfo.name} <span style="font-size:0.5em; font-weight:normal; color:#666;">${locInfo.subtitle}</span>`;
        
        // 2. 动态生成右侧子菜单
        const subMenus = document.getElementById('sub-menus');
        subMenus.innerHTML = '';
        if (locInfo.menus && locInfo.menus.length > 0) {
            locInfo.menus.forEach(m => {
                subMenus.innerHTML += `<button class="menu-btn sub-btn" onclick="showCategory('${m.id}')"><div class="menu-left"><span class="menu-icon">${m.icon}</span> ${m.label}</div></button>`;
            });
        }

        // 3. 渲染静态图表（从 JSON 读取数据）
        if (currentLocation !== 'overview') {
            document.getElementById('demographic-charts-row').style.display = 'grid';
            document.getElementById('tables-container').style.display = 'block';
            renderStaticCharts(locInfo.raceData, locInfo.faithData);
        } else {
            document.getElementById('demographic-charts-row').style.display = 'none';
            document.getElementById('tables-container').style.display = 'none';
        }

        // 4. 加载 Supabase 动态数据 (财务)
        await loadAndRenderFinance(globalUserId); 
        await loadHistoricalTrends(globalUserId); 
        toggleOverview(true); 
    }

    function toggleOverview(forceOpen = false) {
        const subMenus = document.getElementById('sub-menus');
        const chevron = document.getElementById('overview-chevron');
        const overviewBtn = document.getElementById('overview-btn');
        
        document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
        overviewBtn.classList.add('active');

        document.getElementById('overview-panel').style.display = 'block';
        document.getElementById('detail-panel').style.display = 'none';

        if (forceOpen || subMenus.style.maxHeight === '0px' || subMenus.style.maxHeight === '') {
            subMenus.style.maxHeight = '500px';
            chevron.classList.add('open');
        } else {
            subMenus.style.maxHeight = '0px';
            chevron.classList.remove('open');
        }
    }

    // 渲染详情分类 (Lore)
    function showCategory(key) {
        document.getElementById('overview-btn').classList.remove('active');
        document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
        const activeSubBtn = document.querySelector(`button[onclick="showCategory('${key}')"]`);
        if(activeSubBtn) activeSubBtn.classList.add('active');

        document.getElementById('overview-panel').style.display = 'none';
        document.getElementById('detail-panel').style.display = 'block';
        
        const locInfo = territoryData[currentLocation];
        const data = (locInfo.lore && locInfo.lore[key]) ? locInfo.lore[key] : { title: "无数据", items: [] };

        document.getElementById('suz-title').innerText = data.title;
        const listEl = document.getElementById('suz-list');
        const descEl = document.getElementById('suz-desc');
        
        listEl.innerHTML = '';
        descEl.innerText = "请选择条目查看详情。";

        data.items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'suz-item';
            div.innerHTML = `<div class="suz-item-title">${item.title}</div>`;
            div.onclick = function() {
                document.querySelectorAll('.suz-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
                descEl.innerText = item.desc;
            };
            listEl.appendChild(div);
        });
    }

    // 渲染 JSON 驱动的静态图表
    function renderStaticCharts(raceData, faithData) {
        if (!raceData || !faithData) return;

        if(chartInstances.race) chartInstances.race.destroy();
        if(chartInstances.faith) chartInstances.faith.destroy();

        chartInstances.race = new Chart(document.getElementById('raceChart'), {
            type: 'doughnut',
            data: {
                labels: raceData.map(d => d.label),
                datasets: [{
                    data: raceData.map(d => d.value),
                    backgroundColor: raceData.map(d => d.color),
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } } } }
        });

        chartInstances.faith = new Chart(document.getElementById('faithChart'), {
            type: 'pie',
            data: {
                labels: faithData.map(d => d.label),
                datasets: [{
                    data: faithData.map(d => d.value),
                    backgroundColor: faithData.map(d => d.color),
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } } }
        });
    }

    // --- 财务计算引擎 (保持原逻辑，支持 location 过滤) ---
    async function loadAndRenderFinance(userId) {
        let statsQ = supabaseClient.from('city_stats').select('*').eq('user_id', userId);
        let expQ = supabaseClient.from('city_expenses').select('*').eq('user_id', userId);
        let incQ = supabaseClient.from('city_incomes').select('*').eq('user_id', userId);
        let empQ = supabaseClient.from('employees').select('*').eq('user_id', userId).in('status', ['在职', '科研中']);

        if (currentLocation !== 'overview') {
            statsQ = statsQ.eq('location', currentLocation);
            expQ = expQ.eq('location', currentLocation);
            incQ = incQ.eq('location', currentLocation);
            empQ = empQ.eq('location', currentLocation);
        }

        const [statsRes, expRes, incRes, empRes] = await Promise.all([statsQ, expQ, incQ, empQ]);

        const statsList = statsRes.data || [];
        const expenses = expRes.data || [];
        const incomes = incRes.data || [];
        const employees = empRes.data || [];

        let totalPop = 0, totalSubsidy = 0, baseTaxRaw = 0;
        statsList.forEach(s => {
            totalPop += s.population;
            totalSubsidy += (s.subsidy || 0);
            baseTaxRaw += Math.ceil(s.population * (s.tax_rate || 1.2));
        });

        let specializedTaxTotal = 0, tradeRevenue = 0;        
        let taxHtml = `<tr><td>基础人头税</td><td><span class="tag-box tag-tax">人头税</span></td><td class="amount-col income-text">+${baseTaxRaw}</td></tr>`;
        let tradeHtml = '';

        incomes.forEach(i => {
            const total = (i.count || 1) * (i.unit_price || i.amount);
            if (i.category === 'tax') {
                specializedTaxTotal += total;
                taxHtml += `<tr><td>${i.name}</td><td><span class="tag-box tag-special">专项税</span></td><td class="amount-col income-text">+${total}</td></tr>`;
            } else {
                tradeRevenue += total;
                let tagHtml = i.category === 'state' ? `<span class="tag-box tag-state">国营</span>` : `<span class="tag-box tag-trade">贸易</span>`;
                tradeHtml += `<tr><td>${i.name}</td><td>${tagHtml}</td><td style="font-family:monospace; color:#555;">${i.count || 1} x ${i.unit_price || i.amount} GP</td><td class="amount-col income-text">+${total}</td></tr>`;
            }
        });
        const totalTaxIncome = baseTaxRaw + specializedTaxTotal;

        let staffCost = 0, buildingCost = 0, tradeCost = 0;
        let staffHtml = '', buildingHtml = '';

        expenses.forEach(e => {
            const cost = e.count * e.unit_cost;
            if (e.category === 'staff') {
                staffCost += cost;
                staffHtml += `<tr><td>${e.name}</td><td>${e.count}</td><td>${e.unit_cost} GP</td><td class="amount-col expense-text">-${cost}</td></tr>`;
            } else if (e.category === 'building') {
                buildingCost += cost;
                buildingHtml += `<tr><td>${e.name}</td><td>${e.count}</td><td>${e.unit_cost} GP</td><td class="amount-col expense-text">-${cost}</td></tr>`;
            } else if (e.category === 'trade_cost') {
                tradeCost += cost;
                tradeHtml += `<tr><td>${e.name}</td><td><span class="tag-box tag-cost">成本</span></td><td style="font-family:monospace; color:#555;">${e.count} x ${e.unit_cost} GP</td><td class="amount-col expense-text">-${cost}</td></tr>`;
            }
        });

        const empCost = employees.reduce((sum, e) => sum + (e.salary || 0), 0);
        const totalIncome = totalTaxIncome + totalSubsidy + tradeRevenue;
        const totalExpense = staffCost + buildingCost + tradeCost + empCost;
        const netIncome = totalIncome - totalExpense;

        document.getElementById('kpi-pop').innerText = totalPop.toLocaleString();
        const kpiIncome = document.getElementById('kpi-income');
        kpiIncome.innerText = `${netIncome} GP`;
        kpiIncome.style.color = netIncome >= 0 ? '#27ae60' : '#c0392b';

        if (currentLocation !== 'overview') {
            document.getElementById('tax-table-body').innerHTML = taxHtml; 
            document.getElementById('staff-table-body').innerHTML = staffHtml;
            document.getElementById('building-table-body').innerHTML = buildingHtml;
            document.getElementById('trade-table-body').innerHTML = tradeHtml;

            document.getElementById('finance-table-body').innerHTML = `
                <tr><td><strong>税收总收入</strong></td><td>人头税 + 专项税</td><td class="amount-col income-text">+${totalTaxIncome}</td></tr>
                <tr><td>补贴与援助</td><td>外部补助</td><td class="amount-col income-text">+${totalSubsidy}</td></tr>
                <tr><td>产业/贸易营收</td><td>国营与外贸</td><td class="amount-col income-text">+${tradeRevenue}</td></tr>
                <tr style="background:#f0f9f0;font-weight:bold;"><td colspan="2">总收入小计</td><td class="amount-col income-text">+${totalIncome}</td></tr>
                <tr><td>职员与薪资</td><td>--</td><td class="amount-col expense-text">-${staffCost}</td></tr>
                <tr><td>维护与损耗</td><td>--</td><td class="amount-col expense-text">-${buildingCost}</td></tr>
                <tr><td>贸易/产业成本</td><td>--</td><td class="amount-col expense-text">-${tradeCost}</td></tr>
                <tr><td>特殊人才雇佣</td><td>--</td><td class="amount-col expense-text">-${empCost}</td></tr>
                <tr style="background:#fff0f0;font-weight:bold;"><td colspan="2">总支出小计</td><td class="amount-col expense-text">-${totalExpense}</td></tr>
                <tr class="total-row"><td colspan="2">月度净利润</td><td class="amount-col" style="color:${netIncome>=0?'#27ae60':'#c0392b'}">${netIncome} GP</td></tr>
            `;
        }

        renderDynamicPieCharts(
            { baseTax: baseTaxRaw, specTax: specializedTaxTotal, aid: totalSubsidy, trade: tradeRevenue },
            { staff: staffCost, building: buildingCost, trade: tradeCost, core: empCost }
        );
    }

    // 动态收入/支出饼图
    function renderDynamicPieCharts(income, expense) {
        if(chartInstances.income) chartInstances.income.destroy();
        if(chartInstances.expense) chartInstances.expense.destroy();

        chartInstances.income = new Chart(document.getElementById('incomePieChart'), {
            type: 'doughnut',
            data: {
                labels: ['人头税', '专项税', '外部援助', '产业营收'],
                datasets: [{ data: [income.baseTax, income.specTax, income.aid, income.trade], backgroundColor: ['#3498db', '#f1c40f', '#9b59b6', '#2ecc71'], borderWidth: 1 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } } } }
        });

        chartInstances.expense = new Chart(document.getElementById('expensePieChart'), {
            type: 'doughnut',
            data: {
                labels: ['职员薪资', '设施维护', '贸易成本', '特殊人才'],
                datasets: [{ data: [expense.staff, expense.building, expense.trade, expense.core], backgroundColor: ['#34495e', '#7f8c8d', '#e67e22', '#e74c3c'], borderWidth: 1 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } } } }
        });
    }

    // 历史折线图 (保持聚合逻辑)
    async function loadHistoricalTrends(userId) {
        let query = supabaseClient.from('monthly_finances').select('*').eq('user_id', userId).order('year', { ascending: true }).order('month', { ascending: true });
        if (currentLocation !== 'overview') query = query.eq('location', currentLocation);

        const { data, error } = await query;
        if (error || !data || data.length === 0) return;

        const grouped = {};
        data.forEach(d => {
            const key = `${d.year}-${d.month}`;
            if (!grouped[key]) grouped[key] = { year: d.year, month: d.month, inc: 0, exp: 0, net: 0 };
            grouped[key].inc += Number(d.total_income);
            grouped[key].exp += Number(d.total_expense);
            grouped[key].net += Number(d.net_income);
        });

        const sortedArr = Object.values(grouped).slice(-12);
        const labels = sortedArr.map(d => `FR${d.year}-${d.month}月`);
        
        if(chartInstances.trend) chartInstances.trend.destroy();
        chartInstances.trend = new Chart(document.getElementById('trendLineChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '总收入', data: sortedArr.map(d => d.inc), borderColor: '#27ae60', tension: 0.3, fill: false },
                    { label: '总支出', data: sortedArr.map(d => d.exp), borderColor: '#e74c3c', tension: 0.3, fill: false },
                    { label: '净利润', data: sortedArr.map(d => d.net), borderColor: '#f1c40f', borderWidth: 3, tension: 0.3, fill: false }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    init();
</script>
</body>
