<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>领地行政终端</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f1ea; --panel-bg: #ffffff; --text-main: #2c3e50;
            --accent-gold: #c5a059; --accent-blue: #34495e; --border-color: #dcd6cc;
            --danger-color: #c0392b; --success-color: #27ae60; --state-color: #8e44ad; --trade-color: #2980b9; 
        }
        body { font-family: "PingFang SC", "Microsoft YaHei", serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        .layout { display: grid; grid-template-columns: 1fr 260px; height: 100%; }
        .main-content { padding: 40px; overflow-y: auto; display: flex; flex-direction: column; }
        .city-header { border-bottom: 2px solid var(--accent-gold); padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: end; }
        .city-name { font-size: 2.5em; font-weight: bold; letter-spacing: 2px; color: var(--text-main); }
        #overview-panel { display: block; animation: fadeIn 0.5s; }
        .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--panel-bg); padding: 20px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--accent-blue); text-align: center; }
        .kpi-value { font-size: 2em; font-weight: bold; margin: 10px 0; }
        .kpi-label { color: #7f8c8d; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .charts-row.full { grid-template-columns: 1fr; }
        .chart-box { background: var(--panel-bg); padding: 20px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .canvas-container { position: relative; height: 300px; width: 100%; }
        /* 继承你之前的表格比例样式... */
        .finance-table, .staff-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .finance-table td, .staff-table td { padding: 12px; border-bottom: 1px solid #eee; word-wrap: break-word; }
        .amount-col { text-align: center !important; font-family: monospace; font-weight: bold; }
        .income-text { color: var(--success-color); }
        .expense-text { color: var(--danger-color); }
        /* 详情界面样式 */
        #detail-panel { display: none; height: 100%; }
        .suzerain-container { background: #fff; height: 100%; display: flex; flex-direction: column; border: 1px solid #ddd; }
        .suz-header { background: var(--accent-blue); color: #fff; padding: 15px; text-align: center; font-weight: bold; }
        .suz-list { flex: 1; overflow-y: auto; padding: 20px; }
        .suz-item { padding: 15px; border: 1px solid #eee; margin-bottom: 10px; cursor: pointer; }
        .suz-item.active { border-left: 4px solid var(--accent-gold); background: #f9f9f9; }
        .suz-desc-box { background: var(--accent-blue); color: #fff; padding: 25px; border-top: 4px solid var(--accent-gold); min-height: 120px; }
        /* 侧边栏 */
        .sidebar { background: #fff; border-left: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .location-selector { padding: 20px 15px 10px 15px; border-bottom: 2px solid var(--accent-gold); }
        #location-select { width: 100%; padding: 10px; font-weight: bold; background: var(--text-main); color: #fff; border-radius: 4px; }
        .menu-btn { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border: none; background: #fdfdfd; cursor: pointer; width: calc(100% - 20px); margin: 0 10px; border-radius: 6px; }
        .menu-btn.active { background: var(--accent-blue); color: #fff; }
        #sub-menus { overflow: hidden; transition: max-height 0.3s; padding-left: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="layout">
    <div class="main-content">
        <div class="city-header">
            <div class="city-name" id="header-city-name">--</div>
            <div class="city-info" id="date-display">--</div>
        </div>
        <div id="overview-panel">
            <div class="kpi-row">
                <div class="kpi-card"><div class="kpi-label">管辖人口</div><div class="kpi-value" id="kpi-pop">--</div></div>
                <div class="kpi-card"><div class="kpi-label">月度净收入</div><div class="kpi-value" id="kpi-income">--</div><div class="kpi-sub" id="kpi-income-sub">--</div></div>
                <div class="kpi-card"><div class="kpi-label">治安指数</div><div class="kpi-value" id="kpi-order-status">--</div><div style="font-size:0.8em; color:#666;" id="kpi-order-desc">--</div></div>
            </div>
            <div class="charts-row" id="demographic-charts-row">
                <div class="chart-box"><div class="canvas-container"><canvas id="raceChart"></canvas></div></div>
                <div class="chart-box"><div class="canvas-container"><canvas id="faithChart"></canvas></div></div>
            </div>
            <div class="charts-row">
                <div class="chart-box"><div class="canvas-container"><canvas id="incomePieChart"></canvas></div></div>
                <div class="chart-box"><div class="canvas-container"><canvas id="expensePieChart"></canvas></div></div>
            </div>
            <div class="charts-row full"><div class="chart-box"><div class="canvas-container"><canvas id="trendLineChart"></canvas></div></div></div>
            <div id="tables-container">
                <div class="data-section"><table class="finance-table"><tbody id="finance-table-body"></tbody></table></div>
                <div class="data-section"><h3>💰 税收明细</h3><table class="finance-table"><tbody id="tax-table-body"></tbody></table></div>
                <div class="data-section"><h3>👥 职员编制</h3><table class="staff-table"><tbody id="staff-table-body"></tbody></table></div>
            </div>
        </div>
        <div id="detail-panel">
            <div class="suzerain-container"><div class="suz-header" id="suz-title"></div><div class="suz-list" id="suz-list"></div><div class="suz-desc-box" id="suz-desc"></div></div>
        </div>
    </div>
    <div class="sidebar">
        <div class="location-selector">
            <select id="location-select" onchange="changeLocation()">
                <option value="overview">🌍 领地大盘总览</option>
                <option value="almorel" selected>🏰 艾尔莫瑞尔</option>
                <option value="dragon_mine">⛰️ 巨龙之心矿区</option>
                <option value="herakmar">🛡️ 赫拉克玛尔城</option>
                <option value="khilku">🌊 希尔库港</option>
            </select>
        </div>
        <button id="overview-btn" class="menu-btn active" onclick="toggleOverview(true)">📊 宏观概览</button>
        <div id="sub-menus"></div>
        <a href="index.html" style="margin-top:auto; text-align:center; padding:20px; color:#999; text-decoration:none;">⬅ 返回主控台</a>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://vbzfpgucpciqgaakqndz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTc2MzMsImV4cCI6MjA4MzE3MzYzM30.fBVDirEJ52bvrYJZ5DNv7fVDLNgCwITKwdKqT6YJDYw';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let globalUserId, currentLocation = 'almorel', territoryData = null, chartInstances = {};

    async function init() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return window.location.href = 'index.html';
        globalUserId = new URLSearchParams(window.location.search).get('uid') || user.id;
        try {
            const res = await fetch('territory_data.json?t=' + Date.now());
            territoryData = await res.json();
            await changeLocation();
        } catch (e) { console.error("JSON 加载失败", e); }
    }

    async function changeLocation() {
        currentLocation = document.getElementById('location-select').value;
        const locInfo = territoryData[currentLocation];
        if (!locInfo) return;

        document.getElementById('header-city-name').innerHTML = `${locInfo.name} <span style="font-size:0.5em; font-weight:normal; color:#666;">${locInfo.subtitle}</span>`;
        
        // 渲染治安
        const orderStatus = document.getElementById('kpi-order-status');
        orderStatus.innerText = locInfo.order?.status || '--';
        orderStatus.style.color = locInfo.order?.color || '#333';
        document.getElementById('kpi-order-desc').innerText = locInfo.order?.desc || '--';

        // 渲染子菜单
        const subMenus = document.getElementById('sub-menus');
        subMenus.innerHTML = (locInfo.menus || []).map(m => `<button class="menu-btn" onclick="showCategory('${m.id}')">${m.icon} ${m.label}</button>`).join('');

        // 切换显示模式
        const isOverview = currentLocation === 'overview';
        document.getElementById('demographic-charts-row').style.display = isOverview ? 'none' : 'grid';
        document.getElementById('tables-container').style.display = isOverview ? 'none' : 'block';

        if (!isOverview) renderStaticCharts(locInfo.raceData, locInfo.faithData);
        
        await loadAndRenderFinance(globalUserId);
        await loadHistoricalTrends(globalUserId);
        toggleOverview(true);
    }

    function renderStaticCharts(race, faith) {
        const createChart = (id, type, data, title) => {
            if (chartInstances[id]) chartInstances[id].destroy();
            if (!data) return;
            chartInstances[id] = new Chart(document.getElementById(id), {
                type: type,
                data: { labels: data.map(d => d.label), datasets: [{ data: data.map(d => d.value), backgroundColor: data.map(d => d.color), borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' }, title: { display: true, text: title } } }
            });
        };
        createChart('raceChart', 'doughnut', race, '种族构成');
        createChart('faithChart', 'pie', faith, '信仰分布');
    }

    async function loadAndRenderFinance(userId) {
        let statsQ = supabaseClient.from('city_stats').select('*').eq('user_id', userId);
        let expQ = supabaseClient.from('city_expenses').select('*').eq('user_id', userId);
        let incQ = supabaseClient.from('city_incomes').select('*').eq('user_id', userId);
        let empQ = supabaseClient.from('employees').select('*').eq('user_id', userId).in('status', ['在职', '科研中']);

        if (currentLocation !== 'overview') {
            statsQ = statsQ.eq('location', currentLocation);
            expQ = expQ.eq('location', currentLocation);
            incQ = incQ.eq('location', currentLocation);
            empQ = empQ.eq('location', currentLocation);
        }

        const [statsRes, expRes, incRes, empRes] = await Promise.all([statsQ, expQ, incQ, empQ]);
        const stats = statsRes.data || [], expenses = expRes.data || [], incomes = incRes.data || [], employees = empRes.data || [];

        let totalPop = 0, totalSubsidy = 0, baseTaxRaw = 0;
        stats.forEach(s => { totalPop += s.population; totalSubsidy += (s.subsidy || 0); baseTaxRaw += Math.ceil(s.population * (s.tax_rate || 1.2)); });

        let specTax = 0, tradeRev = 0;
        incomes.forEach(i => { const val = (i.count || 1) * (i.unit_price || i.amount); if (i.category === 'tax') specTax += val; else tradeRev += val; });

        let staffCost = 0, buildCost = 0, tradeCost = 0;
        expenses.forEach(e => { const val = e.count * e.unit_cost; if (e.category === 'staff') staffCost += val; else if (e.category === 'building') buildCost += val; else tradeCost += val; });
        const empCost = employees.reduce((sum, e) => sum + (e.salary || 0), 0);

        const totalInc = baseTaxRaw + specTax + totalSubsidy + tradeRev;
        const totalExp = staffCost + buildCost + tradeCost + empCost;
        const net = totalInc - totalExp;

        document.getElementById('kpi-pop').innerText = totalPop.toLocaleString();
        const incomeEl = document.getElementById('kpi-income');
        incomeEl.innerText = `${net} GP`;
        incomeEl.style.color = net >= 0 ? 'var(--success-color)' : 'var(--danger-color)';
        document.getElementById('kpi-income-sub').innerText = net >= 0 ? "✅ 财政健康" : "⚠️ 赤字预警";

        if (currentLocation !== 'overview') {
            document.getElementById('finance-table-body').innerHTML = `
                <tr><td><strong>税收总收入</strong></td><td>人头税 + 专项税</td><td class="amount-col income-text">+${baseTaxRaw + specTax}</td></tr>
                <tr><td>外交补贴</td><td>外部援助</td><td class="amount-col income-text">+${totalSubsidy}</td></tr>
                <tr><td>产业营收</td><td>国营与贸易</td><td class="amount-col income-text">+${tradeRev}</td></tr>
                <tr style="background:#f0f9f0;font-weight:bold;"><td colspan="2">总收入</td><td class="amount-col">+${totalInc}</td></tr>
                <tr><td>职员/设施/贸易/雇员</td><td>综合支出明细</td><td class="amount-col expense-text">-${totalExp}</td></tr>
                <tr class="total-row"><td colspan="2">月度净利润</td><td class="amount-col" style="color:${net>=0?'green':'red'}">${net} GP</td></tr>`;
        }
        renderDynamicPieCharts(baseTaxRaw, specTax, totalSubsidy, tradeRev, staffCost, buildCost, tradeCost, empCost);
    }

    function renderDynamicPieCharts(bT, sT, aid, tr, sC, bC, tC, eC) {
        const createPie = (id, labels, data, colors) => {
            if (chartInstances[id]) chartInstances[id].destroy();
            chartInstances[id] = new Chart(document.getElementById(id), {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 1 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
            });
        };
        createPie('incomePieChart', ['人头税', '专项税', '外部援助', '产业营收'], [bT, sT, aid, tr], ['#3498db', '#f1c40f', '#9b59b6', '#2ecc71']);
        createPie('expensePieChart', ['职员薪资', '设施维护', '贸易成本', '核心队伍'], [sC, bC, tC, eC], ['#34495e', '#7f8c8d', '#e67e22', '#e74c3c']);
    }

    async function loadHistoricalTrends(userId) {
        let q = supabaseClient.from('monthly_finances').select('*').eq('user_id', userId).order('year').order('month');
        if (currentLocation !== 'overview') q = q.eq('location', currentLocation);
        const { data } = await q; if (!data) return;
        const grouped = {};
        data.forEach(d => { const k = `${d.year}-${d.month}`; if (!grouped[k]) grouped[k] = { inc:0, exp:0, net:0, label:`FR${d.year}-${d.month}月` }; grouped[k].inc += Number(d.total_income); grouped[k].exp += Number(d.total_expense); grouped[k].net += Number(d.net_income); });
        const arr = Object.values(grouped).slice(-12);
        if (chartInstances.trend) chartInstances.trend.destroy();
        chartInstances.trend = new Chart(document.getElementById('trendLineChart'), {
            type: 'line',
            data: { labels: arr.map(d=>d.label), datasets: [{ label:'收入', data:arr.map(d=>d.inc), borderColor:'green'}, { label:'支出', data:arr.map(d=>d.exp), borderColor:'red'}, { label:'净利', data:arr.map(d=>d.net), borderColor:'gold', borderWidth:3}] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function toggleOverview(open) {
        document.getElementById('overview-panel').style.display = open ? 'block' : 'none';
        document.getElementById('detail-panel').style.display = open ? 'none' : 'block';
        document.getElementById('overview-btn').className = open ? 'menu-btn active' : 'menu-btn';
    }

    function showCategory(key) {
        toggleOverview(false);
        const data = territoryData[currentLocation].lore?.[key] || { title: "无数据", items: [] };
        document.getElementById('suz-title').innerText = data.title;
        const list = document.getElementById('suz-list'); list.innerHTML = '';
        data.items.forEach(item => {
            const div = document.createElement('div'); div.className = 'suz-item'; div.innerText = item.title;
            div.onclick = () => { document.querySelectorAll('.suz-item').forEach(i=>i.classList.remove('active')); div.classList.add('active'); document.getElementById('suz-desc').innerText = item.desc; };
            list.appendChild(div);
        });
    }

    init();
</script>
</body>
</html>
