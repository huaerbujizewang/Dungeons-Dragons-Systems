<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全境网络 - OMNI Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --omni-green: #196f3d; 
            --omni-green-bright: #2ecc71; 
            --omni-bg: #f4f6f7; 
            --omni-card: #ffffff;
            --omni-text: #2c3e50;
            --omni-danger: #e74c3c; 
        }

        body, html { margin: 0; padding: 0; height: 100vh; font-family: "PingFang SC", sans-serif; background: var(--omni-bg); color: var(--omni-text); overflow: hidden; }

        /* 登录遮罩 */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--omni-green); z-index: 99999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: var(--omni-green); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* 主架构 */
        .app-container { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 260px; background: var(--omni-green); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; font-size: 1.5em; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { padding: 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; border-left: 4px solid transparent; }
        .nav-item.active { background: rgba(255,255,255,0.1); border-left-color: var(--omni-green-bright); font-weight: bold; }

        /* 内容区 */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }

        /* 聊天 */
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 200px); border: 1px solid #eee; border-radius: 12px; background: white; }
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; background: #fcfcfc; }
        .chat-input-bar { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .message { margin-bottom: 15px; display: flex; flex-direction: column; }
        .message.self { align-items: flex-end; }
        .msg-bubble { padding: 10px 15px; border-radius: 15px; background: #eee; max-width: 70%; }
        .message.self .msg-bubble { background: var(--omni-green-bright); color: white; }

        /* DM 面板 */
        #dm-admin-panel { background: #2c3e50; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; gap: 10px; align-items: center; }
        #dm-admin-panel input { padding: 5px; border-radius: 4px; border: none; }

        /* 警告拦截 */
        #intercept-msg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: white; border-left: 5px solid red; padding: 15px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; z-index: 100001; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>🌐 全境网络接入</h2>
            <input type="text" id="l-user" placeholder="公民账号">
            <input type="password" id="l-pass" placeholder="访问密钥">
            <button onclick="handleLogin()">接入网络</button>
            <p id="l-err" style="color:red; font-size:0.8em; margin-top:10px; display:none;">身份校验未通过</p>
        </div>
    </div>

    <div id="intercept-msg">⚠️ <strong>安全拦截：</strong> 检测到敏感词汇，消息已阻断。</div>

    <div class="app-container">
        <nav class="sidebar">
            <div class="sidebar-header">🌐 OMNI</div>
            <div class="nav-item active" onclick="switchPage('chat', this)">💬 枢纽通讯</div>
            <div class="nav-item" onclick="switchPage('life', this)">🍔 帝国优选</div>
            <div class="nav-item" onclick="switchPage('wallet', this)">💳 资产结算</div>
            <div class="nav-item" onclick="switchPage('profile', this)">🛂 公民通行证</div>
            <div style="margin-top:auto; padding:20px; opacity:0.5; cursor:pointer;" onclick="window.history.back()">⬅ 退出</div>
        </nav>

        <main class="main-content">
            <div id="dm-admin-panel">
                <strong style="color:#f39c12">● 监察官后台</strong>
                <input type="text" id="npc-name" placeholder="NPC名字" style="width:100px">
                <input type="color" id="npc-color" value="#3498db">
                <span style="margin-left:10px">划拨信用点：</span>
                <input type="text" id="target-id" placeholder="账号" style="width:80px">
                <input type="number" id="target-amt" placeholder="金额" style="width:80px">
                <button onclick="adminAdjustCredits()" style="background:var(--omni-green); color:white; border:none; padding:5px 10px; cursor:pointer;">执行</button>
            </div>

            <div id="page-chat" class="page active">
                <div class="chat-container">
                    <div class="chat-history" id="chat-box"></div>
                    <div class="chat-input-bar">
                        <input type="text" id="chat-in" placeholder="输入消息..." onkeypress="if(event.key==='Enter') sendMsg()">
                        <button onclick="sendMsg()" style="padding:10px 20px; background:var(--omni-green); color:white; border:none; border-radius:4px; cursor:pointer;">发送</button>
                    </div>
                </div>
            </div>

            <div id="page-life" class="page">
                <div class="card">
                    <h3>物资调配中心</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                        <div style="border:1px solid #eee; padding:15px; border-radius:8px;">
                            <h4>蒂尔兰手工汉堡</h4>
                            <p style="color:var(--omni-green); font-weight:bold;">15 信用点</p>
                            <button onclick="purchase('汉堡', 15)" style="width:100%; padding:8px;">立即调配</button>
                        </div>
                        <div style="border:1px solid #eee; padding:15px; border-radius:8px;">
                            <h4>高纯度魔力液</h4>
                            <p style="color:var(--omni-green); font-weight:bold;">120 信用点</p>
                            <button onclick="purchase('魔力液', 120)" style="width:100%; padding:8px;">立即调配</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-wallet" class="page">
                <div class="card" style="background:linear-gradient(135deg, #196f3d, #114b28); color:white; padding:40px;">
                    <div style="opacity:0.8;">可用余额 (信用点)</div>
                    <div id="wallet-val" style="font-size:3.5em; font-weight:bold; margin-top:10px;">0.00</div>
                </div>
            </div>

            <div id="page-profile" class="page">
                <div class="card">
                    <h2 id="prof-name">公民信息</h2>
                    <p id="prof-race">种族：--</p>
                    <p>社会信用等级：A</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 严格保持单次声明 ---
        const SB_URL = "https://vbzfpgucpciqgaakqndz.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZlI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzg0ODg3MDksImV4cCI6MjA1NDA0ODcwOX0.Sly54jFsh3tS98u4M4WfUe3v0Yx1P5_z0y4W1P5_z0y";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        const DM_UID = "1c00b7ed-69d7-40e2-8c28-84f854a4fa35";

        let currentAccount = null;
        const urlParams = new URLSearchParams(window.location.search);
        const loginUid = urlParams.get('uid');

        async function init() {
            // 1. DM判定
            if(loginUid === DM_UID) {
                currentAccount = { display_name: "帝国监察官", race: "人类", is_dm: true, login_id: "DM" };
                document.getElementById('dm-admin-panel').style.display = 'flex';
                enterApp();
                return;
            }
            // 2. 玩家缓存
            const saved = sessionStorage.getItem('omni_session');
            if(saved) {
                currentAccount = JSON.parse(saved);
                enterApp();
            }
        }

        async function handleLogin() {
            const u = document.getElementById('l-user').value;
            const p = document.getElementById('l-pass').value;
            const { data, error } = await supabase.from('omni_accounts').select('*').eq('login_id', u).eq('login_pass', p).single();
            if(data) {
                currentAccount = data;
                sessionStorage.setItem('omni_session', JSON.stringify(data));
                enterApp();
            } else {
                document.getElementById('l-err').style.display = 'block';
            }
        }

        function enterApp() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('prof-name').innerText = currentAccount.display_name || "公民账号";
            document.getElementById('prof-race').innerText = "种族：" + (currentAccount.race || "未识别");
            loadHistory();
            subscribe();
            updateWallet();
        }

        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            if(pageId === 'wallet') updateWallet();
        }

        async function updateWallet() {
            if(currentAccount.is_dm) {
                document.getElementById('wallet-val').innerText = "∞";
                return;
            }
            const { data } = await supabase.from('omni_accounts').select('credits').eq('id', currentAccount.id).single();
            if(data) document.getElementById('wallet-val').innerText = data.credits.toLocaleString();
        }

        async function loadHistory() {
            const { data } = await supabase.from('omni_messages').select('*').order('created_at', {ascending:true}).limit(50);
            if(data) {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                data.forEach(renderMsg);
                box.scrollTop = box.scrollHeight;
            }
        }

        function subscribe() {
            supabase.channel('omni_msgs').on('postgres_changes', {event:'INSERT', schema:'public', table:'omni_messages'}, p => {
                renderMsg(p.new);
                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
            }).subscribe();
        }

        async function sendMsg() {
            const inp = document.getElementById('chat-in');
            const val = inp.value.trim();
            if(!val) return;

            if(val.includes('伊莎贝拉')) {
                document.getElementById('intercept-msg').style.display = 'block';
                setTimeout(()=> document.getElementById('intercept-msg').style.display = 'none', 3000);
                return;
            }

            let sName = currentAccount.display_name;
            let sRace = currentAccount.race || "未知";
            let sColor = "#2ecc71";

            if(currentAccount.is_dm) {
                const nName = document.getElementById('npc-name').value;
                if(nName) {
                    sName = nName;
                    sRace = "未知";
                    sColor = document.getElementById('npc-color').value;
                }
            }

            await supabase.from('omni_messages').insert([{
                sender_name: sName,
                sender_race: sRace,
                sender_avatar_color: sColor,
                content: val
            }]);
            inp.value = '';
        }

        function renderMsg(m) {
            const box = document.getElementById('chat-box');
            const isSelf = (m.sender_name === currentAccount.display_name);
            const html = `<div class="message ${isSelf ? 'self' : ''}">
                <div style="font-size:0.7em; color:#999;">${m.sender_name} (${m.sender_race})</div>
                <div class="msg-bubble" style="border-left:4px solid ${m.sender_avatar_color}">${m.content}</div>
            </div>`;
            box.insertAdjacentHTML('beforeend', html);
        }

        async function purchase(name, price) {
            if(currentAccount.is_dm) return alert("监察官无需调配结算。");
            const { data } = await supabase.from('omni_accounts').select('credits').eq('id', currentAccount.id).single();
            if(data.credits < price) return alert("信用点不足。");
            if(confirm(`确认调配 ${name}？`)) {
                await supabase.from('omni_accounts').update({ credits: data.credits - price }).eq('id', currentAccount.id);
                alert("支付成功，物流法阵启动。");
                updateWallet();
            }
        }

        async function adminAdjustCredits() {
            const tid = document.getElementById('target-id').value;
            const amt = document.getElementById('target-amt').value;
            await supabase.from('omni_accounts').update({ credits: amt }).eq('login_id', tid);
            alert("调拨完成");
        }

        window.onload = init;
    </script>
</body>
</html>
