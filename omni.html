<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全境网络 - OMNI Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            /* 整体色彩明度上调 */
            --omni-green: #2ecc71; 
            --omni-green-bright: #4ade80; 
            --omni-bg: #ffffff; 
            --omni-card: #f8fafc;
            --omni-text: #1e293b;
            --omni-danger: #ef4444; 
        }

        body, html { margin: 0; padding: 0; height: 100vh; font-family: "PingFang SC", sans-serif; background: var(--omni-bg); color: var(--omni-text); overflow: hidden; }

 /* --- 3D 穿透动态登录背景（丝滑护眼版） --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #e2e8f0, #f8fafc); /* 明亮的灰白底色 */
            z-index: 99999;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            perspective: 1500px; /* 拉远透视点，让运动显得更广阔平缓 */
            transform-style: preserve-3d;
        }

        /* 巨型几何体基础属性：加入高斯模糊，打造全息柔和感 */
        .bg-shape {
            position: absolute;
            width: 150vw; height: 150vh;
            top: -25vh; left: -25vw;
            transform-style: preserve-3d;
            opacity: 0.7; /* 降低一点透明度，避免色彩过于浓烈 */
            filter: blur(40px); /* 核心护眼科技：让锋利的几何体变成柔和的光块 */
        }

        /* 形状1：明亮的薄荷绿，固定形状，只做空间运动 */
        .shape-light {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.9), rgba(6, 182, 212, 0.6));
            clip-path: polygon(0 0, 80% 0, 40% 100%, 0 100%); /* 固定形状不形变 */
            animation: smooth3D-1 18s infinite alternate ease-in-out;
        }

        /* 形状2：高级石板青色 */
        .shape-dark {
            background: linear-gradient(135deg, rgba(71, 85, 105, 0.9), rgba(15, 118, 110, 0.7));
            clip-path: polygon(100% 0, 100% 100%, 20% 100%, 50% 0); /* 固定形状 */
            animation: smooth3D-2 22s infinite alternate ease-in-out;
        }

        /* 形状3：穿梭的明亮光带 */
        .shape-accent {
            background: linear-gradient(135deg, rgba(167, 243, 208, 0.5), rgba(56, 189, 248, 0.5));
            clip-path: polygon(0 40%, 60% 0, 100% 60%, 40% 100%); /* 固定形状 */
            animation: smooth3D-3 25s infinite alternate ease-in-out;
        }

/* ---  静态非对称六边形终端 --- */
        .login-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            padding: 60px 40px; 
            width: 280px; 
            border: 1px solid rgba(74, 222, 128, 0.4);
            position: relative;
            transform: translateZ(500px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            /* 为焦点反馈添加平滑过渡 */
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), background 0.4s;
            
            clip-path: polygon(15% 0%, 100% 10%, 90% 100%, 25% 95%, 0% 80%, 5% 20%);
        }

        /* 焦点态：提供轻微的交互反馈，而不是改变形状 */
        .login-card:focus-within {
            background: rgba(30, 41, 59, 0.98); /* 背景变得更实一点 */
            transform: translateZ(550px) scale(1.03); /* 向前突出并轻微放大 */
        }

        /* 内部元素样式保持不变 */
        .login-card h2 {
            color: var(--omni-green-bright);
            font-size: 1.6em;
            letter-spacing: 5px; 
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.5);
            transform: none;
        }

        .login-card input {
            width: 100%; 
            padding: 14px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(74, 222, 128, 0.2);
            color: #fff; outline: none; transition: 0.3s;
            font-family: monospace; font-size: 1em;
        }

        .login-card input:focus {
            border-color: var(--omni-green-bright);
            background: rgba(74, 222, 128, 0.1);
            box-shadow: -5px 0 0 var(--omni-green-bright);
        }

        .login-card button {
            width: 100%;
            padding: 16px;
            background: var(--omni-green); color: white;
            border: none; font-weight: 900; font-size: 1.1em;
            letter-spacing: 10px; cursor: pointer;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: 0.4s;
        }

        .login-card button:hover {
            background: var(--omni-green-bright);
            transform: scale(1.05); filter: brightness(1.2);
        }

        @keyframes smooth3D-1 {
            0% { transform: translateZ(-600px) rotateY(15deg) rotateX(10deg) translateX(-10%); }
            100% { transform: translateZ(400px) rotateY(-10deg) rotateX(-5deg) translateX(10%); }
        }

        @keyframes smooth3D-2 {
            0% { transform: translateZ(400px) rotateX(-15deg) rotateY(-10deg) translateY(-10%); }
            100% { transform: translateZ(-600px) rotateX(10deg) rotateY(15deg) translateY(10%); }
        }

        @keyframes smooth3D-3 {
            0% { transform: translateZ(0px) rotateZ(0deg) scale(0.9); }
            100% { transform: translateZ(200px) rotateZ(20deg) scale(1.2); }
        }

        /* 专门为返回键设计的次级几何样式 */
        .login-card .btn-secondary {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05); /* 半透明背景 */
            color: rgba(255, 255, 255, 0.6); /* 调暗文字颜色 */
            font-size: 0.9em;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* 采用与主按钮相反的裁切方向，形成几何互补 */
            clip-path: polygon(0 0, 95% 0, 100% 100%, 5% 100%);
        }

        .login-card .btn-secondary:hover {
            background: rgba(239, 68, 68, 0.2); 
            color: var(--omni-danger);
            border-color: var(--omni-danger);
            transform: scale(1.02);
        }


        /* 主架构 */
        .app-container { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 260px; background: var(--omni-green); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; font-size: 1.5em; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { padding: 20px; cursor: pointer; display: flex; align-items: center; gap: 15px; border-left: 4px solid transparent; }
        .nav-item.active { background: rgba(255,255,255,0.1); border-left-color: var(--omni-green-bright); font-weight: bold; }

        /* 内容区 */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }

        /* --- 聊天 --- */
        .chat-layout { display: flex; flex-direction: row; height: calc(100vh - 160px); border: 1px solid #e2e8f0; border-radius: 12px; background: white; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* 左侧联系人栏 */
        .chat-sidebar { width: 220px; border-right: 1px solid #e2e8f0; background: #f8fafc; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-tabs { display: flex; border-bottom: 1px solid #e2e8f0; }
        .sidebar-tabs div { flex: 1; text-align: center; padding: 15px 0; cursor: pointer; font-size: 0.9em; transition: 0.2s; color: #64748b; }
        .sidebar-tabs div.active { background: white; font-weight: bold; color: var(--omni-green); border-bottom: 2px solid var(--omni-green); }
        .contact-list { flex: 1; overflow-y: auto; }
        
        /* 联系人列表项 */
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.2s; }
        .contact-item:hover { background: #e2e8f0; }
        .contact-item.active { background: #e2e8f0; border-left: 3px solid var(--omni-green); }
        .contact-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #ddd; }
        .contact-name { font-size: 0.9em; font-weight: bold; color: var(--omni-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 右侧聊天主区 */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #ffffff; }
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; background: #fdfdfd; display: flex; flex-direction: column; }
        .chat-input-bar { padding: 15px 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; background: white; }
        .chat-input-bar input { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; outline: none; background: #f8fafc; transition: 0.3s; }
        .chat-input-bar input:focus { border-color: var(--omni-green-bright); background: white; }

        /* 头像与消息体 (对话流) */
        .message { display: flex; gap: 12px; margin-bottom: 20px; align-items: flex-start; }
        .message.self { flex-direction: row-reverse; }
        .avatar-circle { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #e2e8f0; background: #fff; flex-shrink: 0; }
        .message.self .avatar-circle { border-color: var(--omni-green-bright); }
        
        .msg-content { display: flex; flex-direction: column; max-width: 70%; }
        .message.self .msg-content { align-items: flex-end; }
        .msg-sender-name { font-size: 0.75em; color: #94a3b8; margin-bottom: 4px; }
        .msg-bubble { padding: 10px 16px; border-radius: 12px; background: #f1f5f9; line-height: 1.5; color: #333; word-break: break-all; }
        
        /* 气泡小尾巴细节 */
        .message.self .msg-bubble { background: var(--omni-green); color: white; border-top-right-radius: 2px; }
        .message:not(.self) .msg-bubble { border-top-left-radius: 2px; }

        /* DM 面板 */
        #dm-admin-panel { background: #2c3e50; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; gap: 10px; align-items: center; }
        #dm-admin-panel input { padding: 5px; border-radius: 4px; border: none; }

        /* 警告拦截 */
        #intercept-msg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: white; border-left: 5px solid red; padding: 15px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; z-index: 100001; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <!-- 3D 空间中互相穿透的巨型几何体 -->
        <div class="bg-shape shape-light"></div>
        <div class="bg-shape shape-dark"></div>
        <div class="bg-shape shape-accent"></div>

        <!-- 登录卡片 -->
        <div class="login-card">
            <h2>全境网络接入</h2>
            <input type="text" id="l-user" placeholder="公民账号" autocomplete="off">
            <input type="password" id="l-pass" placeholder="访问密钥">
            <button onclick="handleLogin()">接入网络</button>
            <button onclick="window.location.href='index.html'" class="btn-secondary">返回 D&D 系统</button>
            <p id="l-err" style="color:var(--omni-danger); margin-top:15px; display:none; font-size:0.8em;">身份验证未通过</p>
        </div>
    </div>


    <div id="intercept-msg">⚠️ <strong>安全拦截：</strong> 检测到敏感词汇，消息已阻断。</div>

    <div class="app-container">
        <nav class="sidebar">
            <div class="sidebar-header">🌐 OMNI</div>
            <div class="nav-item active" onclick="switchPage('chat', this)">💬 枢纽通讯</div>
            <div class="nav-item" onclick="switchPage('life', this)">🍔 帝国优选</div>
            <div class="nav-item" onclick="switchPage('wallet', this)">💳 资产结算</div>
            <div class="nav-item" onclick="switchPage('profile', this)">🛂 公民通行证</div>
            <div style="margin-top:auto; padding:20px; opacity:0.5; cursor:pointer;" onclick="logout()">⬅ 退出</div>
        </nav>

        <main class="main-content">
            <div id="dm-admin-panel" style="background: #1e293b; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; gap: 10px; align-items: center;">
                <strong style="color:#f39c12">● 监察官控制台</strong>
                <span style="margin-left:10px">划拨信用点：</span>
                <input type="text" id="target-id" placeholder="账号ID" style="width:80px; padding: 5px; border-radius: 4px; border: none;">
                <input type="number" id="target-amt" placeholder="金额" style="width:80px; padding: 5px; border-radius: 4px; border: none;">
                <button onclick="adminAdjustCredits()" style="background:var(--omni-green); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">执行</button>
                </div>

            <div id="page-chat" class="page active">
                <div class="chat-layout">
                    <div class="chat-sidebar">
                        <div class="sidebar-tabs">
                            <div class="active" onclick="switchListTab('friends', this)">联系人</div>
                            <div onclick="switchListTab('groups', this)">群组</div>
                        </div>
                        <div class="contact-list" id="contact-list-box">
                            </div>
                    </div>
                    
                    <div class="chat-main">
                        <div id="chat-header-title" style="padding: 15px 20px; border-bottom: 1px solid #e2e8f0; background: #fff; font-weight: bold; font-size: 1.1em; color: var(--omni-text);">
                            公共大厅
                        </div>
                        <div class="chat-history" id="chat-box"></div>
                        <div class="chat-input-bar">
                            <input type="text" id="chat-in" placeholder="输入消息..." onkeypress="if(event.key==='Enter') sendMsg()">
                            <button onclick="sendMsg()" style="padding:10px 25px; background:var(--omni-green); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">发送</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-life" class="page">
                <div class="card">
                    <h3>物资调配中心</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                        <div style="border:1px solid #eee; padding:15px; border-radius:8px;">
                            <h4>蒂尔兰手工汉堡</h4>
                            <p style="color:var(--omni-green); font-weight:bold;">15 信用点</p>
                            <button onclick="purchase('汉堡', 15)" style="width:100%; padding:8px;">立即调配</button>
                        </div>
                        <div style="border:1px solid #eee; padding:15px; border-radius:8px;">
                            <h4>高纯度魔力液</h4>
                            <p style="color:var(--omni-green); font-weight:bold;">120 信用点</p>
                            <button onclick="purchase('魔力液', 120)" style="width:100%; padding:8px;">立即调配</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-wallet" class="page">
                <div class="card" style="background:linear-gradient(135deg, #196f3d, #114b28); color:white; padding:40px;">
                    <div style="opacity:0.8;">可用余额 (信用点)</div>
                    <div id="wallet-val" style="font-size:3.5em; font-weight:bold; margin-top:10px;">0.00</div>
                </div>
            </div>

            <div id="page-profile" class="page">
                <div class="card">
                    <h2 id="prof-name">公民信息</h2>
                    <p id="prof-race">种族：--</p>
                    <p>社会信用等级：A</p>
                </div>
            </div>
        </main>
    </div>

    <script>
      // --- 核心配置 ---
        const SB_URL = "https://vbzfpgucpciqgaakqndz.supabase.co";
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTc2MzMsImV4cCI6MjA4MzE3MzYzM30.fBVDirEJ52bvrYJZ5DNv7fVDLNgCwITKwdKqT6YJDYw';
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        const DM_UID = "1c00b7ed-69d7-40e2-8c28-84f854a4fa35";

        // GitHub 头像路径配置
        const GITHUB_USER = "huaerbujizewang"; 
        const GITHUB_REPO = "Dungeons-Dragons-Systems";
        const AVATAR_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/assets/bestiary/avatars/`;

        function getAvatarUrl(filename) {
            return AVATAR_BASE + (filename || 'default.png');
        }

        let currentAccount = null;
        const urlParams = new URLSearchParams(window.location.search);
        const loginUid = urlParams.get('uid');

        // --- 聊天状态管理 ---
        let currentChatMode = 'public'; // 'public', 'private', 'group'
        let currentChatTarget = null;   // 存储当前私聊对象 {id, name} 或群组 {id, name}
        let currentRealtimeChannel = null; // 用于实时监听

        // --- 初始化与登录 ---
        async function init() {
            if(loginUid === DM_UID) {
                currentAccount = { id: 0, nickname: "系统管理员", race: "后台", is_dm: true, login_id: "DM", avatar_filename: "default.png" };
                document.getElementById('dm-admin-panel').style.display = 'flex';
                enterApp();
                return;
            }
            const saved = sessionStorage.getItem('omni_session');
            if(saved) {
                currentAccount = JSON.parse(saved);
                enterApp();
            }
        }

        async function handleLogin() {
            const u = document.getElementById('l-user').value;
            const p = document.getElementById('l-pass').value;
            const { data, error } = await supabaseClient.from('omni_accounts').select('*').eq('login_id', u).eq('login_pass', p).single();
            if(data) {
                currentAccount = data;
                sessionStorage.setItem('omni_session', JSON.stringify(data));
                enterApp();
            } else {
                document.getElementById('l-err').style.display = 'block';
            }
        }

        function logout() {
            sessionStorage.removeItem('omni_session');
            window.location.href = 'index.html'; // 绝对路径返回主系统
        }

        function enterApp() {
            const overlay = document.getElementById('login-overlay');
            const card = document.querySelector('.login-card');
            if(card && overlay) {
                card.style.transform = "translateX(200%) skewX(-20deg)";
                card.style.opacity = "0";
                setTimeout(() => { overlay.style.display = 'none'; }, 500);
            } else if(overlay) {
                overlay.style.display = 'none';
            }
            
            document.getElementById('prof-name').innerText = currentAccount.nickname || "公民账号";
            document.getElementById('prof-race').innerText = "种族：" + (currentAccount.race || "未识别");
            
            // 启动功能
            openPublicChat(); // 默认进入大厅
            subscribe();
            updateWallet();
            
            loadContactList();
            if(currentAccount.is_dm) {
                document.getElementById('dm-admin-panel').style.display = 'flex';
                loadAdminAccountList();
            }
        }

        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            if(pageId === 'wallet') updateWallet();
        }

        // --- 社交列表导航 ---
        function switchListTab(tab, el) {
            document.querySelectorAll('.sidebar-tabs div').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            if(tab === 'friends') loadContactList();
            else loadGroupList();
        }

        // --- 社交模块：好友与群组  ---

        // 添加联系人逻辑
        async function addFriend() {
            if (currentAccount.id === 0) return alert("系统管理员实体无法直接添加好友，请先在后台【接管账号】。");
            
            const targetName = prompt("请输入你要添加的公民网名：");
            if (!targetName) return;

            // 检索账号
            const { data: users, error } = await supabaseClient.from('omni_accounts').select('id, nickname').eq('nickname', targetName);
            if (!users || users.length === 0) return alert(`未检索到名为 [${targetName}] 的公民。`);
            
            const targetId = users[0].id;
            if (targetId === currentAccount.id) return alert("不可添加自己为联系人。");

            // 写入好友关系
            const { error: insertErr } = await supabaseClient.from('omni_friends').insert([
                { user_id: currentAccount.id, friend_id: targetId }
            ]);

            if (!insertErr) {
                alert("联系人添加成功！");
                loadContactList(); // 刷新列表
            } else {
                alert("添加失败，可能已经是联系人。");
            }
        }

        // 加载好友列表
        async function loadContactList() {
            const box = document.getElementById('contact-list-box');
            let html = `
                <div style="padding:10px; text-align:center;">
                    <button onclick="addFriend()" style="padding:6px 15px; background:white; border:1px solid var(--omni-green); color:var(--omni-green); border-radius:4px; cursor:pointer; width:100%; font-weight:bold;">+ 添加联系人</button>
                </div>
                <div class="contact-item ${currentChatMode === 'public' ? 'active' : ''}" onclick="openPublicChat()">
                    <img src="${getAvatarUrl('default.png')}" class="contact-avatar">
                    <span class="contact-name" style="color:var(--omni-green);">公共大厅</span>
                </div>
            `;

            let queryData = [];

            // 如果是纯 DM 实体，拥有上帝视角，看到所有人
            if (currentAccount.id === 0) {
                const { data } = await supabaseClient.from('omni_accounts').select('*').neq('login_id', 'DM');
                queryData = data;
            } else {
                // 如果是正常账号/被接管的账号，只拉取真正的好友
                const { data: friends } = await supabaseClient.from('omni_friends')
                    .select('user_id, friend_id')
                    .or(`user_id.eq.${currentAccount.id},friend_id.eq.${currentAccount.id}`);
                
                if (friends && friends.length > 0) {
                    // 提取所有好友的 ID 并去重
                    const friendIds = friends.map(f => f.user_id === currentAccount.id ? f.friend_id : f.user_id);
                    const uniqueIds = [...new Set(friendIds)];
                    const { data: accs } = await supabaseClient.from('omni_accounts').select('*').in('id', uniqueIds);
                    queryData = accs;
                }
            }

            if(queryData && queryData.length > 0) {
                queryData.forEach(acc => {
                    const isActive = (currentChatMode === 'private' && currentChatTarget && currentChatTarget.id === acc.id) ? 'active' : '';
                    html += `
                        <div class="contact-item ${isActive}" onclick="openPrivateChat(${acc.id}, '${acc.nickname}')">
                            <img src="${getAvatarUrl(acc.avatar_filename)}" class="contact-avatar">
                            <div style="display:flex; flex-direction:column; overflow:hidden;">
                                <span class="contact-name">${acc.nickname}</span>
                                <span style="font-size:0.7em; color:#94a3b8;">${acc.race || '未知'}</span>
                            </div>
                        </div>
                    `;
                });
            }
            box.innerHTML = html;
        }

        async function loadGroupList() {
            const { data } = await supabaseClient.from('omni_groups').select('*').order('id', {ascending: true});
            const box = document.getElementById('contact-list-box');
            
            let html = `<div style="padding:10px; text-align:center;"><button onclick="createGroup()" style="padding:6px 15px; background:white; border:1px solid var(--omni-green); color:var(--omni-green); border-radius:4px; cursor:pointer; width:100%; font-weight:bold;">+ 新建群组</button></div>`;
            
            if(data) {
                data.forEach(g => {
                    const isActive = (currentChatMode === 'group' && currentChatTarget && currentChatTarget.id === g.id) ? 'active' : '';
                    html += `
                        <div class="contact-item ${isActive}" onclick="openGroupChat(${g.id}, '${g.group_name}')">
                            <div class="contact-avatar" style="background:var(--omni-green); color:white; display:flex; align-items:center; justify-content:center; font-weight:bold;">群</div>
                            <span class="contact-name">${g.group_name}</span>
                        </div>
                    `;
                });
            }
            box.innerHTML = html;
        }

        async function createGroup() {
            if (currentAccount.id === 0) return alert("系统管理员实体无法直接建群，请先在后台【接管账号】。");
            
            const name = prompt("请输入新群组名称：");
            if(!name) return;
            const { error } = await supabaseClient.from('omni_groups').insert([{ group_name: name, creator_id: currentAccount.id }]);
            if(error) alert("建群失败，网络驳回。");
            else loadGroupList();
        }

        async function createGroup() {
            const name = prompt("请输入新群组名称：");
            if(!name) return;
            const { error } = await supabaseClient.from('omni_groups').insert([{ group_name: name, creator_id: currentAccount.id }]);
            if(!error) loadGroupList();
        }

        // --- 聊天室切换逻辑 ---
        function openPublicChat() {
            currentChatMode = 'public';
            currentChatTarget = null;
            document.getElementById('chat-header-title').innerText = "公共大厅";
            loadContactList(); // 刷新左侧选中状态
            loadHistory();
        }

        function openPrivateChat(id, name) {
            currentChatMode = 'private';
            currentChatTarget = { id: id, name: name };
            document.getElementById('chat-header-title').innerText = `私聊：${name}`;
            loadContactList();
            loadHistory();
        }

        function openGroupChat(id, name) {
            currentChatMode = 'group';
            currentChatTarget = { id: id, name: name };
            document.getElementById('chat-header-title').innerText = `群组：${name}`;
            loadGroupList();
            loadHistory();
        }

        // --- 聊天核心引擎 ---
        async function loadHistory() {
            let query = supabaseClient.from('omni_messages').select('*');

            // 根据当前模式过滤消息
            if(currentChatMode === 'public') {
                query = query.is('target_id', null).is('group_id', null);
            } else if (currentChatMode === 'private') {
                // 读取：(我发给他的) 或者 (他发给我的)
                query = query.or(`and(sender_name.eq.${currentAccount.nickname},target_id.eq.${currentChatTarget.id}),and(sender_name.eq.${currentChatTarget.name},target_id.eq.${currentAccount.id})`);
            } else if (currentChatMode === 'group') {
                query = query.eq('group_id', currentChatTarget.id);
            }

            const { data } = await query.order('created_at', {ascending:true}).limit(100);
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            
            if(data) {
                data.forEach(renderMsg);
                setTimeout(() => { box.scrollTop = box.scrollHeight; }, 50);
            }
        }

        function subscribe() {
            if(currentRealtimeChannel) supabaseClient.removeChannel(currentRealtimeChannel);
            
            currentRealtimeChannel = supabaseClient.channel('omni_msgs').on('postgres_changes', {event:'INSERT', schema:'public', table:'omni_messages'}, p => {
                const m = p.new;
                let shouldRender = false;
                
                // 判断新消息是否属于当前聊天窗口
                if(currentChatMode === 'public' && !m.target_id && !m.group_id) {
                    shouldRender = true;
                } else if(currentChatMode === 'private') {
                    if((m.target_id === currentAccount.id && m.sender_name === currentChatTarget.name) || 
                       (m.target_id === currentChatTarget.id && m.sender_name === currentAccount.nickname)) {
                        shouldRender = true;
                    }
                } else if(currentChatMode === 'group' && m.group_id === currentChatTarget.id) {
                    shouldRender = true;
                }

                if(shouldRender) {
                    renderMsg(m);
                    const box = document.getElementById('chat-box');
                    box.scrollTop = box.scrollHeight;
                }
            }).subscribe();
        }

        async function sendMsg() {
            const inp = document.getElementById('chat-in');
            const val = inp.value.trim();
            if(!val) return;

            if(val.includes('伊莎贝拉')) {
                document.getElementById('intercept-msg').style.display = 'block';
                setTimeout(()=> document.getElementById('intercept-msg').style.display = 'none', 3000);
                return;
            }

            let msgPayload = {
                sender_name: currentAccount.nickname,
                sender_race: currentAccount.race || "未知",
                sender_avatar_filename: currentAccount.avatar_filename || "default.png",
                content: val
            };

            // 附加路由信息
            if(currentChatMode === 'private') msgPayload.target_id = currentChatTarget.id;
            if(currentChatMode === 'group') msgPayload.group_id = currentChatTarget.id;

            await supabaseClient.from('omni_messages').insert([msgPayload]);
            inp.value = '';
        }

        function renderMsg(m) {
            const box = document.getElementById('chat-box');
            const isSelf = (m.sender_name === currentAccount.nickname);
            const avatarUrl = getAvatarUrl(m.sender_avatar_filename);
            
            const html = `
                <div class="message ${isSelf ? 'self' : ''}">
                    <img src="${avatarUrl}" class="avatar-circle">
                    <div class="msg-content">
                        <div class="msg-sender-name">${m.sender_name} <span style="opacity:0.6">[${m.sender_race || '未知'}]</span></div>
                        <div class="msg-bubble">${m.content}</div>
                    </div>
                </div>`;
            box.insertAdjacentHTML('beforeend', html);
        }

        // --- DM 后台管理正常化 ---
        async function adminCreateAccount() {
            const nick = prompt("请输入新账号显示名称：");
            if(!nick) return;
            const race = prompt("请输入种族：", "人类");
            const avatar = prompt("请输入头像文件名 (GitHub assets/bestiary/avatars 目录下)：", "default.png");
            
            const { error } = await supabaseClient.from('omni_accounts').insert([{
                login_id: "USER_" + Date.now(),
                login_pass: "123456",
                nickname: nick,
                race: race,
                avatar_filename: avatar,
                credits: 1000
            }]);
            
            if(!error) {
                alert(`账号 [${nick}] 注册成功`);
                loadAdminAccountList();
                loadContactList();
            }
        }

        async function loadAdminAccountList() {
            const { data } = await supabaseClient.from('omni_accounts').select('*').order('id', {ascending: true});
            const dmPanel = document.getElementById('dm-admin-panel');
            
            const oldSel = document.getElementById('admin-acc-selector');
            const oldBtn = document.getElementById('admin-create-btn');
            if(oldSel) oldSel.remove();
            if(oldBtn) oldBtn.remove();

            let html = `
                <select id="admin-acc-selector" onchange="takeoverAccount(this.value)" style="background:#334155; color:white; border:none; padding:5px; border-radius:4px; margin-left:15px; outline:none;">
                    <option value="DM">--- 接管指定账号发信 ---</option>
            `;
            if(data) {
                data.forEach(acc => { html += `<option value="${acc.id}">${acc.nickname}</option>`; });
            }
            html += `</select>
            <button id="admin-create-btn" onclick="adminCreateAccount()" style="background:#3b82f6; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; margin-left:10px; font-weight:bold;">+ 注册新账号</button>`;
            
            dmPanel.insertAdjacentHTML('beforeend', html);
        }

        async function takeoverAccount(accId) {
            if (accId === "DM") {
                currentAccount = { nickname: "系统管理员", race: "后台", is_dm: true, login_id: "DM", avatar_filename: "default.png" };
            } else {
                const { data } = await supabaseClient.from('omni_accounts').select('*').eq('id', accId).single();
                if(data) {
                    const keepAdmin = currentAccount.is_dm; 
                    currentAccount = data;
                    currentAccount.is_dm = keepAdmin; 
                }
            }
            document.getElementById('prof-name').innerText = currentAccount.nickname;
            document.getElementById('prof-race').innerText = "种族：" + (currentAccount.race || "未知");
            
            // 如果处于私聊状态且接管了当前聊天的对象，退回大厅避免逻辑混乱
            if(currentChatMode === 'private' && currentChatTarget && currentChatTarget.id === currentAccount.id) {
                openPublicChat();
            } else {
                loadContactList();
                loadHistory(); // 刷新消息记录（因为视角变了）
            }
        }

        // --- 资产操作 ---
        async function purchase(name, price) {
            if(currentAccount.is_dm && currentAccount.login_id === "DM") return alert("系统管理员账号无需扣费。");
            const targetId = currentAccount.id; 
            const { data } = await supabaseClient.from('omni_accounts').select('credits').eq('id', targetId).single();
            if(data && data.credits < price) return alert("信用点不足。");
            if(confirm(`确认花费 ${price} 信用点调配 [${name}] 吗？`)) {
                await supabaseClient.from('omni_accounts').update({ credits: data.credits - price }).eq('id', targetId);
                alert("支付成功，物资派发中。");
                updateWallet();
            }
        }

        async function adminAdjustCredits() {
            const tid = document.getElementById('target-id').value;
            const amt = document.getElementById('target-amt').value;
            await supabaseClient.from('omni_accounts').update({ credits: amt }).eq('login_id', tid);
            alert("资产调拨完成");
        }

        async function updateWallet() {
            if(currentAccount.is_dm && currentAccount.login_id === "DM") {
                document.getElementById('wallet-val').innerText = "无限";
                return;
            }
            const { data } = await supabaseClient.from('omni_accounts').select('credits').eq('id', currentAccount.id).single();
            if(data) document.getElementById('wallet-val').innerText = data.credits.toLocaleString();
        }

        window.onload = init;
    </script>
</body>
</html>
