<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全境网络 - Omni Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 核心配色：以绿为尊，展现帝国繁荣感 */
        :root {
            --omni-green-main: #196f3d; 
            --omni-green-light: #2ecc71; 
            --omni-bg-gray: #f4f6f7; 
            --omni-card-white: #ffffff;
            --omni-text-main: #2c3e50;
            --omni-text-sub: #7f8c8d;
            --omni-gold: #f39c12; 
            --omni-danger: #e74c3c; 
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--omni-bg-gray);
            color: var(--omni-text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* PC端大屏侧边栏 */
        .omni-sidebar {
            width: 260px;
            background: var(--omni-green-main);
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .omni-logo {
            padding: 30px 20px;
            font-size: 1.8em;
            font-weight: 900;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 20px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item.active {
            background: rgba(255,255,255,0.1);
            border-left-color: var(--omni-green-light);
            font-weight: bold;
        }

        /* 主内容区 */
        .omni-main {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            position: relative;
        }

        .tab-pane { display: none; animation: fadeIn 0.3s ease; }
        .tab-pane.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .omni-card {
            background: var(--omni-card-white);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .section-header {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 25px;
            color: var(--omni-green-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- 通讯频道 (Chat) --- */
        .chat-layout { display: flex; gap: 20px; height: calc(100vh - 180px); }
        .chat-list {
            width: 300px;
            background: var(--omni-card-white);
            border-radius: 12px;
            overflow-y: auto;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .chat-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-item:hover { background: #f9f9f9; }
        .chat-avatar { width: 40px; height: 40px; border-radius: 50%; background: #ddd; flex-shrink: 0; }

        .chat-window {
            flex: 1;
            background: var(--omni-card-white);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* DM 扮演面板 */
        #dm-control-panel {
            background: #2c3e50;
            color: white;
            padding: 12px 20px;
            font-size: 0.9em;
            display: none; /* 仅对 DM UID 显示 */
            gap: 12px;
            align-items: center;
        }
        #dm-control-panel input { padding: 5px 10px; border-radius: 4px; border: none; outline: none; }

        .chat-history { flex: 1; padding: 25px; overflow-y: auto; background: #fcfcfc; }
        .chat-input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 15px; }
        .chat-input-area input { flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; outline: none; }
        .btn-send { background: var(--omni-green-main); color: white; border: none; padding: 0 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-send:hover { background: var(--omni-green-light); }

        /* 消息气泡 */
        .message { margin-bottom: 20px; display: flex; flex-direction: column; }
        .message.self { align-items: flex-end; }
        .msg-info { font-size: 0.75em; color: #999; margin-bottom: 5px; }
        .msg-bubble { padding: 12px 18px; border-radius: 18px; background: #eee; max-width: 70%; word-wrap: break-word; line-height: 1.5; }
        .message.self .msg-bubble { background: var(--omni-green-light); color: white; }
        .msg-error { color: var(--omni-danger); font-size: 0.8em; margin-top: 5px; font-weight: bold; display: flex; align-items: center; gap: 4px; }

        /* --- 帝国优选 (Meituan) --- */
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .store-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
        .store-info { padding: 15px; }
        .store-price { color: var(--omni-green-main); font-weight: bold; font-size: 1.2em; }

        /* --- 资产结算 (Alipay) --- */
        .wallet-banner {
            background: linear-gradient(135deg, var(--omni-green-main), #114b28);
            border-radius: 16px;
            padding: 40px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 20px rgba(25, 111, 61, 0.3);
        }
        .wallet-balance-val { font-size: 3.5em; font-weight: 900; margin-top: 10px; }

        /* --- 安全警告 --- */
        .sys-warning {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #fff; border-left: 6px solid var(--omni-danger);
            padding: 15px 25px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999; display: none; align-items: center; gap: 15px; font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="omni-sidebar">
        <div class="omni-logo">🌐 OMNI 全境</div>
        <div style="flex:1; padding-top: 20px;">
            <div class="nav-item active" onclick="switchTab('chat', this)">💬 枢纽通讯</div>
            <div class="nav-item" onclick="switchTab('life', this)">🍔 帝国优选</div>
            <div class="nav-item" onclick="switchTab('wallet', this)">💳 资产结算</div>
            <div class="nav-item" onclick="switchTab('profile', this)">🛂 公民通行证</div>
        </div>
        <div style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <div style="cursor: pointer; opacity: 0.7; font-size: 0.9em;" onclick="window.history.back()">⬅ 退出系统</div>
        </div>
    </nav>

    <main class="omni-main">
        
        <div id="omni-warning" class="sys-warning">
            <span style="font-size: 1.5em;">⚠️</span>
            <div>
                <div style="color: var(--omni-danger); font-size: 1.1em; margin-bottom: 2px;">安全拦截</div>
                <div style="font-size: 0.85em; font-weight: normal;">检测到敏感词汇，消息发送受限。警告 (1/3)</div>
            </div>
        </div>

        <div id="tab-chat" class="tab-pane active">
            <div class="section-header">枢纽通讯 (HUB)</div>
            <div class="chat-layout">
                <div class="chat-list">
                    <div class="chat-item" style="background: #f0fdf4; border-left: 4px solid var(--omni-green-main);">
                        <div class="chat-avatar" style="background: #3498db;"></div>
                        <div>
                            <div style="font-weight: bold;">因斯卡利亚第三机械厂群</div>
                            <div style="font-size: 0.8em; color: var(--omni-text-sub);">已连接至全境转译服务...</div>
                        </div>
                    </div>
                </div>

                <div class="chat-window">
                    <div id="dm-control-panel">
                        <span style="color: #f39c12; font-weight: bold;">[DM 扮演开启]</span>
                        <input type="text" id="dm-npc-name" placeholder="NPC 名字 (如: 老李)">
                        <input type="text" id="dm-npc-race" placeholder="种族">
                        <input type="color" id="dm-npc-color" value="#3498db" title="头像颜色">
                    </div>

                    <div class="chat-history" id="chat-history">
                        </div>

                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="输入消息内容..." onkeypress="if(event.key === 'Enter') attemptSend()">
                        <button class="btn-send" onclick="attemptSend()">发 送</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-life" class="tab-pane">
            <div class="section-header">帝国优选</div>
            <div class="store-grid">
                <div class="store-card">
                    <div style="height:150px; background:#ddd;"></div>
                    <div class="store-info">
                        <div style="font-weight:bold; font-size:1.1em;">蒂尔兰经典手工汉堡</div>
                        <div style="margin: 10px 0;">⭐ 4.8 | 配送时间 15min</div>
                        <div class="store-price">15.00 信用点</div>
                        <button onclick="mockOrder('汉堡', 15)" style="width:100%; margin-top:10px; padding:10px; border:none; background:#eee; border-radius:4px; cursor:pointer;">立即下单</button>
                    </div>
                </div>
                <div class="store-card">
                    <div style="height:150px; background:#ccc;"></div>
                    <div class="store-info">
                        <div style="font-weight:bold; font-size:1.1em;">高纯度魔力营养液</div>
                        <div style="margin: 10px 0;">⭐ 4.9 | 军工认证</div>
                        <div class="store-price">120.00 信用点</div>
                        <button onclick="mockOrder('营养液', 120)" style="width:100%; margin-top:10px; padding:10px; border:none; background:#eee; border-radius:4px; cursor:pointer;">立即下单</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-wallet" class="tab-pane">
            <div class="section-header">资产结算系统</div>
            <div class="wallet-banner">
                <div>
                    <div style="opacity: 0.9;">当前账户余额 (独立信用点)</div>
                    <div class="wallet-balance-val" id="omni-credits-display">0.00</div>
                    <div style="margin-top: 15px; font-size: 0.9em; opacity: 0.8;">锚定：帝国中央银行结算中心</div>
                </div>
                <div style="background:white; padding:10px; border-radius:12px; opacity:0.8;">
                    <div style="width:120px; height:120px; background: repeating-linear-gradient(45deg, #000, #000 5px, #fff 5px, #fff 10px);"></div>
                </div>
            </div>
        </div>

        <div id="tab-profile" class="tab-pane">
            <div class="section-header">公民数据中心</div>
            <div class="omni-card" style="display:flex; gap:30px; align-items:center;">
                <div id="user-avatar-placeholder" style="width:100px; height:100px; border-radius:50%; background:#eee; border:4px solid var(--omni-green-main);"></div>
                <div>
                    <h2 id="display-user-name" style="margin:0 0 10px 0;">载入中...</h2>
                    <div style="color:var(--omni-text-sub);">
                        <strong>种族识别：</strong> <span id="display-user-race">--</span><br>
                        <strong>社会信用等级：</strong> A
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- Supabase 配置 (同步自 index.html) ---
        const SUPABASE_URL = "https://vbzfpgucpciqgaakqndz.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZlI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzg0ODg3MDksImV4cCI6MjA1NDA0ODcwOX0.Sly54jFsh3tS98u4M4WfUe3v0Yx1P5_z0y4W1P5_z0y";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DM_UID = "1c00b7ed-69d7-40e2-8c28-84f854a4fa35";
        const urlParams = new URLSearchParams(window.location.search);
        const viewingUserId = urlParams.get('uid');

        let myProfile = null;

        // 初始化
        async function init() {
            if (!viewingUserId) return alert("未检测到公民ID。");

            // 1. 获取用户信息
            const { data, error } = await supabase.from('profiles').select('*').eq('id', viewingUserId).single();
            if (data) {
                myProfile = data;
                document.getElementById('display-user-name').innerText = data.display_name;
                document.getElementById('display-user-race').innerText = data.race || "未识别";
                document.getElementById('omni-credits-display').innerText = (data.omni_credits || 0).toLocaleString('en-US', {minimumFractionDigits: 2});

                // 2. DM 判定：开启控制台
                if (viewingUserId === DM_UID) {
                    document.getElementById('dm-control-panel').style.display = 'flex';
                }
            }

            // 3. 聊天初始化
            loadHistory();
            subscribeRealtime();
        }

        // 标签切换
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            element.classList.add('active');
        }

        // --- 聊天功能核心 ---

        async function loadHistory() {
            const { data } = await supabase.from('omni_chat_messages').select('*').order('created_at', { ascending: true }).limit(100);
            if (data) {
                const chatBox = document.getElementById('chat-history');
                chatBox.innerHTML = '';
                data.forEach(renderMsg);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function subscribeRealtime() {
            supabase.channel('omni_public_chat')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'omni_chat_messages' }, payload => {
                    renderMsg(payload.new);
                    const chatBox = document.getElementById('chat-history');
                    chatBox.scrollTop = chatBox.scrollHeight;
                }).subscribe();
        }

        async function attemptSend() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            // 拦截禁忌词
            const isBlocked = text.includes('伊莎贝拉');
            if (isBlocked) {
                document.getElementById('omni-warning').style.display = 'flex';
                setTimeout(() => { document.getElementById('omni-warning').style.display = 'none'; }, 4000);
            }

            // 确定发送者身份
            let sName = myProfile.display_name;
            let sRace = myProfile.race;
            let sAvatar = "#3498db"; // 默认玩家蓝

            // 如果是 DM 且开启了马甲
            if (viewingUserId === DM_UID) {
                const npcName = document.getElementById('dm-npc-name').value.trim();
                if (npcName) {
                    sName = npcName;
                    sRace = document.getElementById('dm-npc-race').value.trim() || "未知";
                    sAvatar = document.getElementById('dm-npc-color').value;
                }
            }

            await supabase.from('omni_chat_messages').insert([{
                sender_uid: viewingUserId,
                sender_name: sName,
                sender_race: sRace,
                sender_avatar: sAvatar,
                content: text,
                is_blocked: isBlocked
            }]);

            input.value = '';
        }

        function renderMsg(msg) {
            const chatBox = document.getElementById('chat-history');
            
            // 逻辑判定：只有当发送者 UID 匹配且名字也匹配（非NPC模式）时，才显示在右侧
            const isSelf = msg.sender_uid === viewingUserId;
            const isNpcMode = isSelf && viewingUserId === DM_UID && msg.sender_name !== myProfile.display_name;
            const alignClass = (isSelf && !isNpcMode) ? 'self' : '';

            const bubbleStyle = msg.is_blocked ? 'background: #fdedec; color: #333; border: 1px solid var(--omni-danger);' : '';

            const html = `
                <div class="message ${alignClass}">
                    <div class="msg-info" style="display:flex; gap:5px; flex-direction: ${alignClass === 'self' ? 'row-reverse' : 'row'};">
                        <strong>${msg.sender_name}</strong> 
                        <span style="opacity:0.6">(${msg.sender_race})</span>
                    </div>
                    <div style="display:flex; flex-direction: ${alignClass === 'self' ? 'row-reverse' : 'row'}; align-items:flex-end; gap:10px;">
                        <div class="chat-avatar" style="background:${msg.sender_avatar}; width:30px; height:30px;"></div>
                        <div class="msg-bubble" style="${bubbleStyle}">${msg.content}</div>
                    </div>
                    ${msg.is_blocked ? '<div class="msg-error"><span>!</span> 消息已拦截</div>' : ''}
                </div>
            `;
            chatBox.innerHTML += html;
        }

        function mockOrder(name, price) {
            if(confirm(`【资产结算确认】\n项目：${name}\n需支付：${price} 信用点\n\n确认后调配程序将自动启动。`)) {
                alert("支付成功。正在计算最近的法阵/列车调度路线...");
            }
        }

        // 启动
        window.onload = init;
    </script>
</body>
</html>
