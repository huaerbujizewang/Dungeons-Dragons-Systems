<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全境网络 - Omni</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 核心色彩定义：以绿为尊 */
        :root {
            --omni-green-main: #196f3d; 
            --omni-green-light: #2ecc71; 
            --omni-bg-gray: #f4f6f7; 
            --omni-card-white: #ffffff;
            --omni-text-main: #2c3e50;
            --omni-text-sub: #7f8c8d;
            --omni-gold: #f39c12; 
            --omni-danger: #e74c3c; 
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--omni-bg-gray);
            color: var(--omni-text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 侧边栏导航 */
        .omni-sidebar {
            width: 260px;
            background: var(--omni-green-main);
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .omni-logo {
            padding: 30px 20px;
            font-size: 1.8em;
            font-weight: 900;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            padding: 20px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item.active {
            background: rgba(255,255,255,0.1);
            border-left-color: var(--omni-green-light);
            font-weight: bold;
        }

        /* 主内容区 */
        .omni-main {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            position: relative;
        }

        .tab-pane { display: none; animation: fadeIn 0.3s ease; }
        .tab-pane.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .omni-card {
            background: var(--omni-card-white);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .section-header {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 25px;
            color: var(--omni-green-main);
        }

        /* --- 通讯模块 UI --- */
        .chat-layout { display: flex; gap: 20px; height: calc(100vh - 180px); }
        .chat-window {
            flex: 1;
            background: var(--omni-card-white);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .chat-history { flex: 1; padding: 20px; overflow-y: auto; background: #fcfcfc; }
        
        /* DM 扮演控制台样式 */
        #dm-control-panel {
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            font-size: 0.9em;
            display: none; /* 仅对 DM 显示 */
            gap: 10px;
            align-items: center;
            border-radius: 12px 12px 0 0;
        }
        #dm-control-panel input { padding: 4px 8px; border-radius: 4px; border: none; outline: none; }

        .chat-input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 15px; }
        .chat-input-area input { flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn-send { background: var(--omni-green-main); color: white; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 消息气泡样式 */
        .message { margin-bottom: 20px; display: flex; flex-direction: column; }
        .message.self { align-items: flex-end; }
        .msg-info { font-size: 0.75em; color: #999; margin-bottom: 4px; }
        .msg-bubble { padding: 12px 18px; border-radius: 18px; background: #eee; max-width: 70%; word-wrap: break-word; }
        .message.self .msg-bubble { background: var(--omni-green-light); color: white; }
        .msg-error { color: var(--omni-danger); font-size: 0.8em; margin-top: 5px; font-weight: bold; }

        /* --- 资产/钱包模块 UI --- */
        .wallet-banner {
            background: linear-gradient(135deg, var(--omni-green-main), #114b28);
            border-radius: 16px;
            padding: 40px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(25, 111, 61, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .wallet-balance-val { font-size: 3.5em; font-weight: 900; }

        /* --- 安全拦截弹窗 --- */
        .sys-warning {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border-left: 6px solid var(--omni-danger);
            padding: 15px 25px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            display: none;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>

    <nav class="omni-sidebar">
        <div class="omni-logo">🌐 OMNI 全境</div>
        <div style="flex:1; padding-top: 20px;">
            <div class="nav-item active" onclick="switchTab('chat', this)">💬 枢纽通讯</div>
            <div class="nav-item" onclick="switchTab('life', this)">🍔 帝国优选</div>
            <div class="nav-item" onclick="switchTab('wallet', this)">💳 资产结算</div>
            <div class="nav-item" onclick="switchTab('profile', this)">🛂 公民通行证</div>
        </div>
        <div style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <div style="cursor: pointer; font-size: 0.9em; opacity: 0.7;" onclick="window.history.back()">⬅ 退出系统</div>
        </div>
    </nav>

    <main class="omni-main">
        
        <div id="omni-warning" class="sys-warning">
            <span style="font-size: 1.5em;">⚠️</span>
            <div>
                <div style="color: var(--omni-danger); font-size: 1.1em; font-weight: bold;">安全拦截</div>
                <div style="font-size: 0.9em;">检测到敏感词汇，消息已阻断。警告 (1/3)</div>
            </div>
        </div>

        <div id="tab-chat" class="tab-pane active">
            <div class="section-header">枢纽通讯 (Hub)</div>
            
            <div id="dm-control-panel">
                <span style="color: #f39c12; font-weight: bold;">[DM 扮演模式]</span>
                <input type="text" id="dm-npc-name" placeholder="NPC 名称 (如: 老李)">
                <input type="text" id="dm-npc-race" placeholder="种族 (如: 人类)">
                <input type="color" id="dm-npc-color" value="#3498db" title="头像颜色">
            </div>

            <div class="chat-window">
                <div class="chat-history" id="chat-history">
                    </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="输入消息 (已开启无感转译)..." onkeypress="if(event.key === 'Enter') attemptSend()">
                    <button class="btn-send" onclick="attemptSend()">发 送</button>
                </div>
            </div>
        </div>

        <div id="tab-life" class="tab-pane">
            <div class="section-header">帝国优选</div>
            <div class="omni-card">
                <p style="color:#7f8c8d;">当前语区：中央平原 - 蒂尔兰</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div style="border: 1px solid #eee; border-radius: 8px; padding: 15px;">
                        <div style="font-weight: bold;">蒂尔兰经典手工汉堡</div>
                        <div style="color: var(--omni-green-main); margin: 5px 0;">15.00 信用点</div>
                        <button onclick="mockOrder('汉堡', 15)" style="width: 100%; padding: 8px; border: none; background: #eee; border-radius: 4px; cursor: pointer;">支付调配</button>
                    </div>
                    <div style="border: 1px solid #eee; border-radius: 8px; padding: 15px;">
                        <div style="font-weight: bold;">高纯度魔力营养液</div>
                        <div style="color: var(--omni-green-main); margin: 5px 0;">120.00 信用点</div>
                        <button onclick="mockOrder('营养液', 120)" style="width: 100%; padding: 8px; border: none; background: #eee; border-radius: 4px; cursor: pointer;">支付调配</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-wallet" class="tab-pane">
            <div class="section-header">资产结算</div>
            <div class="wallet-banner">
                <div>
                    <div style="opacity: 0.9; margin-bottom: 10px;">可用信用点</div>
                    <div class="wallet-balance-val" id="omni-credits-display">0.00</div>
                    <div style="margin-top: 15px; font-size: 0.8em; opacity: 0.7;">锚定：帝国中央银行</div>
                </div>
                <div style="background: white; padding: 10px; border-radius: 8px; opacity: 0.8;">
                    <div style="width: 100px; height: 100px; background: repeating-linear-gradient(45deg, #000, #000 5px, #fff 5px, #fff 10px);"></div>
                </div>
            </div>
        </div>

        <div id="tab-profile" class="tab-pane">
            <div class="section-header">公民数据中心</div>
            <div class="omni-card">
                <h2 id="user-name">载入中...</h2>
                <div style="margin: 10px 0; color: #7f8c8d;">
                    <div><strong>种族识别：</strong> <span id="user-race">--</span></div>
                    <div style="margin-top: 5px;"><strong>社会信用等级：</strong> A</div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- 核心配置 (直接同步 index.html) ---
        const SUPABASE_URL = "https://vbzfpgucpciqgaakqndz.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZlI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzg0ODg3MDksImV4cCI6MjA1NDA0ODcwOX0.Sly54jFsh3tS98u4M4WfUe3v0Yx1P5_z0y4W1P5_z0y";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DM_UID = "1c00b7ed-69d7-40e2-8c28-84f854a4fa35";
        const urlParams = new URLSearchParams(window.location.search);
        const viewingUserId = urlParams.get('uid');

        let myProfile = null;

        // 初始化
        async function init() {
            // 获取用户信息
            const { data } = await supabase.from('profiles').select('*').eq('id', viewingUserId).single();
            if (data) {
                myProfile = data;
                document.getElementById('user-name').innerText = data.name;
                document.getElementById('user-race').innerText = data.race || "未定义";
                document.getElementById('omni-credits-display').innerText = (data.omni_credits || 0).toLocaleString('en-US', {minimumFractionDigits: 2});

                // DM 判定
                if (viewingUserId === DM_UID) {
                    document.getElementById('dm-control-panel').style.display = 'flex';
                }
            }

            loadMessages();
            subscribeToChat();
        }

        // 标签切换
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            element.classList.add('active');
        }

        // 加载历史
        async function loadMessages() {
            const { data } = await supabase.from('omni_chat_messages').select('*').order('created_at', { ascending: true }).limit(50);
            if (data) {
                const chatBox = document.getElementById('chat-history');
                chatBox.innerHTML = '';
                data.forEach(renderMessage);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // 实时同步
        function subscribeToChat() {
            supabase.channel('omni_realtime')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'omni_chat_messages' }, payload => {
                    renderMessage(payload.new);
                    const chatBox = document.getElementById('chat-history');
                    chatBox.scrollTop = chatBox.scrollHeight;
                }).subscribe();
        }

        // 发送消息
        async function attemptSend() {
            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if (!text) return;

            // 禁忌拦截逻辑
            const isBlocked = text.includes('伊莎贝拉');
            if (isBlocked) {
                document.getElementById('omni-warning').style.display = 'flex';
                setTimeout(() => { document.getElementById('omni-warning').style.display = 'none'; }, 4000);
            }

            // 身份判定
            let sName = myProfile ? myProfile.name : "未知公民";
            let sRace = myProfile ? myProfile.race : "未知";
            let sAvatar = "#3498db";

            // DM 扮演马甲逻辑
            if (viewingUserId === DM_UID) {
                const npcName = document.getElementById('dm-npc-name').value.trim();
                const npcRace = document.getElementById('dm-npc-race').value.trim();
                const npcColor = document.getElementById('dm-npc-color').value;
                if (npcName) {
                    sName = npcName;
                    sRace = npcRace || "未知";
                    sAvatar = npcColor;
                }
            }

            await supabase.from('omni_chat_messages').insert([{
                sender_uid: viewingUserId,
                sender_name: sName,
                sender_race: sRace,
                sender_avatar: sAvatar,
                content: text,
                is_blocked: isBlocked
            }]);

            inputEl.value = '';
        }

        // 渲染单条消息
        function renderMessage(msg) {
            const chatBox = document.getElementById('chat-history');
            const isSelf = msg.sender_uid === viewingUserId;
            
            // 逻辑：如果是 DM 且在扮演 NPC，即使是自己发的也靠左
            const isNpcMode = isSelf && viewingUserId === DM_UID && msg.sender_name !== myProfile.name;
            const alignClass = (isSelf && !isNpcMode) ? 'self' : '';

            const bubbleStyle = msg.is_blocked ? 'background: #fdedec; color: #333; border: 1px solid var(--omni-danger);' : '';
            
            chatBox.innerHTML += `
                <div class="message ${alignClass}">
                    <div class="msg-info">${msg.sender_name} (${msg.sender_race})</div>
                    <div class="msg-bubble" style="${bubbleStyle}">${msg.content}</div>
                    ${msg.is_blocked ? '<div class="msg-error">! 消息已拦截</div>' : ''}
                </div>
            `;
        }

        function mockOrder(name, price) {
            confirm(`【支付确认】\n\n项目：${name}\n需支付：${price} 信用点\n\n确认后将立即从您的账户扣款。`) && alert('支付处理中...');
        }

        window.onload = init;
    </script>
</body>
</html>
