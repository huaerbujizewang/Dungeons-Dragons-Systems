<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赫里奥斯</title>
    <style>
        :root {
            --bg: #f4f1ea;
            --paper: #fffdf8;
            --paper-soft: #f8f5ed;
            --ink: #1f2933;
            --muted: #68717d;
            --line: #ded6c8;
            --line-strong: #bfae96;
            --gold: #a36f2c;
            --wine: #733a3a;
            --teal: #2f6f67;
            --shadow: 0 16px 40px rgba(31, 41, 51, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(120deg, rgba(115, 58, 58, 0.08), transparent 34%),
                linear-gradient(300deg, rgba(47, 111, 103, 0.1), transparent 38%),
                var(--bg);
            color: var(--ink);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        a {
            color: inherit;
        }

        .page-shell {
            width: min(1440px, calc(100% - 48px));
            min-height: calc(100vh - 48px);
            margin: 24px auto;
            display: grid;
            grid-template-columns: 304px minmax(0, 1fr);
            border: 1px solid var(--line);
            background: rgba(255, 253, 248, 0.82);
            box-shadow: var(--shadow);
        }

        .sidebar {
            border-right: 1px solid var(--line);
            background: rgba(248, 245, 237, 0.92);
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 48px);
        }

        .brand {
            padding: 24px;
            border-bottom: 1px solid var(--line);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 22px;
            color: var(--muted);
            font-size: 13px;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--wine);
        }

        .brand-title {
            margin: 0;
            font-size: 30px;
            line-height: 1.1;
            letter-spacing: 0;
        }

        .brand-subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .tree {
            padding: 18px 14px 28px;
            overflow-y: auto;
        }

        .tree-section {
            margin-bottom: 8px;
        }

        .tree-toggle,
        .tree-leaf {
            width: 100%;
            min-height: 38px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--ink);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 9px 10px;
            font: inherit;
            text-align: left;
            letter-spacing: 0;
        }

        .tree-toggle {
            font-weight: 800;
        }

        .tree-leaf {
            color: #394553;
            font-size: 14px;
        }

        .tree-toggle:hover,
        .tree-leaf:hover {
            background: rgba(163, 111, 44, 0.09);
        }

        .tree-toggle.active {
            background: rgba(115, 58, 58, 0.1);
            color: var(--wine);
        }

        .tree-leaf.active {
            background: #232b35;
            color: #fff;
        }

        .tree-children {
            margin: 2px 0 10px 14px;
            padding-left: 10px;
            border-left: 1px solid var(--line);
        }

        .toggle-mark {
            flex: 0 0 auto;
            color: var(--gold);
            font-size: 12px;
        }

        .content {
            min-width: 0;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .content-top {
            padding: 28px 34px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: flex-start;
            background: rgba(255, 253, 248, 0.72);
        }

        .kicker {
            color: var(--gold);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .page-title {
            margin: 8px 0 0;
            font-size: clamp(28px, 4vw, 46px);
            line-height: 1.1;
            letter-spacing: 0;
        }

        .workspace {
            padding: 34px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 24px;
            align-items: start;
        }

        .workspace.country-layout {
            grid-template-columns: 1fr;
        }

        .workspace.country-layout .asset-panel {
            position: static;
            order: -1;
        }

        .main-panel,
        .asset-panel {
            border: 1px solid var(--line);
            background: var(--paper);
        }

        .main-panel {
            min-height: 620px;
        }

        .panel-header {
            padding: 22px 24px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .panel-eyebrow {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.1em;
        }

        .panel-title {
            margin: 6px 0 0;
            font-size: 28px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .type-pill {
            flex: 0 0 auto;
            border-radius: 999px;
            padding: 7px 12px;
            color: #fff;
            background: var(--teal);
            font-size: 12px;
            font-weight: 800;
        }

        .type-pill.country {
            background: var(--wine);
        }

        .type-pill.person,
        .type-pill.race {
            background: var(--teal);
        }

        .panel-body {
            padding: 24px;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .section-card {
            width: 100%;
            min-height: 116px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper-soft);
            color: inherit;
            cursor: pointer;
            font: inherit;
            padding: 16px;
            text-align: left;
            transition: border-color 0.16s ease, transform 0.16s ease, background 0.16s ease;
        }

        .section-card:hover {
            border-color: var(--line-strong);
            background: #fffaf0;
            transform: translateY(-1px);
        }

        .section-name {
            font-weight: 900;
            font-size: 17px;
        }

        .section-meta {
            margin-top: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .empty-editor {
            min-height: 368px;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            background:
                linear-gradient(transparent 31px, rgba(222, 214, 200, 0.46) 32px),
            var(--paper-soft);
            background-size: 100% 32px;
        }

        .intro-copy {
            max-width: 820px;
            color: #2f3844;
            font-size: 17px;
            line-height: 2;
        }

        .intro-copy p {
            margin: 0 0 20px;
        }

        .intro-copy p:first-child {
            color: var(--wine);
            font-size: 20px;
            font-weight: 900;
        }

        .intro-copy .fact-heading {
            margin-top: 30px;
            color: var(--ink);
            font-size: 19px;
            font-weight: 900;
            line-height: 1.6;
        }

        .asset-panel {
            position: sticky;
            top: 24px;
        }

        .asset-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--line);
        }

        .asset-title {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0;
        }

        .asset-slot {
            margin: 20px;
            min-height: 260px;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: var(--muted);
            background: var(--paper-soft);
            text-align: center;
            padding: 18px;
        }

        .asset-slot.avatar {
            min-height: 220px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            margin-inline: auto;
            width: min(220px, calc(100% - 40px));
        }

        .asset-slot.map {
            min-height: 0;
            aspect-ratio: 16 / 7;
            width: calc(100% - 40px);
        }

        .asset-label {
            font-weight: 900;
            color: #344050;
        }

        .asset-note {
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.6;
        }

        @media (max-width: 980px) {
            .page-shell {
                width: 100%;
                min-height: 100vh;
                margin: 0;
                grid-template-columns: 1fr;
            }

            .sidebar {
                min-height: 0;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .tree {
                max-height: 340px;
            }

            .workspace,
            .workspace.country-layout {
                grid-template-columns: 1fr;
                padding: 22px;
            }

            .asset-panel {
                position: static;
            }
        }

        @media (max-width: 640px) {
            .content-top,
            .panel-header {
                align-items: stretch;
                flex-direction: column;
            }

            .content-top,
            .workspace {
                padding-inline: 16px;
            }

            .brand {
                padding-inline: 16px;
            }

            .asset-slot.map {
                aspect-ratio: 4 / 3;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <aside class="sidebar">
            <div class="brand">
                <a id="back-link" class="back-link" href="index.html">← 返回主界面</a>
                <h1 class="brand-title">赫里奥斯</h1>
                <p class="brand-subtitle">世界档案目录</p>
            </div>
            <nav class="tree" id="tree" aria-label="赫里奥斯目录"></nav>
        </aside>

        <main class="content">
            <header class="content-top">
                <div>
                    <div class="kicker">Helios Archive</div>
                    <h2 class="page-title">赫里奥斯</h2>
                </div>
            </header>

            <section class="workspace" id="workspace">
                <article class="main-panel">
                    <header class="panel-header">
                        <div>
                            <div class="panel-eyebrow" id="panel-path">首页</div>
                            <h3 class="panel-title" id="panel-title">首页</h3>
                        </div>
                        <span class="type-pill" id="panel-type">目录</span>
                    </header>
                    <div class="panel-body" id="panel-body"></div>
                </article>

                <aside class="asset-panel">
                    <header class="asset-header">
                        <h3 class="asset-title" id="asset-title">可选图片</h3>
                    </header>
                    <div class="asset-slot" id="asset-slot">
                        <div>
                            <div class="asset-label" id="asset-label">图片位</div>
                            <div class="asset-note" id="asset-note">留空</div>
                        </div>
                    </div>
                </aside>
            </section>
        </main>
    </div>

    <script>
        const archive = [
            {
                id: "intro",
                name: "欢迎来到赫里奥斯",
                type: "开头",
                content: [
                    "欢迎来到赫里奥斯",
                    "在东蒂尔兰王国的王帐之中，一位年轻的继承人正等待黎明。诸侯的旗帜在城外连成海洋，教会的钟声尚未响起，刺客却已经穿过回廊。若她在天亮前倒下，一个王朝将被撕成数块；若她撑到日出，整个大陆的历史都将被迫记住她的名字。",
                    "在大齐的古老关隘上，一队行商正护送着装满丝绸、药材与铜镜的车队穿过雾气。山神庙的灯火在雨中摇晃，守关的将军却认出了箱底暗藏的兵符。若他当场揭穿，边境诸国将在今夜开战；若他放车队过去，一场足以改写东方格局的叛乱便会在千里之外点燃。",
                    "在普罗维登斯边境修道院里，一名圣武士跪在风雪中祈祷。她不知道神是否真的注视着自己，也从未听见过来自天上的声音。可是当亡者爬上墙垣、士兵们在绝望中后退时，她仍然拔剑向前；剑锋上亮起的光，既可能是神迹，也可能只是凡人不肯屈服的证明。",
                    "赫里奥斯是一个年轻而广阔的世界。它没有古老的神祇，也没有被永恒的帝国。王国正在扩张，城市正在升起，航路正在被发现，新的民族、新的军队、新的信仰与新的野心一同登上历史舞台。",
                    "在这里，神术真实存在，却不能证明神的面容；强者足以改变战场，却未必能改变时代；王冠、血统、誓言、商路与刀剑共同决定国家的命运。神学只能被定义，不能被解释；奇迹可以被目击，却无法被还原。一个人可以因信仰举起圣光，也可以因野心踏碎王座，而后世未必能分清哪一种力量更加危险。",
                    "赫里奥斯拥抱英雄史诗，也容纳现实的阴影。这里有初生帝国的朝气，有边疆城市的喧嚣，有教堂穹顶下的祈祷，有宫廷长桌旁的背叛，也有战场泥泞中仍然闪耀的理想。它是一个正在奔跑、正在燃烧、正在决定自己将成为什么的世界。",
                    "无论你追随王旗，守护圣坛，横渡未知海域，潜入敌国宫廷，还是只想在一个动荡年代为自己夺得一席之地，赫里奥斯都会回应你的选择。这里的未来尚未完成，而每一次冒险，都可能成为新世界最初的传说。"
                ]
            },
            {
                id: "consensus",
                name: "世界共识",
                children: [
                    {
                        name: "你应该知道的五件事",
                        content: [
                            "你应该知道的五件事",
                            "1. 这是一个战力体系克制而谨慎的世界",
                            "蒂尔兰历 528 年，赫里奥斯并不是强者满地走的时代。",
                            "普通人仍然脆弱，军队仍然重要，王权、城墙、粮食、骑兵、法师、神术者和贵族政治仍然决定大多数国家的命运。",
                            "1-5 级的角色并不罕见，只要接受训练、经历战斗或拥有一定天赋，就有机会达到这个层次。但越往上，数量会迅速崩塌。",
                            "一般来说：",
                            "一千万个人类中，才可能出现一个 20 级角色。",
                            "而在蒂尔兰历 528 年，全世界拥有 CR30 战力的各种存在，加起来不超过 100 个。",
                            "这意味着，高端强者存在，但他们不是日常背景板。每一个真正顶级人物都足以被国家、教会、王室和史书认真记录。",
                            "2. 神明不可知，神术真实存在",
                            "赫里奥斯有宗教，也有神术。",
                            "圣武士可以行神圣之击，牧师可以施展奇迹，虔诚者确实更容易成为神术者。但这并不意味着神明会显现、会说话、会下达命令，或像某个高位存在一样管理信徒。",
                            "在赫里奥斯，神学只能被定义，不能被解释。",
                            "神是否存在，无法证实。神是否有意志，无法证实。神术的力量究竟来自神、信仰、誓言、灵魂，还是某种无法命名的东西，同样无法证实。",
                            "神术可以被看见，可以被使用，可以被传承。但它的源头不可测，不可还原，不可验证。",
                            "3. 赫里奥斯是一颗年轻而广阔的星球",
                            "赫里奥斯不是传统多元宇宙，也不是无数位面拼接出来的世界。",
                            "它首先是一颗星球。它的表面积按地球尺度计算，世界辽阔，表面积与地球大致相同，海洋占比68%，陆地占比32%。",
                            "蒂尔兰历 528 年的赫里奥斯仍然年轻，许多秩序还没有定型。王国正在扩张，边境仍在开拓，航路尚未完全固定，许多民族和国家还在寻找自己的位置。",
                            "这是一个朝气蓬勃的时代。个人、家族、教会、军队和王朝仍然能以强烈的方式改变历史。",
                            "4. 这个世界没有阵营",
                            "赫里奥斯不使用阵营。",
                            "没有“守序善良”“混乱邪恶”，也没有一种可以被法术直接读取的道德标签。",
                            "一个人可以虔诚而残忍。一个国家可以文明而暴虐。一个圣武士可以行奇迹，也可以犯下错误。一个异端可以被教会诅咒，却仍然拯救一座城市。",
                            "道德不是属性栏，而是行为、立场、利益、信仰和历史处境共同构成的结果。",
                            "因此，赫里奥斯的冲突不会简单归结为善恶阵营的对抗。更多时候，它是王权与王权、信仰与信仰、秩序与野心、理想与现实之间的碰撞。",

                            "没有独立于物质世界之外的天堂、地狱、深渊或九狱。世界只剩下物质位面。",
                            "但这不意味着天堂与地狱不存在。",
                            "在赫里奥斯，所谓天堂与地狱，都位于星球表面。它们不是遥远位面，而是这个世界本身的一部分。"
                        ]
                    },
                    {
                        name: "时代说明",
                        content: [
                            "时代说明",
                            "1. 这是一个年轻世界",
                            "在赫里奥斯的主流观点下，赫里奥斯的创造时间不超过 6000 年。",
                            "这并不只是神学说法，也影响了人们对历史、遗迹、文明和国家的理解：这个世界没有无穷无尽的上古纪元，没有层层叠叠的史前帝国，也没有遍地都是的远古魔法废墟。",

                            "不会有大量古代空中都市残骸、遍地都是的失落神兵、早已消亡却技术远超现代的远古人类文明。",

                            "换句话说，现在的法师，就是历史上最聪明、最渊博的法师；现在的铁匠，锻造着这个世界出现过的最锋利的剑。所以玩家不是在一个老世界里翻找过去，而是在一个新世界里撞上未来。"

                    },
                    "战力坐标",
                    "神学与神术",
                    "种族总览",
                    "年表总览"
                ]
            },
            {
                id: "countries",
                name: "国家",
                asset: "country",
                children: ["国家A", "国家B", "国家C", "国家D"]
            },
            {
                id: "people",
                name: "人物",
                asset: "person",
                children: ["统治者", "军事人物", "宗教人物", "学者/法师", "其他重要人物"]
            },
            {
                id: "organizations",
                name: "组织",
                children: ["政府机构", "军事组织", "宗教组织", "秘密组织", "学术/魔法组织"]
            },
            {
                id: "races",
                name: "种族",
                asset: "race",
                children: ["种族A", "种族B", "种族C"]
            },
            {
                id: "history",
                name: "历史",
                children: ["总年表", "重大事件", "战争", "王朝/政权更替"]
            },
            {
                id: "glossary",
                name: "术语表",
                children: ["政治术语", "军事术语", "宗教术语", "魔法术语", "地理术语"]
            }
        ];

        const state = {
            current: { nodeId: "home", name: "首页", path: "首页", type: "目录", asset: "optional", children: archive.map(section => section.name) }
        };

        const tree = document.getElementById("tree");
        const panelPath = document.getElementById("panel-path");
        const panelTitle = document.getElementById("panel-title");
        const panelType = document.getElementById("panel-type");
        const panelBody = document.getElementById("panel-body");
        const workspace = document.getElementById("workspace");
        const assetTitle = document.getElementById("asset-title");
        const assetSlot = document.getElementById("asset-slot");
        const assetLabel = document.getElementById("asset-label");
        const assetNote = document.getElementById("asset-note");

        function buildTree() {
            const homeButton = `<button class="tree-leaf active" data-node="home">首页</button>`;
            const sections = archive.map(section => {
                const children = section.children || [];
                if (!children.length) {
                    return `<button class="tree-leaf" data-node="${section.id}">${section.name}</button>`;
                }

                return `
                    <div class="tree-section">
                        <button class="tree-toggle" data-node="${section.id}">
                            <span>${section.name}</span>
                            <span class="toggle-mark">展开</span>
                        </button>
                        <div class="tree-children">
                            ${children.map(child => `
                                <button class="tree-leaf" data-node="${section.id}:${childName(child)}">${childName(child)}</button>
                            `).join("")}
                        </div>
                    </div>
                `;
            }).join("");

            tree.innerHTML = homeButton + sections;
            tree.addEventListener("click", event => {
                const button = event.target.closest("button[data-node]");
                if (!button) return;
                selectNode(button.dataset.node);
            });

            panelBody.addEventListener("click", event => {
                const card = event.target.closest(".section-card[data-target]");
                if (!card) return;
                selectNode(card.dataset.target);
            });
        }

        function selectNode(nodeId) {
            if (nodeId === "home") {
                state.current = { nodeId, name: "首页", path: "首页", type: "目录", asset: "optional", children: archive.map(section => section.name) };
            } else if (!nodeId.includes(":")) {
                const section = archive.find(item => item.id === nodeId);
                state.current = {
                    nodeId,
                    name: section.name,
                    path: `首页 / ${section.name}`,
                    type: section.type || "分类",
                    asset: section.asset || "optional",
                    children: section.children || [],
                    content: section.content || []
                };
            } else {
                const [sectionId, childLabel] = nodeId.split(":");
                const section = archive.find(item => item.id === sectionId);
                const child = (section.children || []).find(item => childName(item) === childLabel);
                state.current = {
                    nodeId,
                    name: childName(child),
                    path: `首页 / ${section.name} / ${childName(child)}`,
                    type: section.name,
                    asset: section.asset || "optional",
                    children: [],
                    content: child && typeof child === "object" ? child.content || [] : []
                };
            }

            document.querySelectorAll(".tree-leaf").forEach(button => {
                button.classList.toggle("active", button.dataset.node === nodeId);
            });
            document.querySelectorAll(".tree-toggle").forEach(button => {
                button.classList.toggle("active", button.dataset.node === nodeId);
            });
            renderPanel();
        }

        function renderPanel() {
            panelPath.textContent = state.current.path;
            panelTitle.textContent = state.current.name;
            panelType.textContent = state.current.type;
            panelType.className = `type-pill ${assetClass(state.current.asset)}`;
            workspace.classList.toggle("country-layout", state.current.asset === "country");

            if (state.current.content && state.current.content.length) {
                panelBody.innerHTML = `
                    <div class="intro-copy">
                        ${state.current.content.map(renderContentParagraph).join("")}
                    </div>
                `;
            } else if (state.current.children.length) {
                panelBody.innerHTML = `
                    <div class="section-grid">
                        ${state.current.children.map(name => `
                            <button class="section-card" data-target="${targetForChild(name)}">
                                <div class="section-name">${childName(name)}</div>
                                <div class="section-meta">未填充</div>
                            </button>
                        `).join("")}
                    </div>
                `;
            } else {
                panelBody.innerHTML = `<div class="empty-editor" aria-label="${state.current.name}内容区"></div>`;
            }

            renderAssetSlot(state.current.asset);
        }

        function targetForChild(name) {
            if (state.current.nodeId === "home") {
                const section = archive.find(item => item.name === childName(name));
                return section ? section.id : "home";
            }

            return `${state.current.nodeId}:${childName(name)}`;
        }

        function childName(child) {
            return typeof child === "object" ? child.name : child;
        }

        function renderContentParagraph(paragraph, index) {
            const className = index > 0 && /^\d+\.\s/.test(paragraph) ? ' class="fact-heading"' : "";
            return `<p${className}>${escapeHTML(paragraph)}</p>`;
        }

        function escapeHTML(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            }[char]));
        }

        function renderAssetSlot(assetType) {
            assetSlot.className = `asset-slot ${assetClass(assetType)}`;

            if (assetType === "country") {
                assetTitle.textContent = "地理图";
                assetLabel.textContent = "国家地理图";
                assetNote.textContent = "留空";
                return;
            }

            if (assetType === "person" || assetType === "race") {
                assetTitle.textContent = "头像";
                assetLabel.textContent = assetType === "person" ? "人物头像" : "种族头像";
                assetNote.textContent = "留空";
                return;
            }

            assetTitle.textContent = "可选图片";
            assetLabel.textContent = "图片位";
            assetNote.textContent = "留空";
        }

        function assetClass(assetType) {
            if (assetType === "country") return "map country";
            if (assetType === "person") return "avatar person";
            if (assetType === "race") return "avatar race";
            return "optional";
        }

        function preserveUidLinks() {
            const params = new URLSearchParams(location.search);
            const uid = params.get("uid");
            if (!uid) return;

            document.getElementById("back-link").href = `index.html?uid=${encodeURIComponent(uid)}`;
        }

        buildTree();
        preserveUidLinks();
        renderPanel();
    </script>
</body>
</html>
