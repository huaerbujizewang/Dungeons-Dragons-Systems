<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赫里奥斯</title>
    <style>
        :root {
            --bg: #f4f1ea;
            --paper: #fffdf8;
            --paper-soft: #f8f5ed;
            --ink: #1f2933;
            --muted: #68717d;
            --line: #ded6c8;
            --line-strong: #bfae96;
            --gold: #a36f2c;
            --wine: #733a3a;
            --teal: #2f6f67;
            --shadow: 0 16px 40px rgba(31, 41, 51, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            min-height: 100vh;
            background:
                linear-gradient(120deg, rgba(115, 58, 58, 0.08), transparent 34%),
                linear-gradient(300deg, rgba(47, 111, 103, 0.1), transparent 38%),
                var(--bg);
            color: var(--ink);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        a {
            color: inherit;
        }

        .page-shell {
            width: min(1440px, calc(100% - 48px));
            height: calc(100vh - 48px);
            min-height: 0;
            margin: 24px auto;
            display: grid;
            grid-template-columns: 304px minmax(0, 1fr);
            border: 1px solid var(--line);
            background: rgba(255, 253, 248, 0.82);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .sidebar {
            border-right: 1px solid var(--line);
            background: rgba(248, 245, 237, 0.92);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .brand {
            padding: 24px;
            border-bottom: 1px solid var(--line);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 22px;
            color: var(--muted);
            font-size: 13px;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--wine);
        }

        .brand-title {
            margin: 0;
            font-size: 30px;
            line-height: 1.1;
            letter-spacing: 0;
        }

        .brand-subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .tree {
            flex: 1 1 auto;
            min-height: 0;
            padding: 18px 14px 28px;
            overflow-y: auto;
        }

        .tree-section {
            margin-bottom: 8px;
        }

        .tree-toggle,
        .tree-leaf {
            width: 100%;
            min-height: 38px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--ink);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 9px 10px;
            font: inherit;
            text-align: left;
            letter-spacing: 0;
        }

        .tree-toggle {
            font-weight: 800;
        }

        .tree-leaf {
            color: #394553;
            font-size: 14px;
        }

        .tree-toggle:hover,
        .tree-leaf:hover {
            background: rgba(163, 111, 44, 0.09);
        }

        .tree-toggle.active {
            background: rgba(115, 58, 58, 0.1);
            color: var(--wine);
        }

        .tree-leaf.active {
            background: #232b35;
            color: #fff;
        }

        .tree-children {
            margin: 2px 0 10px 14px;
            padding-left: 10px;
            border-left: 1px solid var(--line);
        }

        .tree-section.collapsed > .tree-children {
            display: none;
        }

        .tree-children .tree-toggle {
            min-height: 32px;
            padding: 7px 8px;
            color: #4b5563;
            font-size: 13px;
            font-weight: 700;
        }

        .tree-children .tree-leaf {
            min-height: 32px;
            padding: 7px 8px;
            font-size: 13px;
        }

        .toggle-mark {
            flex: 0 0 auto;
            color: var(--gold);
            font-size: 12px;
        }

        .content {
            min-width: 0;
            min-height: 0;
            display: grid;
            grid-template-rows: auto 1fr;
            overflow-y: auto;
        }

        .content-top {
            padding: 28px 34px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: flex-start;
            background: rgba(255, 253, 248, 0.72);
        }

        .kicker {
            color: var(--gold);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .page-title {
            margin: 8px 0 0;
            font-size: clamp(28px, 4vw, 46px);
            line-height: 1.1;
            letter-spacing: 0;
        }

        .workspace {
            padding: 34px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 24px;
            align-items: start;
        }

        .workspace.country-layout {
            grid-template-columns: 1fr;
        }

        .workspace.country-layout .asset-panel {
            position: static;
            order: -1;
        }

        .workspace.home-layout {
            grid-template-columns: 1fr;
        }

        .workspace.home-layout .asset-panel {
            display: none;
        }

        .workspace.person-layout {
            grid-template-columns: minmax(0, 1fr) minmax(300px, 380px);
        }

        .workspace.no-asset-layout {
            grid-template-columns: 1fr;
        }

        .workspace.no-asset-layout .asset-panel {
            display: none;
        }

        .main-panel,
        .asset-panel {
            border: 1px solid var(--line);
            background: var(--paper);
        }

        .main-panel {
            min-height: 620px;
        }

        .panel-header {
            padding: 22px 24px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .panel-eyebrow {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.1em;
        }

        .panel-title {
            margin: 6px 0 0;
            font-size: 28px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .type-pill {
            flex: 0 0 auto;
            border-radius: 999px;
            padding: 7px 12px;
            color: #fff;
            background: var(--teal);
            font-size: 12px;
            font-weight: 800;
        }

        .type-pill.country {
            background: var(--wine);
        }

        .type-pill.person,
        .type-pill.race {
            background: var(--teal);
        }

        .panel-body {
            padding: 24px;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .home-cover {
            width: min(640px, 100%);
            margin: 0 auto 28px;
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: #0f1419;
        }

        .home-cover img {
            width: 100%;
            display: block;
        }

        .section-card {
            width: 100%;
            min-height: 116px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper-soft);
            color: inherit;
            cursor: pointer;
            font: inherit;
            padding: 16px;
            text-align: left;
            transition: border-color 0.16s ease, transform 0.16s ease, background 0.16s ease;
        }

        .section-card:hover {
            border-color: var(--line-strong);
            background: #fffaf0;
            transform: translateY(-1px);
        }

        .section-name {
            font-weight: 900;
            font-size: 17px;
        }

        .section-meta {
            margin-top: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .empty-editor {
            min-height: 368px;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            background:
                linear-gradient(transparent 31px, rgba(222, 214, 200, 0.46) 32px),
            var(--paper-soft);
            background-size: 100% 32px;
        }

        .intro-copy {
            max-width: 820px;
            color: #2f3844;
            font-size: 17px;
            line-height: 2;
        }

        .intro-copy p {
            margin: 0 0 20px;
        }

        .intro-copy p:first-child {
            color: var(--wine);
            font-size: 20px;
            font-weight: 900;
        }

        .intro-copy .fact-heading {
            margin-top: 30px;
            color: var(--ink);
            font-size: 19px;
            font-weight: 900;
            line-height: 1.6;
        }

        .intro-copy .section-heading {
            margin: 42px 0 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--line);
            color: var(--wine);
            font-size: 24px;
            font-weight: 900;
            line-height: 1.35;
        }

        .intro-copy .sub-heading {
            margin: 30px 0 12px;
            color: var(--ink);
            font-size: 20px;
            font-weight: 900;
            line-height: 1.45;
        }

        .intro-copy .minor-heading {
            margin: 22px 0 10px;
            color: #4a5563;
            font-size: 17px;
            font-weight: 900;
            line-height: 1.45;
        }

        .content-table-wrap {
            max-width: 100%;
            margin: 12px 0 26px;
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper-soft);
        }

        .content-table {
            width: 100%;
            min-width: 620px;
            border-collapse: collapse;
            font-size: 14px;
            line-height: 1.6;
        }

        .content-table th,
        .content-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        .content-table th {
            color: var(--wine);
            background: rgba(163, 111, 44, 0.08);
            font-weight: 900;
        }

        .content-table tr:last-child td {
            border-bottom: 0;
        }

        .stat-block-container {
            margin-top: 28px;
            border: 1px solid #c9a46a;
            border-radius: 8px;
            background: #fbf1dc;
            color: #58180d;
            font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
            padding: 22px;
            box-shadow: inset 0 0 0 1px rgba(130, 32, 0, 0.08);
        }

        .stat-header h2 {
            margin: 0;
            color: #822000;
            font-size: 30px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .stat-header i {
            display: block;
            margin-top: 6px;
            color: #333;
            font-size: 14px;
        }

        .tapered-rule {
            height: 2px;
            margin: 12px 0;
            border: 0;
            background: linear-gradient(to right, transparent, #822000, transparent);
        }

        .red-rule {
            height: 2px;
            margin: 10px 0;
            border: 0;
            background: #822000;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(64px, 1fr));
            gap: 8px;
            margin: 16px 0;
            color: #822000;
            text-align: center;
        }

        .stat-box {
            min-width: 0;
            border: 1px solid rgba(130, 32, 0, 0.18);
            border-radius: 6px;
            background: rgba(255, 253, 248, 0.58);
            padding: 8px 6px;
        }

        .stat-box strong {
            display: block;
            font-size: 12px;
        }

        .stat-box span {
            display: block;
            margin-top: 4px;
            font-size: 15px;
            font-weight: 700;
        }

        .property-line {
            margin: 6px 0;
            color: #822000;
            line-height: 1.65;
        }

        .property-line strong {
            color: #58180d;
        }

        .trait-section {
            margin-top: 14px;
            color: #2f2a25;
            line-height: 1.7;
        }

        .trait-name {
            color: #1f1b18;
            font-style: italic;
            font-weight: 900;
        }

        .action-header {
            margin: 24px 0 8px;
            border-bottom: 1px solid #822000;
            color: #822000;
            font-size: 22px;
            font-variant: small-caps;
            font-weight: 900;
            line-height: 1.35;
        }

        .asset-panel {
            position: sticky;
            top: 24px;
        }

        .asset-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--line);
        }

        .asset-title {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0;
        }

        .asset-slot {
            margin: 20px;
            min-height: 260px;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: var(--muted);
            background: var(--paper-soft);
            text-align: center;
            padding: 18px;
        }

        .asset-slot.avatar {
            min-height: 220px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            margin-inline: auto;
            width: min(220px, calc(100% - 40px));
        }

        .asset-slot.map {
            min-height: 0;
            aspect-ratio: 16 / 7;
            width: calc(100% - 40px);
        }

        .asset-slot.portrait {
            min-height: 0;
            aspect-ratio: 2 / 3;
            width: calc(100% - 40px);
        }

        .asset-slot.has-image {
            border-style: solid;
            padding: 0;
            overflow: hidden;
            background: #0f1419;
        }

        .asset-slot img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .asset-slot.map img {
            object-fit: contain;
        }

        .asset-slot.multi-map {
            display: block;
            aspect-ratio: auto;
            padding: 14px;
            text-align: left;
        }

        .asset-map-item + .asset-map-item {
            margin-top: 16px;
        }

        .asset-map-label {
            margin-bottom: 8px;
            color: var(--wine);
            font-size: 13px;
            font-weight: 900;
        }

        .asset-map-frame {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #0f1419;
        }

        .asset-map-frame img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .asset-slot.portrait img {
            object-fit: cover;
            object-position: center top;
        }

        .asset-label {
            font-weight: 900;
            color: #344050;
        }

        .asset-note {
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.6;
        }

        @media (max-width: 980px) {
            body {
                height: auto;
                overflow: auto;
            }

            .page-shell {
                width: 100%;
                height: auto;
                min-height: 100vh;
                margin: 0;
                grid-template-columns: 1fr;
                overflow: visible;
            }

            .sidebar {
                min-height: 0;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .tree {
                max-height: 340px;
            }

            .content {
                overflow: visible;
            }

            .workspace,
            .workspace.country-layout,
            .workspace.person-layout {
                grid-template-columns: 1fr;
                padding: 22px;
            }

            .asset-panel {
                position: static;
            }
        }

        @media (max-width: 640px) {
            .content-top,
            .panel-header {
                align-items: stretch;
                flex-direction: column;
            }

            .content-top,
            .workspace {
                padding-inline: 16px;
            }

            .brand {
                padding-inline: 16px;
            }

            .asset-slot.map {
                aspect-ratio: 4 / 3;
            }

            .stat-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <aside class="sidebar">
            <div class="brand">
                <a id="back-link" class="back-link" href="index.html">← 返回主界面</a>
                <h1 class="brand-title">赫里奥斯</h1>
                <p class="brand-subtitle">世界档案目录</p>
            </div>
            <nav class="tree" id="tree" aria-label="赫里奥斯目录"></nav>
        </aside>

        <main class="content">
            <header class="content-top">
                <div>
                    <div class="kicker">Helios Archive</div>
                    <h2 class="page-title">赫里奥斯</h2>
                </div>
            </header>

            <section class="workspace" id="workspace">
                <article class="main-panel">
                    <header class="panel-header">
                        <div>
                            <div class="panel-eyebrow" id="panel-path">首页</div>
                            <h3 class="panel-title" id="panel-title">首页</h3>
                        </div>
                        <span class="type-pill" id="panel-type">目录</span>
                    </header>
                    <div class="panel-body" id="panel-body"></div>
                </article>

                <aside class="asset-panel">
                    <header class="asset-header">
                        <h3 class="asset-title" id="asset-title">可选图片</h3>
                    </header>
                    <div class="asset-slot" id="asset-slot">
                        <div>
                            <div class="asset-label" id="asset-label">图片位</div>
                            <div class="asset-note" id="asset-note">留空</div>
                        </div>
                    </div>
                </aside>
            </section>
        </main>
    </div>

    <script>
        const religionOverviewContent = [
            "基本前提",
            "赫里奥斯的宗教并不建立在“神明现身说法”之上。神术真实存在，但神明不可知；宗教可以定义神，却不能解释神。",
            "因此，不同文明对神、世界、灵魂、秩序和死亡形成了各自的解释体系。它们既是信仰，也是法律、身份、共同体和国家合法性的来源。",
            { type: "heading", level: 2, text: "奥斯坎大陆宗教" },
            { type: "heading", level: 3, text: "1. 纳希德教" },
            "类型：一神教",
            "主神：拉赫曼",
            "主要分布：奥斯坎大陆南部、西南部及苔原商路地区",
            "纳希德教是一种严格的一神教，主张世间只有唯一至高的神——拉赫曼。",
            "拉赫曼不可见、不可像、不可被凡人完全理解。信徒认为，世界由拉赫曼创造，人的一生是对信仰、纪律、仁慈与服从的考验。",
            "纳希德教禁止偶像崇拜，重视祈祷、斋戒、施舍、巡礼和经文学习。它在苔原、冻土、商路城市和边境公国中影响很深，尤其适合形成跨部族、跨城邦的共同体认同。",
            "纳希德教的神术者通常被视为经文、律法与虔信的守护者。他们不声称自己见过拉赫曼，只认为神术是拉赫曼允许凡人见证的迹象。",
            { type: "heading", level: 3, text: "2. 普罗维登斯教" },
            "类型：一神教",
            "主神：普罗维登斯",
            "主要分布：普罗维登斯集团及其影响区",
            "普罗维登斯教信奉唯一神普罗维登斯，其名意为“天意、预备、眷顾”。",
            "该教认为世界并非混乱展开，而是存在一个不可完全理解的神圣秩序。凡人无法窥见全貌，却可以通过纪律、劳动、契约、家庭、国家和教会生活参与其中。",
            "它强调守约、克制、责任、命运感和社会秩序，常与城市、商会、军队和官僚体系结合。",
            "普罗维登斯集团将该教视为自身政治合法性的根基。国家并不宣称直接代表神，而是宣称自己在维护一种更高、更稳定的秩序。",
            { type: "heading", level: 3, text: "3. 哥伦比娅信仰" },
            "类型：一神教",
            "主神：哥伦比娅",
            "主要分布：黄金王国",
            "黄金王国信奉唯一神哥伦比娅。",
            "在黄金王国传统中，哥伦比娅既是创造者，也是黄金、光、王权、民族命运与神圣美的象征。",
            "哥伦比娅接近一种被国家、族群与神学共同定义的至高神圣原则。黄金王国认为自身民族与哥伦比娅有特殊关系，因此哥伦比娅信仰天然带有强烈的国家性和族群性。",
            "哥伦比娅教强调纯净、辉光、誓约、王权、牺牲和黄金秩序。它不是外向传教型宗教，而更像黄金王国自我理解的核心。",
            { type: "heading", level: 3, text: "4. 威斯特丽亚教" },
            "类型：一神教",
            "主神：维斯特拉",
            "主要分布：威斯特丽亚集团",
            "威斯特丽亚教信奉唯一神维斯特拉。",
            "维斯特拉被定义为星辰、法律、誓言、寒光与不动秩序之神。该教认为世界之所以没有坠入混沌，是因为存在一条不可见的神圣法则，维斯特拉便是这条法则的源头。",
            "威斯特丽亚教重视誓言、审判、家族、骑士义务与文书法。它的神职者常常兼任裁判、书记官、誓约见证人和贵族教育者。",
            { type: "heading", level: 3, text: "5. 奥斯坎诸神教" },
            "类型：多神教",
            "主要分布：奥斯坎大陆中部、北部、大量公国、城邦与乡村地区",
            "奥斯坎大陆大量公国、自由城邦和乡村共同体信奉一般多神教。",
            "这些神并不组成一个严密统一的体系，不同地区会有不同称呼、不同神庙和不同传说，但大体可以归为六位主神。",
            "奥斯坎六神",

# 语言、日历与货币

## 语言

赫里奥斯没有“精灵语”“矮人语”这类按种族直接划分的通用语言。语言主要随地区、国家、政权传统和书写系统传播。精灵、矮人、人类、魔物或其他族群可能使用同一种国家语言，也可能因迁徙、教育和政治归属而掌握多种语言。

稀有语言仍然存在，但数量有限，通常与特定超自然群体、结社或存在领域相关。

## 常见语言简表

| 语言 | 简要说明 |
| --- | --- |
| 蒂尔兰语 | 奥斯坎中西部重要通用语，使用23个字母，常见于蒂尔兰系国家、军队、公文和商贸。 |
| 奥斯特克语 | 奥斯特克旧地语言，语音较硬，保留大量边境、矿业和军镇词汇。 |
| 哥伦比亚语 | 黄金王国与哥伦比亚人的语言，书写优雅，常用于宫廷、服饰、艺术、法庭和剑咏术式。 |
| 卡法罗语 | 奥斯坎西南部主要语言，常见于草原、共和国、农牧区和旧加拉提亚斯影响区。 |
| 加拉提亚斯语 | 已失落语言，只见于铭文、残卷、古碑和少量学术复原文本。 |
| 格伦瑟语 | 北部虫灾区常用语言，重视军令、地形、警戒和边防词汇。 |
| 桑格丽亚语 | 北方异种政权语言之一，语音低沉，保留大量非人族群称谓。 |
| 安塔拉语 | 普罗维登斯帝国集团通行语言，行政、宗教、法律和外交中使用广泛。 |

| 乌瑞克语 | 乌瑞克及相关地区语言，受深渊语影响明显，常见于边境、雇佣兵和特殊族群社区。 |

| 齐语 | 盘古大陆大齐体系语言，使用方块字，礼制、官文、史书和诗文体系发达。 |
| 桐花语 | 桐花地区语言，受齐语影响很深，保留本地音韵和祭仪词汇。 |
| 拓跋语 | 盘古北方草原语言之一，常见于拓跋斯都护府、骑兵、边贸和部族誓约。 |
| 安东胡语 | 安东都护府及周边游牧地区语言，常用于草场、马群、军镇和边境集市。 |
| 塔尔语 | 塔尔帐语言，重视血缘、帐幕、迁徙路线和战利品分配。 |
| 阿尔泰利亚语 | 阿尔泰利亚帐语言，适合长篇口传史诗和部族谱系记录。 |
| 库里尔泰语 | 库里尔泰帐语言，乾王朝入关后曾对中原政治词汇产生影响。 |
| 维兰提亚语 | 维兰提亚帝国语言，常用于拜火教仪式、帝国法令、军政文书和高原商路。 |
| 卡尔塔语 | 卡尔塔王国主要语言，常见于东部边境、山地城镇和地方王权文书。 |
| 诺泽里亚语 | 环曦大陆主要语言，诺泽里亚、巴里达和苍骨执政府都使用此语。 |

# 提尔斯王国

## 概述

提尔斯王国位于奥斯坎北方高纬度地区，领土面积约 2,098,255 平方公里，人口约 4,700万。它是一个由提夫林贵族主导的古老王国，政治体制为封建君主制，现任统治者为焦冠王阿兹兰三世。

提尔斯的国家核心由火焰、地狱血脉、誓约贵族和边境骑士构成。王室自称继承“余烬王冠”，强调家族血统、火誓契约、封臣义务和王族威严。提夫林贵族在王国中占据主导地位，人类承担农业、手工业与部分城镇行政，豺狼人则多见于边境军、猎团、巡税队和强制征收体系。

提尔斯长期与北方的桑格丽亚大公国交战。双方战争持续多年，边境不断流血，却始终无法彻底吞并对方。

## 地理

提尔斯位于高纬度地区，气候寒冷，冬季漫长。王国境内分布着寒冷高原、针叶林、山脉、火山地带、冻土草场和边境峡谷。

北方与桑格丽亚接壤，是长期战争最激烈的方向。这里分布着山口、堡垒、烽火塔、边境骑士领和血族夜袭路线。许多城镇都修有高墙、火塔和地下避难室。

南部邻近格伦瑟虫灾区。奇怪的是，格伦虫族从不主动进攻提尔斯。这个事实在北方诸国中极其有名，也引发了大量阴谋论。

提尔斯寒冷而不贫弱。火焰魔法在这里极其发达，民用范围很广。城市供暖、矿井照明、冬季道路融冰、炉窑、锻造、温室、粮仓防冻和军用火塔都依赖成熟的火焰术式。

## 首府：炎狱都

炎狱都是提尔斯王国首府，也是王室、誓约贵族、火焰教团和边境军政体系的中心。

这座城市建在一片古老火山岩台地上，地下热源丰富，城市中心有被称为“余烬王座”的王宫。炎狱都全年寒冷，但城内主要街道、贵族区、军营和市场都有火焰法阵供暖。

炎狱都给外来者的印象通常很强烈：黑色火山石建筑、红铜屋顶、常燃火盆、严苛卫兵、提夫林贵族车队和随处可见的誓约符文。

## 政治

提尔斯由焦冠王阿兹兰三世统治。阿兹兰三世性格强硬，长期把桑格丽亚视为王国宿敌。他的统治风格强调边境防御、贵族服从、火誓契约和王室威严。

王国政治由提夫林贵族主导。主要贵族家族通常拥有封地、骑士、火誓契约、私人军队和边境义务。贵族之间会通过誓约、婚姻、抵押人质和王室仲裁维持秩序。

提尔斯王权依赖以下基础：

* 余烬王冠法统；
* 提夫林贵族血统；
* 火誓契约；
* 边境战争动员；
* 王室火焰法师；
* 豺狼人猎团；
* 与洛萨维亚家的亲缘关系。

人类在王国中数量不少，承担农业、手工业、商贸和城镇行政。部分人类家族也能通过军功、官职或王室特许获得地位。豺狼人则常被安排在更粗粝的边境工作中，包括追逃、征税、猎杀、巡逻和前线消耗战。

## 火誓贵族

火誓贵族是提尔斯政治和军事传统的核心。

贵族在继承封地、接受王令、组织军队、缔结婚约或承担边境义务时，常要在火焰前宣誓。火誓具有宗教、法律和魔法意义。违反火誓会带来贵族名誉损毁、王室惩罚、契约反噬，严重者会被剥夺封地。

火誓常用于：

* 封臣效忠；
* 婚姻盟约；
* 边境军役；
* 贡税承诺；
* 贵族决斗；
* 战俘交换；
* 其他义务。

提尔斯贵族文化很重视血统与誓言。一个贵族可以残酷，可以傲慢，可以贪婪，但公开背誓会让整个家族被排除出王国政治核心。

## 种族结构

提尔斯主要由提夫林、人类和豺狼人构成。

| 群体 | 地位与职能 |
| ---- | ---- |
| 提夫林 | 王族与高等贵族主体，掌握王权、封地、火焰法术、边境骑士体系。 |
| 人类 | 农业、手工业、城镇行政、商贸、部分军官与地方官僚。 |
| 豺狼人 | 边境军、猎团、巡税队、追逃队、前线突击与粗暴征收武装。 |

提夫林贵族强调地狱血脉与火焰适应能力，将其视为统治合法性的一部分。人类则构成王国日常运转的稳定基础。豺狼人地位较粗粝，常被畏惧，也常被王室和贵族用来执行不体面的任务。

## 与桑格丽亚的战争

桑格丽亚大公国位于提尔斯北方。两国战争持续多年，已经成为提尔斯国家生活的一部分。

这场战争很少出现决定性胜负。提尔斯难以彻底消灭桑格丽亚的夜袭与渗透网络，桑格丽亚也很难突破提尔斯的火塔、誓约军团和边境堡垒体系。双方不断消耗，仇恨逐代延续。

## 军事

提尔斯军队以火焰魔法、边境骑士、誓约军团和豺狼人猎团为核心。

提尔斯军队擅长在寒冷地区作战。火焰法师可以提供供暖、照明、攻城火力和反夜袭支援。边境骑士适合山口、防线和短距离冲锋。豺狼人猎团则负责追踪、侦察、搜捕和打渗透者。

## 火焰魔法与民用技术

火焰魔法在提尔斯非常普及。它既是贵族权力象征，也是普通社会维持生活的重要技术。

常见民用用途包括：

* 城市供暖；
* 冬季道路融冰；
* 炉窑与锻造；
* 温室农业；
* 粮仓防冻；
* 矿井照明；
* 水源解冻；
* 边境烽火；
* 医疗消毒；
* 船只与车队取暖。

提尔斯火焰法师拥有较高社会地位。许多法师受王室或贵族供养，同时服务于军队、工坊、矿区和城市管理。普通人未必能掌握高阶法术，但低阶火焰器具在城镇中很常见。

## 南部虫灾阴谋论

提尔斯南部邻近格伦瑟虫灾区，但虫族几乎从不主动进攻提尔斯。这个现象在北部诸国中非常反常。

常见阴谋论包括：

* 提尔斯王室与虫族签订了古老契约；
* 南部边境存在火焰结界；
* 虫族畏惧提尔斯地狱血脉；
* 提尔斯用秘密贡品换取安全；
* 提尔斯王族掌握某种驱虫术；
* 提尔斯本身与虫族存在更深关系；
* 有人甚至声称“提尔斯也是虫子”。

这些说法缺乏公开证据。提尔斯王室通常拒绝讨论此事，只会强调南部边境安全来自王国火焰、军队和王冠庇护。外国学者和情报人员对此并不完全相信。

## 经济

提尔斯经济受寒冷气候影响明显，但火焰魔法提高了王国承载能力。

主要产业包括：

* 寒地农业；
* 温室作物；
* 牧业；
* 矿业；
* 火焰法器；
* 军械锻造；
* 皮毛贸易；
* 边境军需；
* 符文铁器；
* 豺狼人猎团雇佣服务。

提尔斯拥有较强的锻造与火焰工坊传统。王国出产的火炉、战斧、重甲、耐寒器具和军用火油在北方地区很受欢迎。

与桑格丽亚的长期战争消耗大量财政，但提尔斯南部免受虫族侵袭，使王国保留了稳定后方。

## 宗教与仪式

提尔斯信仰体系围绕火焰、誓约、王权、地狱血脉和家族亡灵展开。王室仪式常在火盆、熔炉、火山岩祭坛或余烬王座前举行。

重要仪式包括：

* 王冠加冕；
* 火誓封臣；
* 贵族婚约；
* 边境出征；
* 决斗见证；
* 叛誓审判；
* 阵亡骑士焚葬；
* 冬季大火节。

火焰在提尔斯具有法律、宗教和政治象征。誓言在火前说出，判决在火前宣读，王冠也在火焰中被重新祝圣。

## 与洛萨维亚家的关系

提尔斯王族与洛萨维亚家有直接亲缘关系。这也是提尔斯使用蒂尔兰语的重要原因之一。

这种亲缘关系让提尔斯与蒂尔兰旧王国保持特殊联系。提尔斯宫廷熟悉蒂尔兰礼仪、王室称号、贵族书信格式和军事术语。许多提尔斯贵族也会把自己视作更广泛的蒂尔兰王室亲族秩序的一部分。

继承人战争期间，提尔斯对东西蒂尔兰的态度会影响北方外交。阿兹兰三世公开立场谨慎，但提尔斯王室与洛萨维亚家的血缘关系，使任何一方都无法完全忽视炎狱都的态度。

## 永夜

桑格丽亚的永夜覆盖全国。

它的基础来自高纬度极夜，并经过血族魔法强化和稳定化。天空中仍有月光，雪原、冰壁、城堡尖塔和冻港海面会反射苍白光辉。对外来者而言，这片土地像长期停留在寒冷夜晚之中；对血族而言，这里是天然国土。

永夜边界并非完全固定。提尔斯与桑格丽亚的长期战争，很大一部分围绕永夜边界展开。提尔斯会用火焰法阵、边境火塔和誓约仪式试图压制永夜南扩；桑格丽亚则用血族仪式、月光法阵和贵族军队推动夜幕向南压迫。

## 地理

桑格丽亚全境寒冷，外界常年约零下三十四度。冰雪覆盖大部分土地，雪原、冰河、冻土山地和古老血族城堡构成主要景观。

北方是冰海。桑格丽亚拥有冻港，港口一年中大部分时间被冰雪包围，需要血族法师、雪怪劳工、寒地船只和冰道向导维持通行。冻港是少数连接外界的通道，用于贵重物品交换、特殊材料运输、秘密使节往来和白龙贡品调度。

南方与提尔斯接壤。这里分布着山口、火塔、永夜边界、边境猎场和血族前线城堡。双方战争反复拉锯，许多山谷会在不同年份被火光或永夜覆盖。

## 首府：渊血堡

渊血堡是桑格丽亚大公国首府，也是夜之大公薇利安的统治中心。

这座城堡建立在深红冰崖与地下裂谷之上。城堡上层是大公宫廷、贵族议会、月光礼拜厅、血税档案馆和决斗厅；下层则连接血库、家族囚室、采血廊、冷眠仓、旧王墓与地下港道。

渊血堡的秩序极其严密。礼仪、血统、称谓、采血权、座次、决斗资格和猎场权限都有成熟规则。

## 政治

桑格丽亚实行寡头贵族制。薇利安是夜之大公，也是血族第一贵族。她权威稳定，冷静、残酷、极重秩序，但仍需平衡几大血族家族。

桑格丽亚政治不是以平民治理为核心，而是以血族家族之间的权利分配为核心。土地、猎场、人类圈养机构、采血份额、城堡军队、雪怪部族和白龙贡约都属于贵族政治的一部分。

## 血族大贵族

桑格丽亚有数个历史悠久的血族大贵族家族。它们共同支撑寡头秩序，也共同限制大公权力。

| 家族 | 主要权力 |
| ---- | ---- |
| 渊血家 | 大公本家，掌握渊血堡、永夜仪式核心和最高仲裁权。 |
| 银棺家 | 掌握家族法庭、贵族继承、冷眠密库和古老契约。 |
| 霜吻家 | 控制北部冰海冻港、雪原庄园和白龙贡线。 |
| 黑翼家 | 擅长夜袭、侦察、蝙蝠群、空中信使和边境渗透。 |
| 红庭家 | 掌握大量人类圈养机构、血税账册和宫廷供血体系。 |
| 苍月家 | 管理月光礼仪、永夜边界仪式和血族宗教事务。 |

这些家族彼此竞争，也共同维护血族贵族制，不同家族对人类的管理方式差异很大。

## 人类与圈养机构

桑格丽亚的人类通常不被列入正式人口。血族登记人口约173万，这个数字用于计算贵族席位、军役资格、采血权分配和家族法权。人类则更多被登记为血税资源、食材、庄园财产或家族附属品。

人类圈养机构由各血族家族各自经营。不同家族会使用不同名称，而名称本身往往说明它们如何看待人类。

| 名称 | 含义 |
| ---- | ---- |
| 庇护园 | 表面强调保护与供养，通常用于较重视长期血源管理的家族。 |
| 保民庄园 | 用家族恩典包装圈养制度，常见于讲究礼仪的贵族领。 |
| 血粮院 | 直接承认人类作为血源与食材的属性。 |
| 红栏 | 强调分类、编号、配给和消耗，常见于更残酷的领地。 |
| 温室区 | 重视人类繁殖、健康管理和稳定产出。 |
| 采血廊 | 主要为贵族提供定期采血服务。 |
| 肉籍村 | 把村庄整体登记为可消耗人口单位。 |
| 夜供所 | 为宴会、节庆、刑罚和特殊仪式提供活体。 |

稍有道德感的家族会提供教育、配偶安排、职业训练、医疗和基本生活秩序。这类家族数量很少，目的也多半是维护长期血源质量。更多家族只维持最低生存条件，因为在桑格丽亚法律中，人类仍属于可合法处置对象。

大部分情况下，血族贵族可以直接杀死人类。家族法会约束浪费、越权、偷取他族财产、破坏采血秩序和影响长期产出。人类生命本身并非最高法律价值，真正受保护的是贵族权利、家族财产和血税秩序。

## 家族法

桑格丽亚的最高实际秩序是家族法。

王国层面的法令存在，大公命令也存在，但血族贵族日常治理主要依靠各家族自己的成文规则、古老契约和继承惯例。

薇利安的权力很大，尤其在战争、永夜仪式和贵族仲裁中。但她的统治必须承认家族法的高位。若大公无视大贵族家族法，寡头秩序会立刻动摇。

## 人类处境

桑格丽亚人类的核心处境可以概括为：被保护是为了被使用。

在零下三十四度的永夜雪原中，脱离血族设施的人类很难长期生存。圈养机构提供热源、食物、屋舍和基本秩序，也同时剥夺迁徙、婚姻、生育、身体和生命处置权。

理论上，桑格丽亚境内可能存在未被发现的自由人类聚落。冻土、冰洞、废矿、边境森林和旧堡遗址都可能藏人。现实中，很少有人能证明这些聚落长期存在。多数逃亡者会死于寒冷、饥饿、雪怪、血族猎手或边境巡逻。

提尔斯会接收逃亡人类。被接收者常被用于宣传桑格丽亚暴行，也可能被编入边境劳役、情报网络或反血族宣传体系。

## 军事

桑格丽亚军队以血族贵族、血族骑士、夜袭部队、雪怪、白龙和寒地魔物为核心。人类通常不作为主要兵源，因为桑格丽亚并不缺适应永夜与极寒的战斗个体。

## 与提尔斯的战争

桑格丽亚与提尔斯的战争围绕永夜边界、山口堡垒、血族猎场和提夫林边境城镇展开。

双方都具备成熟边境战争体系。桑格丽亚很难彻底吞掉提尔斯，提尔斯也难以攻入永夜深处。战争持续多年，边境变成火光与月光反复争夺的地带。

## 经济

桑格丽亚基本自给自足。极寒环境限制传统农业，但血族需求结构与人类国家不同。贵族庄园、圈养机构、血税体系、雪怪劳力、冻港、矿产和寒地魔法共同支撑国家运转。

主要资源包括：

* 血税；
* 人类圈养机构；
* 冰海冻港；
* 皮毛；
* 寒地矿石；
* 冰晶；
* 血术药剂；
* 贵族工艺品；
* 白龙相关贡品；
* 雪怪劳力；
* 法器。

桑格丽亚一般不进行常规贸易。外界厌恶并恐惧这个国家，桑格丽亚也很少需要普通商品。偶尔流出的货物通常是极贵重物品，例如血术药剂、永夜宝石、冰晶器物、白龙鳞片、贵族古物和寒地法器。

## 宗教

桑格丽亚沿用北部多神教传统，血族并不普遍把自己称作神。成熟贵族更强调血统、家族法、古老契约和永夜秩序。宗教在桑格丽亚主要服务于贵族礼仪、继承、决斗、葬礼、血税见证和永夜边界仪式。

## 外交

桑格丽亚外交封闭而傲慢。它通常不把多数外国贵族视为完全同等对象。在桑格丽亚礼法中，能被当作同等贵族看待的外部对象主要包括提尔斯贵族和洛萨维亚家成员。

这与长期战争和古老王室关系有关。提尔斯贵族虽然是敌人，却被桑格丽亚承认为真正贵族对手。洛萨维亚家则因血统、法统和大陆级地位获得特殊承认。

| 对象 | 关系 | 说明 |
| ---- | ---- | ---- |
| 提尔斯王国 | 长期战争 | 南方宿敌，也是被承认为同等贵族的主要外国势力。 |
| 洛萨维亚家 | 特殊承认 | 桑格丽亚礼法中少数被视作同等贵族的外部家族。 |
| 北部虫灾区 | 谨慎隔离 | 桑格丽亚更关注提尔斯边境，对虫灾区保持观察。 |
| 普通商邦与共和国 | 低度往来 | 很少进行常规贸易，偶尔交换高价值物品。 |
| 外来冒险者 | 高风险对象 | 可能被视为猎物、间谍、交易工具或提尔斯代理人。 |

## 当前局势

蒂尔兰历528年的桑格丽亚大公国由夜之大公薇利安统治。她权力稳定，能够压住血族大贵族，并维持永夜边界、血税体系和对提尔斯战争。

全国永夜仍在延续，月光照在雪原、冻港和血族城堡上。人类在合法食材名录中，各大家族以不同名称经营圈养机构。普通人类离开这些机构几乎无法在极寒永夜中生存。

桑格丽亚与提尔斯的战争仍在继续。边境火塔和永夜结界反复推移，血族夜袭与提夫林火焰军团不断消耗。对外界而言，桑格丽亚像一个冰冷、古老、礼仪完备的血族牢笼。对血族贵族而言，这片永夜雪国正是秩序本身。

# 国家政府

## 概述

国家政府是维持国家运转的正式统治机关。它负责征税、司法、军队、道路、外交、文书、边境、治安、粮仓、户籍和公共工程。无论国家是王国、共和国、帝国、公国、城邦还是联邦，只要它拥有一套能发布命令、征收资源并执行法律的机构，这套机构就可以被称为政府。

政府通常拥有合法暴力、公共财政和行政文书。它可以任命官员，征召士兵，批准贸易，审判罪犯，修建道路，发行命令，也可以派遣代理人处理普通官僚无法解决的问题。

对冒险者而言，政府既是稳定雇主，也是麻烦来源。它能提供合法身份、通行许可、薪酬、情报和保护；同时也会要求服从命令、保守秘密、承担政治后果，并在必要时牺牲个人利益来维护国家利益。

## 目标与活动

国家政府的首要目标是维持统治秩序。

常见活动包括：

* 征税与财政管理；
* 维护治安；
* 镇压叛乱；
* 审判罪犯；
* 保护道路与商路；
* 管理户籍和土地；
* 组织军队；
* 修建公共工程；
* 与外国谈判；
* 处理灾害、邪教、怪物和边境冲突。

不同国家的政府风格差异很大。强势王国可能要求绝对服从，共和国可能依靠议会和文书程序，魔法国家可能让法师掌握行政核心，封建国家则可能把大量权力交给地方贵族。

无论形式如何，政府最关心的通常都是三件事：国家不能乱，税不能断，命令必须有人执行。

## 领导与组织

政府的最高权力来源取决于国家制度。它可能来自国王、皇帝、议会、执政团、公爵、城主、教会、军部或贵族会议。

一般政府会包含以下机构：

* 中央统治者或最高议会；
* 财政机关；
* 司法机关；
* 军事机关；
* 地方官员；
* 边境管理者；
* 文书和档案系统；
* 特殊任务部门。

冒险者通常不会直接成为国家最高官员。他们更常见的身份是政府代理人、特许调查员、军方外勤、宫廷密使、边境巡查员、临时征召者或被授予特殊权限的解决问题者。

政府成员之间未必团结。不同官员、军队、贵族、城市和地方机关可能互相推诿、争权、隐瞒情报或借冒险者完成不方便公开处理的事务。

## 加入组织

角色可以通过以下方式为政府效力：

* 接受政府委托；
* 获得临时授权；
* 加入军队或官僚系统；
* 成为宫廷、议会或地方长官的代理人；
* 获得调查令、通行令或征召令；
* 因功绩被授予公职、爵位或荣誉身份。

政府通常看重可靠性、服从性、能力和政治风险控制。能打很重要，听得懂命令同样重要。一个总是制造外交事故的强者，未必比一个谨慎可靠的低阶代理人更受欢迎。

## 组织特色

政府最大的特色是**合法性**。

政府代理人可以用国家名义行动。他们能调阅档案、进入关卡、要求地方配合、征用物资、审讯嫌疑人、护送官员、追捕通缉犯，甚至在特殊情况下调动士兵。

但合法性也意味着约束。政府代理人不能随意劫掠、私刑、泄密、违令或破坏国家利益。若行动失败，政府可能拒绝承认他们的身份；若行动成功，功劳也未必完全归于个人。

## 声望奖励

| 40 | 你获得建立小型办事处、调查组、边境据点或特别行动小组的权限，并获得政府拨款。 |
| 50+ | 你成为国家高度信任的人物。你可以觐见最高统治者或核心议会，并请求一次重大政治、军事或司法协助。此奖励一旦使用，直到你的声望等级再次提升前无法再次使用。 |

## 组织角色

适合加入政府体系的角色通常重视秩序、责任、名誉、报酬、晋升或国家利益。

政府体系不适合完全拒绝命令、频繁制造混乱、公开挑战国家权威或无法保守秘密的角色。

## 成员福利

如果你是国家政府的成员或受授权代理人，你拥有以下福利：

**合法身份。** 你拥有某种官方凭证。它可能是徽章、印章、通行证、任命书、军牌、戒指或加盖印泥的文书。

**稳定委托。** 只要国家仍需要解决麻烦，你总能从政府处获得工作。

**法律保护。** 你在执行任务时享有一定程度的法律豁免，但严重越权、泄密、叛国或私自牟利仍会受到惩罚。

# 登神会

## 概述

登神会是一个成员稀少、分布分散、入会门槛极高的秘密组织。它的成员通常已经在各自领域拥有相当力量，可能是高阶法师、传奇战士、宗教异端、王室顾问、禁忌学者、退隐英雄、边境军阀或掌握特殊资源的人物。

登神会的核心观念很直接：凡人可以通过伟业、仪式、战争、知识、血脉改造、信仰积累或其他路径抵达神的领域。它不要求成员崇拜某位既有神明，也不要求所有人相信同一种成神方法。对登神会而言，真正重要的是个人事业能否继续推进。

外界很少能确认登神会是否真实存在。许多关于它的传闻都互相矛盾：有人说它控制了宫廷顾问，有人说它资助禁忌实验，有人说它暗中扶持冒险者清理遗迹，也有人说它只是少数强者之间的互助网络。登神会通常不直接统治地区，却会借用政府、教会、商会、学院、军队和冒险者公会的资源来完成自己的计划。

## 目标与活动

登神会的公开目标很少被记录。它的成员之间通常只承认一个共同方向：**利用社会资源完成个人登神事业**。

常见活动包括：

* 搜集神话、圣遗物、禁忌仪式和古老血脉记录；
* 资助高危研究、遗迹探索和异端神学；
* 让代理人进入政府、教会、学院、军队或商会；
* 操纵委托，使冒险者替他们清理障碍；
* 保护某些具备潜力的人物；
* 夺取或封存可能影响成神路径的知识；
* 在战争、灾害、王位继承和宗教冲突中寻找机会。

登神会并不总是表现为统一行动。更多时候，成员各自推进事业，只在资源、情报、通道和掩护上互相配合。某个国家突然批准一项异常考古，某个学院忽然获得巨额捐赠，某个边境领主被建议开放禁区，背后都可能只是某位登神会成员需要一个结果。

## 领导与组织

登神会拥有一套线性且直接的组织架构。成员数量很少，因此它不依赖庞大的分部、派系或官僚系统。

组织通常被认为分为四级：

| 层级 | 说明 |
| --- | --- |
| 代行者 | 尚未真正进入核心圈，但被允许为登神会执行任务的人。 |
| 受印者 | 被正式承认的成员，拥有独立行动权。 |
| 执钥者 | 掌握重要资源、仪式、据点或长期计划的高位成员。 |
| 登阶者 | 组织最上层人物，能够决定重大资源流向与成员晋升。 |

登神会的首领据称是**法蒂玛·阿尔-扎赫拉**。关于她的资料极少，不同地区的记录甚至无法确认她的年龄、种族、出身和真实身份。部分传闻称她是一位神学家，部分传闻称她是某个灭亡王朝的遗民，也有人认为“法蒂玛·阿尔-扎赫拉”只是最高首领共用的名号。

登神会内部没有大量会议和公开命令。上级通常只给出目标、资源和限制条件，下级自行决定执行方式。成员之间强调成果、保密和互不干涉。

## 加入组织

登神会不招收普通新人。多数成员在被接触前，已经完成过足以引起注意的事业。

可能的入会条件包括：

* 独立完成高危遗迹探索；
* 击败远强于自身的敌人；
* 掌握罕见神学或仪式知识；
* 在国家、教会、学院或军队中拥有关键影响力；
* 证明自己能调动大量社会资源；
* 发现一条可验证的登神路径；
* 通过现有成员设置的考验。

登神会不会因为一个人有野心就接纳他。野心很常见，能把野心变成资源、计划和结果的人才有资格被注意。

## 组织特色：深层网络

登神会的活动方式接近一种隐藏在正式制度下的深层网络。

它很少公开建立据点，也很少以组织名义发布命令。它更常通过代理人、赞助者、顾问、秘密文书、私人委托、学术基金、遗嘱、军令、商会合同和宗教许可来影响现实。

一个登神会成员可能同时拥有多个身份：王室顾问、学院赞助者、边境领主的债主、冒险者公会高额委托人、某座神庙的修复资助者。外人看到的只是互不相关的合法行为，真正的共同方向只有少数人知道。

登神会并不需要统治国家。它需要国家继续运转，并在运转过程中不断产生可被利用的资源。

## 声望奖励

角色无法从低声望开始加入登神会。
只有当角色已经完成足够重要的事业，并获得至少 **25声望** 时，才可能被登神会正式承认。

角色通过完成高危委托、取得禁忌知识、夺取关键圣遗物、保护登神路径、影响国家决策或为成员事业提供重要帮助来获得登神会声望。
如果战役不使用声望规则，则由主持人决定角色是否以及何时获得这些奖励。

| 声望等级 | 奖励 |
| ---: | --- |
| 25+ | 你被承认为代行者。你可以接触登神会的外围联系人，并获得一次秘密资源引荐。 |
| 30+ | 你成为受印者。你可以请求一名代理人为你完成一项不会影响登神会核心利益的任务。此奖励一旦使用，直到声望再次提升前无法再次使用。 |
| 45 | 你成为执钥者。你获得管理一处隐秘据点、研究项目、仪式场所或代理网络的权限，并得到组织资源支持。 |
| 60+ | 你成为登阶者候选。你可以获得一条与自身登神事业相关的重大线索、仪式、圣遗物位置或政治安排。此奖励一旦使用，直到声望再次提升前无法再次使用。 |

## 组织角色

适合登神会的角色通常已经拥有强烈个人目标，并愿意长期经营资源、知识、人脉和风险。

组织并不要求成员性格相同，也不要求成员走同一条道路。

不适合登神会的角色，通常是缺乏长期目标、无法保密、过度依赖外部命令，或无法承受政治后果的人。

## 成员福利

如果你是登神会成员，你拥有以下福利：

**秘密引荐。** 你可以通过登神会接触某位学者、官员、祭司、贵族、军官、商会代表或冒险者公会中间人。

**资源调度。** 你可以申请资金、仪式材料、研究文献、伪装身份或通行许可，用于推进一项明确计划。

**高危委托。** 登神会会向你提供普通组织无法接触的任务，包括禁区探索、神学调查、圣遗物追踪、政治渗透和异常现象处理。

**身份遮蔽。** 在必要时，登神会可以帮助掩盖一次行动的真实委托来源。

## 特殊物品：登阶印

登阶印是登神会成员之间确认身份的标记。它可能是一枚戒指、一段暗号、一处纹身、一枚无名圣徽，也可能是一段只有特定法术才能显现的文字。

登阶印不代表公开权力。它只代表持有者进入了某个隐藏网络，可以被特定联系人识别。

伪造登阶印通常不会立刻引来公开审判。更常见的结果是，伪造者会收到一份真实委托。若他无法完成，登神会便能确认他只是冒牌货。

        function buildTree() {

        function renderTreeNode(node, nodeId, depth = 0) {
            const name = childName(node);

            if (!children.length) {
                return `<button class="tree-leaf" data-node="${escapeAttribute(nodeId)}">${name}</button>`;

                    </div>
                </div>
            `;
        }

        function selectNode(nodeId) {
            if (nodeId === "home") {
                state.current = {
                    nodeId,
                    name: "首页",
                    path: "首页",
                    type: "目录",
                    asset: "optional",
                    children: archive,
                    image: "assets/helios/封面.png",
                    imageAspect: "1103 / 1426"
                };
            } else {
                const resolved = resolveNode(nodeId);
                const section = resolved.section;
                const node = resolved.node;
                const parent = resolved.parent;
                const isTopLevel = node === section;
                const inheritedAsset = section.asset
                    ? (shouldUseInheritedAsset(section, node) ? section.asset : node && typeof node === "object" && node.asset || "none")
                    : node && typeof node === "object" && node.asset || "optional";
                state.current = {
                    nodeId,
                    name: childName(node),
                    path: `首页 / ${resolved.path.map(item => item.name).join(" / ")}`,
                    type: isTopLevel ? section.type || "分类" : childName(parent),
                    asset: inheritedAsset,
                    children: node && typeof node === "object" ? node.children || [] : [],
                    content: node && typeof node === "object" ? node.content || [] : [],
                    image: node && typeof node === "object" ? node.image || "" : "",
                    images: node && typeof node === "object" ? node.images || [] : [],
                    imageAspect: node && typeof node === "object" ? node.imageAspect || "" : "",

        function shouldUseInheritedAsset(section, node) {
            if (node === section) return true;
            if (!section.asset) return false;
            if (!node || typeof node !== "object") return false;
            if (node.asset) return false;
            if (node.children && node.children.length) return false;
            return true;
        }

        function expandActivePath(nodeId) {
            document.querySelectorAll(".tree-toggle").forEach(button => {
                if (nodeId.startsWith(`${button.dataset.node}:`)) {

        function updateToggleMarks() {
            document.querySelectorAll(".tree-toggle").forEach(button => {
                const marker = button.querySelector(".toggle-mark");
                if (!marker) return;
                marker.textContent = button.closest(".tree-section").classList.contains("collapsed") ? "展开" : "收起";
            });
        }

        function resolveNode(nodeId) {
            const parts = nodeId.split(":");
            const section = archive.find(item => item.id === parts[0]);
            let node = section;
            let parent = null;
            const path = section ? [{ name: section.name, node }] : [];

            for (const label of parts.slice(1)) {
                parent = node;
                node = ((parent && parent.children) || []).find(item => childName(item) === label);
                path.push({ name: childName(node), node });
            }

            return { section, node, parent, path };
        }

        function renderPanel() {
            panelPath.textContent = state.current.path;

            if (state.current.markdown || state.current.statBlock) {

        function renderChildrenGrid() {

        function targetForChild(name) {
            if (state.current.nodeId === "home") {
                const section = archive.find(item => item.name === childName(name));

            return `${state.current.nodeId}:${childName(name)}`;

        function childName(child) {
            return typeof child === "object" ? child.name : child;
        }

        function childMeta(child) {
            if (typeof child !== "object") return "未填充";
            if (child.content && child.content.length) return "已记录";
            if (child.markdown) return "已记录";
            if (child.statBlock) return "已记录";
            if (child.children && child.children.length) return `含 ${child.children.length} 项`;
            return "未填充";
        }

        function renderMarkdown(markdown) {
            const lines = markdown.trim().split(/\r?\n/);
            const html = [];

            for (let index = 0; index < lines.length; index += 1) {
                const line = lines[index].trim();
                if (!line || line === "---") continue;

                if (line.startsWith("|")) {
                    const tableLines = [];
                    while (index < lines.length && lines[index].trim().startsWith("|")) {
                        tableLines.push(lines[index].trim());
                        index += 1;
                    }
                    index -= 1;
                    html.push(renderMarkdownTable(tableLines));
                    continue;
                }

                if (line.startsWith("* ")) {
                    const items = [];
                    while (index < lines.length && lines[index].trim().startsWith("* ")) {
                        items.push(lines[index].trim().slice(2));
                        index += 1;
                    }
                    index -= 1;
                    html.push(`<ul>${items.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ul>`);
                    continue;
                }

                if (line.startsWith("#### ")) {
                    html.push(`<div class="minor-heading">${renderInlineMarkdown(line.slice(5))}</div>`);
                    continue;
                }

                if (line.startsWith("### ")) {
                    html.push(`<div class="sub-heading">${renderInlineMarkdown(line.slice(4))}</div>`);
                    continue;
                }

                if (line.startsWith("## ")) {
                    html.push(`<div class="section-heading">${renderInlineMarkdown(line.slice(3))}</div>`);
                    continue;
                }

                if (line.startsWith("# ")) {
                    html.push(`<p>${renderInlineMarkdown(line.slice(2))}</p>`);
                    continue;
                }

                html.push(`<p>${renderInlineMarkdown(line)}</p>`);
            }

            return html.join("");
        }

        function renderMarkdownTable(lines) {
            const rows = lines
                .filter(line => !/^\|\s*-/.test(line))
                .map(line => line.split("|").slice(1, -1).map(cell => cell.trim()));

            if (!rows.length) return "";
            const headers = rows[0].map(header => `<th>${renderInlineMarkdown(header)}</th>`).join("");
            const body = rows.slice(1).map(row => `
                <tr>${row.map(cell => `<td>${renderInlineMarkdown(cell)}</td>`).join("")}</tr>
            `).join("");

            return `
                <div class="content-table-wrap">
                    <table class="content-table">
                        <thead><tr>${headers}</tr></thead>
                        <tbody>${body}</tbody>
                    </table>
                </div>
            `;
        }

        function renderInlineMarkdown(value) {
            return escapeHTML(value).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        }

        function renderContentParagraph(paragraph, index) {
            if (typeof paragraph === "object" && paragraph.type === "table") return renderContentTable(paragraph);
            if (typeof paragraph === "object" && paragraph.type === "heading") return renderContentHeading(paragraph);

            const compactHeadings = [
                "等级坐标",
                "CR坐标",
                "备注",
                "奥斯坎六神",
                "草原主要灵名",
                "群岛五神",
                "北境五神",
                "对他们来说，统治关系非常直观：",
                "登神会内部没有统一教义，只有一个核心目标：",
                "不要崇拜旧神，要成为新神。"
            ];
            const isHeading = index > 0 && (/^\d+\.\s/.test(paragraph) || compactHeadings.includes(paragraph));
            const className = isHeading ? ' class="fact-heading"' : "";
            return `<p${className}>${escapeHTML(paragraph)}</p>`;
        }

        function renderContentHeading(heading) {
            const className = heading.level === 2 ? "section-heading" : "sub-heading";
            return `<div class="${className}">${escapeHTML(heading.text)}</div>`;
        }

        function renderContentTable(table) {
            const headers = table.headers.map(header => `<th>${escapeHTML(header)}</th>`).join("");
            const rows = table.rows.map(row => `
                <tr>${row.map(cell => `<td>${escapeHTML(cell)}</td>`).join("")}</tr>
            `).join("");

            return `
                <div class="content-table-wrap">
                    <table class="content-table">
                        <thead><tr>${headers}</tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>

        }

        function renderStatBlock(data) {
            const statLabels = {

            ].filter(Boolean) : [];

            const propsHtml = [

            ` : "";

            const bonusHtml = data.bonus_actions && data.bonus_actions.length ? `
                <div class="action-header">附赠动作</div>
                ${renderTraitList(data.bonus_actions)}
            ` : "";

            const reactionsHtml = data.reactions && data.reactions.length ? `
                <div class="action-header">反应</div>
                ${renderTraitList(data.reactions)}
            ` : "";

            const legendaryHtml = data.legendary_actions && data.legendary_actions.length ? `
                <div class="action-header">传奇动作</div>
                ${data.legendary_desc ? `<div class="trait-section">${formatStatText(data.legendary_desc)}</div>` : ""}
                ${renderTraitList(data.legendary_actions)}
            ` : "";

            const spellsHtml = data.spells ? `
                <div class="action-header">施法</div>
                ${data.spells.header ? `<div class="trait-section"><em>${formatStatText(data.spells.header)}</em></div>` : ""}
                ${Array.isArray(data.spells.list)
                    ? data.spells.list.map(spell => `
                        <div class="trait-section">
                            <span class="trait-name">${escapeHTML(spell.level)}：</span>${escapeHTML(spell.spells)}
                        </div>
                    `).join("")
                    : `<div class="trait-section">${formatStatText(data.spells.list || "")}</div>`
                }
            ` : "";

            const companionHtml = data.companion ? `
                <div class="action-header">坐骑</div>
                ${renderStatBlock(data.companion)}

            return `
                <div class="stat-block-container">
                    <div class="stat-header">
                        <h2>${escapeHTML(data.name || state.current.name)}</h2>
                        <i>${escapeHTML(data.meta || "")}</i>
                    </div>
                    <hr class="tapered-rule">
                    ${data.resume ? `<div class="trait-section"><em>${escapeHTML(data.resume)}</em></div>` : ""}
                    <div class="property-line"><strong>护甲等级：</strong>${escapeHTML(data.ac || "")}</div>
                    <div class="property-line"><strong>生命值：</strong>${escapeHTML(data.hp || "")}</div>

                    <hr class="red-rule">
                    ${propsHtml}
                    <hr class="tapered-rule">
                    ${renderTraitList(data.traits)}
                    ${actionsHtml}
                    ${bonusHtml}
                    ${reactionsHtml}
                    ${legendaryHtml}
                    ${spellsHtml}
                    ${companionHtml}
                </div>
            `;
        }

        function formatStatText(value) {
            return escapeHTML(value || "").replace(/\n/g, "<br>");
        }

        function escapeHTML(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",

        function renderAssetSlot(assetType) {

            assetTitle.textContent = state.current.nodeId === "home" ? "封面" : "可选图片";
            if (state.current.image) {
                assetSlot.classList.add("has-image");
                if (state.current.imageAspect) assetSlot.style.aspectRatio = state.current.imageAspect;
                assetSlot.innerHTML = `<img src="${escapeAttribute(state.current.image)}" alt="${escapeAttribute(state.current.name)}图片">`;
            } else {
                updateAssetText("图片位", "留空");
            }
        }

        function updateAssetText(label, note) {
            const currentAssetLabel = assetSlot.querySelector(".asset-label");
            const currentAssetNote = assetSlot.querySelector(".asset-note");
            if (currentAssetLabel) currentAssetLabel.textContent = label;
            if (currentAssetNote) currentAssetNote.textContent = note;
        }

        function escapeAttribute(value) {
            return String(value).replace(/["'<>]/g, "");
        }

        function assetClass(assetType) {
            if (assetType === "country") return "map country";
            if (assetType === "person") return "avatar person";
            if (assetType === "race") return "avatar race";
            return "optional";
        }

        function preserveUidLinks() {
            const params = new URLSearchParams(location.search);
            const uid = params.get("uid");
            if (!uid) return;

            document.getElementById("back-link").href = `index.html?uid=${encodeURIComponent(uid)}`;
        }

        buildTree();
        preserveUidLinks();
        renderPanel();
    </script>
</body>
</html>
