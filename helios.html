<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赫里奥斯</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f4f1ea;
            --paper: #fffdf8;
            --paper-soft: #f8f5ed;
            --ink: #1f2933;
            --muted: #68717d;
            --line: #ded6c8;
            --line-strong: #bfae96;
            --gold: #a36f2c;
            --wine: #733a3a;
            --teal: #2f6f67;
            --shadow: 0 16px 40px rgba(31, 41, 51, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            min-height: 100vh;
            background:
                linear-gradient(120deg, rgba(115, 58, 58, 0.08), transparent 34%),
                linear-gradient(300deg, rgba(47, 111, 103, 0.1), transparent 38%),
                var(--bg);
            color: var(--ink);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        a {
            color: inherit;
        }

        .page-shell {
            width: min(1440px, calc(100% - 48px));
            height: calc(100vh - 48px);
            min-height: 0;
            margin: 24px auto;
            display: grid;
            grid-template-columns: 304px minmax(0, 1fr);
            border: 1px solid var(--line);
            background: rgba(255, 253, 248, 0.82);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .sidebar {
            border-right: 1px solid var(--line);
            background: rgba(248, 245, 237, 0.92);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .brand {
            padding: 24px;
            border-bottom: 1px solid var(--line);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 22px;
            color: var(--muted);
            font-size: 13px;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--wine);
        }

        .brand-title {
            margin: 0;
            font-size: 30px;
            line-height: 1.1;
            letter-spacing: 0;
        }

        .brand-subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .tree {
            flex: 1 1 auto;
            min-height: 0;
            padding: 18px 14px 28px;
            overflow-y: auto;
        }

        .tree-section {
            margin-bottom: 8px;
        }

        .tree-toggle,
        .tree-leaf {
            width: 100%;
            min-height: 38px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--ink);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 9px 10px;
            font: inherit;
            text-align: left;
            letter-spacing: 0;
        }

        .tree-toggle {
            font-weight: 800;
        }

        .tree-leaf {
            color: #394553;
            font-size: 14px;
        }

        .tree-label {
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }

        .tree-label-text {
            min-width: 0;
        }

        .tree-toggle:hover,
        .tree-leaf:hover {
            background: rgba(163, 111, 44, 0.09);
        }

        .tree-toggle.active {
            background: rgba(115, 58, 58, 0.1);
            color: var(--wine);
        }

        .tree-leaf.active {
            background: #232b35;
            color: #fff;
        }

        .tree-children {
            margin: 2px 0 10px 14px;
            padding-left: 10px;
            border-left: 1px solid var(--line);
        }

        .tree-section.collapsed > .tree-children {
            display: none;
        }

        .tree-children .tree-toggle {
            min-height: 32px;
            padding: 7px 8px;
            color: #4b5563;
            font-size: 13px;
            font-weight: 700;
        }

        .tree-children .tree-leaf {
            min-height: 42px;
            padding: 7px 8px;
            font-size: 13px;
        }

        .toggle-mark {
            flex: 0 0 auto;
            color: var(--gold);
            border-radius: 999px;
            padding: 2px 6px;
            font-size: 12px;
            line-height: 1.2;
        }

        .toggle-mark:hover {
            background: rgba(163, 111, 44, 0.12);
        }

        .form-rule {
            height: 1px;
            margin: 20px 0;
            background: linear-gradient(to right, transparent, var(--line-strong), transparent);
        }

        .checkbox-mark {
            display: inline-flex;
            width: 0.95em;
            height: 0.95em;
            margin: 0 0.25em;
            border: 1px solid var(--line-strong);
            border-radius: 2px;
            vertical-align: -0.12em;
        }

        .download-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            margin: 8px 0 16px;
            padding: 10px 16px;
            border-radius: 6px;
            background: #232b35;
            color: #fff;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 10px 24px rgba(35, 43, 53, 0.16);
        }

        .download-button:hover {
            background: var(--wine);
        }

        .pdf-preview {
            width: 100%;
            height: min(78vh, 820px);
            margin: 10px 0 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f8f4ec;
            overflow: hidden;
        }

        .pdf-preview iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        .content {
            min-width: 0;
            min-height: 0;
            display: grid;
            grid-template-rows: auto 1fr;
            overflow-y: auto;
        }

        .content-top {
            padding: 28px 34px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: flex-start;
            background: rgba(255, 253, 248, 0.72);
        }

        .kicker {
            color: var(--gold);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .page-title {
            margin: 8px 0 0;
            font-size: clamp(28px, 4vw, 46px);
            line-height: 1.1;
            letter-spacing: 0;
        }

        .workspace {
            padding: 34px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 24px;
            align-items: start;
        }

        .workspace.country-layout {
            grid-template-columns: 1fr;
        }

        .workspace.country-layout .asset-panel {
            position: static;
            order: -1;
        }

        .workspace.home-layout {
            grid-template-columns: 1fr;
        }

        .workspace.home-layout .asset-panel {
            display: none;
        }

        .workspace.person-layout {
            grid-template-columns: minmax(0, 1fr) minmax(300px, 380px);
        }

        .workspace.no-asset-layout {
            grid-template-columns: 1fr;
        }

        .workspace.no-asset-layout .asset-panel {
            display: none;
        }

        .main-panel,
        .asset-panel {
            border: 1px solid var(--line);
            background: var(--paper);
        }

        .main-panel {
            min-height: 620px;
        }

        .panel-header {
            padding: 22px 24px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .panel-eyebrow {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.1em;
        }

        .panel-title {
            margin: 6px 0 0;
            font-size: 28px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .type-pill {
            flex: 0 0 auto;
            border-radius: 999px;
            padding: 7px 12px;
            color: #fff;
            background: var(--teal);
            font-size: 12px;
            font-weight: 800;
        }

        .type-pill.country {
            background: var(--wine);
        }

        .type-pill.person,
        .type-pill.race {
            background: var(--teal);
        }

        .panel-body {
            padding: 24px;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .home-cover {
            width: min(640px, 100%);
            margin: 0 auto 28px;
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: #0f1419;
        }

        .home-cover img {
            width: 100%;
            display: block;
        }

        .section-card {
            width: 100%;
            min-height: 122px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper-soft);
            color: inherit;
            cursor: pointer;
            font: inherit;
            padding: 16px;
            text-align: left;
            transition: border-color 0.16s ease, transform 0.16s ease, background 0.16s ease;
        }

        .section-card:hover {
            border-color: var(--line-strong);
            background: #fffaf0;
            transform: translateY(-1px);
        }

        .section-name {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 7px;
            font-weight: 900;
            font-size: 17px;
            line-height: 1.35;
        }

        .country-badge {
            display: inline-flex;
            align-items: center;
            min-height: 20px;
            padding: 2px 7px;
            border-radius: 999px;
            background: #6b7280;
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            line-height: 1.2;
            white-space: nowrap;
            vertical-align: 0.08em;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28);
        }

        .country-badge-row {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .tree-label .country-badge {
            min-height: 18px;
            padding: 2px 6px;
            font-size: 10px;
        }

        .country-badge.east-tirlan { background: #1f6f8b; }
        .country-badge.west-tirlan { background: #7f3f3f; }
        .country-badge.aragonlas { background: #8f3d22; }
        .country-badge.providence { background: #5962a7; }
        .country-badge.golden { background: #9a7415; }
        .country-badge.westeria { background: #4b5563; }
        .country-badge.winton { background: #3e8f66; }
        .country-badge.sangria { background: #6d214f; }
        .country-badge.mergia { background: #286f6b; }
        .country-badge.amazigh { background: #5b7896; }
        .country-badge.guild { background: #4f5d75; }
        .country-badge.secret { background: #5b4b8a; }

        .section-meta {
            margin-top: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .empty-editor {
            min-height: 368px;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            background:
                linear-gradient(transparent 31px, rgba(222, 214, 200, 0.46) 32px),
            var(--paper-soft);
            background-size: 100% 32px;
        }

        .intro-copy {
            max-width: 820px;
            color: #2f3844;
            font-size: 17px;
            line-height: 2;
        }

        .intro-copy p {
            margin: 0 0 20px;
        }

        .intro-copy p:first-child {
            color: var(--wine);
            font-size: 20px;
            font-weight: 900;
        }

        .intro-copy p.nation-motto {
            margin: 0 0 24px;
            color: #5f6268;
            font-size: 15px;
            font-style: italic;
            font-weight: 500;
            line-height: 1.75;
        }

        .intro-copy .fact-heading {
            margin-top: 30px;
            color: var(--ink);
            font-size: 19px;
            font-weight: 900;
            line-height: 1.6;
        }

        .intro-copy .section-heading {
            margin: 42px 0 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--line);
            color: var(--wine);
            font-size: 24px;
            font-weight: 900;
            line-height: 1.35;
        }

        .intro-copy .sub-heading {
            margin: 30px 0 12px;
            color: var(--ink);
            font-size: 20px;
            font-weight: 900;
            line-height: 1.45;
        }

        .intro-copy .minor-heading {
            margin: 22px 0 10px;
            color: #4a5563;
            font-size: 17px;
            font-weight: 900;
            line-height: 1.45;
        }

        .policy-panel {
            margin: 4px 0 34px;
            padding: 18px;
            border: 1px solid rgba(121, 93, 66, 0.22);
            border-radius: 8px;
            background: rgba(255, 252, 244, 0.72);
        }

        .policy-panel.special-state {
            padding: 14px;
            border-color: rgba(132, 46, 36, 0.28);
            background: linear-gradient(180deg, rgba(255, 247, 236, 0.92), rgba(246, 235, 219, 0.86));
        }

        .policy-status-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 74px;
            padding: 18px 24px;
            border: 1px solid rgba(132, 46, 36, 0.38);
            border-radius: 4px;
            background: rgba(132, 46, 36, 0.1);
            color: #7c2f26;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0;
            line-height: 1.25;
            text-align: center;
        }

        .policy-panel-title {
            margin-bottom: 14px;
            color: var(--ink);
            font-size: 17px;
            font-weight: 900;
            line-height: 1.4;
        }

        .policy-group + .policy-group {
            margin-top: 16px;
        }

        .policy-group-title {
            margin-bottom: 8px;
            color: #6f5b46;
            font-size: 13px;
            font-weight: 900;
        }

        .policy-chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .policy-chip {
            position: relative;
            display: inline-flex;
            align-items: baseline;
            gap: 6px;
            max-width: 100%;
            padding: 5px 9px;
            border: 1px solid rgba(80, 67, 54, 0.14);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.68);
            color: #28313c;
            font-size: 13px;
            line-height: 1.35;
        }

        .policy-chip[data-policy-desc] {
            cursor: help;
        }

        .policy-chip[data-policy-desc]::before,
        .policy-chip[data-policy-desc]::after {
            position: absolute;
            left: 50%;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.16s ease 0.5s, transform 0.16s ease 0.5s;
        }

        .policy-chip[data-policy-desc]::before {
            content: "";
            top: calc(100% + 5px);
            width: 10px;
            height: 10px;
            border-left: 1px solid rgba(80, 67, 54, 0.22);
            border-top: 1px solid rgba(80, 67, 54, 0.22);
            background: #fffaf0;
            transform: translate(-50%, -2px) rotate(45deg);
        }

        .policy-chip[data-policy-desc]::after {
            content: attr(data-policy-desc);
            top: calc(100% + 10px);
            width: max-content;
            max-width: min(330px, calc(100vw - 56px));
            padding: 10px 12px;
            border: 1px solid rgba(80, 67, 54, 0.22);
            border-radius: 8px;
            background: #fffaf0;
            color: #2f3844;
            box-shadow: 0 14px 34px rgba(30, 24, 18, 0.18);
            font-size: 12px;
            font-weight: 500;
            line-height: 1.65;
            white-space: normal;
            transform: translate(-50%, -4px);
        }

        .policy-chip[data-policy-desc]:hover::before,
        .policy-chip[data-policy-desc]:hover::after,
        .policy-chip[data-policy-desc]:focus-visible::before,
        .policy-chip[data-policy-desc]:focus-visible::after {
            opacity: 1;
            transition-delay: 1.2s;
        }

        .policy-chip[data-policy-desc]:hover::before,
        .policy-chip[data-policy-desc]:focus-visible::before {
            transform: translate(-50%, 0) rotate(45deg);
        }

        .policy-chip[data-policy-desc]:hover::after,
        .policy-chip[data-policy-desc]:focus-visible::after {
            transform: translate(-50%, 0);
        }

        .policy-chip.power {
            background: rgba(128, 54, 43, 0.08);
        }

        .policy-chip.economy {
            background: rgba(37, 105, 101, 0.08);
        }

        .policy-chip.rights {
            background: rgba(91, 78, 112, 0.08);
        }

        .policy-chip.diplomacy-positive {
            background: rgba(45, 128, 84, 0.09);
        }

        .policy-chip.diplomacy-neutral {
            background: rgba(91, 100, 112, 0.08);
        }

        .policy-chip.diplomacy-negative {
            background: rgba(132, 46, 36, 0.09);
        }

        .policy-chip.diplomacy-subject {
            background: rgba(128, 91, 43, 0.1);
        }

        .policy-label {
            color: #73777d;
            font-size: 12px;
            white-space: nowrap;
        }

        .policy-value {
            font-weight: 800;
            word-break: keep-all;
        }

        .policy-chip[data-policy-desc]::before,
        .policy-chip[data-policy-desc]::after {
            display: none;
        }

        .policy-floating-tooltip {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 2147483647;
            max-width: min(330px, calc(100vw - 56px));
            padding: 10px 12px;
            border: 1px solid rgba(80, 67, 54, 0.22);
            border-radius: 8px;
            background: #fffaf0;
            color: #2f3844;
            box-shadow: 0 14px 34px rgba(30, 24, 18, 0.2);
            font-size: 12px;
            font-weight: 500;
            line-height: 1.65;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-4px);
            transition: opacity 0.16s ease, transform 0.16s ease;
            white-space: normal;
        }

        .policy-floating-tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }


        .content-table-wrap {
            max-width: 100%;
            margin: 12px 0 26px;
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper-soft);
        }

        .content-table {
            width: 100%;
            min-width: 620px;
            border-collapse: collapse;
            font-size: 14px;
            line-height: 1.6;
        }

        .content-table th,
        .content-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        .content-table th {
            color: var(--wine);
            background: rgba(163, 111, 44, 0.08);
            font-weight: 900;
        }

        .content-table tr:last-child td {
            border-bottom: 0;
        }

        .inline-portrait {
            display: block;
            width: 76px;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            object-position: center top;
            border-radius: 6px;
            border: 1px solid var(--line);
            background: #f4ead8;
        }

        .official-card {
            display: grid;
            grid-template-columns: minmax(0, 1fr) clamp(180px, 22vw, 220px);
            gap: 22px;
            align-items: center;
            margin: 18px 0 26px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper-soft);
        }

        .official-card-body {
            min-width: 0;
        }

        .official-card-role {
            margin-bottom: 4px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .official-card-title {
            margin-bottom: 12px;
            color: var(--ink);
            font-size: 20px;
            font-weight: 900;
        }

        .official-card-body p:last-child {
            margin-bottom: 0;
        }

        .official-card-portrait {
            width: 100%;
            aspect-ratio: 2 / 3;
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: #f4ead8;
        }

        .official-card-portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        @media (max-width: 760px) {
            .official-card {
                grid-template-columns: 1fr;
            }

            .official-card-portrait {
                max-width: 220px;
                width: min(220px, 100%);
                aspect-ratio: 2 / 3;
            }
        }

        .stat-block-container {
            margin-top: 28px;
            border: 1px solid #c9a46a;
            border-radius: 8px;
            background: #fbf1dc;
            color: #58180d;
            font-family: Georgia, "Times New Roman", "Noto Serif SC", serif;
            padding: 22px;
            box-shadow: inset 0 0 0 1px rgba(130, 32, 0, 0.08);
        }

        .stat-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 16px;
            align-items: start;
        }

        .stat-header.with-avatar {
            grid-template-columns: minmax(0, 1fr) 88px;
        }

        .stat-header-main {
            min-width: 0;
            padding-top: 2px;
        }

        .stat-header h2 {
            margin: 0;
            color: #822000;
            font-size: 30px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .stat-header i {
            display: block;
            margin-top: 6px;
            color: #333;
            font-size: 14px;
        }

        .stat-avatar {
            width: 88px;
            aspect-ratio: 1 / 1;
            border: 1px solid #c9a46a;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(255, 253, 248, 0.62);
            box-shadow: 0 8px 18px rgba(88, 24, 13, 0.12);
        }

        .stat-avatar img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: center top;
        }

        .tapered-rule {
            height: 2px;
            margin: 12px 0;
            border: 0;
            background: linear-gradient(to right, transparent, #822000, transparent);
        }

        .red-rule {
            height: 2px;
            margin: 10px 0;
            border: 0;
            background: #822000;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(64px, 1fr));
            gap: 8px;
            margin: 16px 0;
            color: #822000;
            text-align: center;
        }

        .stat-box {
            min-width: 0;
            border: 1px solid rgba(130, 32, 0, 0.18);
            border-radius: 6px;
            background: rgba(255, 253, 248, 0.58);
            padding: 8px 6px;
        }

        .stat-box strong {
            display: block;
            font-size: 12px;
        }

        .stat-box span {
            display: block;
            margin-top: 4px;
            font-size: 15px;
            font-weight: 700;
        }

        .property-line {
            margin: 6px 0;
            color: #822000;
            line-height: 1.65;
        }

        .property-line strong {
            color: #58180d;
        }

        .trait-section {
            margin-top: 14px;
            color: #2f2a25;
            line-height: 1.7;
        }

        .trait-name {
            color: #1f1b18;
            font-style: italic;
            font-weight: 900;
        }

        .action-header {
            margin: 24px 0 8px;
            border-bottom: 1px solid #822000;
            color: #822000;
            font-size: 22px;
            font-variant: small-caps;
            font-weight: 900;
            line-height: 1.35;
        }

        /* 角色卡防窥区：只遮罩“特性/动作/施法/传奇动作”等下半段细节，不遮导航、正文、立绘或基础面板。 */
        .stat-private-area {
            position: relative;
            margin-top: 10px;
        }

        .stat-private-area.locked {
            min-height: 220px;
            overflow: hidden;
            border-radius: 8px;
        }

        .stat-private-area.locked .stat-private-content {
            max-height: 260px;
            overflow: hidden;
            filter: blur(7px);
            opacity: 0.42;
            pointer-events: none;
            user-select: none;
        }

        .stat-private-cover {
            display: none;
        }

        .stat-private-area.locked .stat-private-cover {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background:
                linear-gradient(180deg, rgba(251, 241, 220, 0.78), rgba(251, 241, 220, 0.94)),
                repeating-linear-gradient(135deg, rgba(130, 32, 0, 0.06) 0 8px, transparent 8px 16px);
            backdrop-filter: blur(3px);
        }

        .stat-private-card {
            max-width: 360px;
            padding: 18px 20px;
            border: 1px solid rgba(130, 32, 0, 0.25);
            border-radius: 8px;
            background: rgba(255, 253, 248, 0.92);
            text-align: center;
            box-shadow: 0 16px 36px rgba(88, 24, 13, 0.12);
        }

        .stat-private-title {
            color: #822000;
            font-size: 22px;
            font-weight: 900;
            line-height: 1.3;
        }

        .stat-private-note {
            margin-top: 8px;
            color: #6a4a3c;
            font-size: 13px;
            line-height: 1.6;
        }

        .stat-reveal-button {
            margin-top: 14px;
            border: 0;
            border-radius: 6px;
            background: #822000;
            color: #fff8ec;
            cursor: pointer;
            font: inherit;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0;
            padding: 8px 13px;
        }

        .stat-reveal-button:hover {
            background: #58180d;
        }

        .asset-panel {
            position: sticky;
            top: 24px;
        }

        .asset-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--line);
        }

        .asset-title {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0;
        }

        .asset-slot {
            margin: 20px;
            min-height: 260px;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: var(--muted);
            background: var(--paper-soft);
            text-align: center;
            padding: 18px;
        }

        .asset-slot.avatar {
            min-height: 220px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            margin-inline: auto;
            width: min(220px, calc(100% - 40px));
        }

        .asset-slot.map {
            min-height: 0;
            aspect-ratio: 16 / 7;
            width: calc(100% - 40px);
        }

        .asset-slot.portrait {
            min-height: 0;
            aspect-ratio: 2 / 3;
            width: calc(100% - 40px);
        }

        .asset-slot.has-image {
            border-style: solid;
            padding: 0;
            overflow: hidden;
            background: #0f1419;
        }

        .asset-slot img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .asset-slot.map img {
            object-fit: contain;
        }

        .asset-slot.multi-map {
            display: block;
            aspect-ratio: auto;
            padding: 14px;
            text-align: left;
        }

        .asset-map-item + .asset-map-item {
            margin-top: 16px;
        }

        .asset-map-label {
            margin-bottom: 8px;
            color: var(--wine);
            font-size: 13px;
            font-weight: 900;
        }

        .asset-map-frame {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #0f1419;
        }

        .asset-map-frame img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .asset-slot.portrait img {
            object-fit: cover;
            object-position: center top;
        }

        .asset-label {
            font-weight: 900;
            color: #344050;
        }

        .asset-note {
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.6;
        }

        @media (max-width: 980px) {
            body {
                height: auto;
                overflow: auto;
            }

            .page-shell {
                width: 100%;
                height: auto;
                min-height: 100vh;
                margin: 0;
                grid-template-columns: 1fr;
                overflow: visible;
            }

            .sidebar {
                min-height: 0;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .tree {
                max-height: 340px;
            }

            .content {
                overflow: visible;
            }

            .workspace,
            .workspace.country-layout,
            .workspace.person-layout {
                grid-template-columns: 1fr;
                padding: 22px;
            }

            .asset-panel {
                position: static;
            }
        }

        @media (max-width: 640px) {
            .content-top,
            .panel-header {
                align-items: stretch;
                flex-direction: column;
            }

            .content-top,
            .workspace {
                padding-inline: 16px;
            }

            .brand {
                padding-inline: 16px;
            }

            .asset-slot.map {
                aspect-ratio: 4 / 3;
            }

            .stat-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <aside class="sidebar">
            <div class="brand">
                <a id="back-link" class="back-link" href="index.html">← 返回主界面</a>
                <h1 class="brand-title">赫里奥斯</h1>
                <p class="brand-subtitle">世界档案目录</p>
            </div>
            <nav class="tree" id="tree" aria-label="赫里奥斯目录"></nav>
        </aside>

        <main class="content">
            <header class="content-top">
                <div>
                    <div class="kicker">Helios Archive</div>
                    <h2 class="page-title">赫里奥斯</h2>
                </div>
            </header>

            <section class="workspace" id="workspace">
                <article class="main-panel">
                    <header class="panel-header">
                        <div>
                            <div class="panel-eyebrow" id="panel-path">首页</div>
                            <h3 class="panel-title" id="panel-title">首页</h3>
                        </div>
                        <span class="type-pill" id="panel-type">目录</span>
                    </header>
                    <div class="panel-body" id="panel-body"></div>
                </article>

                <aside class="asset-panel">
                    <header class="asset-header">
                        <h3 class="asset-title" id="asset-title">可选图片</h3>
                    </header>
                    <div class="asset-slot" id="asset-slot">
                        <div>
                            <div class="asset-label" id="asset-label">图片位</div>
                            <div class="asset-note" id="asset-note">留空</div>
                        </div>
                    </div>
                </aside>
            </section>
        </main>
    </div>

    <script>        let archive = [];
        let personCountryMap = {};
        let countryBadgeClassMap = {};
        const HELIOS_DATA_URL = "helios-data.json";

        async function loadHeliosData() {
            const response = await fetch(HELIOS_DATA_URL, { cache: "no-store" });
            if (!response.ok) {
                throw new Error("无法加载档案数据：" + response.status + " " + response.statusText);
            }
            const data = await response.json();
            archive = Array.isArray(data.archive) ? data.archive : [];
            personCountryMap = data.personCountryMap || {};
            countryBadgeClassMap = data.countryBadgeClassMap || {};
        }

        const SUPABASE_URL = "https://vbzfpgucpciqgaakqndz.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTc2MzMsImV4cCI6MjA4MzE3MzYzM30.fBVDirEJ52bvrYJZ5DNv7fVDLNgCwITKwdKqT6YJDYw";
        const supabaseClient = window.supabase ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
        const HELIOS_FULL_STAT_EMAIL = "739477825@qq.com";

        const state = {
            current: {
                nodeId: "home",
                name: "首页",
                path: "首页",
                type: "目录",
                asset: "optional",
                children: archive,
                image: "assets/helios/封面.png",
                imageAspect: "1103 / 1426"
            },
            authResolved: false,
            viewerEmail: "",
            revealedStatBlocks: new Set()
        };

        const tree = document.getElementById("tree");
        const panelPath = document.getElementById("panel-path");
        const panelTitle = document.getElementById("panel-title");
        const panelType = document.getElementById("panel-type");
        const panelBody = document.getElementById("panel-body");
        const workspace = document.getElementById("workspace");
        const assetTitle = document.getElementById("asset-title");
        const assetSlot = document.getElementById("asset-slot");
        const assetLabel = document.getElementById("asset-label");
        const assetNote = document.getElementById("asset-note");

        const policyTooltip = document.createElement("div");
        policyTooltip.className = "policy-floating-tooltip";
        policyTooltip.setAttribute("role", "tooltip");
        document.body.appendChild(policyTooltip);
        let policyTooltipTarget = null;
        let policyTooltipShowTimer = null;
        let policyTooltipHideTimer = null;


        function buildTree() {
            const homeButton = `<button class="tree-leaf active" data-node="home">首页</button>`;
            const sections = archive.map(section => {
                return renderTreeNode(section, section.id, 0);
            }).join("");

            tree.innerHTML = homeButton + sections;
            tree.addEventListener("click", event => {
                const button = event.target.closest("button[data-node]");
                if (!button) return;
                if (button.classList.contains("tree-toggle")) {
                    const marker = event.target.closest(".toggle-mark");
                    if (marker && button.contains(marker)) {
                        const section = button.closest(".tree-section");
                        section.classList.toggle("collapsed");
                        updateToggleMarks();
                        return;
                    }
                }
                selectNode(button.dataset.node);
            });

            panelBody.addEventListener("click", event => {
                const revealButton = event.target.closest(".stat-reveal-button[data-stat-reveal]");
                if (revealButton) {
                    state.revealedStatBlocks.add(revealButton.dataset.statReveal);
                    renderPanel();
                    return;
                }

                const card = event.target.closest(".section-card[data-target]");
                if (!card) return;
                selectNode(card.dataset.target);
            });

            panelBody.addEventListener("pointerover", event => {
                const chip = event.target.closest(".policy-chip[data-policy-desc]");
                if (chip && panelBody.contains(chip)) showPolicyTooltip(chip);
            });

            panelBody.addEventListener("pointerout", event => {
                const chip = event.target.closest(".policy-chip[data-policy-desc]");
                if (chip && !chip.contains(event.relatedTarget)) hidePolicyTooltip();
            });

            panelBody.addEventListener("focusin", event => {
                const chip = event.target.closest(".policy-chip[data-policy-desc]");
                if (chip && panelBody.contains(chip)) showPolicyTooltip(chip);
            });

            panelBody.addEventListener("focusout", event => {
                const chip = event.target.closest(".policy-chip[data-policy-desc]");
                if (chip) hidePolicyTooltip();
            });

            window.addEventListener("resize", repositionPolicyTooltip);
            document.addEventListener("scroll", repositionPolicyTooltip, true);
        }

        function showPolicyTooltip(target) {
            const description = target.dataset.policyDesc;
            if (!description) return;
            clearTimeout(policyTooltipShowTimer);
            clearTimeout(policyTooltipHideTimer);
            policyTooltipTarget = target;
            policyTooltip.textContent = description;
            policyTooltip.classList.remove("visible");
            policyTooltipShowTimer = setTimeout(() => {
                if (policyTooltipTarget !== target || !document.body.contains(target)) return;
                if (!repositionPolicyTooltip(true)) return;
                policyTooltip.classList.add("visible");
            }, 1200);
        }

        function hidePolicyTooltip() {
            clearTimeout(policyTooltipShowTimer);
            clearTimeout(policyTooltipHideTimer);
            policyTooltipHideTimer = setTimeout(() => {
                policyTooltip.classList.remove("visible");
                policyTooltipTarget = null;
            }, 500);
        }

        function repositionPolicyTooltip(force = false) {
            if (!policyTooltipTarget || (!force && !policyTooltip.classList.contains("visible"))) return false;
            if (!document.body.contains(policyTooltipTarget)) {
                policyTooltip.classList.remove("visible");
                policyTooltipTarget = null;
                return false;
            }

            const rect = policyTooltipTarget.getBoundingClientRect();
            if (!Number.isFinite(rect.left) || !Number.isFinite(rect.top) || (rect.width === 0 && rect.height === 0)) {
                return false;
            }

            const margin = 28;
            const maxWidth = Math.max(180, Math.min(330, window.innerWidth - margin * 2));
            policyTooltip.style.maxWidth = `${maxWidth}px`;
            policyTooltip.style.left = "-9999px";
            policyTooltip.style.top = "-9999px";

            const tooltipRect = policyTooltip.getBoundingClientRect();
            const width = Math.min(tooltipRect.width || maxWidth, maxWidth);
            const height = tooltipRect.height || 40;
            let left = rect.right + 12;
            let top = rect.top + rect.height / 2 - height / 2;

            if (left + width > window.innerWidth - margin) {
                left = rect.left - width - 12;
            }
            if (left < margin) {
                left = Math.min(Math.max(rect.left, margin), window.innerWidth - width - margin);
                top = rect.bottom + 10;
            }
            if (top + height > window.innerHeight - 16) {
                top = Math.max(16, window.innerHeight - height - 16);
            }
            if (top < 16) top = 16;

            policyTooltip.style.left = `${left}px`;
            policyTooltip.style.top = `${top}px`;
            return true;
        }

        function renderTreeNode(node, nodeId, depth = 0) {
            const name = childName(node);
            const children = typeof node === "object" ? node.children || [] : [];
            if (!children.length) {
                return `<button class="tree-leaf" data-node="${escapeAttribute(nodeId)}">${renderNodeLabel(name, nodeId)}</button>`;
            }

            const collapsedClass = depth === 0 ? "" : " collapsed";
            const toggleText = depth === 0 ? "收起" : "展开";
            return `
                <div class="tree-section${collapsedClass}">
                    <button class="tree-toggle" data-node="${escapeAttribute(nodeId)}">
                        <span>${name}</span>
                        <span class="toggle-mark">${toggleText}</span>
                    </button>
                    <div class="tree-children">
                        ${children.map(child => renderTreeNode(child, `${nodeId}:${childName(child)}`, depth + 1)).join("")}
                    </div>
                </div>
            `;
        }

        function renderNodeLabel(name, nodeId) {
            return `
                <span class="tree-label">
                    <span class="tree-label-text">${escapeHTML(name)}</span>
                    ${renderPersonCountryBadge(name, nodeId)}
                </span>
            `;
        }

        function renderPersonCountryBadge(name, nodeId) {
            if (!nodeId || !nodeId.startsWith("people:")) return "";
            const countryMap = typeof personCountryMap !== "undefined" ? personCountryMap : {};
            const badgeMap = typeof countryBadgeClassMap !== "undefined" ? countryBadgeClassMap : {};
            const country = countryMap[name];
            if (!country) return "";
            const labels = Array.isArray(country) ? country : [country];
            const badges = labels.map(label => {
                const badgeClass = badgeMap[label] || "";
                return `<span class="country-badge ${badgeClass}">${escapeHTML(label)}</span>`;
            }).join("");
            return `<span class="country-badge-row">${badges}</span>`;
        }

        function selectNode(nodeId) {
            if (nodeId === "home") {
                state.current = {
                    nodeId,
                    name: "首页",
                    path: "首页",
                    type: "目录",
                    asset: "optional",
                    children: archive,
                    image: "assets/helios/封面.png",
                    imageAspect: "1103 / 1426"
                };
            } else {
                const resolved = resolveNode(nodeId);
                const section = resolved.section;
                const node = resolved.node;
                const parent = resolved.parent;
                if (!section || !node) {
                    console.warn("无法定位节点", nodeId);
                    return;
                }
                const isTopLevel = node === section;
                const resolvedAsset = resolveNodeAsset(section, node);
                state.current = {
                    nodeId,
                    name: childName(node),
                    path: `首页 / ${resolved.path.map(item => item.name).join(" / ")}`,
                    type: isTopLevel ? section.type || "分类" : childName(parent),
                    asset: resolvedAsset,
                    children: node && typeof node === "object" ? node.children || [] : [],
                    content: node && typeof node === "object" ? node.content || [] : [],
                    image: node && typeof node === "object" ? node.image || "" : "",
                    images: node && typeof node === "object" ? node.images || [] : [],
                    imageAspect: node && typeof node === "object" ? node.imageAspect || "" : "",
                    markdown: node && typeof node === "object" ? node.markdown || "" : "",
                    statBlock: node && typeof node === "object" ? node.statBlock || null : null,
                    policies: node && typeof node === "object" ? node.policies || null : null,
                    relations: node && typeof node === "object" ? node.relations || node.diplomacy || null : null
                };
            }

            document.querySelectorAll(".tree-leaf").forEach(button => {
                button.classList.toggle("active", button.dataset.node === nodeId);
            });
            document.querySelectorAll(".tree-toggle").forEach(button => {
                button.classList.toggle("active", button.dataset.node === nodeId);
            });
            expandActivePath(nodeId);
            renderPanel();
        }

        function resolveNodeAsset(section, node) {
            if (!node || typeof node !== "object") return "optional";
            if (node.asset) return node.asset;
            if (node === section) return section.asset || "optional";
            if (!section.asset) return "optional";
            if (["country", "person", "race"].includes(section.asset)) {
                return hasOwnVisualAsset(node) ? section.asset : "none";
            }
            return isDirectoryNode(node) ? "none" : section.asset;
        }

        function isDirectoryNode(node) {
            if (!node || typeof node !== "object") return false;
            return Boolean(node.children && node.children.length) && !hasOwnPageContent(node);
        }

        function hasOwnPageContent(node) {
            if (!node || typeof node !== "object") return false;
            return Boolean(
                node.markdown ||
                node.statBlock ||
                node.policies ||
                node.relations ||
                node.diplomacy ||
                node.content && node.content.length ||
                hasOwnVisualAsset(node)
            );
        }

        function hasOwnVisualAsset(node) {
            if (!node || typeof node !== "object") return false;
            return Boolean(node.image || node.images && node.images.length);
        }

        function expandActivePath(nodeId) {
            document.querySelectorAll(".tree-toggle").forEach(button => {
                if (nodeId.startsWith(`${button.dataset.node}:`)) {
                    button.closest(".tree-section").classList.remove("collapsed");
                }
            });
            updateToggleMarks();
        }

        function updateToggleMarks() {
            document.querySelectorAll(".tree-toggle").forEach(button => {
                const marker = button.querySelector(".toggle-mark");
                if (!marker) return;
                marker.textContent = button.closest(".tree-section").classList.contains("collapsed") ? "展开" : "收起";
            });
        }

        function resolveNode(nodeId) {
            const parts = nodeId.split(":");
            const section = archive.find(item => item.id === parts[0]);
            let node = section;
            let parent = null;
            const path = section ? [{ name: section.name, node }] : [];

            for (const label of parts.slice(1)) {
                parent = node;
                node = ((parent && parent.children) || []).find(item => childName(item) === label);
                if (!node) break;
                path.push({ name: childName(node), node });
            }

            return { section, node, parent, path };
        }

        function renderPanel() {
            panelPath.textContent = state.current.path;
            panelTitle.textContent = state.current.name;
            panelType.textContent = state.current.type;
            panelType.className = `type-pill ${assetClass(state.current.asset)}`;
            workspace.classList.toggle("country-layout", state.current.asset === "country");
            workspace.classList.toggle("home-layout", state.current.nodeId === "home");
            workspace.classList.toggle("person-layout", state.current.asset === "person" && Boolean(state.current.image));
            workspace.classList.toggle("no-asset-layout", state.current.asset === "none");

            const contentHasPolicies = state.current.content && state.current.content.some(item => item && typeof item === "object" && item.type === "policies");
            const contentHasRelations = state.current.content && state.current.content.some(item => item && typeof item === "object" && (item.type === "relations" || item.type === "diplomacy"));
            const bodyMarkdown = state.current.markdown ? prepareMarkdownForPanels(state.current.markdown, {
                policies: state.current.policies && !contentHasPolicies,
                relations: state.current.relations && !contentHasRelations
            }) : "";

            if (state.current.markdown || state.current.statBlock || state.current.policies || state.current.relations) {
                panelBody.innerHTML = `
                    ${bodyMarkdown ? `<div class="intro-copy">${renderMarkdown(bodyMarkdown)}</div>` : ""}
                    ${state.current.content && state.current.content.length ? `<div class="intro-copy">${state.current.content.map(renderContentParagraph).join("")}</div>` : ""}
                    ${state.current.policies && !contentHasPolicies && (!bodyMarkdown || !bodyMarkdown.includes("[[policies]]")) ? `<div class="intro-copy">${renderPolicyPanel(state.current.policies)}</div>` : ""}
                    ${state.current.relations && !contentHasRelations && (!bodyMarkdown || (!bodyMarkdown.includes("[[relations]]") && !bodyMarkdown.includes("[[diplomacy]]"))) ? `<div class="intro-copy">${renderDiplomacyPanel(state.current.relations)}</div>` : ""}
                    ${state.current.statBlock ? renderStatBlock(state.current.statBlock) : ""}
                    ${state.current.children.length ? renderChildrenGrid() : ""}
                `;
            } else if (state.current.content && state.current.content.length) {
                panelBody.innerHTML = `
                    <div class="intro-copy">
                        ${state.current.content.map(renderContentParagraph).join("")}
                    </div>
                    ${state.current.children.length ? renderChildrenGrid() : ""}
                `;
            } else if (state.current.children.length) {
                panelBody.innerHTML = `
                    ${state.current.nodeId === "home" ? renderHomeCover() : ""}
                    ${renderChildrenGrid()}
                `;
            } else {
                panelBody.innerHTML = `<div class="empty-editor" aria-label="${state.current.name}内容区"></div>`;
            }

            renderAssetSlot(state.current.asset);
        }

        function prepareMarkdownForPanels(markdown, panels) {
            const shouldInjectPolicies = panels && panels.policies;
            if (!shouldInjectPolicies || !markdown) return markdown;

            const lines = markdown
                .split("\n")
                .filter(line => line.trim() !== "[[policies]]");
            const overviewIndex = lines.findIndex(line => /^#{2,4}\s*姒傝堪\s*$/.test(line.trim()));
            if (overviewIndex >= 0) {
                lines.splice(overviewIndex, 0, "", "[[policies]]", "");
                return lines.join("\n");
            }

            const titleIndex = lines.findIndex(line => /^#\s+/.test(line.trim()));
            if (titleIndex >= 0) {
                lines.splice(titleIndex + 1, 0, "", "[[policies]]", "");
                return lines.join("\n");
            }

            return `[[policies]]\n\n${lines.join("\n")}`;
        }

        function childName(child) {

        function childMeta(child) {
            if (typeof child !== "object") return "未填充";
            if (child.content && child.content.length) return "已记录";
            if (child.markdown) return "已记录";
            if (child.statBlock) return "已记录";
            if (child.children && child.children.length) return `含 ${child.children.length} 项`;
            return "未填充";
        }

        function renderMarkdown(markdown) {
            const lines = markdown.trim().split(/\r?\n/);
            const html = [];

            for (let index = 0; index < lines.length; index += 1) {
                const line = lines[index].trim();
                if (!line || line === "---") continue;

                if (line.startsWith("*") && !line.startsWith("**") && !line.startsWith("* ")) {
                    const mottoLines = [];
                    let current = line;
                    while (index < lines.length) {
                        mottoLines.push(current);
                        if (current.endsWith("*")) break;
                        index += 1;
                        current = index < lines.length ? lines[index].trim() : "";
                    }
                    const cleaned = mottoLines.map((mottoLine, mottoIndex) => {
                        let value = mottoLine;
                        if (mottoIndex === 0) value = value.replace(/^\*/, "");
                        if (mottoIndex === mottoLines.length - 1) value = value.replace(/\*$/, "");
                        return value;
                    }).filter(Boolean);
                    html.push(`<p class="nation-motto"><em>${cleaned.map(renderInlineMarkdown).join("<br>")}</em></p>`);
                    continue;
                }

                if (/^(={6,}|_{6,})$/.test(line)) {
                    html.push(`<div class="form-rule"></div>`);
                    continue;
                }

                if (line.startsWith("[[download:")) {
                    const download = line.match(/^\[\[download:(.+?)\|(.+?)\]\]$/);
                    if (download) {
                        html.push(`<p><a class="download-button" href="${escapeAttribute(download[2])}" download>${renderInlineMarkdown(download[1])}</a></p>`);
                        continue;
                    }
                }

                if (line.startsWith("[[pdf-preview:")) {
                    const preview = line.match(/^\[\[pdf-preview:(.+?)\]\]$/);
                    if (preview) {
                        const src = escapeAttribute(preview[1]);
                        html.push(`<div class="pdf-preview"><iframe src="${src}" title="PDF 预览"></iframe></div>`);
                        continue;
                    }
                }

                if (line === "[[policies]]") {
                    html.push(renderPolicyPanel(state.current.policies));
                    continue;
                }

                if (line === "[[relations]]" || line === "[[diplomacy]]") {
                    html.push(renderDiplomacyPanel(state.current.relations));
                    continue;
                }

                if (line.startsWith("[[official-card:")) {
                    const card = line.match(/^\[\[official-card:(.+?)\|(.+?)\|(.+?)\]\]$/);
                    if (card) {
                        const bodyLines = [];
                        index += 1;
                        while (index < lines.length && lines[index].trim() !== "[[/official-card]]") {
                            bodyLines.push(lines[index]);
                            index += 1;
                        }
                        html.push(renderOfficialCard(card[1], card[2], card[3], bodyLines.join("\n")));
                        continue;
                    }
                }

                if (line.startsWith("|")) {
                    const tableLines = [];
                    while (index < lines.length && lines[index].trim().startsWith("|")) {
                        tableLines.push(lines[index].trim());
                        index += 1;
                    }
                    index -= 1;
                    html.push(renderMarkdownTable(tableLines));
                    continue;
                }

                if (isMarkdownListLine(line)) {
                    const items = [];
                    while (index < lines.length && isMarkdownListLine(lines[index].trim())) {
                        items.push(stripMarkdownListMarker(lines[index].trim()));
                        index += 1;
                    }
                    index -= 1;
                    html.push(`<ul>${items.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ul>`);
                    continue;
                }

                if (line.startsWith("#### ")) {
                    html.push(`<div class="minor-heading">${renderInlineMarkdown(line.slice(5))}</div>`);
                    continue;
                }

                if (line.startsWith("### ")) {
                    html.push(`<div class="sub-heading">${renderInlineMarkdown(line.slice(4))}</div>`);
                    continue;
                }

                if (line.startsWith("## ")) {
                    html.push(`<div class="section-heading">${renderInlineMarkdown(line.slice(3))}</div>`);
                    continue;
                }

                if (line.startsWith("# ")) {
                    html.push(`<p>${renderInlineMarkdown(line.slice(2))}</p>`);
                    continue;
                }

                html.push(`<p>${renderInlineMarkdown(line)}</p>`);
            }

            return html.join("");
        }
