        function normalizeDiplomacyEntries(relations) {
            if (!relations) return [];
            if (Array.isArray(relations)) {
                const groups = new Map();
                relations.forEach(item => {
                    if (!item || typeof item !== "object") return;
                    const groupName = item.group || item.category || "外交关系";
                    const label = item.target || item.country || item.name;
                    const value = item.attitude || item.status || item.value;
                    if (!label || !value) return;
                    if (!groups.has(groupName)) groups.set(groupName, []);
                    groups.get(groupName).push({ label, value, note: item.note || "" });
                });
                return Array.from(groups, ([name, entries]) => ({ name, entries }));
            }

            if (typeof relations !== "object") return [];
            const entries = Object.entries(relations);
            const hasNestedGroups = entries.some(([, value]) => value && typeof value === "object" && !Array.isArray(value) && !(value.attitude || value.status || value.value));

            if (hasNestedGroups) {
                return entries.map(([groupName, groupEntries]) => ({
                    name: groupName,
                    entries: Object.entries(groupEntries || {}).map(([label, raw]) => {
                        if (raw && typeof raw === "object") {
                            return {
                                label: raw.target || raw.country || label,
                                value: raw.attitude || raw.status || raw.value || "",
                                note: raw.note || ""
                            };
                        }
                        return { label, value: raw, note: "" };
                    }).filter(entry => entry.value)
                })).filter(group => group.entries.length);
            }

            return [{
                name: "外交关系",
                entries: entries.map(([label, raw]) => {
                    if (raw && typeof raw === "object") {
                        return {
                            label: raw.target || raw.country || label,
                            value: raw.attitude || raw.status || raw.value || "",
                            note: raw.note || ""
                        };
                    }
                    return { label, value: raw, note: "" };
                }).filter(entry => entry.value)
            }];
        }

        function renderDiplomacyPanel(relations) {
            const groups = normalizeDiplomacyEntries(relations);
            if (!groups.length) return "";

            return `
                <section class="policy-panel diplomacy-panel">
                    <div class="policy-panel-title">外交关系</div>
                    ${groups.map(group => `
                        <div class="policy-group">
                            <div class="policy-group-title">${escapeHTML(group.name)}</div>
                            <div class="policy-chip-list">
                                ${group.entries.map(entry => {
                                    const description = diplomacyDescriptions[entry.value] || "";
                                    const fullDescription = entry.note ? [description, entry.note].filter(Boolean).join("\n") : description;
                                    const descriptionAttr = fullDescription ? ` data-policy-desc="${escapeAttribute(fullDescription)}" tabindex="0"` : "";
                                    return `
                                        <span class="policy-chip ${diplomacyChipClass(entry.value)}"${descriptionAttr}>
                                            <span class="policy-label">${escapeHTML(entry.label)}</span>
                                            <span class="policy-value">${escapeHTML(entry.value)}</span>
                                        </span>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    `).join("")}
                </section>
            `;
        }

        function renderPolicyPanel(policies) {
            if (!policies || typeof policies !== "object") return "";
            if (policies.specialStatus) {
                return `
                    <section class="policy-panel special-state">
                        <div class="policy-status-banner">${escapeHTML(policies.specialStatus)}</div>
                    </section>
                `;
            }
            const groupClassMap = {
                "\u6743\u529b\u7ed3\u6784": "power",
                "\u7ecf\u6d4e\u5236\u5ea6": "economy",
                "\u4eba\u6743\u4e0e\u52b3\u5de5": "rights"
            };
            const groups = Object.entries(policies).map(([groupName, entries]) => {
                const chipClass = groupClassMap[groupName] || "";
                const chips = Object.entries(entries || {}).map(([label, value]) => {
                    const description = policyDescriptions[value] || "";
                    const descriptionAttr = description ? ` data-policy-desc="${escapeAttribute(description)}" tabindex="0"` : "";
                    return `
                        <span class="policy-chip ${chipClass}"${descriptionAttr}>
                            <span class="policy-label">${escapeHTML(label)}</span>
                            <span class="policy-value">${escapeHTML(value)}</span>
                        </span>
                    `;
                }).join("");
                return `
                    <div class="policy-group">
                        <div class="policy-group-title">${escapeHTML(groupName)}</div>
                        <div class="policy-chip-list">${chips}</div>
                    </div>
                `;
            }).join("");

            return `
                <section class="policy-panel">
                    <div class="policy-panel-title">\u56fd\u5bb6\u653f\u7b56</div>
                    ${groups}
                </section>
            `;
        }

        function isMarkdownListLine(line) {
            return /^(\* |•\s*|- \[[ xX]\] |\[[ xX]\] )/.test(line);
        }

        function stripMarkdownListMarker(line) {
            return line
                .replace(/^\* /, "")
                .replace(/^•\s*/, "")
                .replace(/^- (\[[ xX]\] )/, "$1")
                .replace(/^(\[[ xX]\] )/, "$1");
        }

        function renderMarkdownTable(lines) {
            const rows = lines
                .filter(line => !/^\|\s*-/.test(line))
                .map(line => line.split("|").slice(1, -1).map(cell => cell.trim()));

            if (!rows.length) return "";
            const headers = rows[0].map(header => `<th>${renderInlineMarkdown(header)}</th>`).join("");
            const body = rows.slice(1).map(row => `
                <tr>${row.map(cell => `<td>${renderInlineMarkdown(cell)}</td>`).join("")}</tr>
            `).join("");

            return `
                <div class="content-table-wrap">
                    <table class="content-table">
                        <thead><tr>${headers}</tr></thead>
                        <tbody>${body}</tbody>
                    </table>
                </div>
            `;
        }

        function renderInlineMarkdown(value) {
            return escapeHTML(value)
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, `<img class="inline-portrait" src="$2" alt="$1">`)
                .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                .replace(/\[ \]/g, `<span class="checkbox-mark" aria-hidden="true"></span>`)
                .replace(/\[[xX]\]/g, `<span class="checkbox-mark" aria-hidden="true">✓</span>`);
        }

        function renderContentParagraph(paragraph, index) {
            if (typeof paragraph === "object" && paragraph.type === "table") return renderContentTable(paragraph);
            if (typeof paragraph === "object" && paragraph.type === "heading") return renderContentHeading(paragraph);
            if (typeof paragraph === "object" && paragraph.type === "motto") {
                const lines = Array.isArray(paragraph.lines) ? paragraph.lines : [paragraph.text || ""];
                return `<p class="nation-motto"><em>${lines.filter(Boolean).map(line => escapeHTML(line)).join("<br>")}</em></p>`;
            }
            if (typeof paragraph === "object" && paragraph.type === "policies") {
                return renderPolicyPanel(paragraph.policies || state.current.policies);
            }
            if (typeof paragraph === "object" && (paragraph.type === "relations" || paragraph.type === "diplomacy")) {
                return renderDiplomacyPanel(paragraph.relations || paragraph.diplomacy || state.current.relations);
            }

            const compactHeadings = [
                "等级坐标",
                "CR坐标",
                "备注",
                "奥斯坎六神",
                "草原主要灵名",
                "群岛五神",
                "北境五神",
                "对他们来说，统治关系非常直观：",
                "登神会内部没有统一教义，只有一个核心目标：",
                "不要崇拜旧神，要成为新神。"
            ];
            const isHeading = index > 0 && (/^\d+\.\s/.test(paragraph) || compactHeadings.includes(paragraph));
            const className = isHeading ? ' class="fact-heading"' : "";
            return `<p${className}>${escapeHTML(paragraph)}</p>`;
        }

        function renderContentHeading(heading) {
            const className = heading.level === 2 ? "section-heading" : "sub-heading";
            return `<div class="${className}">${escapeHTML(heading.text)}</div>`;
        }

        function renderContentTable(table) {
            const headers = table.headers.map(header => `<th>${escapeHTML(header)}</th>`).join("");
            const rows = table.rows.map(row => `
                <tr>${row.map(cell => `<td>${escapeHTML(cell)}</td>`).join("")}</tr>
            `).join("");

            return `
                <div class="content-table-wrap">
                    <table class="content-table">
                        <thead><tr>${headers}</tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        function renderStatBlock(data) {
            const statLabels = {
                str: "STR",
                dex: "DEX",
                con: "CON",
                int: "INT",
                wis: "WIS",
                cha: "CHA"
            };
            const normalizeStatBlockStats = stats => {
                if (Array.isArray(stats)) {
                    return stats.reduce((normalized, stat) => {
                        const key = String(stat.key || "").toLowerCase();
                        if (key) {
                            normalized[key] = {
                                score: stat.score || stat.value || "-",
                                mod: stat.mod || ""
                            };
                        }
                        return normalized;
                    }, {});
                }
                return stats || {};
            };
            const normalizeStatBlockBasicInfo = info => {
                if (Array.isArray(info)) {
                    return info.reduce((normalized, item) => {
                        const key = item.key || item.label;
                        if (key === "性别") normalized.gender = item.value;
                        if (key === "出身") normalized.origin = item.value;
                        if (key === "身高") normalized.height = item.value;
                        if (key === "生日") normalized.birthday = item.value;
                        if (key === "标签") normalized.tags = String(item.value || "").split(/[，,]/).map(tag => tag.trim()).filter(Boolean);
                        return normalized;
                    }, {});
                }
                return info || {};
            };
            const normalizeProperty = prop => ({
                label: prop.label || prop.key || "",
                value: prop.value || ""
            });
            const normalizedStats = normalizeStatBlockStats(data.stats);
            const normalizedBasicInfo = normalizeStatBlockBasicInfo(data.basic_info);
            const statKeys = ["str", "dex", "con", "int", "wis", "cha"];
            const statsHtml = statKeys.map(key => {
                const stat = normalizedStats && normalizedStats[key] ? normalizedStats[key] : { score: "-", mod: "" };
                return `
                    <div class="stat-box">
                        <strong>${statLabels[key]}</strong>
                        <span>${escapeHTML(stat.score)} ${stat.mod ? `(${escapeHTML(stat.mod)})` : ""}</span>
                    </div>
                `;
            }).join("");

            const basicInfo = normalizedBasicInfo ? [
                normalizedBasicInfo.gender ? { label: "性别", value: normalizedBasicInfo.gender } : null,
                normalizedBasicInfo.origin ? { label: "出身", value: normalizedBasicInfo.origin } : null,
                normalizedBasicInfo.height ? { label: "身高", value: normalizedBasicInfo.height } : null,
                normalizedBasicInfo.birthday ? { label: "生日", value: normalizedBasicInfo.birthday } : null,
                normalizedBasicInfo.tags && normalizedBasicInfo.tags.length ? { label: "标签", value: normalizedBasicInfo.tags.join("，") } : null
            ].filter(Boolean) : [];

            const propsHtml = [
                ...basicInfo,
                ...(data.props || []).map(normalizeProperty)
            ].map(prop => `
                <div class="property-line"><strong>${escapeHTML(prop.label)}：</strong>${escapeHTML(prop.value)}</div>
            `).join("");

            const renderTraitList = items => (items || []).map(item => `
                <div class="trait-section">
                    <span class="trait-name">${escapeHTML(item.name)}.</span> ${formatStatText(item.desc)}
                </div>
            `).join("");

            const actionsHtml = data.actions && data.actions.length ? `
                <div class="action-header">动作</div>
                ${renderTraitList(data.actions)}
            ` : "";

            const bonusHtml = data.bonus_actions && data.bonus_actions.length ? `
                <div class="action-header">附赠动作</div>
                ${renderTraitList(data.bonus_actions)}
            ` : "";

            const reactionsHtml = data.reactions && data.reactions.length ? `
                <div class="action-header">反应</div>
                ${renderTraitList(data.reactions)}
            ` : "";

            const legendaryHtml = data.legendary_actions && data.legendary_actions.length ? `
                <div class="action-header">传奇动作</div>
                ${data.legendary_desc ? `<div class="trait-section">${formatStatText(data.legendary_desc)}</div>` : ""}
                ${renderTraitList(data.legendary_actions)}
            ` : "";

            const mythicHtml = data.mythic_actions && data.mythic_actions.length ? `
                <div class="action-header">神话动作</div>
                ${renderTraitList(data.mythic_actions)}
            ` : "";

            const renderSpellList = list => Array.isArray(list)
                ? list.map(spell => `
                    <div class="trait-section">
                        <span class="trait-name">${escapeHTML(spell.level)}：</span>${escapeHTML(spell.spells)}
                    </div>
                `).join("")
                : `<div class="trait-section">${formatStatText(list || "")}</div>`;

            const spellsBody = data.spells && Array.isArray(data.spells.sections)
                ? data.spells.sections.map(section => `
                    ${section.name ? `<div class="trait-section"><span class="trait-name">${escapeHTML(section.name)}</span></div>` : ""}
                    ${renderSpellList(section.list)}
                `).join("")
                : data.spells ? renderSpellList(data.spells.list) : "";

            const spellsHtml = data.spells ? `
                <div class="action-header">施法</div>
                ${data.spells.header ? `<div class="trait-section"><em>${formatStatText(data.spells.header)}</em></div>` : ""}
                ${spellsBody}
            ` : "";

            const companionHtml = data.companion ? `
                <div class="action-header">坐骑</div>
                ${renderStatBlock(data.companion)}
            ` : "";

            const privateDetailsHtml = [
                renderTraitList(data.traits),
                actionsHtml,
                bonusHtml,
                reactionsHtml,
                legendaryHtml,
                mythicHtml,
                spellsHtml,
                companionHtml
            ].join("");
            const avatarHtml = data.avatar ? `
                <div class="stat-avatar">
                    <img src="${escapeAttribute(data.avatar)}" alt="${escapeAttribute(data.name || state.current.name)}头像">
                </div>
            ` : "";

            return `
                <div class="stat-block-container">
                    <div class="stat-header${avatarHtml ? " with-avatar" : ""}">
                        <div class="stat-header-main">
                            <h2>${escapeHTML(data.name || state.current.name)}</h2>
                            <i>${escapeHTML(data.meta || "")}</i>
                        </div>
                        ${avatarHtml}
                    </div>
                    <hr class="tapered-rule">
                    ${data.resume ? `<div class="trait-section"><em>${escapeHTML(data.resume)}</em></div>` : ""}
                    <div class="property-line"><strong>护甲等级：</strong>${escapeHTML(data.ac || "")}</div>
                    <div class="property-line"><strong>生命值：</strong>${escapeHTML(data.hp || "")}</div>
                    <div class="property-line"><strong>速度：</strong>${escapeHTML(data.speed || "")}</div>
                    <hr class="red-rule">
                    <div class="stat-grid">${statsHtml}</div>
                    <hr class="red-rule">
                    ${propsHtml}
                    <hr class="tapered-rule">
                    ${renderProtectedStatDetails(data, privateDetailsHtml)}
                </div>
            `;
        }

        function renderProtectedStatDetails(data, detailsHtml) {
            if (!detailsHtml.trim()) return "";
            if (!shouldProtectStatDetails(data)) return detailsHtml;

            const revealKey = makeStatRevealKey(data);
            return `
                <div class="stat-private-area locked">
                    <div class="stat-private-content" aria-hidden="true">
                        ${detailsHtml}
                    </div>
                    <div class="stat-private-cover">
                        <div class="stat-private-card">
                            <div class="stat-private-title">情报不足</div>
                            <div class="stat-private-note">该角色的特性、动作、施法与更深层战斗资料默认隐藏。</div>
                            <button class="stat-reveal-button" type="button" data-stat-reveal="${escapeAttribute(revealKey)}">查看完整角色卡</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function shouldProtectStatDetails(data) {
            if (!state.current.nodeId || !state.current.nodeId.startsWith("people:")) return false;
            if (hasFullStatAccess()) return false;
            return !state.revealedStatBlocks.has(makeStatRevealKey(data));
        }

        // 防窥只作用于角色卡中“特性/动作/施法/传奇动作”等战斗细节。
        // 人物节点、正文简介、立绘、头像、AC/HP/六维/语言等基础面板必须始终可见。
        function hasFullStatAccess() {
            return normalizeEmail(state.viewerEmail) === HELIOS_FULL_STAT_EMAIL;
        }

        function makeStatRevealKey(data) {
            return `${state.current.nodeId || "unknown"}:${data.name || state.current.name || "stat"}`;
        }

        function formatStatText(value) {
            return escapeHTML(value || "").replace(/\n/g, "<br>");
        }

        function escapeHTML(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            }[char]));
        }

        function renderAssetSlot(assetType) {
            assetSlot.className = "asset-slot";
            assetSlot.style.aspectRatio = "";
            assetSlot.innerHTML = `
                <div>
                    <div class="asset-label" id="asset-label">图片位</div>
                    <div class="asset-note" id="asset-note">留空</div>
                </div>
            `;

            if (assetType === "country") {
                assetSlot.classList.add("map", "country");
                assetTitle.textContent = "地理图";
                if (state.current.images && state.current.images.length) {
                    assetSlot.classList.add("has-image", "multi-map");
                    assetSlot.style.aspectRatio = "";
                    assetSlot.innerHTML = state.current.images.map(image => `
                        <div class="asset-map-item">
                            <div class="asset-map-label">${escapeHTML(image.label || "地理图")}</div>
                            <div class="asset-map-frame" style="aspect-ratio:${escapeAttribute(image.aspect || "4 / 3")}">
                                <img src="${escapeAttribute(image.src)}" alt="${escapeAttribute(image.label || state.current.name)}地理图">
                            </div>
                        </div>
                    `).join("");
                } else if (state.current.image) {
                    assetSlot.classList.add("has-image");
                    if (state.current.imageAspect) assetSlot.style.aspectRatio = state.current.imageAspect;
                    assetSlot.innerHTML = `<img src="${escapeAttribute(state.current.image)}" alt="${escapeAttribute(state.current.name)}地理图">`;
                } else {
                    updateAssetText("国家地理图", "留空");
                }
                return;
            }

            if (assetType === "person" || assetType === "race") {
                if (state.current.image) {
                    assetSlot.classList.add("portrait", assetType, "has-image");
                    assetTitle.textContent = assetType === "person" ? "立绘" : "种族图";
                    if (state.current.imageAspect) assetSlot.style.aspectRatio = state.current.imageAspect;
                    assetSlot.innerHTML = `<img src="${escapeAttribute(state.current.image)}" alt="${escapeAttribute(state.current.name)}立绘">`;
                } else {
                    assetSlot.classList.add("avatar", assetType);
                    assetTitle.textContent = "头像";
                    updateAssetText(assetType === "person" ? "人物头像" : "种族头像", "留空");
                }
                return;
            }

            assetSlot.classList.add("optional");
            assetTitle.textContent = state.current.nodeId === "home" ? "封面" : "可选图片";
            if (state.current.image) {
                assetSlot.classList.add("has-image");
                if (state.current.imageAspect) assetSlot.style.aspectRatio = state.current.imageAspect;
                assetSlot.innerHTML = `<img src="${escapeAttribute(state.current.image)}" alt="${escapeAttribute(state.current.name)}图片">`;
            } else {
                updateAssetText("图片位", "留空");
            }
        }

        function updateAssetText(label, note) {
            const currentAssetLabel = assetSlot.querySelector(".asset-label");
            const currentAssetNote = assetSlot.querySelector(".asset-note");
            if (currentAssetLabel) currentAssetLabel.textContent = label;
            if (currentAssetNote) currentAssetNote.textContent = note;
        }

        function escapeAttribute(value) {
            return String(value).replace(/["'<>]/g, "");
        }

        function assetClass(assetType) {
            if (assetType === "country") return "map country";
            if (assetType === "person") return "avatar person";
            if (assetType === "race") return "avatar race";
            return "optional";
        }

        function normalizeEmail(value) {
            return String(value || "").trim().toLowerCase();
        }

        function readStoredViewerEmail() {
            const params = new URLSearchParams(location.search);
            const paramKeys = ["email", "userEmail", "account", "viewerEmail"];
            for (const key of paramKeys) {
                const value = params.get(key);
                if (value && value.includes("@")) return normalizeEmail(value);
            }

            const storageKeys = [
                "currentUserEmail",
                "userEmail",
                "viewerEmail",
                "heliosViewerEmail",
                "dnd_user_email"
            ];
            for (const storage of [window.localStorage, window.sessionStorage]) {
                if (!storage) continue;
                for (const key of storageKeys) {
                    const value = storage.getItem(key);
                    if (value && value.includes("@")) return normalizeEmail(value);
                }

                const omniSession = storage.getItem("omni_session");
                if (omniSession) {
                    try {
                        const parsed = JSON.parse(omniSession);
                        if (parsed && parsed.email) return normalizeEmail(parsed.email);
                    } catch (error) {
                        // Ignore malformed local session data.
                    }
                }
            }

            return "";
        }

        async function resolveHeliosViewerEmail() {
            let email = readStoredViewerEmail();

            if (typeof supabaseClient !== "undefined" && supabaseClient && supabaseClient.auth) {
                try {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session && session.user && session.user.email) {
                        email = normalizeEmail(session.user.email);
                    } else {
                        const { data: { user } } = await supabaseClient.auth.getUser();
                        if (user && user.email) email = normalizeEmail(user.email);
                    }
                } catch (error) {
                    // 本页是静态档案页，鉴权失败不能影响浏览；只会让战斗细节保持防窥。
                }
            }

            state.viewerEmail = email;
            state.authResolved = true;
            renderPanel();
        }

        function preserveUidLinks() {
            const params = new URLSearchParams(location.search);
            const uid = params.get("uid");
            if (!uid) return;

            document.getElementById("back-link").href = `index.html?uid=${encodeURIComponent(uid)}`;
        }

        function renderDataLoadError(error) {
            const fileHint = location.protocol === "file:"
                ? "<p>当前页面似乎是用 file:// 直接打开的。拆分为 JSON 后，浏览器通常需要通过本地服务器访问，例如在项目目录运行 <code>python -m http.server</code> 后打开对应地址。</p>"
                : "";
            tree.innerHTML = `<button class="tree-leaf active" data-node="home">首页</button>`;
            panelPath.textContent = "首页";
            panelTitle.textContent = "赫里奥斯";
            panelType.textContent = "数据未加载";
            panelType.className = "type-pill optional";
            panelBody.innerHTML = `
                <div class="intro-copy">
                    <h2>档案数据加载失败</h2>
                    <p>${escapeHTML(error && error.message ? error.message : String(error))}</p>
                    ${fileHint}
                </div>
            `;
            renderAssetSlot("optional");
        }

        async function initializeHelios() {
            preserveUidLinks();
            panelBody.innerHTML = `<div class="intro-copy"><p>正在加载赫里奥斯档案……</p></div>`;
            try {
                await loadHeliosData();
            } catch (error) {
                console.error(error);
                renderDataLoadError(error);
                return;
            }

            state.current.children = archive;
            buildTree();
            renderPanel();
            resolveHeliosViewerEmail();
        }

        initializeHelios();
    </script>
</body>
</html>
