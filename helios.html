<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赫里奥斯</title>
    <style>
        :root {
            --bg: #f4f1ea;
            --paper: #fffdf8;
            --paper-soft: #f8f5ed;
            --ink: #1f2933;
            --muted: #68717d;
            --line: #ded6c8;
            --line-strong: #bfae96;
            --gold: #a36f2c;
            --wine: #733a3a;
            --teal: #2f6f67;
            --shadow: 0 16px 40px rgba(31, 41, 51, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(120deg, rgba(115, 58, 58, 0.08), transparent 34%),
                linear-gradient(300deg, rgba(47, 111, 103, 0.1), transparent 38%),
                var(--bg);
            color: var(--ink);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        a {
            color: inherit;
        }

        .page-shell {
            width: min(1440px, calc(100% - 48px));
            min-height: calc(100vh - 48px);
            margin: 24px auto;
            display: grid;
            grid-template-columns: 304px minmax(0, 1fr);
            border: 1px solid var(--line);
            background: rgba(255, 253, 248, 0.82);
            box-shadow: var(--shadow);
        }

        .sidebar {
            border-right: 1px solid var(--line);
            background: rgba(248, 245, 237, 0.92);
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 48px);
        }

        .brand {
            padding: 24px;
            border-bottom: 1px solid var(--line);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 22px;
            color: var(--muted);
            font-size: 13px;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--wine);
        }

        .brand-title {
            margin: 0;
            font-size: 30px;
            line-height: 1.1;
            letter-spacing: 0;
        }

        .brand-subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .tree {
            padding: 18px 14px 28px;
            overflow-y: auto;
        }

        .tree-section {
            margin-bottom: 8px;
        }

        .tree-toggle,
        .tree-leaf {
            width: 100%;
            min-height: 38px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--ink);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 9px 10px;
            font: inherit;
            text-align: left;
            letter-spacing: 0;
        }

        .tree-toggle {
            font-weight: 800;
        }

        .tree-leaf {
            color: #394553;
            font-size: 14px;
        }

        .tree-toggle:hover,
        .tree-leaf:hover {
            background: rgba(163, 111, 44, 0.09);
        }

        .tree-toggle.active {
            background: rgba(115, 58, 58, 0.1);
            color: var(--wine);
        }

        .tree-leaf.active {
            background: #232b35;
            color: #fff;
        }

        .tree-children {
            margin: 2px 0 10px 14px;
            padding-left: 10px;
            border-left: 1px solid var(--line);
        }

        .toggle-mark {
            flex: 0 0 auto;
            color: var(--gold);
            font-size: 12px;
        }

        .content {
            min-width: 0;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .content-top {
            padding: 28px 34px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: flex-start;
            background: rgba(255, 253, 248, 0.72);
        }

        .kicker {
            color: var(--gold);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .page-title {
            margin: 8px 0 0;
            font-size: clamp(28px, 4vw, 46px);
            line-height: 1.1;
            letter-spacing: 0;
        }

        .workspace {
            padding: 34px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 24px;
            align-items: start;
        }

        .workspace.country-layout {
            grid-template-columns: 1fr;
        }

        .workspace.country-layout .asset-panel {
            position: static;
            order: -1;
        }

        .main-panel,
        .asset-panel {
            border: 1px solid var(--line);
            background: var(--paper);
        }

        .main-panel {
            min-height: 620px;
        }

        .panel-header {
            padding: 22px 24px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .panel-eyebrow {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.1em;
        }

        .panel-title {
            margin: 6px 0 0;
            font-size: 28px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .type-pill {
            flex: 0 0 auto;
            border-radius: 999px;
            padding: 7px 12px;
            color: #fff;
            background: var(--teal);
            font-size: 12px;
            font-weight: 800;
        }

        .type-pill.country {
            background: var(--wine);
        }

        .type-pill.person,
        .type-pill.race {
            background: var(--teal);
        }

        .panel-body {
            padding: 24px;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .section-card {
            width: 100%;
            min-height: 116px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper-soft);
            color: inherit;
            cursor: pointer;
            font: inherit;
            padding: 16px;
            text-align: left;
            transition: border-color 0.16s ease, transform 0.16s ease, background 0.16s ease;
        }

        .section-card:hover {
            border-color: var(--line-strong);
            background: #fffaf0;
            transform: translateY(-1px);
        }

        .section-name {
            font-weight: 900;
            font-size: 17px;
        }

        .section-meta {
            margin-top: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .empty-editor {
            min-height: 368px;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            background:
                linear-gradient(transparent 31px, rgba(222, 214, 200, 0.46) 32px),
            var(--paper-soft);
            background-size: 100% 32px;
        }

        .intro-copy {
            max-width: 820px;
            color: #2f3844;
            font-size: 17px;
            line-height: 2;
        }

        .intro-copy p {
            margin: 0 0 20px;
        }

        .intro-copy p:first-child {
            color: var(--wine);
            font-size: 20px;
            font-weight: 900;
        }

        .intro-copy .fact-heading {
            margin-top: 30px;
            color: var(--ink);
            font-size: 19px;
            font-weight: 900;
            line-height: 1.6;
        }

        .intro-copy .section-heading {
            margin: 42px 0 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--line);
            color: var(--wine);
            font-size: 24px;
            font-weight: 900;
            line-height: 1.35;
        }

        .intro-copy .sub-heading {
            margin: 30px 0 12px;
            color: var(--ink);
            font-size: 20px;
            font-weight: 900;
            line-height: 1.45;
        }

        .content-table-wrap {
            max-width: 100%;
            margin: 12px 0 26px;
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper-soft);
        }

        .content-table {
            width: 100%;
            min-width: 620px;
            border-collapse: collapse;
            font-size: 14px;
            line-height: 1.6;
        }

        .content-table th,
        .content-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        .content-table th {
            color: var(--wine);
            background: rgba(163, 111, 44, 0.08);
            font-weight: 900;
        }

        .content-table tr:last-child td {
            border-bottom: 0;
        }

        .asset-panel {
            position: sticky;
            top: 24px;
        }

        .asset-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--line);
        }

        .asset-title {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0;
        }

        .asset-slot {
            margin: 20px;
            min-height: 260px;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: var(--muted);
            background: var(--paper-soft);
            text-align: center;
            padding: 18px;
        }

        .asset-slot.avatar {
            min-height: 220px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            margin-inline: auto;
            width: min(220px, calc(100% - 40px));
        }

        .asset-slot.map {
            min-height: 0;
            aspect-ratio: 16 / 7;
            width: calc(100% - 40px);
        }

        .asset-label {
            font-weight: 900;
            color: #344050;
        }

        .asset-note {
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.6;
        }

        @media (max-width: 980px) {
            .page-shell {
                width: 100%;
                min-height: 100vh;
                margin: 0;
                grid-template-columns: 1fr;
            }

            .sidebar {
                min-height: 0;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .tree {
                max-height: 340px;
            }

            .workspace,
            .workspace.country-layout {
                grid-template-columns: 1fr;
                padding: 22px;
            }

            .asset-panel {
                position: static;
            }
        }

        @media (max-width: 640px) {
            .content-top,
            .panel-header {
                align-items: stretch;
                flex-direction: column;
            }

            .content-top,
            .workspace {
                padding-inline: 16px;
            }

            .brand {
                padding-inline: 16px;
            }

            .asset-slot.map {
                aspect-ratio: 4 / 3;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <aside class="sidebar">
            <div class="brand">
                <a id="back-link" class="back-link" href="index.html">← 返回主界面</a>
                <h1 class="brand-title">赫里奥斯</h1>
                <p class="brand-subtitle">世界档案目录</p>
            </div>
            <nav class="tree" id="tree" aria-label="赫里奥斯目录"></nav>
        </aside>

        <main class="content">
            <header class="content-top">
                <div>
                    <div class="kicker">Helios Archive</div>
                    <h2 class="page-title">赫里奥斯</h2>
                </div>
            </header>

            <section class="workspace" id="workspace">
                <article class="main-panel">
                    <header class="panel-header">
                        <div>
                            <div class="panel-eyebrow" id="panel-path">首页</div>
                            <h3 class="panel-title" id="panel-title">首页</h3>
                        </div>
                        <span class="type-pill" id="panel-type">目录</span>
                    </header>
                    <div class="panel-body" id="panel-body"></div>
                </article>

                <aside class="asset-panel">
                    <header class="asset-header">
                        <h3 class="asset-title" id="asset-title">可选图片</h3>
                    </header>
                    <div class="asset-slot" id="asset-slot">
                        <div>
                            <div class="asset-label" id="asset-label">图片位</div>
                            <div class="asset-note" id="asset-note">留空</div>
                        </div>
                    </div>
                </aside>
            </section>
        </main>
    </div>

    <script>
        const religionOverviewContent = [
            "基本前提",
            "赫里奥斯的宗教并不建立在“神明现身说法”之上。神术真实存在，但神明不可知；宗教可以定义神，却不能解释神。",
            "因此，不同文明对神、世界、灵魂、秩序和死亡形成了各自的解释体系。它们既是信仰，也是法律、身份、共同体和国家合法性的来源。",
            { type: "heading", level: 2, text: "奥斯坎大陆宗教" },
            { type: "heading", level: 3, text: "1. 纳希德教" },
            "类型：一神教",
            "主神：拉赫曼",
            "主要分布：奥斯坎大陆南部、西南部及苔原商路地区",
            "纳希德教是一种严格的一神教，主张世间只有唯一至高的神——拉赫曼。",
            "拉赫曼不可见、不可像、不可被凡人完全理解。信徒认为，世界由拉赫曼创造，人的一生是对信仰、纪律、仁慈与服从的考验。",
            "纳希德教禁止偶像崇拜，重视祈祷、斋戒、施舍、巡礼和经文学习。它在苔原、冻土、商路城市和边境公国中影响很深，尤其适合形成跨部族、跨城邦的共同体认同。",
            "纳希德教的神术者通常被视为经文、律法与虔信的守护者。他们不声称自己见过拉赫曼，只认为神术是拉赫曼允许凡人见证的迹象。",
            { type: "heading", level: 3, text: "2. 普罗维登斯教" },
            "类型：一神教",
            "主神：普罗维登斯",
            "主要分布：普罗维登斯集团及其影响区",
            "普罗维登斯教信奉唯一神普罗维登斯，其名意为“天意、预备、眷顾”。",
            "该教认为世界并非混乱展开，而是存在一个不可完全理解的神圣秩序。凡人无法窥见全貌，却可以通过纪律、劳动、契约、家庭、国家和教会生活参与其中。",
            "它强调守约、克制、责任、命运感和社会秩序，常与城市、商会、军队和官僚体系结合。",
            "普罗维登斯集团将该教视为自身政治合法性的根基。国家并不宣称直接代表神，而是宣称自己在维护一种更高、更稳定的秩序。",
            { type: "heading", level: 3, text: "3. 哥伦比娅信仰" },
            "类型：一神教",
            "主神：哥伦比娅",
            "主要分布：黄金王国",
            "黄金王国信奉唯一神哥伦比娅。",
            "在黄金王国传统中，哥伦比娅既是创造者，也是黄金、光、王权、民族命运与神圣美的象征。",
            "哥伦比娅接近一种被国家、族群与神学共同定义的至高神圣原则。黄金王国认为自身民族与哥伦比娅有特殊关系，因此哥伦比娅信仰天然带有强烈的国家性和族群性。",
            "哥伦比娅教强调纯净、辉光、誓约、王权、牺牲和黄金秩序。它不是外向传教型宗教，而更像黄金王国自我理解的核心。",
            { type: "heading", level: 3, text: "4. 威斯特丽亚教" },
            "类型：一神教",
            "主神：维斯特拉",
            "主要分布：威斯特丽亚集团",
            "威斯特丽亚教信奉唯一神维斯特拉。",
            "维斯特拉被定义为星辰、法律、誓言、寒光与不动秩序之神。该教认为世界之所以没有坠入混沌，是因为存在一条不可见的神圣法则，维斯特拉便是这条法则的源头。",
            "威斯特丽亚教重视誓言、审判、家族、骑士义务与文书法。它的神职者常常兼任裁判、书记官、誓约见证人和贵族教育者。",
            { type: "heading", level: 3, text: "5. 奥斯坎诸神教" },
            "类型：多神教",
            "主要分布：奥斯坎大陆中部、北部、大量公国、城邦与乡村地区",
            "奥斯坎大陆大量公国、自由城邦和乡村共同体信奉一般多神教。",
            "这些神并不组成一个严密统一的体系，不同地区会有不同称呼、不同神庙和不同传说，但大体可以归为六位主神。",
            "奥斯坎六神",
            {
                type: "table",
                headers: ["神名", "神职"],
                rows: [
                    ["阿斯特兰", "天空、王权、雷霆、誓约"],
                    ["梅丽娅", "大地、丰收、家庭、母性"],
                    ["卡尔多", "战争、勇气、铁器、边境"],
                    ["塞琳娜", "月亮、梦、医治、秘密"],
                    ["奥尔文", "河流、商旅、道路、谈判"],
                    ["诺克图斯", "死亡、墓地、冬季、沉默"]
                ]
            },
            "奥斯坎诸神教具有很强的地方性。",
            "一个公国可能以阿斯特兰为王权守护神，另一个山地部族则主要祭祀卡尔多和诺克图斯。农民更常向梅丽娅祈求收成，商队则向奥尔文献祭，医者和夜行者更熟悉塞琳娜的仪式。",
            "该教不是高度统一的教会，而是由神庙、祭司家族、地方传统和节庆仪式组成的松散体系。",
            { type: "heading", level: 3, text: "6. 阿拉贡拉斯无神论" },

            "主要分布：阿拉贡拉斯大帝国集团",

            "阿拉贡拉斯集团的无神论来自龙族、巨人及高阶种族长期统治形成的世界观。",
            "在阿拉贡拉斯，龙会飞，巨人能推倒城墙，高阶血脉天生拥有更长寿命、更强肉体、更高魔法亲和力和更直接的暴力优势。因此，他们不需要用“神授王权”解释统治权。",
            "对他们来说，统治关系非常直观：",
            "强者居上，弱者服役；高阶种族统治，低阶族群纳贡；服从换取保护，反叛招致毁灭。",
            "阿拉贡拉斯并不否认神术存在，也不一定否认世界上存在某些被弱族称为“神”的现象。但他们拒绝承认“神”拥有高于龙皇、巨皇与高阶血脉的政治权威。",
            { type: "heading", level: 2, text: "盘古大陆宗教" },
            { type: "heading", level: 3, text: "1. 诸灵信仰" },
            "类型：泛灵论",
            "主要分布：齐集团",
            "齐集团的宗教不是严格教会体系，而是一种多神教与泛灵论混合的传统。",
            "它认为天地山川、祖先、星辰、河流、城池、社稷和万物皆有灵性，但这些灵性不一定是人格化的神。",
            "齐地宗教重视祭祀秩序、祖先牌位、山川封号、地方神庙和国家礼制。",
            "神灵并不只存在于神庙中，也存在于河堤、田地、城门、祖坟和军旗里。",

            { type: "heading", level: 3, text: "2. 维兰提亚拜火教" },

            "主神：阿塔尔",

            "维兰提亚集团信奉圣火之神阿塔尔。",

            "该教认为世界中存在光明与污秽、真言与谎言、洁净与腐败之间的长期斗争。火不是单纯的自然元素，而是辨明、净化和见证的象征。",
            "维兰提亚拜火教重视火坛、净手、誓言、圣火守护、葬礼洁净和反污秽仪式。",

            "该教对死亡和尸体有强烈禁忌，认为腐败会污染土地与火。因此，维兰提亚社会在葬礼、医疗、战争尸体处理方面有极严格的宗教规范。",
            { type: "heading", level: 3, text: "3. 草原诸魂信仰" },

                            "备注",
                            "等级代表角色成长框架，CR代表NPC威胁坐标。",
                            "528年的赫里奥斯没有强者满地走，高端战力必须谨慎使用。"
                        ]
                    },
                    {
                        name: "神学与神术",
                        content: [
                            "神学与神术",

                            "牧师可以施展奇迹，圣武士可以以誓言点燃剑锋，虔诚者也确实更容易成为神术者。信仰、戒律、祈祷、修会生活与神术能力之间存在明确关联；但这种关联无法证明神明本身的形态、意志或存在方式。",
                            "赫里奥斯的神不会像凡人君主一样发布命令，也不会以可验证的方式与信徒交流。没有人能确认神是否拥有面容、声音、人格、情绪或明确意志。神术可以被目击，可以被使用，可以被传承，但其源头不可测、不可还原、不可证实，也不可证伪。",
                            "因此，赫里奥斯的神学只能被定义，不能被解释。",
                            "不同宗教可以定义自己的神：一神教可以宣称唯一神，多神教可以祭祀诸神，泛灵论可以承认万物有灵，无神论者也可以否认神明具有政治与真理上的权威。",
                            "神职者不会因为某个高位存在“撤回授权”而失去神术。世界上不存在明确的人格神管理法术权限。一个神术者是否还能行奇迹，更多表现为信仰、誓言、修行、身份与个人状态的复杂结果；但这种结果同样无法被彻底解释。",
                            "在赫里奥斯，神术是真实的，神是否存在则永远悬而未决。"

                    },
                    {
                        name: "这会对游戏造成什么影响",
                        content: [

                            "1. 位面转移法术不可用",
                            "所有以“前往其他位面”为核心效果的法术、能力与道具均不可用。",
                            "例如：位面转移、星界投射、异界传送、进入外层位面的相关能力。",

                            "角色不会拥有“守序善良”“混乱邪恶”等阵营标签，也不会因为法术、诅咒或物品效果改变阵营。",
                            "3. 怪物图鉴中的阵营不可用",
                            "怪物图鉴中写明的阵营不适用于赫里奥斯。",

                            "因此，不能因为某个怪物在原规则中标注为邪恶，就默认它在赫里奥斯必然邪恶。",

                            "赫里奥斯不使用伟大轮环宇宙观。",
                            "九狱、深渊、天堂山、机械境、混沌海等传统外层位面结构均不作为世界真实结构存在。"

            },
            {
                id: "countries",
                name: "国家",
                asset: "country",
                children: ["国家A", "国家B", "国家C", "国家D"]
            },
            {
                id: "religion",
                name: "宗教",
                children: [
                    {
                        name: "基本前提",
                        content: religionIntroContent()
                    },
                    {
                        name: "奥斯坎大陆宗教",
                        content: religionSectionContent("奥斯坎大陆宗教", "盘古大陆宗教")
                    },
                    {
                        name: "盘古大陆宗教",
                        content: religionSectionContent("盘古大陆宗教", "环曦大陆宗教")
                    },
                    {
                        name: "环曦大陆宗教",
                        content: religionSectionContent("环曦大陆宗教", "其他区域宗教")
                    },
                    {
                        name: "其他区域宗教",
                        content: religionSectionContent("其他区域宗教", "小型宗教与边缘信仰")
                    },
                    {
                        name: "小型宗教与边缘信仰",
                        content: religionSectionContent("小型宗教与边缘信仰")
                    }
                ]
            },
            {
                id: "people",
                name: "人物",
                asset: "person",
                children: ["统治者", "军事人物", "宗教人物", "学者/法师", "其他重要人物"]
            },
            {
                id: "organizations",
                name: "组织",
                children: ["政府机构", "军事组织", "宗教组织", "秘密组织", "学术/魔法组织"]
            },
            {
                id: "races",
                name: "种族",
                asset: "race",
                children: ["种族A", "种族B", "种族C"]
            },
            {
                id: "history",
                name: "历史",
                children: ["总年表", "重大事件", "战争", "王朝/政权更替"]
            },
            {
                id: "glossary",
                name: "术语表",
                children: ["政治术语", "军事术语", "宗教术语", "魔法术语", "地理术语"]
            }
        ];

        const state = {
            current: { nodeId: "home", name: "首页", path: "首页", type: "目录", asset: "optional", children: archive }
        };

        const tree = document.getElementById("tree");
        const panelPath = document.getElementById("panel-path");
        const panelTitle = document.getElementById("panel-title");
        const panelType = document.getElementById("panel-type");
        const panelBody = document.getElementById("panel-body");
        const workspace = document.getElementById("workspace");
        const assetTitle = document.getElementById("asset-title");
        const assetSlot = document.getElementById("asset-slot");
        const assetLabel = document.getElementById("asset-label");
        const assetNote = document.getElementById("asset-note");

        function buildTree() {
            const homeButton = `<button class="tree-leaf active" data-node="home">首页</button>`;
            const sections = archive.map(section => {
                const children = section.children || [];
                if (!children.length) {
                    return `<button class="tree-leaf" data-node="${section.id}">${section.name}</button>`;
                }

                return `
                    <div class="tree-section">
                        <button class="tree-toggle" data-node="${section.id}">
                            <span>${section.name}</span>
                            <span class="toggle-mark">展开</span>
                        </button>
                        <div class="tree-children">
                            ${children.map(child => `
                                <button class="tree-leaf" data-node="${section.id}:${childName(child)}">${childName(child)}</button>
                            `).join("")}
                        </div>
                    </div>
                `;
            }).join("");

            tree.innerHTML = homeButton + sections;
            tree.addEventListener("click", event => {
                const button = event.target.closest("button[data-node]");
                if (!button) return;
                selectNode(button.dataset.node);
            });

            panelBody.addEventListener("click", event => {
                const card = event.target.closest(".section-card[data-target]");
                if (!card) return;
                selectNode(card.dataset.target);
            });
        }

        function selectNode(nodeId) {
            if (nodeId === "home") {
                state.current = { nodeId, name: "首页", path: "首页", type: "目录", asset: "optional", children: archive };
            } else if (!nodeId.includes(":")) {
                const section = archive.find(item => item.id === nodeId);
                state.current = {
                    nodeId,
                    name: section.name,
                    path: `首页 / ${section.name}`,
                    type: section.type || "分类",
                    asset: section.asset || "optional",
                    children: section.children || [],
                    content: section.content || []
                };
            } else {
                const [sectionId, childLabel] = nodeId.split(":");
                const section = archive.find(item => item.id === sectionId);
                const child = (section.children || []).find(item => childName(item) === childLabel);
                state.current = {
                    nodeId,
                    name: childName(child),
                    path: `首页 / ${section.name} / ${childName(child)}`,
                    type: section.name,
                    asset: section.asset || "optional",
                    children: [],
                    content: child && typeof child === "object" ? child.content || [] : []
                };
            }

            document.querySelectorAll(".tree-leaf").forEach(button => {
                button.classList.toggle("active", button.dataset.node === nodeId);
            });
            document.querySelectorAll(".tree-toggle").forEach(button => {
                button.classList.toggle("active", button.dataset.node === nodeId);
            });
            renderPanel();
        }

        function renderPanel() {
            panelPath.textContent = state.current.path;
            panelTitle.textContent = state.current.name;
            panelType.textContent = state.current.type;
            panelType.className = `type-pill ${assetClass(state.current.asset)}`;
            workspace.classList.toggle("country-layout", state.current.asset === "country");

            if (state.current.content && state.current.content.length) {
                panelBody.innerHTML = `
                    <div class="intro-copy">
                        ${state.current.content.map(renderContentParagraph).join("")}
                    </div>
                `;
            } else if (state.current.children.length) {
                panelBody.innerHTML = `
                    <div class="section-grid">
                        ${state.current.children.map(name => `
                            <button class="section-card" data-target="${targetForChild(name)}">
                                <div class="section-name">${childName(name)}</div>
                                <div class="section-meta">${childMeta(name)}</div>
                            </button>
                        `).join("")}
                    </div>
                `;
            } else {
                panelBody.innerHTML = `<div class="empty-editor" aria-label="${state.current.name}内容区"></div>`;
            }

            renderAssetSlot(state.current.asset);
        }

        function targetForChild(name) {
            if (state.current.nodeId === "home") {
                const section = archive.find(item => item.name === childName(name));
                return section ? section.id : "home";
            }

            return `${state.current.nodeId}:${childName(name)}`;
        }

        function childName(child) {
            return typeof child === "object" ? child.name : child;
        }

        function childMeta(child) {
            if (typeof child !== "object") return "未填充";
            if (child.content && child.content.length) return "已记录";
            if (child.children && child.children.length) return `含 ${child.children.length} 项`;
            return "未填充";
        }

        function renderContentParagraph(paragraph, index) {
            if (typeof paragraph === "object" && paragraph.type === "table") return renderContentTable(paragraph);
            if (typeof paragraph === "object" && paragraph.type === "heading") return renderContentHeading(paragraph);

            const compactHeadings = [
                "等级坐标",
                "CR坐标",
                "备注",
                "奥斯坎六神",
                "草原主要灵名",
                "群岛五神",
                "北境五神",
                "对他们来说，统治关系非常直观：",
                "登神会内部没有统一教义，只有一个核心目标：",
                "不要崇拜旧神，要成为新神。"
            ];
            const isHeading = index > 0 && (/^\d+\.\s/.test(paragraph) || compactHeadings.includes(paragraph));
            const className = isHeading ? ' class="fact-heading"' : "";
            return `<p${className}>${escapeHTML(paragraph)}</p>`;
        }

        function renderContentHeading(heading) {
            const className = heading.level === 2 ? "section-heading" : "sub-heading";
            return `<div class="${className}">${escapeHTML(heading.text)}</div>`;
        }

        function renderContentTable(table) {
            const headers = table.headers.map(header => `<th>${escapeHTML(header)}</th>`).join("");
            const rows = table.rows.map(row => `
                <tr>${row.map(cell => `<td>${escapeHTML(cell)}</td>`).join("")}</tr>
            `).join("");

            return `
                <div class="content-table-wrap">
                    <table class="content-table">
                        <thead><tr>${headers}</tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        function escapeHTML(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            }[char]));
        }

        function renderAssetSlot(assetType) {
            assetSlot.className = `asset-slot ${assetClass(assetType)}`;

            if (assetType === "country") {
                assetTitle.textContent = "地理图";
                assetLabel.textContent = "国家地理图";
                assetNote.textContent = "留空";
                return;
            }

            if (assetType === "person" || assetType === "race") {
                assetTitle.textContent = "头像";
                assetLabel.textContent = assetType === "person" ? "人物头像" : "种族头像";
                assetNote.textContent = "留空";
                return;
            }

            assetTitle.textContent = "可选图片";
            assetLabel.textContent = "图片位";
            assetNote.textContent = "留空";
        }

        function assetClass(assetType) {
            if (assetType === "country") return "map country";
            if (assetType === "person") return "avatar person";
            if (assetType === "race") return "avatar race";
            return "optional";
        }

        function preserveUidLinks() {
            const params = new URLSearchParams(location.search);
            const uid = params.get("uid");
            if (!uid) return;

            document.getElementById("back-link").href = `index.html?uid=${encodeURIComponent(uid)}`;
        }

        buildTree();
        preserveUidLinks();
        renderPanel();
    </script>
</body>
