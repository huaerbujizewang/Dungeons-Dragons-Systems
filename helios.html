<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赫里奥斯</title>
    <style>
        :root {
            --bg: #f4f1ea;
            --paper: #fffdf8;
            --paper-soft: #f8f5ed;
            --ink: #1f2933;
            --muted: #68717d;
            --line: #ded6c8;
            --line-strong: #bfae96;
            --gold: #a36f2c;
            --wine: #733a3a;
            --teal: #2f6f67;
            --shadow: 0 16px 40px rgba(31, 41, 51, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(120deg, rgba(115, 58, 58, 0.08), transparent 34%),
                linear-gradient(300deg, rgba(47, 111, 103, 0.1), transparent 38%),
                var(--bg);
            color: var(--ink);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        a {
            color: inherit;
        }

        .page-shell {
            width: min(1440px, calc(100% - 48px));
            min-height: calc(100vh - 48px);
            margin: 24px auto;
            display: grid;
            grid-template-columns: 304px minmax(0, 1fr);
            border: 1px solid var(--line);
            background: rgba(255, 253, 248, 0.82);
            box-shadow: var(--shadow);
        }

        .sidebar {
            border-right: 1px solid var(--line);
            background: rgba(248, 245, 237, 0.92);
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 48px);
        }

        .brand {
            padding: 24px;
            border-bottom: 1px solid var(--line);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 22px;
            color: var(--muted);
            font-size: 13px;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--wine);
        }

        .brand-title {
            margin: 0;
            font-size: 30px;
            line-height: 1.1;
            letter-spacing: 0;
        }

        .brand-subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .tree {
            padding: 18px 14px 28px;
            overflow-y: auto;
        }

        .tree-section {
            margin-bottom: 8px;
        }

        .tree-toggle,
        .tree-leaf {
            width: 100%;
            min-height: 38px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--ink);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 9px 10px;
            font: inherit;
            text-align: left;
            letter-spacing: 0;
        }

        .tree-toggle {
            font-weight: 800;
        }

        .tree-leaf {
            color: #394553;
            font-size: 14px;
        }

        .tree-toggle:hover,
        .tree-leaf:hover {
            background: rgba(163, 111, 44, 0.09);
        }

        .tree-toggle.active {
            background: rgba(115, 58, 58, 0.1);
            color: var(--wine);
        }

        .tree-leaf.active {
            background: #232b35;
            color: #fff;
        }

        .tree-children {
            margin: 2px 0 10px 14px;
            padding-left: 10px;
            border-left: 1px solid var(--line);
        }

        .toggle-mark {
            flex: 0 0 auto;
            color: var(--gold);
            font-size: 12px;
        }

        .content {
            min-width: 0;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .content-top {
            padding: 28px 34px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: flex-start;
            background: rgba(255, 253, 248, 0.72);
        }

        .kicker {
            color: var(--gold);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .page-title {
            margin: 8px 0 0;
            font-size: clamp(28px, 4vw, 46px);
            line-height: 1.1;
            letter-spacing: 0;
        }

        .workspace {
            padding: 34px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 24px;
            align-items: start;
        }

        .workspace.country-layout {
            grid-template-columns: 1fr;
        }

        .workspace.country-layout .asset-panel {
            position: static;
            order: -1;
        }

        .workspace.home-layout {
            grid-template-columns: 1fr;
        }

        .workspace.home-layout .asset-panel {
            display: none;
        }

        .main-panel,
        .asset-panel {
            border: 1px solid var(--line);
            background: var(--paper);
        }

        .main-panel {
            min-height: 620px;
        }

        .panel-header {
            padding: 22px 24px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .panel-eyebrow {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.1em;
        }

        .panel-title {
            margin: 6px 0 0;
            font-size: 28px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .type-pill {
            flex: 0 0 auto;
            border-radius: 999px;
            padding: 7px 12px;
            color: #fff;
            background: var(--teal);
            font-size: 12px;
            font-weight: 800;
        }

        .type-pill.country {
            background: var(--wine);
        }

        .type-pill.person,
        .type-pill.race {
            background: var(--teal);
        }

        .panel-body {
            padding: 24px;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .home-cover {
            width: min(640px, 100%);
            margin: 0 auto 28px;
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: #0f1419;
        }

        .home-cover img {
            width: 100%;
            display: block;
        }

        .section-card {
            width: 100%;
            min-height: 116px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper-soft);
            color: inherit;
            cursor: pointer;
            font: inherit;
            padding: 16px;
            text-align: left;
            transition: border-color 0.16s ease, transform 0.16s ease, background 0.16s ease;
        }

        .section-card:hover {
            border-color: var(--line-strong);
            background: #fffaf0;
            transform: translateY(-1px);
        }

        .section-name {
            font-weight: 900;
            font-size: 17px;
        }

        .section-meta {
            margin-top: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .empty-editor {
            min-height: 368px;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            background:
                linear-gradient(transparent 31px, rgba(222, 214, 200, 0.46) 32px),
            var(--paper-soft);
            background-size: 100% 32px;
        }

        .intro-copy {
            max-width: 820px;
            color: #2f3844;
            font-size: 17px;
            line-height: 2;
        }

        .intro-copy p {
            margin: 0 0 20px;
        }

        .intro-copy p:first-child {
            color: var(--wine);
            font-size: 20px;
            font-weight: 900;
        }

        .intro-copy .fact-heading {
            margin-top: 30px;
            color: var(--ink);
            font-size: 19px;
            font-weight: 900;
            line-height: 1.6;
        }

        .intro-copy .section-heading {
            margin: 42px 0 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--line);
            color: var(--wine);
            font-size: 24px;
            font-weight: 900;
            line-height: 1.35;
        }

        .intro-copy .sub-heading {
            margin: 30px 0 12px;
            color: var(--ink);
            font-size: 20px;
            font-weight: 900;
            line-height: 1.45;
        }

        .content-table-wrap {
            max-width: 100%;
            margin: 12px 0 26px;
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper-soft);
        }

        .content-table {
            width: 100%;
            min-width: 620px;
            border-collapse: collapse;
            font-size: 14px;
            line-height: 1.6;
        }

        .content-table th,
        .content-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        .content-table th {
            color: var(--wine);
            background: rgba(163, 111, 44, 0.08);
            font-weight: 900;
        }

        .content-table tr:last-child td {
            border-bottom: 0;
        }

        .asset-panel {
            position: sticky;
            top: 24px;
        }

        .asset-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--line);
        }

        .asset-title {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0;
        }

        .asset-slot {
            margin: 20px;
            min-height: 260px;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: var(--muted);
            background: var(--paper-soft);
            text-align: center;
            padding: 18px;
        }

        .asset-slot.avatar {
            min-height: 220px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            margin-inline: auto;
            width: min(220px, calc(100% - 40px));
        }

        .asset-slot.map {
            min-height: 0;
            aspect-ratio: 16 / 7;
            width: calc(100% - 40px);
        }

        .asset-slot.has-image {
            border-style: solid;
            padding: 0;
            overflow: hidden;
            background: #0f1419;
        }

        .asset-slot img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .asset-slot.map img {
            object-fit: contain;
        }

        .asset-label {
            font-weight: 900;
            color: #344050;
        }

        .asset-note {
            margin-top: 8px;
            font-size: 12px;
            line-height: 1.6;
        }

        @media (max-width: 980px) {
            .page-shell {
                width: 100%;
                min-height: 100vh;
                margin: 0;
                grid-template-columns: 1fr;
            }

            .sidebar {
                min-height: 0;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .tree {
                max-height: 340px;
            }

            .workspace,
            .workspace.country-layout {
                grid-template-columns: 1fr;
                padding: 22px;
            }

            .asset-panel {
                position: static;
            }
        }

        @media (max-width: 640px) {
            .content-top,
            .panel-header {
                align-items: stretch;
                flex-direction: column;
            }

            .content-top,
            .workspace {
                padding-inline: 16px;
            }

            .brand {
                padding-inline: 16px;
            }

            .asset-slot.map {
                aspect-ratio: 4 / 3;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <aside class="sidebar">
            <div class="brand">
                <a id="back-link" class="back-link" href="index.html">← 返回主界面</a>
                <h1 class="brand-title">赫里奥斯</h1>
                <p class="brand-subtitle">世界档案目录</p>
            </div>
            <nav class="tree" id="tree" aria-label="赫里奥斯目录"></nav>
        </aside>

        <main class="content">
            <header class="content-top">
                <div>
                    <div class="kicker">Helios Archive</div>
                    <h2 class="page-title">赫里奥斯</h2>
                </div>
            </header>

            <section class="workspace" id="workspace">
                <article class="main-panel">
                    <header class="panel-header">
                        <div>
                            <div class="panel-eyebrow" id="panel-path">首页</div>
                            <h3 class="panel-title" id="panel-title">首页</h3>
                        </div>
                        <span class="type-pill" id="panel-type">目录</span>
                    </header>
                    <div class="panel-body" id="panel-body"></div>
                </article>

                <aside class="asset-panel">
                    <header class="asset-header">
                        <h3 class="asset-title" id="asset-title">可选图片</h3>
                    </header>
                    <div class="asset-slot" id="asset-slot">
                        <div>
                            <div class="asset-label" id="asset-label">图片位</div>
                            <div class="asset-note" id="asset-note">留空</div>
                        </div>
                    </div>
                </aside>
            </section>
        </main>
    </div>

    <script>
        const religionOverviewContent = [
            "基本前提",
            "赫里奥斯的宗教并不建立在“神明现身说法”之上。神术真实存在，但神明不可知；宗教可以定义神，却不能解释神。",
            "因此，不同文明对神、世界、灵魂、秩序和死亡形成了各自的解释体系。它们既是信仰，也是法律、身份、共同体和国家合法性的来源。",
            { type: "heading", level: 2, text: "奥斯坎大陆宗教" },
            { type: "heading", level: 3, text: "1. 纳希德教" },
            "类型：一神教",
            "主神：拉赫曼",
            "主要分布：奥斯坎大陆南部、西南部及苔原商路地区",
            "纳希德教是一种严格的一神教，主张世间只有唯一至高的神——拉赫曼。",
            "拉赫曼不可见、不可像、不可被凡人完全理解。信徒认为，世界由拉赫曼创造，人的一生是对信仰、纪律、仁慈与服从的考验。",
            "纳希德教禁止偶像崇拜，重视祈祷、斋戒、施舍、巡礼和经文学习。它在苔原、冻土、商路城市和边境公国中影响很深，尤其适合形成跨部族、跨城邦的共同体认同。",
            "纳希德教的神术者通常被视为经文、律法与虔信的守护者。他们不声称自己见过拉赫曼，只认为神术是拉赫曼允许凡人见证的迹象。",
            { type: "heading", level: 3, text: "2. 普罗维登斯教" },
            "类型：一神教",
            "主神：普罗维登斯",
            "主要分布：普罗维登斯集团及其影响区",
            "普罗维登斯教信奉唯一神普罗维登斯，其名意为“天意、预备、眷顾”。",
            "该教认为世界并非混乱展开，而是存在一个不可完全理解的神圣秩序。凡人无法窥见全貌，却可以通过纪律、劳动、契约、家庭、国家和教会生活参与其中。",
            "它强调守约、克制、责任、命运感和社会秩序，常与城市、商会、军队和官僚体系结合。",
            "普罗维登斯集团将该教视为自身政治合法性的根基。国家并不宣称直接代表神，而是宣称自己在维护一种更高、更稳定的秩序。",
            { type: "heading", level: 3, text: "3. 哥伦比娅信仰" },
            "类型：一神教",
            "主神：哥伦比娅",
            "主要分布：黄金王国",
            "黄金王国信奉唯一神哥伦比娅。",
            "在黄金王国传统中，哥伦比娅既是创造者，也是黄金、光、王权、民族命运与神圣美的象征。",
            "哥伦比娅接近一种被国家、族群与神学共同定义的至高神圣原则。黄金王国认为自身民族与哥伦比娅有特殊关系，因此哥伦比娅信仰天然带有强烈的国家性和族群性。",
            "哥伦比娅教强调纯净、辉光、誓约、王权、牺牲和黄金秩序。它不是外向传教型宗教，而更像黄金王国自我理解的核心。",
            { type: "heading", level: 3, text: "4. 威斯特丽亚教" },
            "类型：一神教",
            "主神：维斯特拉",
            "主要分布：威斯特丽亚集团",
            "威斯特丽亚教信奉唯一神维斯特拉。",
            "维斯特拉被定义为星辰、法律、誓言、寒光与不动秩序之神。该教认为世界之所以没有坠入混沌，是因为存在一条不可见的神圣法则，维斯特拉便是这条法则的源头。",
            "威斯特丽亚教重视誓言、审判、家族、骑士义务与文书法。它的神职者常常兼任裁判、书记官、誓约见证人和贵族教育者。",
            { type: "heading", level: 3, text: "5. 奥斯坎诸神教" },
            "类型：多神教",
            "主要分布：奥斯坎大陆中部、北部、大量公国、城邦与乡村地区",
            "奥斯坎大陆大量公国、自由城邦和乡村共同体信奉一般多神教。",
            "这些神并不组成一个严密统一的体系，不同地区会有不同称呼、不同神庙和不同传说，但大体可以归为六位主神。",
            "奥斯坎六神",
            {
                type: "table",
                headers: ["神名", "神职"],
                rows: [

                    ["卡尔多", "战争、勇气、铁器、边境"],

            "奥斯坎诸神教具有很强的地方性。",

            "在阿拉贡拉斯，龙会飞，巨人能推倒城墙，高阶血脉天生拥有更长寿命、更强肉体、更高魔法亲和力和更直接的暴力优势。因此，他们不需要用“神授王权”解释统治权。",
            "对他们来说，统治关系非常直观：",
            "强者居上，弱者服役；高阶种族统治，低阶族群纳贡；服从换取保护，反叛招致毁灭。",
            "阿拉贡拉斯并不否认神术存在，也不一定否认世界上存在某些被弱族称为“神”的现象。但他们拒绝承认“神”拥有高于龙皇、巨皇与高阶血脉的政治权威。",
            { type: "heading", level: 2, text: "盘古大陆宗教" },
            { type: "heading", level: 3, text: "1. 诸灵信仰" },
            "类型：泛灵论",
            "主要分布：齐集团",
            "齐集团的宗教不是严格教会体系，而是一种多神教与泛灵论混合的传统。",
            "它认为天地山川、祖先、星辰、河流、城池、社稷和万物皆有灵性，但这些灵性不一定是人格化的神。",

            { type: "heading", level: 3, text: "2. 维兰提亚拜火教" },

            "维兰提亚集团信奉圣火之神阿塔尔。",

# 黄金王国

## 概述

黄金王国是奥斯坎西部的大型强国，首府为阿卡迪亚。它拥有漫长海岸线、大片内陆、南部港湾与富庶河谷，领土面积为 **5,754,861 平方公里**，人口约为1.3亿。
黄金王国位于奥斯坎大陆西侧，拥有温带森林、草原、山地，亚热带森林，雨林与干旱地带。其大致范围为西经110°至76°、北纬30°至南纬13°。
外界常称黄金王国为“金色少女之国”。这个称呼来自哥伦比亚人的外貌特征：金发、精致、年轻感强，公共视觉上高度女性化。外族常将黄金王国想象成纤弱、华丽、宫廷化的国家；实际上的黄金王国拥有成熟行政、强大军队、稳定治安、优良城市建设和强烈区域霸权意识。

## 哥伦比亚人与社会底色

哥伦比亚人由自称的神明遗骸与特殊魔力环境影响形成。所有哥伦比亚人拥有金发、浅蓝色眼瞳、细腻五官和偏柔美的体态。哥伦比亚人的公共外貌高度趋同，外族经常误判其性别，也常将整个国家浪漫化、异域化。

哥伦比亚社会依靠一套细密的身份识别系统维持秩序。服饰、发型、佩饰、剑饰、纹章、鞋履、香料气味、礼仪姿态和魔力波动，都能传达身份信息。

由于外貌趋同，阶级、家族、职业、婚姻状态和政治身份都需要外部符号确认。于是，服装成为法律，礼仪成为行政，审美成为权力。

## 王权结构

黄金王国由哥伦比娅三世统治。王室采用女性优先继承原则，女性继承顺位通常高于同辈男性。男性王族依然拥有继承权、封地权、婚姻政治价值和军职资格。

王室权力来源包括：

* 王室直属领；
* 王都财政；
* 王室港口税；
* 剑咏法师团核心番号；
* 宫廷官僚系统；
* 金衣律解释权；
* 贵族册封与婚姻确认权；
* 最高司法裁断权。

黄金王国的王权属于“宫廷强、地方复杂”的类型。王令在王都、直属领、港口、军镇和主要城市执行很快；进入深层封地后，王令会遭遇地方贵族法、封臣誓约、家族特许状、旧婚约、旧税权和教会地产的层层解释。

## 分封体系

黄金王国的分封制度非常古老，许多封地可以追溯到王国早期扩张、海岸征服、山地平定和王族婚姻。

常见领地类型包括：

| 类型 | 说明 |
| ---- | ---- |
| 王室直属领 | 由王室官员治理，财政直接进入王库。王都、重要港口、部分矿区和剑咏军校多属此类。 |
| 大贵族封土 | 由红衣大贵族统治，拥有地方司法、征税、家兵、城堡与附庸骑士。 |
| 王族采邑 | 授予王族旁支，用于安置未继承王位的王女、王子和王室寡居成员。 |
| 骑士领 | 面积较小，通常承担军事义务，可能直属王室，也可能直属大贵族。 |
| 自治城市 | 拥有商税特许、城墙自卫权和市议会，向王室或地方贵族缴纳固定贡金。 |
| 特许商会区 | 由大型商会经营港口、仓储、造船、纺织或奢侈品贸易，法律地位复杂。 |
| 教会与圣遗地产 | 负责神遗崇拜、王族血统礼仪、婚姻登记、服饰圣化和公共救济。 |

封臣关系混乱是黄金王国改革长期受阻的主因。一个小贵族可能在军事上向大公效忠，在司法上接受王室法院审判，在税务上向自治城市借款，在婚姻上受另一家族契约约束。王室改革税制、兵制、道路法时，经常会牵动大量古老誓约。

## 金衣律

金衣律是黄金王国最具代表性的法律。它规定不同阶层、血统、职务、婚姻状态、军功和司法身份应当使用的服色、材质、纹样、鞋履、发饰、剑饰与外套形制。

金衣律既维持身份秩序，也约束所有阶层。皇室成员必须穿金，大贵族必须穿红，官僚穿白，商人穿蓝，军官使用规定式样。王室成员在正式场合穿错，同样会被处罚。金衣律高于个人喜好，也高于临时政治需要。

| 服色 | 对应身份 |
| ---- | ---- |
| 金 | 王族与神血直系。 |
| 红 | 大贵族与封土血权。 |
| 紫 | 王族旁支、高等宫廷成员、中小贵族高阶者。 |
| 白 | 王室官僚、法官、书记官、礼法官。 |
| 蓝 | 商人、金融行会、海贸特许者。 |
| 黑 | 军官、禁卫、战斗单位。 |
| 绿、青、土黄、灰 | 自由民、手工业者、农户、仆役。 |

主要重罪包括僭金、伪红、乱纹、遮籍、污白和误礼。相关案件常牵连裁缝、染坊、证人和材料提供者。黄金王国的裁缝行业受到官方监管，宫廷裁缝拥有接近官员的地位。

## 服装文化

黄金王国的服装设计位居奥斯坎大陆前列，在女装领域尤其强势。

常见元素包括丝袜、长靴、高筒礼靴、细腰礼服、短披肩、金属腰封、剑带与裙装结合、不对称外套、宫廷手套、轻薄披纱、纹章发饰和便于佩剑的女式骑装。

黄金王国服装具有高度制度化、仪式化和身份化特征。裙摆长度、靴筒高度、丝袜纹样、袖口金线、披肩角度和剑带位置都能传达身份。

服装产业是黄金王国重要出口产业。王都、南部港口和贵族城市拥有大量织坊、染坊、靴匠、刺绣工坊、珠宝匠和法术纤维师。黄金王国服装在外大陆被视为奢侈品，也被贵族阶层大量模仿。

## 城市规划

黄金王国城市极其漂亮，规划讲究轴线、广场、喷泉、花园、彩色石材、宫廷街区、商业廊道与服饰展示空间。

常见城市分区包括：

| 分区 | 功能 |
| ---- | ---- |
| 金轴区 | 王宫、王室法院、祭仪广场、王族纪念建筑。 |
| 红环区 | 大贵族宅邸、纹章厅、骑士会馆、宫廷舞会建筑。 |
| 白厅区 | 官僚机关、档案馆、税务所、法院、服饰登记所。 |
| 蓝廊区 | 商会、交易所、银行、港口办事处、奢侈品市场。 |
| 工坊区 | 纺织、染色、制靴、珠宝、剑饰、魔法材料加工。 |
| 自由民城区 | 住宅、市场、小教堂、学校、公共浴场。 |

黄金王国城市喜欢用宽街连接广场，让不同阶层在公共场合按照服色自然分流。许多城市广场在节日时会形成金、红、白、蓝、青等色块，被外族旅行者形容为“活着的纹章”。

城市治安很好。街道照明、夜巡、服饰查验、行会保甲和剑咏巡逻共同构成城市秩序。王都夜间安全，礼法也很压抑。

## 商业阶层

黄金王国商人富有，主要集中在服装、港口、金融、染料、珠宝、法术材料和奢侈品行业。商人属于蓝衣阶层，可以拥有巨额财富、船队、工坊、银行和城市议席。许多商人通过借贷控制贵族财政，部分大商会已经能影响王室政策。

商人主要追求：

* 统一国内关税；
* 简化通行许可；
* 废除贵族私设桥税；
* 保护工厂产权；
* 扩大城市自治；
* 建立全国商法法院；
* 推动统一货币与度量衡。

贵族对商人态度复杂。贵族需要商人的钱，也厌恶商人的上升。商人可以穿极其昂贵的蓝衣，依然不能触碰红衣贵族的服色与纹章。这种视觉羞辱长期积累了强烈不满。

## 剑咏法师团

剑咏法师团是黄金王国最重要的成建制魔法军。它们以剑为施法核心，通过剑势、咏唱、阵列和魔力共振发动法术。

黄金王国常备剑咏法师团共有 **48个团**，每团 **2500人**。

剑咏法师团起源于贵族剑术、王室礼仪和军用咏唱法。许多团拥有古老番号，王室直属团地位最高，贵族封地团传统最重，边境机动团实战经验最丰富。

## 军队结构

黄金王国军队由四类力量构成。

| 王室军 | 由王室财政供养，包括禁卫、剑咏直属团、王家骑兵、港口守备和首都卫戍军。忠诚度高，装备精良。 |
| 贵族军 | 大贵族根据封臣义务出兵，包括骑士、家兵、地方弩手、附庸剑咏队和城堡守军。战斗力差距很大。 |
| 自由军 | 由自治城市和商会维持，负责城墙、仓库、港口和商路护卫。富裕商会能雇佣高阶施法者和魔法弩兵。 |
| 边境军 | 负责荒野、山口、边境森林和邪教高发区。纪律严厉，实战经验丰富，经常和冒险者、佣兵、地方猎团合作。 |

## 宫廷政治

王国宫廷华丽、细密、危险。服饰礼仪决定政治距离，宴会座次决定派系强弱。

主要派系包括：

| 红衣派 | 大贵族集团 | 维护封地权、家族法庭、私兵权和传统礼仪。 |

| 白厅派 | 官僚、法官、礼法官、财政书记 | 法律统一和行政效率。 |

## 法律与司法

黄金王国拥有多层法律体系：

法律多层叠加导致司法繁琐。一件土地纠纷可能同时涉及王室法、贵族法、婚姻法、纹章权和服饰权。黄金王国律师、礼法官和谱系学家地位很高，收入丰厚。

## 宗教与神遗观念

黄金王国的宗教围绕神明遗骸、王族血统、金色审美和秩序礼仪展开。其主神为**哥伦比娅**。王族被视为神遗影响最强的一支，女性优先继承也被解释为神遗回响在女性血脉中更加稳定。

主要宗教机构负责：

* 神遗节庆；

宗教与服装联系很深。某些礼服需要经过教会祝圣，王室金衣更被视作半圣物。乱穿衣服既是法律问题，也是宗教问题。

## 外交

### 与威斯特丽亚帝国

黄金王国与威斯特丽亚帝国关系友好，属于西部旧秩序强权互相承认。黄金王国欣赏威斯特丽亚骑士传统，威斯特丽亚尊重黄金王国的财富、剑咏法师团和王室礼法。

双方贸易密切。黄金王国出口奢侈服饰、丝袜、长靴、细剑、织物、珠宝、法术材料和剑咏顾问；威斯特丽亚出口矿石、重甲、战马、骑士教官和军用金属。

黄金王国强盛、富庶、华丽，也深陷旧制度与新经济之间的拉扯。

## 概述

梅尔吉亚共和国是奥斯坎西南部的魔法师共和国，国土面积约 **507,358 平方公里**，人口约 620万。它南临奥斯坎大陆最高山系**维斯特洛山脉**，东接干旱沙漠，全国主体地貌为草原。梅尔吉亚境内没有稳定河流，农业、水源、城市供给和防灾体系高度依赖法师阶层。

梅尔吉亚国家规模不大，却极其难缠。它没有强大的传统贵族军，也缺乏大国式人口纵深，但城市布满法师塔、结界区、实验室、传送门、禁忌仓库和魔法工坊。外敌攻入梅尔吉亚，面对的往往不是整齐军阵，而是层层叠叠的结界、魔像、元素、契约恶魔、法术佣兵和突如其来的空间陷阱。

梅尔吉亚的政治制度非常赤裸：**魔力量决定选票权重**。普通人拥有名义公民权，但政治影响力极低。高阶法师一人可能拥有数百乃至数千票。梅尔吉亚人称之为“能力即责任”，外人则称其为“法师寡头”。

## 地理

梅尔吉亚地处奥斯坎大陆西南部，南方是高耸入云的**维斯特洛山脉**。这条山脉是奥斯坎大陆最高山系，山峰常年积雪，山口险峻，阻隔南北交通，也为梅尔吉亚提供了天然屏障。

国家东部连接沙漠，风沙、热浪和干旱长期威胁边境聚落。梅尔吉亚全国没有稳定大河，只有季节性溪流、地下水脉、魔法蓄水池和人工井网。草原覆盖了国家大部分区域，牧业、耐旱作物和魔法灌溉共同维持基础生计。

梅尔吉亚人常说：

> 没有法师，梅尔吉亚活不过三个旱季。

这句话并非夸张。水源净化、云雨召唤、地下水探测、结界蓄水、粮仓保鲜、草场修复和城市供水，全都离不开法术体系。

## 首都：星井城

星井城是梅尔吉亚共和国首都，也是全国最大的法师都市。

城市中心有一座巨大的竖井式魔法设施，称为**星井**。星井深入地下水脉与魔力脉络，上层连接观星塔、议政厅、七席法庭和大型结界核心。它既是水源枢纽，也是魔法能源节点，更是共和国合法性的象征。

星井城分为数个主要区域：

| ---- | ---- |
| 七席环庭 | 七席大法官议政、审判和公开辩论的核心区。 |
| 星井中枢 | 城市供水、结界能源和大型仪式节点。 |
| 高塔区 | 高阶法师塔、私人研究所、学派学院。 |
| 白市 | 合法魔法材料、卷轴、药剂和契约交易市场。 |
| 灰坊 | 半合法实验工坊、雇佣法师中介、魔像修理铺。 |
| 静默区 | 禁咒仓库、封印室、危险实验废弃地。 |
| 公民区 | 普通居民、工匠、仆役、学徒家庭和低阶施法者居住区。 |

星井城繁荣、富裕、危险。这里有奥斯坎西南部最好的法术图书馆，也有最昂贵的医疗术、最危险的实验室和最阴暗的学派暗杀。

## 政治制度

梅尔吉亚实行加权选票制。所有登记公民都有投票权，但选票权重由魔力量、法术等级、学术资格、公共贡献和法庭认可共同决定。

普通公民通常只有一票。低阶法师可能拥有十几票。中阶法师可拥有数十至数百票。高阶法师、学派院长、重大工程主持者和七席候选人可能拥有上千票。

梅尔吉亚官方认为，魔法能力越强，个人一旦犯错造成的危害越大，因此也必须承担更高政治责任。反对者则认为，这套制度只是高阶法师垄断国家的漂亮说辞。

政治核心是**七席大法官**。七席分别代表除死灵系外的七个主要法术学派：防护、咒法、预言、附魔、塑能、幻术、变化。死灵系在梅尔吉亚处于高度限制状态，不拥有正式席位。

露米奈里斯是一座浮空城，悬浮在维斯特洛山脉云海之上。城市由银白石材、水晶塔、弧形空桥、月井、悬浮庭园和环形法阵组成。晴朗天气下，从山麓抬头可以看到它漂浮在云层边缘，像一轮白昼中的月。

城市核心称为月井中枢。月井中枢负责维持浮空城升力、结界、水循环、空气净化、重力稳定和城市能源。艾蕾希尔·月枝对月井中枢拥有最高控制权，这也是她统治公国的根本来源。

露米奈里斯城内主要区域包括：

| 星露庭园 | 贵族居所、公共花园、宴会与艺术展示区。 |

露米奈里斯城极其干净，建筑线条轻盈，公共空间安静而克制。城内对噪音、污染、服饰、礼仪和魔法使用都有严格规定。外来者进入浮空城通常需要登记身份、携带许可，并接受基本魔法检查。

## 晨褐精灵

露米奈里斯的主体种族是晨褐精灵。这是维斯特洛高原环境中形成的精灵亚种，肤色多为浅褐、蜜褐、铜褐或暖棕色，发色常见银白、浅金、茶金、深棕与月灰，眼瞳多为琥珀、浅绿、银蓝或淡紫。

晨褐精灵长期生活在高海拔、强日照、云海与雪峰环境中，体态轻盈，耐寒耐晒，擅长攀援、弓术、空桥行走和高山魔法。他们的审美偏向明亮、干净、轻盈和线条感，常使用白石、水晶、银饰、羽纹、月纹和透明织物。

晨褐精灵自认为是精灵文明最成熟的一代。他们没有衰落叙事，也没有怀旧情结。对他们而言，露米奈里斯浮空城就是精灵技艺、魔法秩序和高山生活的巅峰成果。

露米奈里斯的国家结构以浮空城为核心。山地据点、空港、补给镇和高原牧场都围绕浮空城运行。地方管理者负责维持山路、补给、水源、草甸、药田和飞行路线安全。

公国行政相对精简，文件、许可、货物流向和人口登记都集中在浮空城档案系统中。由于交通困难，边远山地居民拥有较强自治习惯，但他们仍然依赖浮空城提供法阵维护、医疗、教育和灾害救援。

山地据点居民承担山路巡检、草甸牧养、冰湖维护、药草采集和空桥修缮。他们生活艰苦，性格比浮空城居民更直接，也更熟悉维斯特洛山脉的危险。

露米奈里斯社会讲究礼仪与审美。衣物清洁、行走姿态、语调、发饰、魔法痕迹和佩饰材质都能体现个人教养。粗鲁、喧哗、污染水源和破坏公共景观会受到严厉处罚。

露米奈里斯的宗教生活围绕月井、云海、山峰、星辰和水晶展开。晨褐精灵崇敬高处的清洁秩序，认为山峰接近天空，云海连接梦境，月光能够净化心智。

月井仪式是公国最重要的公共仪式。每年特定月相，城主会主持月井校准与祝祷，确保浮空城稳定运行。这个仪式同时具有宗教、政治和工程意义。

露米奈里斯没有强烈传教倾向。外来者可以在山麓信奉自己的神，只要不破坏公国秩序、不污染水源、不干涉月井仪式，就能得到有限容忍。

塞伦迪亚联邦是奥斯坎西南部的中型联邦国家，领土面积约 **1,081,927 平方公里**。它名义上拥有联邦政府、议会、法律和统一元首，实际政治权力高度分散。各邦、自由市、边境领、教区、商会武装、冒险者公会和地方领主都拥有自己的规矩。

## 地理

塞伦迪亚全境大部分为温带草原，地形平坦开阔，适合骑行、车队通行、牧业、农耕和军队机动。西南部略干旱，草场变薄，村镇分布更稀疏，商路与水井对当地生存极为重要。

国境内有两条主要河流，均自南向北流动，最终注入北方的蓝湖。两河流域是塞伦迪亚最重要的人口、农业和贸易走廊。

两条河通常被称为：

| 河流 | 说明 |

| 东塞伦河 | 流经东部平原、自由市和农业区，沿岸城镇密集，税权争议极多。 |

蓝湖是塞伦迪亚北部最重要的水域，也是多条贸易路线、渔业聚落、湖港自由市和走私网络的交汇点。由于联邦中央控制力薄弱，蓝湖沿岸同时存在官方关卡、商会码头、地方领主私税站和冒险者公会据点。

联邦政府可以发布命令，但执行命令需要地方配合。地方经常拖延、解释、讨价还价，甚至直接无视。联邦议长能调停矛盾，却很难根治矛盾。

## 军事

塞伦迪亚没有稳定强大的统一军队。联邦名义上拥有联邦军，但规模有限，调动缓慢，常被地方扯皮拖住。

塞伦迪亚法律混乱，且经常重叠。

联邦法规定国家共同原则，邦法处理地方事务，自由市法保护商业，教区法管理宗教事务，领主法处理庄园和土地，商会合同法控制债务与货运，冒险者公会规则处理委托、赏金和队伍纠纷。

一个案件可能同时被五套制度争夺管辖权。比如一名冒险者在自由市外杀死某个地方领主的私兵，可能涉及联邦治安法、邦法、领主法、公会规章和商会雇佣合同。

塞伦迪亚的法律结果往往取决于谁先到场、谁出钱更多、谁有武力、谁能请到更强的公会或法师。

塞伦迪亚对外形象复杂。邻国既看不起它的混乱，也需要它的自由市、商路、冒险者和佣兵市场。

塞伦迪亚常被周边国家用作：

# 国家政府

## 概述

国家政府是维持国家运转的正式统治机关。它负责征税、司法、军队、道路、外交、文书、边境、治安、粮仓、户籍和公共工程。无论国家是王国、共和国、帝国、公国、城邦还是联邦，只要它拥有一套能发布命令、征收资源并执行法律的机构，这套机构就可以被称为政府。

政府通常拥有合法暴力、公共财政和行政文书。它可以任命官员，征召士兵，批准贸易，审判罪犯，修建道路，发行命令，也可以派遣代理人处理普通官僚无法解决的问题。

对冒险者而言，政府既是稳定雇主，也是麻烦来源。它能提供合法身份、通行许可、薪酬、情报和保护；同时也会要求服从命令、保守秘密、承担政治后果，并在必要时牺牲个人利益来维护国家利益。

## 目标与活动

国家政府的首要目标是维持统治秩序。

常见活动包括：

* 征税与财政管理；
* 维护治安；
* 镇压叛乱；
* 审判罪犯；
* 保护道路与商路；
* 管理户籍和土地；
* 组织军队；
* 修建公共工程；
* 与外国谈判；
* 处理灾害、邪教、怪物和边境冲突。

不同国家的政府风格差异很大。强势王国可能要求绝对服从，共和国可能依靠议会和文书程序，魔法国家可能让法师掌握行政核心，封建国家则可能把大量权力交给地方贵族。

无论形式如何，政府最关心的通常都是三件事：国家不能乱，税不能断，命令必须有人执行。

## 领导与组织

政府的最高权力来源取决于国家制度。它可能来自国王、皇帝、议会、执政团、公爵、城主、教会、军部或贵族会议。

一般政府会包含以下机构：

* 中央统治者或最高议会；
* 财政机关；
* 司法机关；
* 军事机关；
* 地方官员；
* 边境管理者；
* 文书和档案系统；
* 特殊任务部门。

冒险者通常不会直接成为国家最高官员。他们更常见的身份是政府代理人、特许调查员、军方外勤、宫廷密使、边境巡查员、临时征召者或被授予特殊权限的解决问题者。

政府成员之间未必团结。不同官员、军队、贵族、城市和地方机关可能互相推诿、争权、隐瞒情报或借冒险者完成不方便公开处理的事务。

## 加入组织

角色可以通过以下方式为政府效力：

* 接受政府委托；
* 获得临时授权；
* 加入军队或官僚系统；
* 成为宫廷、议会或地方长官的代理人；
* 获得调查令、通行令或征召令；
* 因功绩被授予公职、爵位或荣誉身份。

政府通常看重可靠性、服从性、能力和政治风险控制。能打很重要，听得懂命令同样重要。一个总是制造外交事故的强者，未必比一个谨慎可靠的低阶代理人更受欢迎。

## 组织特色

政府最大的特色是**合法性**。

政府代理人可以用国家名义行动。他们能调阅档案、进入关卡、要求地方配合、征用物资、审讯嫌疑人、护送官员、追捕通缉犯，甚至在特殊情况下调动士兵。

但合法性也意味着约束。政府代理人不能随意劫掠、私刑、泄密、违令或破坏国家利益。若行动失败，政府可能拒绝承认他们的身份；若行动成功，功劳也未必完全归于个人。

适合加入政府体系的角色通常重视秩序、责任、名誉、报酬、晋升或国家利益。

政府体系不适合完全拒绝命令、频繁制造混乱、公开挑战国家权威或无法保守秘密的角色。

# 冒险者公会

## 概述

冒险者公会是面向自由冒险者的登记组织。它不直接统治土地，也不宣称效忠某个单一国家；它的核心功能是把危险委托、雇主报酬与愿意冒险的人连接起来。

在秩序稳定的国家，冒险者公会常被视为合法雇佣中介，负责处理怪物、遗迹、护送、搜救、异常事件与地方官府不方便亲自处理的麻烦。在某些失序地区，公会甚至会承担半官方治安功能。许多村镇付不起常备军，也等不到政府援助，只能把最后一点钱交给冒险者公会。

## 目标与活动

冒险者公会的公开目标是规范冒险行业，减少无证佣兵、黑市赏金和私人复仇造成的混乱。

公会主要活动包括：

* 登记冒险者身份；
* 发布和审核委托；
* 评估任务难度；
* 分配报酬；
* 调解冒险者与雇主纠纷；
* 追踪失踪队伍；
* 管理怪物赏金；
* 鉴定战利品；
* 提供基础训练；
* 维护地方公会大厅；
* 向政府、商会、村镇和个人提供外包武力。

冒险者公会的现任总公会长是**马德拉里·希伯**。

马德拉里·希伯是一名约一百七十岁的人类，外表衰老却精神清醒。据说他年轻时也是顶尖冒险者，曾进入过许多危险遗迹。如今他长期坐镇总公会，依靠药剂、法术、秘仪和昂贵医疗维持生命。

几乎所有人都知道，马德拉里一直在寻找延寿的方法。有人认为他只是怕死，也有人认为他掌握着某个只有长寿者才能完成的计划。

冒险者公会的结构很清晰：

* 总公会；
* 地区分会；
* 城市公会大厅；

* 任务评估员；
* 记录员；

* 临时小队与固定小队。

大部分冒险者只会接触地方公会大厅。那里通常有任务板、酒馆、登记柜台、训练场、医疗室、仓库和战利品鉴定处。

## 加入组织

登记流程通常包括：

## 组织特色：注册与称号

冒险者公会采用称号排位制度。称号代表冒险者能接触的委托等级，也代表雇主愿意支付的信任成本。

冒险者公会适合几乎所有愿意接取委托、探索危险地点、接受报酬并承担风险的角色。

公会不关心成员是否出身高贵，只关心任务能否完成、报酬能否结算、风险能否接受。过于抗拒合作、频繁违约、喜欢滥杀或无法遵守最低规则的角色，很快会被公会排斥。

        const state = {
            current: {
                nodeId: "home",
                name: "首页",
                path: "首页",
                type: "目录",
                asset: "optional",
                children: archive,

        const tree = document.getElementById("tree");
        const panelPath = document.getElementById("panel-path");
        const panelTitle = document.getElementById("panel-title");
        const panelType = document.getElementById("panel-type");
        const panelBody = document.getElementById("panel-body");
        const workspace = document.getElementById("workspace");
        const assetTitle = document.getElementById("asset-title");
        const assetSlot = document.getElementById("asset-slot");
        const assetLabel = document.getElementById("asset-label");
        const assetNote = document.getElementById("asset-note");

        function buildTree() {
            const homeButton = `<button class="tree-leaf active" data-node="home">首页</button>`;
            const sections = archive.map(section => {
                const children = section.children || [];
                if (!children.length) {
                    return `<button class="tree-leaf" data-node="${section.id}">${section.name}</button>`;
                }

                return `
                    <div class="tree-section">
                        <button class="tree-toggle" data-node="${section.id}">
                            <span>${section.name}</span>
                            <span class="toggle-mark">展开</span>
                        </button>
                        <div class="tree-children">
                            ${children.map(child => `
                                <button class="tree-leaf" data-node="${section.id}:${childName(child)}">${childName(child)}</button>
                            `).join("")}
                        </div>
                    </div>
                `;
            }).join("");

            tree.innerHTML = homeButton + sections;
            tree.addEventListener("click", event => {
                const button = event.target.closest("button[data-node]");
                if (!button) return;
                selectNode(button.dataset.node);
            });

            panelBody.addEventListener("click", event => {
                const card = event.target.closest(".section-card[data-target]");
                if (!card) return;
                selectNode(card.dataset.target);
            });
        }

        function selectNode(nodeId) {
            if (nodeId === "home") {
                state.current = {
                    nodeId,
                    name: "首页",
                    path: "首页",
                    type: "目录",
                    asset: "optional",
                    children: archive,
                    image: "assets/helios/封面.png",
                    imageAspect: "1103 / 1426"
                };
            } else if (!nodeId.includes(":")) {
                const section = archive.find(item => item.id === nodeId);
                state.current = {
                    nodeId,
                    name: section.name,
                    path: `首页 / ${section.name}`,
                    type: section.type || "分类",
                    asset: section.asset || "optional",
                    children: section.children || [],
                    content: section.content || [],
                    image: section.image || "",
                    imageAspect: section.imageAspect || "",
                    markdown: section.markdown || ""
                };
            } else {
                const [sectionId, childLabel] = nodeId.split(":");
                const section = archive.find(item => item.id === sectionId);
                const child = (section.children || []).find(item => childName(item) === childLabel);
                state.current = {
                    nodeId,
                    name: childName(child),
                    path: `首页 / ${section.name} / ${childName(child)}`,
                    type: section.name,
                    asset: section.asset || "optional",
                    children: [],
                    content: child && typeof child === "object" ? child.content || [] : [],
                    image: child && typeof child === "object" ? child.image || "" : "",
                    imageAspect: child && typeof child === "object" ? child.imageAspect || "" : "",
                    markdown: child && typeof child === "object" ? child.markdown || "" : ""
                };
            }

            document.querySelectorAll(".tree-leaf").forEach(button => {
                button.classList.toggle("active", button.dataset.node === nodeId);
            });
            document.querySelectorAll(".tree-toggle").forEach(button => {
                button.classList.toggle("active", button.dataset.node === nodeId);
            });
            renderPanel();
        }

        function renderPanel() {
            panelPath.textContent = state.current.path;
            panelTitle.textContent = state.current.name;
            panelType.textContent = state.current.type;
            panelType.className = `type-pill ${assetClass(state.current.asset)}`;
            workspace.classList.toggle("country-layout", state.current.asset === "country");
            workspace.classList.toggle("home-layout", state.current.nodeId === "home");

            if (state.current.markdown) {
                panelBody.innerHTML = `<div class="intro-copy">${renderMarkdown(state.current.markdown)}</div>`;
            } else if (state.current.content && state.current.content.length) {
                panelBody.innerHTML = `
                    <div class="intro-copy">
                        ${state.current.content.map(renderContentParagraph).join("")}
                    </div>
                `;
            } else if (state.current.children.length) {
                panelBody.innerHTML = `
                    ${state.current.nodeId === "home" ? renderHomeCover() : ""}
                    <div class="section-grid">
                        ${state.current.children.map(name => `
                            <button class="section-card" data-target="${targetForChild(name)}">
                                <div class="section-name">${childName(name)}</div>
                                <div class="section-meta">${childMeta(name)}</div>
                            </button>
                        `).join("")}
                    </div>
                `;
            } else {
                panelBody.innerHTML = `<div class="empty-editor" aria-label="${state.current.name}内容区"></div>`;
            }

            renderAssetSlot(state.current.asset);
        }

        function renderHomeCover() {
            if (!state.current.image) return "";
            return `
                <div class="home-cover">
                    <img src="${escapeAttribute(state.current.image)}" alt="赫里奥斯封面">
                </div>
            `;
        }

        function targetForChild(name) {
            if (state.current.nodeId === "home") {
                const section = archive.find(item => item.name === childName(name));
                return section ? section.id : "home";
            }

            return `${state.current.nodeId}:${childName(name)}`;
        }

        function childName(child) {
            return typeof child === "object" ? child.name : child;
        }

        function childMeta(child) {
            if (typeof child !== "object") return "未填充";
            if (child.content && child.content.length) return "已记录";
            if (child.markdown) return "已记录";
            if (child.children && child.children.length) return `含 ${child.children.length} 项`;
            return "未填充";
        }

        function renderMarkdown(markdown) {
            const lines = markdown.trim().split(/\r?\n/);
            const html = [];

            for (let index = 0; index < lines.length; index += 1) {
                const line = lines[index].trim();
                if (!line || line === "---") continue;

                if (line.startsWith("|")) {
                    const tableLines = [];
                    while (index < lines.length && lines[index].trim().startsWith("|")) {
                        tableLines.push(lines[index].trim());
                        index += 1;
                    }
                    index -= 1;
                    html.push(renderMarkdownTable(tableLines));
                    continue;
                }

                if (line.startsWith("* ")) {
                    const items = [];
                    while (index < lines.length && lines[index].trim().startsWith("* ")) {
                        items.push(lines[index].trim().slice(2));
                        index += 1;
                    }
                    index -= 1;
                    html.push(`<ul>${items.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ul>`);
                    continue;
                }

                if (line.startsWith("### ")) {
                    html.push(`<div class="sub-heading">${renderInlineMarkdown(line.slice(4))}</div>`);
                    continue;
                }

                if (line.startsWith("## ")) {
                    html.push(`<div class="section-heading">${renderInlineMarkdown(line.slice(3))}</div>`);
                    continue;
                }

                if (line.startsWith("# ")) {
                    html.push(`<p>${renderInlineMarkdown(line.slice(2))}</p>`);
                    continue;
                }

                html.push(`<p>${renderInlineMarkdown(line)}</p>`);
            }

            return html.join("");
        }

        function renderMarkdownTable(lines) {
            const rows = lines
                .filter(line => !/^\|\s*-/.test(line))
                .map(line => line.split("|").slice(1, -1).map(cell => cell.trim()));

            if (!rows.length) return "";
            const headers = rows[0].map(header => `<th>${renderInlineMarkdown(header)}</th>`).join("");
            const body = rows.slice(1).map(row => `
                <tr>${row.map(cell => `<td>${renderInlineMarkdown(cell)}</td>`).join("")}</tr>
            `).join("");

            return `
                <div class="content-table-wrap">
                    <table class="content-table">
                        <thead><tr>${headers}</tr></thead>
                        <tbody>${body}</tbody>
                    </table>
                </div>
            `;
        }

        function renderInlineMarkdown(value) {
            return escapeHTML(value).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        }

        function renderContentParagraph(paragraph, index) {
            if (typeof paragraph === "object" && paragraph.type === "table") return renderContentTable(paragraph);
            if (typeof paragraph === "object" && paragraph.type === "heading") return renderContentHeading(paragraph);

            const compactHeadings = [
                "等级坐标",
                "CR坐标",
                "备注",
                "奥斯坎六神",
                "草原主要灵名",
                "群岛五神",
                "北境五神",
                "对他们来说，统治关系非常直观：",
                "登神会内部没有统一教义，只有一个核心目标：",
                "不要崇拜旧神，要成为新神。"
            ];
            const isHeading = index > 0 && (/^\d+\.\s/.test(paragraph) || compactHeadings.includes(paragraph));
            const className = isHeading ? ' class="fact-heading"' : "";
            return `<p${className}>${escapeHTML(paragraph)}</p>`;
        }

        function renderContentHeading(heading) {
            const className = heading.level === 2 ? "section-heading" : "sub-heading";
            return `<div class="${className}">${escapeHTML(heading.text)}</div>`;
        }

        function renderContentTable(table) {
            const headers = table.headers.map(header => `<th>${escapeHTML(header)}</th>`).join("");
            const rows = table.rows.map(row => `
                <tr>${row.map(cell => `<td>${escapeHTML(cell)}</td>`).join("")}</tr>
            `).join("");

            return `
                <div class="content-table-wrap">
                    <table class="content-table">
                        <thead><tr>${headers}</tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        function escapeHTML(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            }[char]));
        }

        function renderAssetSlot(assetType) {
            assetSlot.className = `asset-slot ${assetClass(assetType)}`;
            assetSlot.style.aspectRatio = "";
            assetSlot.innerHTML = `
                <div>
                    <div class="asset-label" id="asset-label">图片位</div>
                    <div class="asset-note" id="asset-note">留空</div>
                </div>
            `;

            if (assetType === "country") {
                assetTitle.textContent = "地理图";
                if (state.current.image) {
                    assetSlot.classList.add("has-image");
                    if (state.current.imageAspect) assetSlot.style.aspectRatio = state.current.imageAspect;
                    assetSlot.innerHTML = `<img src="${escapeAttribute(state.current.image)}" alt="${escapeAttribute(state.current.name)}地理图">`;
                } else {
                    updateAssetText("国家地理图", "留空");
                }
                return;
            }

            if (assetType === "person" || assetType === "race") {
                assetTitle.textContent = "头像";
                updateAssetText(assetType === "person" ? "人物头像" : "种族头像", "留空");
                return;
            }

            assetTitle.textContent = state.current.nodeId === "home" ? "封面" : "可选图片";
            if (state.current.image) {
                assetSlot.classList.add("has-image");
                if (state.current.imageAspect) assetSlot.style.aspectRatio = state.current.imageAspect;
                assetSlot.innerHTML = `<img src="${escapeAttribute(state.current.image)}" alt="${escapeAttribute(state.current.name)}图片">`;
            } else {
                updateAssetText("图片位", "留空");
            }
        }

        function updateAssetText(label, note) {
            const currentAssetLabel = assetSlot.querySelector(".asset-label");
            const currentAssetNote = assetSlot.querySelector(".asset-note");
            if (currentAssetLabel) currentAssetLabel.textContent = label;
            if (currentAssetNote) currentAssetNote.textContent = note;
        }

        function escapeAttribute(value) {
            return String(value).replace(/["'<>]/g, "");
        }

        function assetClass(assetType) {
            if (assetType === "country") return "map country";
            if (assetType === "person") return "avatar person";
            if (assetType === "race") return "avatar race";
            return "optional";
        }

        function preserveUidLinks() {
            const params = new URLSearchParams(location.search);
            const uid = params.get("uid");
            if (!uid) return;

            document.getElementById("back-link").href = `index.html?uid=${encodeURIComponent(uid)}`;
        }

        buildTree();
        preserveUidLinks();
        renderPanel();
    </script>
