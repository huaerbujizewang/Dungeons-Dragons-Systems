<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://vbzfpgucpciqgaakqndz.supabase.co;
    connect-src 'self' https://vbzfpgucpciqgaakqndz.supabase.co wss://vbzfpgucpciqgaakqndz.supabase.co;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https: blob:;
    object-src 'none';
    base-uri 'self';
">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白城证券交易所</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="stocks.js"></script>
    <style>
        :root {
            --ink: #1f2933;
            --muted: #667085;
            --line: #d9dee7;
            --paper: #f7f8fb;
            --panel: #ffffff;
            --green: #178a55;
            --red: #bf3a30;
            --blue: #2f6f9f;
            --gold: #a8791c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--ink);
            background: var(--paper);
        }
        header {
            background: #27384a;
            color: #fff;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
        }
        h1 { margin: 0; font-size: 1.45rem; letter-spacing: 0; }
        header a { color: #d6e7ff; text-decoration: none; font-size: 0.92rem; }
        main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 22px;
        }
        .status-strip {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .status-item, .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(31, 41, 51, 0.05);
        }
        .status-item { padding: 12px 14px; }
        .label { color: var(--muted); font-size: 0.78rem; margin-bottom: 4px; }
        .value { font-weight: 700; font-size: 1.05rem; }
        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 330px;
            gap: 16px;
            align-items: start;
        }
        .panel { padding: 16px; }
        .panel h2, .panel h3 { margin: 0 0 12px; font-size: 1.05rem; }
        .panel-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }
        .panel-head h2, .panel-head h3 { margin: 0; }
        .chart-tools {
            display: flex;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-size: 0.82rem;
        }
        .chart-tools select { width: auto; min-width: 98px; padding: 6px 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
        th, td { padding: 10px 8px; border-bottom: 1px solid #edf0f5; text-align: right; vertical-align: middle; }
        th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align: left; }
        tr.stock-row { cursor: pointer; }
        tr.stock-row:hover, tr.stock-row.active { background: #eef5fb; }
        .up { color: var(--red); }
        .down { color: var(--green); }
        .status-open { color: var(--green); }
        .status-closed { color: var(--red); }
        .muted { color: var(--muted); }
        .message {
            padding: 18px;
            border: 1px dashed #b7c3d3;
            border-radius: 8px;
            background: #fff;
            color: var(--muted);
            text-align: center;
        }
        .trade-box {
            display: grid;
            gap: 10px;
        }
        input, select {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid #cdd5df;
            border-radius: 6px;
            font: inherit;
            background: #fff;
        }
        button {
            border: 0;
            border-radius: 6px;
            padding: 10px 12px;
            font-weight: 700;
            cursor: pointer;
            background: #34495e;
            color: #fff;
        }
        button.secondary { background: #eef2f6; color: #27384a; border: 1px solid #cfd8e3; }
        button.buy { background: var(--green); }
        button.sell { background: var(--red); }
        button:disabled { opacity: 0.55; cursor: not-allowed; }
        .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        canvas {
            width: 100%;
            height: 180px;
            display: block;
            background: #fbfcfe;
            border: 1px solid #edf0f5;
            border-radius: 6px;
        }
        .comparison-panel { margin-bottom: 16px; }
        .comparison-chart { height: 260px; }
        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
            margin-top: 10px;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .legend-swatch {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            display: inline-block;
        }
        .dm-panel { margin-top: 16px; border-color: #c7b37a; background: #fffdf6; }
        .dm-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; align-items: end; }
        .dm-intel { max-height: 260px; overflow: auto; font-size: 0.84rem; background: #fff; border: 1px solid #eee3bb; border-radius: 6px; padding: 8px; }
        .tiny { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
        @media (max-width: 900px) {
            header { flex-direction: column; align-items: flex-start; }
            .panel-head { align-items: flex-start; flex-direction: column; }
            .status-strip, .layout, .dm-grid { grid-template-columns: 1fr; }
            main { padding: 14px; }
            th:nth-child(6), td:nth-child(6), th:nth-child(7), td:nth-child(7) { display: none; }
        }
    </style>
</head>
<body>
<header>
    <div>
        <h1>白城证券交易所</h1>
        <div class="tiny" style="color:#d7e2ef;">所有行情、持仓和 DM 修正均按当前账号独立保存</div>
    </div>
    <a id="back-link" href="index.html">返回小队管理系统</a>
</header>

<main>
    <section class="panel comparison-panel">
        <div class="panel-head">
            <h2>八股走势对比</h2>
            <label class="chart-tools">
                范围
                <select id="history-range" onchange="changeHistoryRange()">
                    <option value="30">1个月</option>
                    <option value="90">3个月</option>
                    <option value="180">6个月</option>
                    <option value="360" selected>12个月</option>
                    <option value="720">2年</option>
                    <option value="1800">5年</option>
                    <option value="0">全部</option>
                </select>
            </label>
        </div>
        <canvas id="comparison-chart" class="comparison-chart" width="1100" height="320"></canvas>
        <div id="comparison-legend" class="chart-legend"></div>
    </section>

    <section class="status-strip">
        <div class="status-item">
            <div class="label">当前世界日期</div>
            <div id="world-date" class="value">--</div>
        </div>
        <div class="status-item">
            <div class="label">市场状态</div>
            <div id="market-status" class="value">加载中</div>
        </div>
        <div class="status-item">
            <div class="label">账户资金</div>
            <div id="gold-value" class="value">-- GP</div>
        </div>
        <div class="status-item">
            <div class="label">当前视角</div>
            <div id="viewer-label" class="value">--</div>
        </div>
    </section>

    <section id="closed-message" class="message" style="display:none;"></section>

    <section class="layout">
        <div class="panel">
            <h2>挂牌公司</h2>
            <div style="overflow:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>名称</th>
                            <th>代码</th>
                            <th>当前价</th>
                            <th>上一日</th>
                            <th>持有</th>
                            <th>均价</th>
                            <th>市值</th>
                            <th>浮盈亏</th>
                        </tr>
                    </thead>
                    <tbody id="stock-table"></tbody>
                </table>
            </div>
        </div>

        <aside class="panel">
            <h2 id="selected-title">交易</h2>
            <div class="trade-box">
                <div>
                    <div class="label">整数股数</div>
                    <input id="trade-quantity" type="number" min="1" step="1" value="1">
                </div>
                <div class="button-row">
                    <button id="buy-btn" class="buy" onclick="tradeStock('buy')">买入</button>
                    <button id="sell-btn" class="sell" onclick="tradeStock('sell')">卖出</button>
                </div>
                <div id="trade-note" class="tiny">当日所有交易均按当前价成交。</div>
            </div>
            <h3 style="margin-top:18px;">价格历史</h3>
            <canvas id="history-chart" width="640" height="260"></canvas>
        </aside>
    </section>

    <section id="dm-panel" class="panel dm-panel" style="display:none;">
        <h2>DM 市场控制</h2>
        <div class="dm-grid">
            <label>
                <div class="label">市场状态</div>
                <select id="dm-market-enabled">
                    <option value="true">开启</option>
                    <option value="false">关闭</option>
                </select>
            </label>
            <label>
                <div class="label">开启日期</div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;">
                    <input id="dm-open-year" type="number" placeholder="年">
                    <input id="dm-open-month" type="number" min="1" max="12" placeholder="月">
                    <input id="dm-open-day" type="number" min="1" max="30" placeholder="日">
                </div>
            </label>
            <button onclick="saveMarketConfig()">保存市场设置</button>
            <button id="repair-history-btn" onclick="repairMarketHistory()">补全价格历史</button>
            <label>
                <div class="label">修正股票</div>
                <select id="dm-adjust-stock"></select>
            </label>
            <label>
                <div class="label">下一次结算修正 %</div>
                <input id="dm-adjust-percent" type="number" step="0.1" placeholder="-25">
                <div class="tiny">按百分点加减到当日涨跌率。</div>
            </label>
            <button onclick="saveDmAdjustment()">设置一次性修正</button>
        </div>
        <h3 style="margin-top:14px;">本月隐藏趋势与基础涨跌</h3>
        <div id="dm-intel" class="dm-intel"></div>
    </section>
</main>

<script>
    const SUPABASE_URL = 'https://vbzfpgucpciqgaakqndz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTc2MzMsImV4cCI6MjA4MzE3MzYzM30.fBVDirEJ52bvrYJZ5DNv7fVDLNgCwITKwdKqT6YJDYw';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ADMIN_ROLES = ['dm', 'root'];

    let currentUser = null;
    let currentRole = 'player';
    let accountId = null;
    let accountProfile = null;
    let snapshot = null;
    let selectedStockId = null;
    let selectedHistoryDays = 360;
    let presenceChannel = null;
    let autoRepairAttempted = false;

    const CHART_COLORS = ['#bf3a30', '#178a55', '#2f6f9f', '#a8791c', '#6f4aa8', '#bf6b2d', '#2b7a78', '#4b5563'];

    function escapeHTML(value) {
        return String(value ?? '').replace(/[&<>'"]/g, ch => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        }[ch]));
    }

    async function initPresenceSystem(email, role = 'player') {
        email = String(email || '').trim().toLowerCase();
        if (!email) return;

        if (presenceChannel) {
            const oldChannel = presenceChannel;
            presenceChannel = null;
            try {
                await supabaseClient.removeChannel(oldChannel);
            } catch (error) {
                console.warn('presence cleanup failed', error);
            }
        }

        presenceChannel = supabaseClient.channel('online-users', {
            config: {
                presence: {
                    key: email
                }
            }
        });

        presenceChannel.subscribe(async status => {
            if (status !== 'SUBSCRIBED' || !presenceChannel) return;
            const trackStatus = await presenceChannel.track({
                email,
                role,
                page: 'stocks',
                online_at: new Date().toISOString()
            });
            if (trackStatus !== 'ok') console.warn('presence track failed', trackStatus);
        });
    }

    window.addEventListener('beforeunload', () => {
        if (presenceChannel) presenceChannel.untrack();
    });

    function formatMoney(value) {
        return `${Number(value || 0).toLocaleString(undefined, { maximumFractionDigits: 2 })} GP`;
    }

    function formatRate(value) {
        const pct = Number(value || 0) * 100;
        return `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
    }

    function getLastChange(stockId) {
        const history = snapshot?.historyByStock?.[stockId] || [];
        if (!history.length) return 0;
        const current = history[history.length - 1];
        if (current.previous_price) return (Number(current.price) / Number(current.previous_price)) - 1;
        if (history.length < 2) return 0;
        return (Number(current.price) / Number(history[history.length - 2].price)) - 1;
    }

    async function init() {
        const params = new URLSearchParams(location.search);
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) {
            document.getElementById('closed-message').style.display = 'block';
            document.getElementById('closed-message').textContent = '请先登录小队管理系统。';
            return;
        }
        currentUser = user;
        const { data: roleData } = await supabaseClient
            .from('admin_users')
            .select('role_level')
            .eq('id', user.id)
            .maybeSingle();
        currentRole = roleData?.role_level || 'player';
        accountId = ADMIN_ROLES.includes(currentRole) && params.get('uid') ? params.get('uid') : user.id;
        initPresenceSystem(user.email || '', currentRole);
        document.getElementById('back-link').href = `index.html${accountId ? `?uid=${encodeURIComponent(accountId)}` : ''}`;
        await refreshPage();
    }

    async function refreshPage() {
        const { data: profile, error } = await supabaseClient
            .from('profiles')
            .select('*')
            .eq('id', accountId)
            .single();
        if (error) {
            showError(error.message);
            return;
        }
        accountProfile = profile;
        const currentDate = profile.world_date || { year: 1494, month: 2, day: 12 };
        const calendarSystem = profile.calendar_system || (profile.campaign_type === 'coc' ? 'ce' : 'dr');
        document.getElementById('world-date').textContent = BaichengStocks.formatDate(currentDate, calendarSystem, profile.campaign_type);
        document.getElementById('gold-value').textContent = formatMoney(profile.gold_gp);
        document.getElementById('viewer-label').textContent = profile.email || accountId;

        try {
            const snapshotOptions = {
                client: supabaseClient,
                accountId,
                currentDate,
                includeFuture: ADMIN_ROLES.includes(currentRole),
                historyDays: getHistoryFetchDays()
            };
            snapshot = await BaichengStocks.loadSnapshot(snapshotOptions);
            if (shouldAutoRepairHistory(currentDate)) {
                autoRepairAttempted = true;
                await BaichengStocks.repairMarketHistory({
                    client: supabaseClient,
                    accountId,
                    currentDate
                });
                snapshot = await BaichengStocks.loadSnapshot(snapshotOptions);
            }
        } catch (e) {
            showError(`股票数据加载失败：${e.message || e}`);
            return;
        }

        if (!selectedStockId && snapshot.stocks.length) selectedStockId = snapshot.stocks[0].id;
        renderMarketStatus(currentDate);
        drawComparisonChart();
        renderStocks();
        renderTradePanel();
        renderDmPanel(currentDate);
    }

    function showError(message) {
        const box = document.getElementById('closed-message');
        box.style.display = 'block';
        box.textContent = message;
    }

    function renderMarketStatus(currentDate) {
        const status = document.getElementById('market-status');
        const message = document.getElementById('closed-message');
        const openDate = snapshot.openDate;
        if (!snapshot.market.market_enabled) {
            status.textContent = '已关闭';
            status.className = 'value status-closed';
            message.style.display = 'block';
            message.textContent = '白城证券交易所尚未开放';
            return;
        }
        if (!snapshot.tradable) {
            const calendarSystem = accountProfile?.calendar_system || (accountProfile?.campaign_type === 'coc' ? 'ce' : 'dr');
            status.textContent = openDate ? `${BaichengStocks.formatDate(openDate, calendarSystem, accountProfile?.campaign_type)} 开放` : '未设日期';
            status.className = 'value';
            message.style.display = 'block';
            message.textContent = '白城证券交易所尚未开放';
            return;
        }
        status.textContent = '开放交易';
        status.className = 'value status-open';
        message.style.display = 'none';
    }

    function renderStocks() {
        const tbody = document.getElementById('stock-table');
        tbody.innerHTML = snapshot.stocks.map(stock => {
            const state = snapshot.states[stock.id] || {};
            const holding = snapshot.holdings[stock.id] || {};
            const price = Number(state.current_price || stock.initial_price);
            const quantity = Number(holding.quantity || 0);
            const average = Number(holding.average_cost || 0);
            const marketValue = price * quantity;
            const pnl = quantity > 0 ? (price - average) * quantity : 0;
            const change = getLastChange(stock.id);
            const active = stock.id === selectedStockId ? ' active' : '';
            return `
                <tr class="stock-row${active}" onclick="selectStock('${stock.id}')">
                    <td>${escapeHTML(stock.name)}</td>
                    <td>${escapeHTML(stock.code)}</td>
                    <td>${formatMoney(price)}</td>
                    <td class="${change >= 0 ? 'up' : 'down'}">${formatRate(change)}</td>
                    <td>${quantity}</td>
                    <td>${average ? formatMoney(average) : '-'}</td>
                    <td>${formatMoney(marketValue)}</td>
                    <td class="${pnl >= 0 ? 'up' : 'down'}">${formatMoney(pnl)}</td>
                </tr>
            `;
        }).join('');
    }

    function selectStock(stockId) {
        selectedStockId = stockId;
        renderStocks();
        renderTradePanel();
    }

    function getHistoryFetchDays() {
        if (!Number.isFinite(selectedHistoryDays) || selectedHistoryDays <= 0) return 0;
        return selectedHistoryDays + 30;
    }

    async function changeHistoryRange() {
        selectedHistoryDays = parseInt(document.getElementById('history-range').value, 10);
        if (!Number.isFinite(selectedHistoryDays)) selectedHistoryDays = 360;
        await refreshPage();
    }

    function currentDateSerial() {
        return accountProfile?.world_date ? BaichengStocks.dateToSerial(accountProfile.world_date) : null;
    }

    function filterHistoryByDays(history, days) {
        const rows = history || [];
        const serial = currentDateSerial();
        if (!Number.isFinite(serial) || !Number.isFinite(days) || days <= 0) return rows;
        return rows.filter(row => Number(row.date_serial) >= serial - days && Number(row.date_serial) <= serial);
    }

    function hasRenderableHistory() {
        if (!snapshot?.stocks?.length) return false;
        return snapshot.stocks.some(stock =>
            filterHistoryByDays(snapshot.historyByStock?.[stock.id] || [], selectedHistoryDays).length >= 2
        );
    }

    function shouldAutoRepairHistory(currentDate) {
        if (autoRepairAttempted || !ADMIN_ROLES.includes(currentRole)) return false;
        if (!snapshot?.market?.market_enabled || !snapshot?.openDate || !currentDate) return false;
        if (BaichengStocks.compareDates(snapshot.openDate, currentDate) >= 0) return false;
        return !hasRenderableHistory();
    }

    function clearChart(canvas, ctx) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fbfcfe';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#d7dde7';
        ctx.lineWidth = 1;
    }

    function drawChartFrame(canvas, ctx, left = 44, top = 22, right = 18, bottom = 34) {
        const width = canvas.width - left - right;
        const height = canvas.height - top - bottom;
        ctx.beginPath();
        ctx.moveTo(left, top);
        ctx.lineTo(left, top + height);
        ctx.lineTo(left + width, top + height);
        ctx.stroke();
        return { left, top, right, bottom, width, height };
    }

    function drawNoData(canvas, ctx, text) {
        ctx.fillStyle = '#667085';
        ctx.textAlign = 'center';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        ctx.textAlign = 'start';
    }

    function drawComparisonChart() {
        const canvas = document.getElementById('comparison-chart');
        const legend = document.getElementById('comparison-legend');
        if (!canvas || !legend || !snapshot) return;
        const ctx = canvas.getContext('2d');
        clearChart(canvas, ctx);
        const frame = drawChartFrame(canvas, ctx, 52, 24, 20, 38);
        const series = snapshot.stocks.map((stock, index) => {
            const history = filterHistoryByDays(snapshot.historyByStock[stock.id] || [], selectedHistoryDays)
                .filter(row => Number(row.price) > 0);
            if (history.length < 2) return null;
            const first = Number(history[0].price);
            const points = history.map(row => ({
                serial: Number(row.date_serial),
                value: (Number(row.price) / first) - 1
            }));
            return {
                stock,
                points,
                color: CHART_COLORS[index % CHART_COLORS.length],
                last: points[points.length - 1].value
            };
        }).filter(Boolean);

        if (!series.length) {
            legend.innerHTML = '';
            drawNoData(canvas, ctx, '暂无足够历史');
            return;
        }

        const allPoints = series.flatMap(item => item.points);
        const minSerial = Math.min(...allPoints.map(point => point.serial));
        const maxSerial = Math.max(...allPoints.map(point => point.serial));
        const minValue = Math.min(...allPoints.map(point => point.value), 0);
        const maxValue = Math.max(...allPoints.map(point => point.value), 0);
        const valueSpan = Math.max(0.01, maxValue - minValue);
        const serialSpan = Math.max(1, maxSerial - minSerial);

        const zeroY = frame.top + frame.height - ((0 - minValue) / valueSpan) * frame.height;
        ctx.strokeStyle = '#edf0f5';
        ctx.beginPath();
        ctx.moveTo(frame.left, zeroY);
        ctx.lineTo(frame.left + frame.width, zeroY);
        ctx.stroke();

        for (const item of series) {
            ctx.strokeStyle = item.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            item.points.forEach((point, index) => {
                const x = frame.left + ((point.serial - minSerial) / serialSpan) * frame.width;
                const y = frame.top + frame.height - ((point.value - minValue) / valueSpan) * frame.height;
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        ctx.fillStyle = '#1f2933';
        ctx.fillText(formatRate(maxValue), frame.left + 4, frame.top + 12);
        ctx.fillText(formatRate(minValue), frame.left + 4, frame.top + frame.height - 6);
        legend.innerHTML = series.map(item => `
            <span class="legend-item">
                <span class="legend-swatch" style="background:${item.color}"></span>
                ${escapeHTML(item.stock.code)} ${formatRate(item.last)}
            </span>
        `).join('');
    }

    function renderTradePanel() {
        const stock = snapshot.stocks.find(item => item.id === selectedStockId);
        if (!stock) return;
        document.getElementById('selected-title').textContent = `${stock.name} (${stock.code})`;
        const disabled = !snapshot.tradable;
        document.getElementById('buy-btn').disabled = disabled;
        document.getElementById('sell-btn').disabled = disabled;
        document.getElementById('trade-note').textContent = disabled
            ? '市场尚未开放，当前不能交易。'
            : '当日所有交易均按当前价成交，价格只在日期推进时变化。';
        drawChart(stock.id);
    }

    function drawChart(stockId) {
        const canvas = document.getElementById('history-chart');
        const ctx = canvas.getContext('2d');
        const history = filterHistoryByDays(snapshot.historyByStock[stockId] || [], selectedHistoryDays);
        clearChart(canvas, ctx);
        const frame = drawChartFrame(canvas, ctx, 40, 20, 20, 36);
        if (history.length < 2) {
            drawNoData(canvas, ctx, '暂无足够历史');
            return;
        }
        const prices = history.map(row => Number(row.price));
        const serials = history.map(row => Number(row.date_serial));
        const min = Math.min(...prices);
        const max = Math.max(...prices);
        const span = Math.max(0.01, max - min);
        const minSerial = Math.min(...serials);
        const maxSerial = Math.max(...serials);
        const serialSpan = Math.max(1, maxSerial - minSerial);
        ctx.strokeStyle = '#2f6f9f';
        ctx.lineWidth = 3;
        ctx.beginPath();
        history.forEach((row, index) => {
            const x = frame.left + ((Number(row.date_serial) - minSerial) / serialSpan) * frame.width;
            const y = frame.top + frame.height - ((Number(row.price) - min) / span) * frame.height;
            if (index === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.fillStyle = '#1f2933';
        ctx.fillText(formatMoney(max), frame.left + 4, frame.top + 12);
        ctx.fillText(formatMoney(min), frame.left + 4, frame.top + frame.height - 6);
    }

    function setTradeBusy(isBusy) {
        const buyBtn = document.getElementById('buy-btn');
        const sellBtn = document.getElementById('sell-btn');
        buyBtn.disabled = isBusy || !snapshot?.tradable;
        sellBtn.disabled = isBusy || !snapshot?.tradable;
        buyBtn.textContent = isBusy ? '提交中' : '买入';
        sellBtn.textContent = isBusy ? '提交中' : '卖出';
    }

    function applyTradeResult(type, result) {
        if (!snapshot || !selectedStockId || !result) return;
        if (Number.isFinite(Number(result.gold))) {
            accountProfile.gold_gp = Number(result.gold);
            document.getElementById('gold-value').textContent = formatMoney(accountProfile.gold_gp);
        }

        const holdingQty = Number(result.holdingQuantity);
        if (type === 'sell' && holdingQty <= 0) {
            delete snapshot.holdings[selectedStockId];
        } else if (Number.isFinite(holdingQty)) {
            const existing = snapshot.holdings[selectedStockId] || { account_id: accountId, stock_id: selectedStockId };
            snapshot.holdings[selectedStockId] = {
                ...existing,
                quantity: holdingQty,
                average_cost: Number(result.averageCost || existing.average_cost || 0)
            };
        }

        renderStocks();
        renderTradePanel();
    }

    async function tradeStock(type) {
        const quantity = parseInt(document.getElementById('trade-quantity').value, 10);
        const currentDate = accountProfile.world_date;
        setTradeBusy(true);
        try {
            let result;
            if (type === 'buy') {
                result = await BaichengStocks.buyStock({ client: supabaseClient, accountId, stockId: selectedStockId, quantity, currentDate });
                applyTradeResult(type, result);
                alert(`买入成功：${result.quantity} 股，成交额 ${formatMoney(result.total)}`);
            } else {
                result = await BaichengStocks.sellStock({ client: supabaseClient, accountId, stockId: selectedStockId, quantity, currentDate });
                applyTradeResult(type, result);
                alert(`卖出成功：${result.quantity} 股，成交额 ${formatMoney(result.total)}`);
            }
            refreshPage().catch(console.error);
        } catch (e) {
            alert(e.message || '交易失败');
        } finally {
            setTradeBusy(false);
        }
    }

    function renderDmPanel(currentDate) {
        const dmPanel = document.getElementById('dm-panel');
        if (!ADMIN_ROLES.includes(currentRole)) {
            dmPanel.style.display = 'none';
            return;
        }
        dmPanel.style.display = 'block';
        document.getElementById('dm-market-enabled').value = snapshot.market.market_enabled ? 'true' : 'false';
        const open = snapshot.openDate || currentDate;
        document.getElementById('dm-open-year').value = open.year;
        document.getElementById('dm-open-month').value = open.month;
        document.getElementById('dm-open-day').value = open.day;
        document.getElementById('dm-adjust-stock').innerHTML = snapshot.stocks
            .map(stock => `<option value="${stock.id}">${escapeHTML(stock.name)} (${escapeHTML(stock.code)})</option>`)
            .join('');
        document.getElementById('dm-adjust-stock').value = selectedStockId || snapshot.stocks[0]?.id || '';
        renderDmIntel();
    }

    function renderDmIntel() {
        const box = document.getElementById('dm-intel');
        const returnsByStock = {};
        snapshot.dailyReturns.forEach(row => {
            if (!returnsByStock[row.stock_id]) returnsByStock[row.stock_id] = [];
            returnsByStock[row.stock_id].push(row);
        });
        box.innerHTML = snapshot.stocks.map(stock => {
            const trend = snapshot.trends[stock.id];
            const rows = (returnsByStock[stock.id] || [])
                .map(row => `${row.day}日 ${formatRate(row.base_return)}`)
                .join('，');
            return `
                <div style="border-bottom:1px solid #f0e5bf; padding:8px 0;">
                    <strong>${escapeHTML(stock.name)}</strong>
                    <div>隐藏趋势：${escapeHTML(trend?.trend_type || '尚未生成')}</div>
                    <div class="tiny">${rows || '本月基础涨跌尚未生成'}</div>
                </div>
            `;
        }).join('');
    }

    async function saveMarketConfig() {
        const openDate = {
            year: parseInt(document.getElementById('dm-open-year').value, 10),
            month: parseInt(document.getElementById('dm-open-month').value, 10),
            day: parseInt(document.getElementById('dm-open-day').value, 10)
        };
        const enabled = document.getElementById('dm-market-enabled').value === 'true';
        try {
            await BaichengStocks.setMarketConfig({
                client: supabaseClient,
                accountId,
                enabled,
                openDate,
                currentDate: accountProfile.world_date
            });
            alert('市场设置已保存。');
            await refreshPage();
        } catch (e) {
            alert(e.message || '保存失败');
        }
    }

    async function repairMarketHistory() {
        if (!ADMIN_ROLES.includes(currentRole)) return;
        if (!accountProfile?.world_date) {
            alert('当前日期未加载。');
            return;
        }
        if (!snapshot?.market?.market_enabled) {
            alert('市场尚未开启。');
            return;
        }
        if (!confirm('将从市场开启日期补齐到当前日期的每日价格历史。继续？')) return;
        const button = document.getElementById('repair-history-btn');
        if (button) {
            button.disabled = true;
            button.textContent = '正在补全...';
        }
        try {
            await BaichengStocks.repairMarketHistory({
                client: supabaseClient,
                accountId,
                currentDate: accountProfile.world_date
            });
            autoRepairAttempted = true;
            await refreshPage();
            alert('价格历史已补全。');
        } catch (e) {
            showError(`补全价格历史失败：${e.message || e}`);
        } finally {
            if (button) {
                button.disabled = false;
                button.textContent = '补全价格历史';
            }
        }
    }

    async function saveDmAdjustment() {
        const stockId = document.getElementById('dm-adjust-stock').value;
        const percentage = Number(document.getElementById('dm-adjust-percent').value) / 100;
        try {
            await BaichengStocks.setDmAdjustment({
                client: supabaseClient,
                accountId,
                stockId,
                currentDate: accountProfile.world_date,
                percentage
            });
            document.getElementById('dm-adjust-percent').value = '';
            alert('下一次结算修正已设置。');
            await refreshPage();
        } catch (e) {
            alert(e.message || '设置失败');
        }
    }

    init();
</script>
</body>
</html>
