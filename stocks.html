<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://vbzfpgucpciqgaakqndz.supabase.co;
    connect-src 'self' https://vbzfpgucpciqgaakqndz.supabase.co wss://vbzfpgucpciqgaakqndz.supabase.co;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https: blob:;
    object-src 'none';
    base-uri 'self';
">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白城证券交易所</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="stocks.js"></script>
    <style>
        :root {
            --ink: #1f2933;
            --muted: #667085;
            --line: #d9dee7;
            --paper: #f7f8fb;
            --panel: #ffffff;
            --green: #178a55;
            --red: #bf3a30;
            --blue: #2f6f9f;
            --gold: #a8791c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--ink);
            background: var(--paper);
        }
        header {
            background: #27384a;
            color: #fff;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
        }
        h1 { margin: 0; font-size: 1.45rem; letter-spacing: 0; }
        header a { color: #d6e7ff; text-decoration: none; font-size: 0.92rem; }
        main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 22px;
        }
        .status-strip {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .status-item, .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(31, 41, 51, 0.05);
        }
        .status-item { padding: 12px 14px; }
        .label { color: var(--muted); font-size: 0.78rem; margin-bottom: 4px; }
        .value { font-weight: 700; font-size: 1.05rem; }
        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 330px;
            gap: 16px;
            align-items: start;
        }
        .panel { padding: 16px; }
        .panel h2, .panel h3 { margin: 0 0 12px; font-size: 1.05rem; }
        .panel-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }
        .panel-head h2, .panel-head h3 { margin: 0; }
        .chart-tools {
            display: flex;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-size: 0.82rem;
        }
        .chart-tools select { width: auto; min-width: 98px; padding: 6px 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
        th, td { padding: 10px 8px; border-bottom: 1px solid #edf0f5; text-align: right; vertical-align: middle; }
        th:first-child, td:first-child, th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) { text-align: left; }
        tr.stock-row { cursor: pointer; }
        tr.stock-row:hover, tr.stock-row.active { background: #eef5fb; }
        tr.stock-row.halted { background: #fff8f2; }
        tr.stock-row.halted.active { background: #f8eadf; }
        .halt-badge {
            display: inline-flex;
            align-items: center;
            min-height: 22px;
            padding: 2px 7px;
            border-radius: 999px;
            background: #fff0e4;
            color: #a64220;
            border: 1px solid #f2c4aa;
            font-size: 0.78rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .trade-warning {
            margin-top: 8px;
            padding: 8px 9px;
            border: 1px solid #f2c4aa;
            border-radius: 6px;
            background: #fff8f2;
            color: #a64220;
            font-size: 0.84rem;
        }
        .up { color: var(--red); }
        .down { color: var(--green); }
        .status-open { color: var(--green); }
        .status-closed { color: var(--red); }
        .muted { color: var(--muted); }
        .message {
            padding: 18px;
            border: 1px dashed #b7c3d3;
            border-radius: 8px;
            background: #fff;
            color: var(--muted);
            text-align: center;
        }
        .trade-box {
            display: grid;
            gap: 10px;
        }
        .quote-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }
        .quote-item {
            border: 1px solid #edf0f5;
            border-radius: 6px;
            background: #fbfcfe;
            padding: 8px 9px;
        }
        .quote-item strong {
            display: block;
            margin-top: 2px;
            font-size: 0.96rem;
        }
        .history-query, .news-list {
            border: 1px solid #edf0f5;
            border-radius: 6px;
            background: #fbfcfe;
            padding: 10px;
        }
        .history-query {
            display: grid;
            gap: 8px;
            margin-top: 12px;
        }
        .history-query-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 6px;
            align-items: end;
        }
        .query-result {
            min-height: 1.5em;
            font-size: 0.86rem;
            color: var(--muted);
        }
        .news-list {
            display: grid;
            gap: 8px;
        }
        .news-item {
            border-bottom: 1px solid #edf0f5;
            padding-bottom: 8px;
        }
        .news-item:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }
        .news-item strong {
            display: block;
            margin-bottom: 3px;
        }
        input, select {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid #cdd5df;
            border-radius: 6px;
            font: inherit;
            background: #fff;
        }
        button {
            border: 0;
            border-radius: 6px;
            padding: 10px 12px;
            font-weight: 700;
            cursor: pointer;
            background: #34495e;
            color: #fff;
        }
        button.secondary { background: #eef2f6; color: #27384a; border: 1px solid #cfd8e3; }
        button.danger { background: var(--red); }
        button.buy { background: var(--green); }
        button.sell { background: var(--red); }
        button:disabled { opacity: 0.55; cursor: not-allowed; }
        .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        canvas {
            width: 100%;
            height: 180px;
            display: block;
            background: linear-gradient(180deg, #fbfdff 0%, #f4f7fb 100%);
            border: 1px solid #edf0f5;
            border-radius: 6px;
            cursor: grab;
            touch-action: none;
        }
        canvas:active { cursor: grabbing; }
        .comparison-panel { margin-bottom: 16px; }
        .comparison-chart { height: 260px; }
        .chart-zoom-tools {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin: 8px 0 10px;
            color: var(--muted);
            font-size: 0.8rem;
        }
        .chart-zoom-tools button {
            padding: 6px 9px;
            font-size: 0.78rem;
        }
        .chart-hint { color: var(--muted); }
        .history-loading {
            display: none;
            height: 5px;
            overflow: hidden;
            border-radius: 999px;
            background: #e7edf5;
            margin: 0 0 10px;
        }
        .history-loading.active { display: block; }
        .history-loading div {
            width: 38%;
            height: 100%;
            border-radius: inherit;
            background: var(--blue);
            animation: loading-slide 0.9s ease-in-out infinite;
        }
        @keyframes loading-slide {
            0% { transform: translateX(-110%); }
            100% { transform: translateX(280%); }
        }
        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
            margin-top: 10px;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            padding: 3px 5px;
            border-radius: 5px;
            transition: background 0.15s ease, opacity 0.15s ease;
        }
        .legend-item:hover { background: #eef3f8; }
        .legend-item.hidden { opacity: 0.38; text-decoration: line-through; }
        .legend-swatch {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            display: inline-block;
        }
        .dm-panel { margin-top: 16px; border-color: #c7b37a; background: #fffdf6; }
        .dm-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; align-items: end; }
        .dm-intel { max-height: 260px; overflow: auto; font-size: 0.84rem; background: #fff; border: 1px solid #eee3bb; border-radius: 6px; padding: 8px; }
        .dm-status {
            margin-top: 10px;
            padding: 9px 10px;
            border: 1px solid #eee3bb;
            border-radius: 6px;
            background: #fff;
            color: var(--muted);
            font-size: 0.84rem;
        }
        .dm-status.ok { border-color: #b7dfc9; color: var(--green); background: #f3fbf6; }
        .dm-status.error { border-color: #e3b7b1; color: var(--red); background: #fff6f5; }
        .dm-status.busy { border-color: #cbd8ea; color: var(--blue); background: #f4f8fd; }
        .tiny { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
        @media (max-width: 900px) {
            header { flex-direction: column; align-items: flex-start; }
            .panel-head { align-items: flex-start; flex-direction: column; }
            .status-strip, .layout, .dm-grid { grid-template-columns: 1fr; }
            main { padding: 14px; }
            th:nth-child(6), td:nth-child(6), th:nth-child(7), td:nth-child(7) { display: none; }
        }
    </style>
</head>
<body>
<header>
    <div>
        <h1>白城证券交易所</h1>
        <div class="tiny" style="color:#d7e2ef;">所有行情、持仓和 DM 修正均按当前账号独立保存</div>
    </div>
    <a id="back-link" href="index.html">返回小队管理系统</a>
</header>

<main>
    <section class="panel comparison-panel">
        <div class="panel-head">
            <h2>八股走势对比</h2>
            <label class="chart-tools">
                范围
                <select id="history-range" onchange="changeHistoryRange()">
                    <option value="30">1个月</option>
                    <option value="90">3个月</option>
                    <option value="180">6个月</option>
                    <option value="360" selected>12个月</option>
                    <option value="720">2年</option>
                    <option value="1800">5年</option>
                    <option value="0">全部</option>
                </select>
            </label>
        </div>
        <div id="history-loading" class="history-loading"><div></div></div>
        <canvas id="comparison-chart" class="comparison-chart" width="1100" height="320"></canvas>
        <div class="chart-zoom-tools">
            <span id="chart-zoom-label">缩放：全部范围</span>
            <span class="chart-hint">滚轮缩放，拖拽平移，双击重置</span>
            <button class="secondary" onclick="resetChartZoom()">重置缩放</button>
        </div>
        <div id="comparison-legend" class="chart-legend"></div>
    </section>

    <section class="status-strip">
        <div class="status-item">
            <div class="label">当前世界日期</div>
            <div id="world-date" class="value">--</div>
        </div>
        <div class="status-item">
            <div class="label">市场状态</div>
            <div id="market-status" class="value">加载中</div>
        </div>
        <div class="status-item">
            <div class="label">账户资金</div>
            <div id="gold-value" class="value">-- GP</div>
        </div>
        <div class="status-item">
            <div class="label">当前视角</div>
            <div id="viewer-label" class="value">--</div>
        </div>
    </section>

    <section id="closed-message" class="message" style="display:none;"></section>

    <section class="panel news-panel">
        <div class="panel-head">
            <h2>市场新闻</h2>
            <span class="tiny">拆股与封停公告会在这里播报</span>
        </div>
        <div id="stock-news-list" class="news-list"></div>
    </section>

    <section class="layout">
        <div class="panel">
            <h2>挂牌公司</h2>
            <div style="overflow:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>名称</th>
                            <th>代码</th>
                            <th>状态</th>
                            <th>当前价</th>
                            <th>上一日</th>
                            <th>持有</th>
                            <th>均价</th>
                            <th>市值</th>
                            <th>浮盈亏</th>
                        </tr>
                    </thead>
                    <tbody id="stock-table"></tbody>
                </table>
            </div>
        </div>

        <aside class="panel">
            <h2 id="selected-title">交易</h2>
            <div id="selected-quote" class="quote-grid"></div>
            <div class="trade-box">
                <div>
                    <div class="label">整数股数</div>
                    <input id="trade-quantity" type="number" min="1" step="1" value="1">
                </div>
                <div class="button-row">
                    <button id="buy-btn" class="buy" onclick="tradeStock('buy')">买入</button>
                    <button id="sell-btn" class="sell" onclick="tradeStock('sell')">卖出</button>
                </div>
                <div id="trade-note" class="tiny">当日所有交易均按当前价成交。</div>
            </div>
            <div class="history-query">
                <strong>历史涨跌查询</strong>
                <div class="history-query-row">
                    <input id="change-query-year" type="number" placeholder="年">
                    <input id="change-query-month" type="number" min="1" max="12" placeholder="月">
                    <input id="change-query-day" type="number" min="1" max="30" placeholder="日">
                    <button class="secondary" onclick="querySelectedStockChange()">查询</button>
                </div>
                <div id="change-query-result" class="query-result">选择日期后查询该日相对前一交易日的涨跌。</div>
            </div>
            <h3 style="margin-top:18px;">价格历史</h3>
            <canvas id="history-chart" width="640" height="260"></canvas>
        </aside>
    </section>

    <section id="dm-panel" class="panel dm-panel" style="display:none;">
        <h2>DM 市场控制</h2>
        <div class="dm-grid">
            <label>
                <div class="label">市场状态</div>
                <select id="dm-market-enabled">
                    <option value="true">开启</option>
                    <option value="false">关闭</option>
                </select>
            </label>
            <label>
                <div class="label">开启日期</div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;">
                    <input id="dm-open-year" type="number" placeholder="年">
                    <input id="dm-open-month" type="number" min="1" max="12" placeholder="月">
                    <input id="dm-open-day" type="number" min="1" max="30" placeholder="日">
                </div>
            </label>
            <button onclick="saveMarketConfig()">保存市场设置</button>
            <button id="catch-up-history-btn" class="secondary" onclick="catchUpMarketHistory()">补齐缺失历史</button>
            <button id="repair-history-btn" onclick="repairMarketHistory()">重建价格历史</button>
            <button id="clear-generated-btn" class="secondary" onclick="clearGeneratedStockData()">清除生成数据</button>
            <label>
                <div class="label">回滚日期</div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;">
                    <input id="dm-rollback-year" type="number" placeholder="年">
                    <input id="dm-rollback-month" type="number" min="1" max="12" placeholder="月">
                    <input id="dm-rollback-day" type="number" min="1" max="30" placeholder="日">
                </div>
            </label>
            <button id="rollback-stock-btn" class="secondary" onclick="rollbackStockMarket()">回滚到日期</button>
            <button id="delete-stock-data-btn" class="danger" onclick="deleteAllStockData()">删除全部股票数据</button>
            <label>
                <div class="label">修正股票</div>
                <select id="dm-adjust-stock"></select>
            </label>
            <label>
                <div class="label">下一次结算修正 %</div>
                <input id="dm-adjust-percent" type="number" step="0.1" placeholder="-25">
                <div class="tiny">按百分点加减到当日涨跌率。</div>
            </label>
            <button onclick="saveDmAdjustment()">设置一次性修正</button>
            <label>
                <div class="label">拆股股票</div>
                <select id="dm-split-stock"></select>
            </label>
            <label>
                <div class="label">拆股比例 1:N</div>
                <input id="dm-split-ratio" type="number" min="2" step="1" placeholder="2">
            </label>
            <button id="split-stock-btn" onclick="splitSelectedStock()">执行拆股并播报</button>
            <label>
                <div class="label">封停股票</div>
                <select id="dm-halt-stock"></select>
            </label>
            <label>
                <div class="label">封停天数</div>
                <input id="dm-halt-days" type="number" min="1" step="1" placeholder="3">
                <div class="tiny">从当前世界日期开始计算，1天表示只封当天。</div>
            </label>
            <button id="halt-stock-btn" class="danger" onclick="haltSelectedStock()">暂时封停交易</button>
        </div>
        <div id="dm-action-status" class="dm-status">DM 操作状态：空闲。</div>
        <h3 style="margin-top:14px;">本月隐藏趋势与基础涨跌</h3>
        <div id="dm-intel" class="dm-intel"></div>
    </section>
</main>

<script>
    const SUPABASE_URL = 'https://vbzfpgucpciqgaakqndz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiemZwZ3VjcGNpcWdhYWtxbmR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc1OTc2MzMsImV4cCI6MjA4MzE3MzYzM30.fBVDirEJ52bvrYJZ5DNv7fVDLNgCwITKwdKqT6YJDYw';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ADMIN_ROLES = ['dm', 'root'];

    let currentUser = null;
    let currentRole = 'player';
    let accountId = null;
    let accountProfile = null;
    let snapshot = null;
    let selectedStockId = null;
    let selectedHistoryDays = 360;
    let presenceChannel = null;
    let autoRepairAttempted = false;
    let comparisonZoom = null;
    let comparisonDrag = null;
    const hiddenComparisonStocks = new Set();

    const CHART_COLORS = ['#bf3a30', '#178a55', '#2f6f9f', '#a8791c', '#6f4aa8', '#bf6b2d', '#2b7a78', '#4b5563'];

    function escapeHTML(value) {
        return String(value ?? '').replace(/[&<>'"]/g, ch => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        }[ch]));
    }

    async function initPresenceSystem(email, role = 'player') {
        email = String(email || '').trim().toLowerCase();
        if (!email) return;

        if (presenceChannel) {
            const oldChannel = presenceChannel;
            presenceChannel = null;
            try {
                await supabaseClient.removeChannel(oldChannel);
            } catch (error) {
                console.warn('presence cleanup failed', error);
            }
        }

        presenceChannel = supabaseClient.channel('online-users', {
            config: {
                presence: {
                    key: email
                }
            }
        });

        presenceChannel.subscribe(async status => {
            if (status !== 'SUBSCRIBED' || !presenceChannel) return;
            const trackStatus = await presenceChannel.track({
                email,
                role,
                page: 'stocks',
                online_at: new Date().toISOString()
            });
            if (trackStatus !== 'ok') console.warn('presence track failed', trackStatus);
        });
    }

    window.addEventListener('beforeunload', () => {
        if (presenceChannel) presenceChannel.untrack();
    });

    function formatMoney(value) {
        return `${Number(value || 0).toLocaleString(undefined, { maximumFractionDigits: 2 })} GP`;
    }

    function formatRate(value) {
        const pct = Number(value || 0) * 100;
        return `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
    }

    function getLastChange(stockId) {
        const history = snapshot?.historyByStock?.[stockId] || [];
        if (!history.length) return 0;
        const current = history[history.length - 1];
        if (current.previous_price) return (Number(current.price) / Number(current.previous_price)) - 1;
        if (history.length < 2) return 0;
        return (Number(current.price) / Number(history[history.length - 2].price)) - 1;
    }

    function getRangeChange(stockId) {
        const history = filterHistoryByDays(snapshot?.historyByStock?.[stockId] || [], selectedHistoryDays)
            .filter(row => Number(row.price) > 0);
        if (history.length < 2) return 0;
        const first = Number(history[0].price);
        const last = Number(history[history.length - 1].price);
        return first ? (last / first) - 1 : 0;
    }

    function getLatestHistoryRow(stockId) {
        const history = snapshot?.historyByStock?.[stockId] || [];
        return history[history.length - 1] || null;
    }

    function getStockHalt(stockId) {
        return snapshot?.halts?.[stockId] || null;
    }

    function formatPlainDate(date) {
        if (!date) return '--';
        return `${date.year ?? '--'}-${date.month ?? '--'}-${date.day ?? '--'}`;
    }

    function formatHaltEnd(halt) {
        return formatPlainDate(halt?.end_date_value || {});
    }

    function renderHaltBadge(stockId) {
        const halt = getStockHalt(stockId);
        if (!halt) return '<span class="muted">正常</span>';
        return `<span class="halt-badge">封停至 ${escapeHTML(formatHaltEnd(halt))}</span>`;
    }

    function renderStockNews() {
        const box = document.getElementById('stock-news-list');
        if (!box) return;
        const news = snapshot?.news || [];
        if (!news.length) {
            box.innerHTML = '<div class="tiny">暂无市场新闻。</div>';
            return;
        }
        box.innerHTML = news.slice(0, 8).map(item => {
            const stock = snapshot.stocks.find(row => row.id === item.stock_id);
            const date = item.date_value || {};
            return `
                <div class="news-item">

        currentRole = roleData?.role_level || 'player';

        document.getElementById('back-link').href = `index.html${accountId ? `?uid=${encodeURIComponent(accountId)}` : ''}`;

    async function refreshPage() {
        const { data: profile, error } = await supabaseClient
            .from('profiles')
            .select('*')
            .eq('id', accountId)
            .single();
        if (error) {
            showError(error.message);
            return;
        }
        accountProfile = profile;
        const currentDate = profile.world_date || { year: 1494, month: 2, day: 12 };
        const calendarSystem = profile.calendar_system || (profile.campaign_type === 'coc' ? 'ce' : 'dr');
        document.getElementById('world-date').textContent = BaichengStocks.formatDate(currentDate, calendarSystem, profile.campaign_type);
        document.getElementById('gold-value').textContent = formatMoney(profile.gold_gp);
        document.getElementById('viewer-label').textContent = profile.email || accountId;

        try {
            const snapshotOptions = {
                client: supabaseClient,
                accountId,
                currentDate,
                includeFuture: ADMIN_ROLES.includes(currentRole),
                historyDays: getHistoryFetchDays()
            };
            snapshot = await BaichengStocks.loadSnapshot(snapshotOptions);
        } catch (e) {
            showError(`股票数据加载失败：${e.message || e}`);
            return;

        if (!selectedStockId && snapshot.stocks.length) selectedStockId = snapshot.stocks[0].id;

        drawComparisonChart();

    function getHistoryFetchDays() {

    async function changeHistoryRange() {
        selectedHistoryDays = parseInt(document.getElementById('history-range').value, 10);

    function setHistoryLoading(isLoading) {

    function currentDateSerial() {
        return accountProfile?.world_date ? BaichengStocks.dateToSerial(accountProfile.world_date) : null;
    }

    function filterHistoryByDays(history, days) {
        const rows = history || [];
        const serial = currentDateSerial();
        if (!Number.isFinite(serial) || !Number.isFinite(days) || days <= 0) return rows;
        return rows.filter(row => Number(row.date_serial) >= serial - days && Number(row.date_serial) <= serial);
    }

    function getComparisonBaseRange(series) {
        const allPoints = series.flatMap(item => item.points);
        if (!allPoints.length) return null;
        return {
            min: Math.min(...allPoints.map(point => point.serial)),
            max: Math.max(...allPoints.map(point => point.serial))
        };
    }

    function normalizeComparisonZoom(baseRange) {
        if (!baseRange || baseRange.max <= baseRange.min) {
            comparisonZoom = null;
            return null;
        }
        if (!comparisonZoom) return null;
        const minSpan = Math.max(3, (baseRange.max - baseRange.min) * 0.04);
        let min = Math.max(baseRange.min, comparisonZoom.min);
        let max = Math.min(baseRange.max, comparisonZoom.max);
        if (max - min < minSpan) {
            const center = (min + max) / 2;
            min = center - minSpan / 2;
            max = center + minSpan / 2;
        }
        if (min < baseRange.min) {
            max += baseRange.min - min;
            min = baseRange.min;
        }
        if (max > baseRange.max) {
            min -= max - baseRange.max;
            max = baseRange.max;
        }
        min = Math.max(baseRange.min, min);
        max = Math.min(baseRange.max, max);
        comparisonZoom = { min, max };
        return comparisonZoom;
    }

    function getComparisonVisibleRange(series) {
        const baseRange = getComparisonBaseRange(series);
        if (!baseRange) return null;
        const zoom = normalizeComparisonZoom(baseRange);
        return zoom || baseRange;
    }

    function updateZoomLabel(baseRange, visibleRange) {
        const label = document.getElementById('chart-zoom-label');
        if (!label) return;
        if (!baseRange || !visibleRange || !comparisonZoom) {
            label.textContent = '缩放：全部范围';
            return;
        }
        const total = Math.max(1, baseRange.max - baseRange.min);
        const visible = Math.max(1, visibleRange.max - visibleRange.min);
        label.textContent = `缩放：${Math.round((total / visible) * 10) / 10}x`;
    }

    function resetChartZoom() {
        comparisonZoom = null;
        drawComparisonChart();
    }

    function toggleComparisonStock(stockId) {
        if (hiddenComparisonStocks.has(stockId)) hiddenComparisonStocks.delete(stockId);
        else hiddenComparisonStocks.add(stockId);
        drawComparisonChart();
    }

    function hasRenderableHistory() {
        if (!snapshot?.stocks?.length) return false;
        return snapshot.stocks.some(stock =>
            filterHistoryByDays(snapshot.historyByStock?.[stock.id] || [], selectedHistoryDays).length >= 2
        );
    }

    function shouldAutoRepairHistory(currentDate) {
        if (autoRepairAttempted || !ADMIN_ROLES.includes(currentRole)) return false;
        if (!snapshot?.market?.market_enabled || !snapshot?.openDate || !currentDate) return false;
        if (BaichengStocks.compareDates(snapshot.openDate, currentDate) >= 0) return false;
        return !hasRenderableHistory();
    }

    async function runDmAction(options) {
        const { buttonId, busyText, successText, action, afterSuccess = true } = options;

        const button = buttonId ? document.getElementById(buttonId) : null;
        const originalText = button?.textContent || '';

        try {

            setDmControlsBusy(false);
        }
    }

    function prepareChartCanvas(canvas) {
        const rect = canvas.getBoundingClientRect();
        const ratio = Math.max(1, window.devicePixelRatio || 1);
        const width = Math.max(1, Math.round(rect.width));
        const height = Math.max(1, Math.round(rect.height));
        const pixelWidth = Math.round(width * ratio);
        const pixelHeight = Math.round(height * ratio);
        if (canvas.width !== pixelWidth || canvas.height !== pixelHeight) {
            canvas.width = pixelWidth;
            canvas.height = pixelHeight;
        }
        const ctx = canvas.getContext('2d');
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        return { ctx, width, height };
    }

    function clearChart(canvas, ctx, width, height) {
        ctx.clearRect(0, 0, width, height);
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, '#fbfdff');
        gradient.addColorStop(1, '#f4f7fb');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
    }

    function drawChartFrame(canvas, ctx, width, height, left = 44, top = 22, right = 18, bottom = 34) {
        const innerWidth = width - left - right;
        const innerHeight = height - top - bottom;
        ctx.save();
        ctx.strokeStyle = '#dfe6ef';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i <= 4; i += 1) {
            const y = top + (innerHeight / 4) * i;
            ctx.moveTo(left, y);
            ctx.lineTo(left + innerWidth, y);
        }
        for (let i = 0; i <= 6; i += 1) {
            const x = left + (innerWidth / 6) * i;
            ctx.moveTo(x, top);
            ctx.lineTo(x, top + innerHeight);
        }
        ctx.stroke();

        ctx.strokeStyle = '#bfc9d6';
        ctx.lineWidth = 1.25;
        ctx.beginPath();
        ctx.moveTo(left, top);
        ctx.lineTo(left, top + innerHeight);
        ctx.lineTo(left + innerWidth, top + innerHeight);
        ctx.stroke();
        ctx.restore();
        return { left, top, right, bottom, width: innerWidth, height: innerHeight };
    }

    function drawNoData(canvas, ctx, text, width, height) {
        ctx.fillStyle = '#667085';
        ctx.textAlign = 'center';
        ctx.fillText(text, width / 2, height / 2);
        ctx.textAlign = 'start';
    }

    function drawSmoothLine(ctx, points, color, options = {}) {
        if (!points.length) return;
        const { lineWidth = 2.5, glow = true } = options;
        ctx.save();
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        if (glow) {
            ctx.shadowColor = color;
            ctx.shadowBlur = 8;
            ctx.globalAlpha = 0.2;
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth + 3;
            ctx.beginPath();
            points.forEach((point, index) => {
                if (index === 0) ctx.moveTo(point.x, point.y);
                else ctx.lineTo(point.x, point.y);
            });
            ctx.stroke();
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        points.forEach((point, index) => {
            if (index === 0) {
                ctx.moveTo(point.x, point.y);
            } else if (index < points.length - 1) {
                const next = points[index + 1];
                ctx.quadraticCurveTo(point.x, point.y, (point.x + next.x) / 2, (point.y + next.y) / 2);
            } else {
                ctx.lineTo(point.x, point.y);
            }
        });
        ctx.stroke();
        ctx.restore();
    }

    function drawComparisonChart() {
        const canvas = document.getElementById('comparison-chart');
        const legend = document.getElementById('comparison-legend');
        if (!canvas || !legend || !snapshot) return;
        const { ctx, width, height } = prepareChartCanvas(canvas);
        clearChart(canvas, ctx, width, height);
        const frame = drawChartFrame(canvas, ctx, width, height, 58, 26, 24, 40);
        const allSeries = snapshot.stocks.map((stock, index) => {
            const history = filterHistoryByDays(snapshot.historyByStock[stock.id] || [], selectedHistoryDays)
                .filter(row => Number(row.price) > 0);
            if (history.length < 2) return null;
            const points = history.map(row => ({
                serial: Number(row.date_serial),
                value: Number(row.price)
            }));
            return {
                stock,
                points,
                color: CHART_COLORS[index % CHART_COLORS.length],
                last: points[points.length - 1].value
            };
        }).filter(Boolean);

        if (!allSeries.length) {
            legend.innerHTML = '';
            drawNoData(canvas, ctx, '暂无足够历史', width, height);
            updateZoomLabel(null, null);
            return;
        }

        const baseRange = getComparisonBaseRange(allSeries);
        const visibleRange = getComparisonVisibleRange(allSeries);
        updateZoomLabel(baseRange, visibleRange);
        const series = allSeries
            .filter(item => !hiddenComparisonStocks.has(item.stock.id))
            .map(item => ({
                ...item,
                points: item.points.filter(point =>
                    point.serial >= visibleRange.min && point.serial <= visibleRange.max
                )
            }))
            .filter(item => item.points.length >= 2);

        if (!series.length) {
            legend.innerHTML = renderComparisonLegend(allSeries);
            drawNoData(canvas, ctx, '没有可见股票', width, height);
            return;
        }

        const allPoints = series.flatMap(item => item.points);
        const minSerial = visibleRange.min;
        const maxSerial = visibleRange.max;
        const rawMinValue = Math.min(...allPoints.map(point => point.value));
        const rawMaxValue = Math.max(...allPoints.map(point => point.value));
        const padding = Math.max(0.01, (rawMaxValue - rawMinValue) * 0.08);
        const minValue = Math.max(0, rawMinValue - padding);
        const maxValue = rawMaxValue + padding;
        const valueSpan = Math.max(0.01, maxValue - minValue);
        const serialSpan = Math.max(1, maxSerial - minSerial);

        const midY = frame.top + frame.height / 2;
        ctx.strokeStyle = '#edf0f5';
        ctx.beginPath();
        ctx.moveTo(frame.left, midY);
        ctx.lineTo(frame.left + frame.width, midY);
        ctx.stroke();

        for (const item of series) {
            const screenPoints = item.points.map(point => ({
                x: frame.left + ((point.serial - minSerial) / serialSpan) * frame.width,
                y: frame.top + frame.height - ((point.value - minValue) / valueSpan) * frame.height
            }));
            drawSmoothLine(ctx, screenPoints, item.color, { lineWidth: 2.4, glow: true });
            const lastPoint = screenPoints[screenPoints.length - 1];
            ctx.save();
            ctx.fillStyle = item.color;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(lastPoint.x, lastPoint.y, 3.6, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        ctx.fillStyle = '#1f2933';
        ctx.font = '12px "PingFang SC", "Microsoft YaHei", sans-serif';
        ctx.fillText(formatMoney(maxValue), frame.left + 4, frame.top + 14);
        ctx.fillText(formatMoney(minValue), frame.left + 4, frame.top + frame.height - 7);
        legend.innerHTML = renderComparisonLegend(allSeries);
    }

    function renderComparisonLegend(series) {
        return series.map(item => {
            const hidden = hiddenComparisonStocks.has(item.stock.id);
            return `
                <span class="legend-item${hidden ? ' hidden' : ''}" onclick="toggleComparisonStock('${item.stock.id}')">
                    <span class="legend-swatch" style="background:${item.color}"></span>
                    ${escapeHTML(item.stock.code)} ${formatMoney(item.last)}
                </span>
            `;
        }).join('');
    }

    function getComparisonSeriesForZoom() {
        if (!snapshot?.stocks?.length) return [];
        return snapshot.stocks.map((stock, index) => {
            const history = filterHistoryByDays(snapshot.historyByStock[stock.id] || [], selectedHistoryDays)
                .filter(row => Number(row.price) > 0);
            if (history.length < 2) return null;
            return {
                stock,
                color: CHART_COLORS[index % CHART_COLORS.length],
                points: history.map(row => ({
                    serial: Number(row.date_serial),
                    value: Number(row.price)
                }))
            };
        }).filter(Boolean);
    }

    function zoomComparisonAt(clientX, deltaY) {
        const canvas = document.getElementById('comparison-chart');
        if (!canvas) return;
        const series = getComparisonSeriesForZoom();
        const baseRange = getComparisonBaseRange(series);
        if (!baseRange || baseRange.max <= baseRange.min) return;
        const current = comparisonZoom || baseRange;
        const rect = canvas.getBoundingClientRect();
        const ratio = Math.min(1, Math.max(0, (clientX - rect.left) / Math.max(1, rect.width)));
        const anchor = current.min + (current.max - current.min) * ratio;
        const factor = deltaY > 0 ? 1.22 : 0.82;
        const minSpan = Math.max(3, (baseRange.max - baseRange.min) * 0.04);
        const nextSpan = Math.min(baseRange.max - baseRange.min, Math.max(minSpan, (current.max - current.min) * factor));
        let min = anchor - nextSpan * ratio;
        let max = min + nextSpan;
        if (min < baseRange.min) {
            max += baseRange.min - min;
            min = baseRange.min;
        }
        if (max > baseRange.max) {
            min -= max - baseRange.max;
            max = baseRange.max;
        }
        if (min <= baseRange.min && max >= baseRange.max) comparisonZoom = null;
        else comparisonZoom = { min, max };
        drawComparisonChart();
    }

    function panComparisonBy(deltaPixels) {
        const canvas = document.getElementById('comparison-chart');
        if (!canvas || !comparisonZoom) return;
        const series = getComparisonSeriesForZoom();
        const baseRange = getComparisonBaseRange(series);
        if (!baseRange) return;
        const rect = canvas.getBoundingClientRect();
        const span = comparisonZoom.max - comparisonZoom.min;
        const deltaSerial = -(deltaPixels / Math.max(1, rect.width)) * span;
        let min = comparisonZoom.min + deltaSerial;
        let max = comparisonZoom.max + deltaSerial;
        if (min < baseRange.min) {
            max += baseRange.min - min;
            min = baseRange.min;
        }
        if (max > baseRange.max) {
            min -= max - baseRange.max;
            max = baseRange.max;
        }
        comparisonZoom = { min, max };
        drawComparisonChart();
    }

    function setupComparisonChartInteractions() {
        const canvas = document.getElementById('comparison-chart');
        if (!canvas) return;
        canvas.addEventListener('wheel', event => {
            event.preventDefault();
            zoomComparisonAt(event.clientX, event.deltaY);
        }, { passive: false });
        canvas.addEventListener('pointerdown', event => {
            comparisonDrag = { x: event.clientX };
            canvas.setPointerCapture?.(event.pointerId);
        });
        canvas.addEventListener('pointermove', event => {
            if (!comparisonDrag) return;
            const delta = event.clientX - comparisonDrag.x;
            comparisonDrag.x = event.clientX;
            panComparisonBy(delta);
        });
        canvas.addEventListener('pointerup', event => {
            comparisonDrag = null;
            canvas.releasePointerCapture?.(event.pointerId);
        });
        canvas.addEventListener('pointercancel', () => {
            comparisonDrag = null;
        });
        canvas.addEventListener('dblclick', resetChartZoom);
    }

    async function querySelectedStockChange() {

            resultBox.innerHTML = `
                ${stock.code} ${date.year}-${date.month}-${date.day}：
                价格 ${formatMoney(result.price)}，前一记录 ${previous}，
                <strong class="${changeClass}">涨跌 ${formatRate(result.change)}</strong>
            `;
        } catch (e) {
            resultBox.textContent = `查询失败：${e.message || e}`;
        }
    }

    function drawChart(stockId) {
        const canvas = document.getElementById('history-chart');
        const { ctx, width, height } = prepareChartCanvas(canvas);
        const history = filterHistoryByDays(snapshot.historyByStock[stockId] || [], selectedHistoryDays);
        clearChart(canvas, ctx, width, height);
        const frame = drawChartFrame(canvas, ctx, width, height, 46, 22, 22, 38);
        if (history.length < 2) {
            drawNoData(canvas, ctx, '暂无足够历史', width, height);
            return;
        }
        const prices = history.map(row => Number(row.price));
        const serials = history.map(row => Number(row.date_serial));
        const min = Math.min(...prices);
        const max = Math.max(...prices);
        const padding = Math.max(0.01, (max - min) * 0.08);
        const minValue = Math.max(0, min - padding);
        const maxValue = max + padding;
        const span = Math.max(0.01, maxValue - minValue);
        const minSerial = Math.min(...serials);
        const maxSerial = Math.max(...serials);
        const serialSpan = Math.max(1, maxSerial - minSerial);
        const points = history.map(row => ({
            x: frame.left + ((Number(row.date_serial) - minSerial) / serialSpan) * frame.width,
            y: frame.top + frame.height - ((Number(row.price) - minValue) / span) * frame.height
        }));
        const areaGradient = ctx.createLinearGradient(0, frame.top, 0, frame.top + frame.height);
        areaGradient.addColorStop(0, 'rgba(47, 111, 159, 0.24)');
        areaGradient.addColorStop(1, 'rgba(47, 111, 159, 0)');
        ctx.save();
        ctx.fillStyle = areaGradient;
        ctx.beginPath();
        points.forEach((point, index) => {
            if (index === 0) ctx.moveTo(point.x, point.y);
            else ctx.lineTo(point.x, point.y);
        });
        ctx.lineTo(points[points.length - 1].x, frame.top + frame.height);
        ctx.lineTo(points[0].x, frame.top + frame.height);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        drawSmoothLine(ctx, points, '#2f6f9f', { lineWidth: 3, glow: true });
        const lastPoint = points[points.length - 1];
        ctx.save();
        ctx.fillStyle = '#2f6f9f';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.arc(lastPoint.x, lastPoint.y, 4.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
        ctx.fillStyle = '#1f2933';
        ctx.font = '12px "PingFang SC", "Microsoft YaHei", sans-serif';
        ctx.fillText(formatMoney(maxValue), frame.left + 4, frame.top + 14);
        ctx.fillText(formatMoney(minValue), frame.left + 4, frame.top + frame.height - 7);
    }

    function setTradeBusy(isBusy) {
        const buyBtn = document.getElementById('buy-btn');
        const sellBtn = document.getElementById('sell-btn');
        const halted = Boolean(selectedStockId && getStockHalt(selectedStockId));
        buyBtn.disabled = isBusy || !snapshot?.tradable || halted;
        sellBtn.disabled = isBusy || !snapshot?.tradable || halted;
        buyBtn.textContent = isBusy ? '提交中' : '买入';
        sellBtn.textContent = isBusy ? '提交中' : '卖出';
    }

    function applyTradeResult(type, result) {
        if (!snapshot || !selectedStockId || !result) return;
        if (Number.isFinite(Number(result.gold))) {
            accountProfile.gold_gp = Number(result.gold);
            document.getElementById('gold-value').textContent = formatMoney(accountProfile.gold_gp);
        }

        const holdingQty = Number(result.holdingQuantity);
        if (type === 'sell' && holdingQty <= 0) {
            delete snapshot.holdings[selectedStockId];
        } else if (Number.isFinite(holdingQty)) {
            const existing = snapshot.holdings[selectedStockId] || { account_id: accountId, stock_id: selectedStockId };
            snapshot.holdings[selectedStockId] = {
                ...existing,
                quantity: holdingQty,
                average_cost: Number(result.averageCost || existing.average_cost || 0)
            };
        }

        renderStocks();
        renderTradePanel();
    }

    async function tradeStock(type) {
        const quantity = parseInt(document.getElementById('trade-quantity').value, 10);
        const currentDate = accountProfile.world_date;
        const halt = selectedStockId ? getStockHalt(selectedStockId) : null;
        if (halt) {
            alert(`该股票正在封停交易，封停至 ${formatHaltEnd(halt)}。`);
            return;
        }
        setTradeBusy(true);
        try {
            let result;
            if (type === 'buy') {
                result = await BaichengStocks.buyStock({ client: supabaseClient, accountId, stockId: selectedStockId, quantity, currentDate });
                applyTradeResult(type, result);
                alert(`买入成功：${result.quantity} 股，成交额 ${formatMoney(result.total)}`);
            } else {
                result = await BaichengStocks.sellStock({ client: supabaseClient, accountId, stockId: selectedStockId, quantity, currentDate });
                applyTradeResult(type, result);
                alert(`卖出成功：${result.quantity} 股，成交额 ${formatMoney(result.total)}`);
            }
            refreshPage().catch(console.error);
        } catch (e) {
            alert(e.message || '交易失败');
        } finally {
            setTradeBusy(false);
        }
    }

    function renderDmPanel(currentDate) {
        const dmPanel = document.getElementById('dm-panel');
        if (!ADMIN_ROLES.includes(currentRole)) {
            dmPanel.style.display = 'none';
            return;
        }
        dmPanel.style.display = 'block';
        document.getElementById('dm-market-enabled').value = snapshot.market.market_enabled ? 'true' : 'false';
        const open = snapshot.openDate || currentDate;
        document.getElementById('dm-open-year').value = open.year;
        document.getElementById('dm-open-month').value = open.month;
        document.getElementById('dm-open-day').value = open.day;
        document.getElementById('dm-rollback-year').value = currentDate.year;
        document.getElementById('dm-rollback-month').value = currentDate.month;
        document.getElementById('dm-rollback-day').value = currentDate.day;
        document.getElementById('dm-adjust-stock').innerHTML = snapshot.stocks
            .map(stock => `<option value="${stock.id}">${escapeHTML(stock.name)} (${escapeHTML(stock.code)})</option>`)
            .join('');
        document.getElementById('dm-adjust-stock').value = selectedStockId || snapshot.stocks[0]?.id || '';
        document.getElementById('dm-split-stock').innerHTML = snapshot.stocks
            .map(stock => `<option value="${stock.id}">${escapeHTML(stock.name)} (${escapeHTML(stock.code)})</option>`)
            .join('');
        document.getElementById('dm-split-stock').value = selectedStockId || snapshot.stocks[0]?.id || '';
        document.getElementById('dm-halt-stock').innerHTML = snapshot.stocks
            .map(stock => `<option value="${stock.id}">${escapeHTML(stock.name)} (${escapeHTML(stock.code)})</option>`)
            .join('');
        document.getElementById('dm-halt-stock').value = selectedStockId || snapshot.stocks[0]?.id || '';
        if (shouldAutoRepairHistory(currentDate)) {
            setDmActionStatus('检测到当前可视区间没有足够价格历史。可以点“补齐缺失历史”或“重建价格历史”。', 'error');
        } else {
            setDmActionStatus('DM 操作状态：空闲。');
        }
        renderDmIntel();
    }

    function renderDmIntel() {
        const box = document.getElementById('dm-intel');
        const returnsByStock = {};
        snapshot.dailyReturns.forEach(row => {
            if (!returnsByStock[row.stock_id]) returnsByStock[row.stock_id] = [];
            returnsByStock[row.stock_id].push(row);
        });
        box.innerHTML = snapshot.stocks.map(stock => {
            const trend = snapshot.trends[stock.id];
            const rows = (returnsByStock[stock.id] || [])
                .map(row => `${row.day}日 ${formatRate(row.base_return)}`)
                .join('，');
            return `
                <div style="border-bottom:1px solid #f0e5bf; padding:8px 0;">
                    <strong>${escapeHTML(stock.name)}</strong>
                    <div>隐藏趋势：${escapeHTML(trend?.trend_type || '尚未生成')}</div>
                    <div class="tiny">${rows || '本月基础涨跌尚未生成'}</div>
                </div>
            `;
        }).join('');
    }

    async function saveMarketConfig() {
        const openDate = {
            year: parseInt(document.getElementById('dm-open-year').value, 10),
            month: parseInt(document.getElementById('dm-open-month').value, 10),
            day: parseInt(document.getElementById('dm-open-day').value, 10)
        };
        const enabled = document.getElementById('dm-market-enabled').value === 'true';
        await runDmAction({
            busyText: '正在保存市场设置...',
            successText: '市场设置已保存。',
            action: async () => {
                await BaichengStocks.setMarketConfig({
                    client: supabaseClient,
                    accountId,
                    enabled,
                    openDate,
                    currentDate: accountProfile.world_date
                });
            }
        });
    }

    async function catchUpMarketHistory() {
        if (!accountProfile?.world_date) {
            setDmActionStatus('当前日期未加载。', 'error');
            return;
        }
        if (!snapshot?.market?.market_enabled) {
            setDmActionStatus('市场尚未开启。', 'error');
            return;
        }
        await runDmAction({
            buttonId: 'catch-up-history-btn',
            busyText: '正在补齐缺失历史...',
            successText: '缺失价格历史已补齐。',
            action: async () => {
                await BaichengStocks.catchUpMarket({
                    client: supabaseClient,
                    accountId,
                    currentDate: accountProfile.world_date,
                    historyDays: 0,
                    repairSparseHistory: true
                });
                autoRepairAttempted = true;
            }
        });
    }

    async function repairMarketHistory() {
        if (!ADMIN_ROLES.includes(currentRole)) return;
        if (!accountProfile?.world_date) {
            setDmActionStatus('当前日期未加载。', 'error');
            return;
        }
        if (!snapshot?.market?.market_enabled) {
            setDmActionStatus('市场尚未开启。', 'error');
            return;
        }
        if (!confirm('将清除旧价格历史、月趋势、每日基础涨跌和当前价，并从市场开启日期重新生成到当前日期。继续？')) return;
        await runDmAction({
            buttonId: 'repair-history-btn',
            busyText: '正在重建价格历史...',
            successText: '价格历史已重建。',
            action: async () => {
                await BaichengStocks.repairMarketHistory({
                    client: supabaseClient,
                    accountId,
                    currentDate: accountProfile.world_date
                });
                autoRepairAttempted = true;
            }
        });
    }

    async function clearGeneratedStockData() {
        if (!confirm('将清除当前账号的价格历史、月趋势、每日基础涨跌和当前价，但保留持仓与交易记录。继续？')) return;
        await runDmAction({
            buttonId: 'clear-generated-btn',
            busyText: '正在清除生成数据...',
            successText: '生成数据已清除。',
            action: async () => {
                await BaichengStocks.clearGeneratedStockData({
                    client: supabaseClient,
                    accountId
                });
                selectedStockId = null;
                autoRepairAttempted = false;
            }
        });
    }

    async function rollbackStockMarket() {
        const targetDate = {
            year: parseInt(document.getElementById('dm-rollback-year').value, 10),
            month: parseInt(document.getElementById('dm-rollback-month').value, 10),
            day: parseInt(document.getElementById('dm-rollback-day').value, 10)
        };
        if (!confirm(`将股票市场回滚到 ${targetDate.year}-${targetDate.month}-${targetDate.day}，未来交易会撤销并回退金币。继续？`)) return;
        await runDmAction({
            buttonId: 'rollback-stock-btn',
            busyText: '正在回滚股票市场...',
            successText: '股票市场已回滚。',
            action: async () => {
                await BaichengStocks.rollbackStocksToDate({
                    client: supabaseClient,
                    accountId,
                    targetDate
                });
                autoRepairAttempted = false;
            }
        });
    }

    async function deleteAllStockData() {
        if (!ADMIN_ROLES.includes(currentRole)) return;
        const firstConfirm = confirm('这会删除当前账号的全部股票数据，包括市场设置、价格历史、持仓和交易记录。继续？');
        if (!firstConfirm) return;
        const secondConfirm = confirm('确认执行硬重置？删除后该账号股票市场会回到未开启状态。');
        if (!secondConfirm) return;
        await runDmAction({
            buttonId: 'delete-stock-data-btn',
            busyText: '正在删除全部股票数据...',
            successText: '全部股票数据已删除。',
            action: async () => {
                await BaichengStocks.deleteAccountStockData({
                    client: supabaseClient,
                    accountId
                });
                snapshot = null;
                selectedStockId = null;
                autoRepairAttempted = false;
            }
        });
    }

    async function saveDmAdjustment() {
        const stockId = document.getElementById('dm-adjust-stock').value;
        const percentage = Number(document.getElementById('dm-adjust-percent').value) / 100;
        await runDmAction({
            busyText: '正在设置一次性修正...',
            successText: '下一次结算修正已设置。',
            action: async () => {
                await BaichengStocks.setDmAdjustment({
                    client: supabaseClient,
                    accountId,
                    stockId,
                    currentDate: accountProfile.world_date,
                    percentage
                });
                document.getElementById('dm-adjust-percent').value = '';
            }
        });
    }

    async function splitSelectedStock() {
        const stockId = document.getElementById('dm-split-stock').value;
        const ratioTo = parseInt(document.getElementById('dm-split-ratio').value, 10);
        const stock = snapshot.stocks.find(item => item.id === stockId);
        if (!stock) {
            setDmActionStatus('请选择要拆分的股票。', 'error');
            return;
        }
        if (!Number.isInteger(ratioTo) || ratioTo <= 1) {
            setDmActionStatus('拆股比例必须是大于 1 的整数，例如 2、3、10。', 'error');
            return;
        }
        if (!confirm(`确认对 ${stock.name}（${stock.code}）执行 1:${ratioTo} 拆股？`)) return;
        await runDmAction({
            buttonId: 'split-stock-btn',
            busyText: '正在执行拆股...',
            successText: `${stock.code} 1:${ratioTo} 拆股已完成，并已发布新闻。`,
            action: async () => {
                await BaichengStocks.splitStock({
                    client: supabaseClient,
                    accountId,
                    stockId,
                    currentDate: accountProfile.world_date,
                    ratioFrom: 1,
                    ratioTo
                });
                document.getElementById('dm-split-ratio').value = '';
            }
        });
    }

    async function haltSelectedStock() {
        const stockId = document.getElementById('dm-halt-stock').value;
        const days = parseInt(document.getElementById('dm-halt-days').value, 10);
        const stock = snapshot.stocks.find(item => item.id === stockId);
        if (!stock) {
            setDmActionStatus('请选择要封停的股票。', 'error');
            return;
        }
        if (!Number.isInteger(days) || days <= 0) {
            setDmActionStatus('封停天数必须是正整数。', 'error');
            return;
        }
        if (!confirm(`确认将 ${stock.name}（${stock.code}）封停交易 ${days} 天？`)) return;
        await runDmAction({
            buttonId: 'halt-stock-btn',
            busyText: '正在封停股票交易...',
            successText: `${stock.code} 已封停交易 ${days} 天，并已发布市场新闻。`,
            action: async () => {
                await BaichengStocks.haltStockTrading({
                    client: supabaseClient,
                    accountId,
                    stockId,
                    currentDate: accountProfile.world_date,
                    days
                });
                document.getElementById('dm-halt-days').value = '';
            }
        });
    }

    let chartResizeTimer = null;
    window.addEventListener('resize', () => {
        clearTimeout(chartResizeTimer);
        chartResizeTimer = setTimeout(() => {
            if (!snapshot) return;
            drawComparisonChart();
            if (selectedStockId) drawChart(selectedStockId);
        }, 120);
    });

    setupComparisonChartInteractions();
    init();
</script>
</body>
